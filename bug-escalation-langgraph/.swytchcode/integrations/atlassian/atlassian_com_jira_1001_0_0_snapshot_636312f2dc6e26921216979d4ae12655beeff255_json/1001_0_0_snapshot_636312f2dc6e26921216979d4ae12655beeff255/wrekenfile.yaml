      Deletes the [property](https://developer.atlassian.com/cloud/jira/platform/storing-data-without-a-database/#a-id-jira-entity-properties-a-jira-entity-properties) from a project.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg) or *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the property.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/properties/{propertyKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to administer the project. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project or property is not found. (HTTP 404)
    CANONICAL_ID: rest.api.properties.delete_a48f
