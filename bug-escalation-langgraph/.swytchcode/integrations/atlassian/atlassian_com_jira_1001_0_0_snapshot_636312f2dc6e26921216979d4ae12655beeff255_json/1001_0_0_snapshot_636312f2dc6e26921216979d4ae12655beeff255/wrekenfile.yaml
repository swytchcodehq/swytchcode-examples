        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.license.list
  jira.rest.issue.create:
    SUMMARY: Create issue
    DESC: |-
      Creates an issue or, where the option to create subtasks is enabled in Jira, a subtask. A transition may be applied, to move the issue or subtask to a workflow step other than the default start step, and issue properties set.

      The content of the issue or subtask is defined using `update` and `fields`. The fields that can be set in the issue or subtask are determined using the [ Get create issue metadata](#api-rest-api-3-issue-createmeta-get). These are the same fields that appear on the issue's create screen. Note that the `description`, `environment`, and any `textarea` type custom fields (multi-line text fields) take Atlassian Document Format content. Single line custom fields (`textfield`) accept a string and don't handle Atlassian Document Format content.

      Creating a subtask differs from creating an issue as follows:

       *  `issueType` must be set to a subtask issue type (use [ Get create issue metadata](#api-rest-api-3-issue-createmeta-get) to find subtask issue types).
       *  `parent` must contain the ID or key of the parent issue.

      In a next-gen project any issue may be made a child providing that the parent and child are members of the same project.

      **[Permissions](#permissions) required:** *Browse projects* and *Create issues* [project permissions](https://confluence.atlassian.com/x/yodKLg) for the project in which the issue or subtask is created.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueUpdateDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreatedIssue)
    INPUTS:
      - updateHistory:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(IssueUpdateDetails)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreatedIssue)
        RETURNVAR: rest_api_issue_create_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: |-
          Returned if the request:

           *  is missing required fields.
           *  contains invalid field values.
           *  contains fields that cannot be set for the issue type.
           *  is by a user who does not have the necessary permission.
           *  is to create a subtype in a project different that of the parent issue.
           *  is for a subtask when the option to create subtasks is disabled.
           *  is invalid for any other reason. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 422
        WHEN: Returned if a configuration problem prevents the creation of the issue. (HTTP 422)
    CANONICAL_ID: jira.rest.issue.create
  rest.api.archive.create:
    SUMMARY: Archive issue(s) by JQL
    DESC: |
      Enables admins to archive up to 100,000 issues in a single request using JQL, returning the URL to check the status of the submitted request.

      You can use the [get task](https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-tasks/#api-rest-api-3-task-taskid-get) and [cancel task](https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-tasks/#api-rest-api-3-task-taskid-cancel-post) APIs to manage the request.

      **Note that:**

       *  you can't archive subtasks directly, only through their parent issues
       *  you can only archive issues from software, service management, and business projects

      **[Permissions](#permissions) required:** Jira admin or site admin: [global permission](https://confluence.atlassian.com/x/x4dKLg)

      **License required:** Premium or Enterprise

      **Signed-in users only:** This API can't be accessed anonymously.

      **Rate limiting:** Only a single request per jira instance can be active at any given time.

    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/archive
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ArchiveIssueAsyncRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRING
    INPUTS:
      - body:
          TYPE: STRUCT(ArchiveIssueAsyncRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRING
        RETURNVAR: rest_api_archive_create_202
        STATUS: 202
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if no issues were archived due to a bad request, for example an invalid JQL query. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if no issues were archived because the provided authentication credentials are either missing or invalid. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if no issues were archived because the user lacks the required Jira admin or site admin permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 412
        WHEN: Returned if a request to archive issue(s) is already running. (HTTP 412)
    CANONICAL_ID: rest.api.archive.create
  rest.api.archive.update:
    SUMMARY: Archive issue(s) by issue ID/key
    DESC: |
      Enables admins to archive up to 1000 issues in a single request using issue ID/key, returning details of the issue(s) archived in the process and the errors encountered, if any.

      **Note that:**

       *  you can't archive subtasks directly, only through their parent issues
       *  you can only archive issues from software, service management, and business projects

      **[Permissions](#permissions) required:** Jira admin or site admin: [global permission](https://confluence.atlassian.com/x/x4dKLg)

      **License required:** Premium or Enterprise

      **Signed-in users only:** This API can't be accessed anonymously.

    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/issue/archive
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueArchivalSyncRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueArchivalSyncResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(IssueArchivalSyncRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(IssueArchivalSyncResponse)
        RETURNVAR: rest_api_archive_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if none of the issues in the request can be archived. Possible reasons:

           *  the issues weren't found
           *  the issues are subtasks
           *  the issues belong to unlicensed projects
           *  the issues belong to archived projects (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if no issues were archived because the provided authentication credentials are either missing or invalid. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if no issues were archived because the user lacks the required Jira admin or site admin permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 412
        WHEN: Returned if one or more issues were successfully archived, but the operation was incomplete because the number of issue IDs or keys provided exceeds 1000. (HTTP 412)
    CANONICAL_ID: rest.api.archive.update
  rest.api.bulk.create:
    SUMMARY: Bulk create issue
    DESC: |-
      Creates upto **50** issues and, where the option to create subtasks is enabled in Jira, subtasks. Transitions may be applied, to move the issues or subtasks to a workflow step other than the default start step, and issue properties set.

      The content of each issue or subtask is defined using `update` and `fields`. The fields that can be set in the issue or subtask are determined using the [ Get create issue metadata](#api-rest-api-3-issue-createmeta-get). These are the same fields that appear on the issues' create screens. Note that the `description`, `environment`, and any `textarea` type custom fields (multi-line text fields) take Atlassian Document Format content. Single line custom fields (`textfield`) accept a string and don't handle Atlassian Document Format content.

      Creating a subtask differs from creating an issue as follows:

       *  `issueType` must be set to a subtask issue type (use [ Get create issue metadata](#api-rest-api-3-issue-createmeta-get) to find subtask issue types).
       *  `parent` the must contain the ID or key of the parent issue.

      **[Permissions](#permissions) required:** *Browse projects* and *Create issues* [project permissions](https://confluence.atlassian.com/x/yodKLg) for the project in which each issue or subtask is created.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/bulk
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssuesUpdateBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreatedIssues)
    INPUTS:
      - body:
          TYPE: STRUCT(IssuesUpdateBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreatedIssues)
        RETURNVAR: rest_api_bulk_create_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(CreatedIssues)
        STATUS: 400
        WHEN: |-
          Returned if all requests are invalid. Requests may be unsuccessful when they:

           *  are missing required fields.
           *  contain invalid field values.
           *  contain fields that cannot be set for the issue type.
           *  are by a user who does not have the necessary permission.
           *  are to create a subtype in a project different that of the parent issue.
           *  is for a subtask when the option to create subtasks is disabled.
           *  are invalid for any other reason. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.bulk.create
  rest.api.bulkfetch.create_a8ed:
    SUMMARY: Bulk fetch issues
    DESC: |-
      Returns the details for a set of requested issues. You can request up to 100 issues.

      Each issue is identified by its ID or key, however, if the identifier doesn't match an issue, a case-insensitive search and check for moved issues is performed. If a matching issue is found its details are returned, a 302 or other redirect is **not** returned.

      Issues will be returned in ascending `id` order. If there are errors, Jira will return a list of issues which couldn't be fetched along with error messages.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** Issues are included in the response where the user has:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/bulkfetch
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BulkFetchIssueRequestBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BulkIssueResults)
    INPUTS:
      - body:
          TYPE: STRUCT(BulkFetchIssueRequestBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BulkIssueResults)
        RETURNVAR: rest_api_bulkfetch_create_a8ed
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if no issue IDs/keys were present, or more than 100 issue IDs/keys were requested. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.bulkfetch.create_a8ed
  rest.api.createmeta.list:
    SUMMARY: Get create issue metadata
    DESC: |-
      Returns details of projects, issue types within projects, and, when requested, the create screen fields for each issue type for the user. Use the information to populate the requests in [ Create issue](#api-rest-api-3-issue-post) and [Create issues](#api-rest-api-3-issue-bulk-post).

      Deprecated, see [Create Issue Meta Endpoint Deprecation Notice](https://developer.atlassian.com/cloud/jira/platform/changelog/#CHANGE-1304).

      The request can be restricted to specific projects or issue types using the query parameters. The response will contain information for the valid projects, issue types, or project and issue type combinations requested. Note that invalid project, issue type, or project and issue type combinations do not generate errors.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Create issues* [project permission](https://confluence.atlassian.com/x/yodKLg) in the requested projects.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/createmeta
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueCreateMetadata)
    INPUTS:
      - projectIds:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - projectKeys:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - issuetypeIds:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - issuetypeNames:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(IssueCreateMetadata)
        RETURNVAR: rest_api_createmeta_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.createmeta.list
  rest.api.issuetypes.get:
    SUMMARY: Get create metadata issue types for a project
    DESC: |-
      Returns a page of issue type metadata for a specified project. Use the information to populate the requests in [ Create issue](#api-rest-api-3-issue-post) and [Create issues](#api-rest-api-3-issue-bulk-post).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Create issues* [project permission](https://confluence.atlassian.com/x/yodKLg) in the requested projects.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/createmeta/{projectIdOrKey}/issuetypes
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageOfCreateMetaIssueTypes)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
    RETURNS:
      - RETURNTYPE: STRUCT(PageOfCreateMetaIssueTypes)
        RETURNVAR: rest_api_issuetypes_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.issuetypes.get
  rest.api.issuetypes.get_148d:
    SUMMARY: Get create field metadata for a project and issue type id
    DESC: |-
      Returns a page of field metadata for a specified project and issuetype id. Use the information to populate the requests in [ Create issue](#api-rest-api-3-issue-post) and [Create issues](#api-rest-api-3-issue-bulk-post).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Create issues* [project permission](https://confluence.atlassian.com/x/yodKLg) in the requested projects.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/createmeta/{projectIdOrKey}/issuetypes/{issueTypeId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageOfCreateMetaIssueTypeWithField)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - issueTypeId:
          TYPE: STRING
          LOCATION: path
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
    RETURNS:
      - RETURNTYPE: STRUCT(PageOfCreateMetaIssueTypeWithField)
        RETURNVAR: rest_api_issuetypes_get_148d
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.issuetypes.get_148d
  rest.api.report.list:
    SUMMARY: Get issue limit report
    DESC: |-
      Returns all issues breaching and approaching per-issue limits.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) is required for the project the issues are in. Results may be incomplete otherwise
       *  *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/limit/report
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueLimitReportResponseBean)
    INPUTS:
      - isReturningKeys:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(IssueLimitReportResponseBean)
        RETURNVAR: rest_api_report_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to complete this request. (HTTP 403)
    CANONICAL_ID: rest.api.report.list
  rest.api.picker.list_d660:
    SUMMARY: Get issue picker suggestions
    DESC: |-
      Returns lists of issues matching a query string. Use this resource to provide auto-completion suggestions when the user is looking for an issue using a word or string.

      This operation returns two lists:

       *  `History Search` which includes issues from the user's history of created, edited, or viewed issues that contain the string in the `query` parameter.
       *  `Current Search` which includes issues that match the JQL expression in `currentJQL` and contain the string in the `query` parameter.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/picker
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssuePickerSuggestions)
    INPUTS:
      - query:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - currentJQL:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - currentIssueKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - currentProjectId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - showSubTasks:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - showSubTaskParent:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(IssuePickerSuggestions)
        RETURNVAR: rest_api_picker_list_d660
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.picker.list_d660
  rest.api.properties.create:
    SUMMARY: Bulk set issues properties by list
    DESC: |-
      Sets or updates a list of entity property values on issues. A list of up to 10 entity properties can be specified along with up to 10,000 issues on which to set or update that list of entity properties.

      The value of the request body must be a [valid](http://tools.ietf.org/html/rfc4627), non-empty JSON. The maximum length of single issue property value is 32768 characters. This operation can be accessed anonymously.

      This operation is:

       *  transactional, either all properties are updated in all eligible issues or, when errors occur, no properties are updated.
       *  [asynchronous](#async). Follow the `location` link in the response to determine the status of the task and use [Get task](#api-rest-api-3-task-taskId-get) to obtain subsequent updates.

      **[Permissions](#permissions) required:**

       *  *Browse projects* and *Edit issues* [project permissions](https://confluence.atlassian.com/x/yodKLg) for the project containing the issue.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/properties
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueEntityProperties)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(IssueEntityProperties)
          LOCATION: body
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Return if the request is invalid or the user does not have the necessary permission. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
    CANONICAL_ID: rest.api.properties.create
  rest.api.multi.create:
    SUMMARY: Bulk set issue properties by issue
    DESC: |-
      Sets or updates entity property values on issues. Up to 10 entity properties can be specified for each issue and up to 100 issues included in the request.

      The value of the request body must be a [valid](http://tools.ietf.org/html/rfc4627), non-empty JSON.

      This operation is:

       *  [asynchronous](#async). Follow the `location` link in the response to determine the status of the task and use [Get task](#api-rest-api-3-task-taskId-get) to obtain subsequent updates.
       *  non-transactional. Updating some entities may fail. Such information will available in the task result.

      **[Permissions](#permissions) required:**

       *  *Browse projects* and *Edit issues* [project permissions](https://confluence.atlassian.com/x/yodKLg) for the project containing the issue.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/properties/multi
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(MultiIssueEntityProperties)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(MultiIssueEntityProperties)
          LOCATION: body
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Return if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Return if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.multi.create
  rest.api.properties.delete_9f2c:
    SUMMARY: Bulk delete issue property
    DESC: |-
      Deletes a property value from multiple issues. The issues to be updated can be specified by filter criteria.

      The criteria the filter used to identify eligible issues are:

       *  `entityIds` Only issues from this list are eligible.
       *  `currentValue` Only issues with the property set to this value are eligible.

      If both criteria is specified, they are joined with the logical *AND*: only issues that satisfy both criteria are considered eligible.

      If no filter criteria are specified, all the issues visible to the user and where the user has the EDIT\_ISSUES permission for the issue are considered eligible.

      This operation is:

       *  transactional, either the property is deleted from all eligible issues or, when errors occur, no properties are deleted.
       *  [asynchronous](#async). Follow the `location` link in the response to determine the status of the task and use [Get task](#api-rest-api-3-task-taskId-get) to obtain subsequent updates.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [ project permission](https://confluence.atlassian.com/x/yodKLg) for each project containing issues.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  *Edit issues* [project permission](https://confluence.atlassian.com/x/yodKLg) for each issue.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/issue/properties/{propertyKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueFilterForBulkPropertyDelete)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(IssueFilterForBulkPropertyDelete)
          LOCATION: body
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.properties.delete_9f2c
  rest.api.properties.update_83e3:
    SUMMARY: Bulk set issue property
    DESC: |-
      Sets a property value on multiple issues.

      The value set can be a constant or determined by a [Jira expression](https://developer.atlassian.com/cloud/jira/platform/jira-expressions/). Expressions must be computable with constant complexity when applied to a set of issues. Expressions must also comply with the [restrictions](https://developer.atlassian.com/cloud/jira/platform/jira-expressions/#restrictions) that apply to all Jira expressions.

      The issues to be updated can be specified by a filter.

      The filter identifies issues eligible for update using these criteria:

       *  `entityIds` Only issues from this list are eligible.
       *  `currentValue` Only issues with the property set to this value are eligible.
       *  `hasProperty`:

           *  If *true*, only issues with the property are eligible.
           *  If *false*, only issues without the property are eligible.

      If more than one criteria is specified, they are joined with the logical *AND*: only issues that satisfy all criteria are eligible.

      If an invalid combination of criteria is provided, an error is returned. For example, specifying a `currentValue` and `hasProperty` as *false* would not match any issues (because without the property the property cannot have a value).

      The filter is optional. Without the filter all the issues visible to the user and where the user has the EDIT\_ISSUES permission for the issue are considered eligible.

      This operation is:

       *  transactional, either all eligible issues are updated or, when errors occur, none are updated.
       *  [asynchronous](#async). Follow the `location` link in the response to determine the status of the task and use [Get task](#api-rest-api-3-task-taskId-get) to obtain subsequent updates.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for each project containing issues.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  *Edit issues* [project permission](https://confluence.atlassian.com/x/yodKLg) for each issue.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/issue/properties/{propertyKey}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BulkIssuePropertyUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BulkIssuePropertyUpdateRequest)
          LOCATION: body
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.properties.update_83e3
  rest.api.unarchive.update:
    SUMMARY: Unarchive issue(s) by issue keys/ID
    DESC: |
      Enables admins to unarchive up to 1000 issues in a single request using issue ID/key, returning details of the issue(s) unarchived in the process and the errors encountered, if any.

      **Note that:**

       *  you can't unarchive subtasks directly, only through their parent issues
       *  you can only unarchive issues from software, service management, and business projects

      **[Permissions](#permissions) required:** Jira admin or site admin: [global permission](https://confluence.atlassian.com/x/x4dKLg)

      **License required:** Premium or Enterprise

      **Signed-in users only:** This API can't be accessed anonymously.

    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/issue/unarchive
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueArchivalSyncRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueArchivalSyncResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(IssueArchivalSyncRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(IssueArchivalSyncResponse)
        RETURNVAR: rest_api_unarchive_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if none of the issues in the request are eligible to be unarchived. Possible reasons:

           *  the issues weren't found
           *  the issues are subtasks
           *  the issues belong to archived projects (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if no issues were unarchived because the provided authentication credentials are either missing or invalid. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if no issues were unarchived because the user lacks the required Jira admin or site admin permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 412
        WHEN: Returned if one or more issues were successfully unarchived, but the operation was incomplete because the number of issue IDs or keys provided exceeds 1000. (HTTP 412)
    CANONICAL_ID: rest.api.unarchive.update
  rest.api.watching.create:
    SUMMARY: Get is watching issue bulk
    DESC: |-
      Returns, for the user, details of the watched status of issues from a list. If an issue ID is invalid, the returned watched status is `false`.

      This operation requires the **Allow users to watch issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/watching
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueList)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BulkIssueIsWatching)
    INPUTS:
      - body:
          TYPE: STRUCT(IssueList)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BulkIssueIsWatching)
        RETURNVAR: rest_api_watching_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.watching.create
  rest.api.issue.delete_bc21:
    SUMMARY: Delete issue
    DESC: |-
      Deletes an issue.

      An issue cannot be deleted if it has one or more subtasks. To delete an issue with subtasks, set `deleteSubtasks`. This causes the issue's subtasks to be deleted with the issue.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse projects* and *Delete issues* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the issue.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - deleteSubtasks:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: "false"
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the issue has subtasks and `deleteSubtasks` is not set to *true*. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to delete the issue. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found or the user does not have permission to view the issue. (HTTP 404)
    CANONICAL_ID: rest.api.issue.delete_bc21
  rest.api.issue.get:
    SUMMARY: Get issue
    DESC: |-
      Returns the details for an issue.

      The issue is identified by its ID or key, however, if the identifier doesn't match an issue, a case-insensitive search and check for moved issues is performed. If a matching issue is found its details are returned, a 302 or other redirect is **not** returned. The issue key returned in the response is the key of the issue found.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueBean)
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - fields:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - fieldsByKeys:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - updateHistory:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - failFast:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(IssueBean)
        RETURNVAR: rest_api_issue_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.issue.get
  rest.api.issue.update:
    SUMMARY: Edit issue
    DESC: |-
      Edits an issue. Issue properties may be updated as part of the edit. Please note that issue transition is not supported and is ignored here. To transition an issue, please use [Transition issue](#api-rest-api-3-issue-issueIdOrKey-transitions-post).

      The edits to the issue's fields are defined using `update` and `fields`. The fields that can be edited are determined using [ Get edit issue metadata](#api-rest-api-3-issue-issueIdOrKey-editmeta-get).

      The parent field may be set by key or ID. For standard issue types, the parent may be removed by setting `update.parent.set.none` to *true*. Note that the `description`, `environment`, and any `textarea` type custom fields (multi-line text fields) take Atlassian Document Format content. Single line custom fields (`textfield`) accept a string and don't handle Atlassian Document Format content.

      Connect apps having an app user with *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg), and Forge apps acting on behalf of users with *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg), can override the screen security configuration using `overrideScreenSecurity` and `overrideEditableFlag`.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse projects* and *Edit issues* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueUpdateDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - notifyUsers:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - overrideScreenSecurity:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - overrideEditableFlag:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - returnIssue:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: ""
      - body:
          TYPE: STRUCT(IssueUpdateDetails)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_issue_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the request body is missing.
           *  the user does not have the necessary permission to edit one or more fields.
           *  the request includes one or more fields that are not found or are not associated with the issue's edit screen.
           *  the request includes an invalid transition. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user uses `overrideScreenSecurity` or `overrideEditableFlag` but doesn't have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found or the user does not have permission to view it. (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Returned if the issue could not be updated due to a conflicting update. (HTTP 409)
      - TYPE: ANY
        STATUS: 422
        WHEN: Returned if a configuration problem prevents the issue being updated. (HTTP 422)
    CANONICAL_ID: rest.api.issue.update
  rest.api.assignee.update:
    SUMMARY: Assign issue
    DESC: |-
      Assigns an issue to a user. Use this operation when the calling user does not have the *Edit Issues* permission but has the *Assign issue* permission for the project that the issue is in.

      If `name` or `accountId` is set to:

       *  `"-1"`, the issue is assigned to the default assignee for the project.
       *  `null`, the issue is set to unassigned.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse Projects* and *Assign Issues* [ project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/assignee
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(User)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(User)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the user is not found.
           *  `name`, `key`, or `accountId` is missing.
           *  more than one of `name`, `key`, and `accountId` are provided. (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found. (HTTP 404)
    CANONICAL_ID: rest.api.assignee.update
  rest.api.attachments.create:
    SUMMARY: Add attachment
    DESC: |-
      Adds one or more attachments to an issue. Attachments are posted as multipart/form-data ([RFC 1867](https://www.ietf.org/rfc/rfc1867.txt)).

      Note that:

       *  The request must have a `X-Atlassian-Token: no-check` header, if not it is blocked. See [Special headers](#special-request-headers) for more information.
       *  The name of the multipart/form-data parameter that contains the attachments must be `file`.

      The following examples upload a file called *myfile.txt* to the issue *TEST-123*:

      #### curl ####

          curl --location --request POST 'https://your-domain.atlassian.net/rest/api/3/issue/TEST-123/attachments'
           -u 'email@example.com:<api_token>'
           -H 'X-Atlassian-Token: no-check'
           --form 'file=@"myfile.txt"'

      #### Node.js ####

          // This code sample uses the 'node-fetch' and 'form-data' libraries:
           // https://www.npmjs.com/package/node-fetch
           // https://www.npmjs.com/package/form-data
           const fetch = require('node-fetch');
           const FormData = require('form-data');
           const fs = require('fs');

           const filePath = 'myfile.txt';
           const form = new FormData();
           const stats = fs.statSync(filePath);
           const fileSizeInBytes = stats.size;
           const fileStream = fs.createReadStream(filePath);

           form.append('file', fileStream, {knownLength: fileSizeInBytes});

           fetch('https://your-domain.atlassian.net/rest/api/3/issue/TEST-123/attachments', {
               method: 'POST',
               body: form,
               headers: {
                   'Authorization': `Basic ${Buffer.from(
                       'email@example.com:'
                   ).toString('base64')}`,
                   'Accept': 'application/json',
                   'X-Atlassian-Token': 'no-check'
               }
           })
               .then(response => {
                   console.log(
                       `Response: ${response.status} ${response.statusText}`
                   );
                   return response.text();
               })
               .then(text => console.log(text))
               .catch(err => console.error(err));

      #### Java ####

          // This code sample uses the  'Unirest' library:
           // http://unirest.io/java.html
           HttpResponse response = Unirest.post("https://your-domain.atlassian.net/rest/api/2/issue/{issueIdOrKey}/attachments")
                   .basicAuth("email@example.com", "")
                   .header("Accept", "application/json")
                   .header("X-Atlassian-Token", "no-check")
                   .field("file", new File("myfile.txt"))
                   .asJson();

                   System.out.println(response.getBody());

      #### Python ####

          # This code sample uses the 'requests' library:
           # http://docs.python-requests.org
           import requests
           from requests.auth import HTTPBasicAuth
           import json

           url = "https://your-domain.atlassian.net/rest/api/2/issue/{issueIdOrKey}/attachments"

           auth = HTTPBasicAuth("email@example.com", "")

           headers = {
              "Accept": "application/json",
              "X-Atlassian-Token": "no-check"
           }

           response = requests.request(
              "POST",
              url,
              headers = headers,
              auth = auth,
              files = {
                   "file": ("myfile.txt", open("myfile.txt","rb"), "application-type")
              }
           )

           print(json.dumps(json.loads(response.text), sort_keys=True, indent=4, separators=(",", ": ")))

      #### PHP ####

          // This code sample uses the 'Unirest' library:
           // http://unirest.io/php.html
           Unirest\Request::auth('email@example.com', '');

           $headers = array(
             'Accept' => 'application/json',
             'X-Atlassian-Token' => 'no-check'
           );

           $parameters = array(
             'file' => File::add('myfile.txt')
           );

           $response = Unirest\Request::post(
             'https://your-domain.atlassian.net/rest/api/2/issue/{issueIdOrKey}/attachments',
             $headers,
             $parameters
           );

           var_dump($response)

      #### Forge ####

          // This sample uses Atlassian Forge and the `form-data` library.
           // https://developer.atlassian.com/platform/forge/
           // https://www.npmjs.com/package/form-data
           import api from "@forge/api";
           import FormData from "form-data";

           const form = new FormData();
           form.append('file', fileStream, {knownLength: fileSizeInBytes});

           const response = await api.asApp().requestJira('/rest/api/2/issue/{issueIdOrKey}/attachments', {
               method: 'POST',
               body: form,
               headers: {
                   'Accept': 'application/json',
                   'X-Atlassian-Token': 'no-check'
               }
           });

           console.log(`Response: ${response.status} ${response.statusText}`);
           console.log(await response.json());

      Tip: Use a client library. Many client libraries have classes for handling multipart POST operations. For example, in Java, the Apache HTTP Components library provides a [MultiPartEntity](http://hc.apache.org/httpcomponents-client-ga/httpmime/apidocs/org/apache/http/entity/mime/MultipartEntity.html) class for multipart POST operations.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse Projects* and *Create attachments* [ project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/attachments
      HEADERS:
        Content-Type: multipart/form-data
        Authorization: bearer_token
      CONTENT_TYPE: multipart/form-data
      ACCEPT: application/json
      BODYTYPE: form-data
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(Attachment)"
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(Attachment)"
        RETURNVAR: rest_api_attachments_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if any of the following is true:

           *  the issue is not found.
           *  the user does not have permission to view the issue. (HTTP 404)
      - TYPE: ANY
        STATUS: 413
        WHEN: |-
          Returned if any of the following is true:

           *  the attachments exceed the maximum attachment size for issues.
           *  more than 60 files are requested to be uploaded.
           *  the per-issue limit for attachments has been breached.

          See [Configuring file attachments](https://confluence.atlassian.com/x/wIXKM) for details. (HTTP 413)
    CANONICAL_ID: rest.api.attachments.create
