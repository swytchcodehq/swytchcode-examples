      TYPE: STRING
      REQUIRED: false
      comment: The unique name for the component in the project. Required when creating a component. Optional when updating a component. The maximum length is 255 characters.
    - name: project
      NAME: project
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The key of the project the component is assigned to. Required when creating a component. Can't be updated.
    - name: projectId
      NAME: projectId
