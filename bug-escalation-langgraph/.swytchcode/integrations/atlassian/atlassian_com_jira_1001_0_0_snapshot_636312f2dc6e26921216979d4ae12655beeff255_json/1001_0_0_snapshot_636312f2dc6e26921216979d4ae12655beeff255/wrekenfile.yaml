      METHOD: GET
      ENDPOINT: /rest/api/3/component
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBean2ComponentJsonBean)
    INPUTS:
      - projectIdsOrKeys:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
