        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BulkCustomFieldOptionCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CustomFieldCreatedContextOptionsList)
    INPUTS:
      - fieldId:
          TYPE: STRING
          LOCATION: path
      - contextId:
          TYPE: INT
          LOCATION: path
      - body:
