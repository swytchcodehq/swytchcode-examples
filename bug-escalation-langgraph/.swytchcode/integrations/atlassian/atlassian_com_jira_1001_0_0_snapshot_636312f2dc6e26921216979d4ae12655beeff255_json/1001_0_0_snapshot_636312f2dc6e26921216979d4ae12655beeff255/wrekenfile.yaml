  rest.api.role.list:
    SUMMARY: Get all project roles
    DESC: |-
      Gets a list of all project roles, complete with project role details and default actors.

      ### About project roles ###

      [Project roles](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-roles/) are a flexible way to to associate users and groups with projects. In Jira Cloud, the list of project roles is shared globally with all projects, but each project can have a different set of actors associated with it (unlike groups, which have the same membership throughout all Jira applications).

      Project roles are used in [permission schemes](#api-rest-api-3-permissionscheme-get), [email notification schemes](#api-rest-api-3-notificationscheme-get), [issue security levels](#api-rest-api-3-issuesecurityschemes-get), [comment visibility](#api-rest-api-3-comment-list-post), and workflow conditions.

      #### Members and actors ####

      In the Jira REST API, a member of a project role is called an *actor*. An *actor* is a group or user associated with a project role.

      Actors may be set as [default members](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-roles/#Specifying-'default-members'-for-a-project-role) of the project role or set at the project level:

       *  Default actors: Users and groups that are assigned to the project role for all newly created projects. The default actors can be removed at the project level later if desired.
       *  Actors: Users and groups that are associated with a project role for a project, which may differ from the default actors. This enables you to assign a user to different roles in different projects.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/role
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(ProjectRole)"
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ProjectRole)"
        RETURNVAR: rest_api_role_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have administrative permissions. (HTTP 403)
    CANONICAL_ID: rest.api.role.list
  rest.api.role.create_c180:
    SUMMARY: Create project role
    DESC: |-
      Creates a new project role with no [default actors](#api-rest-api-3-resolution-get). You can use the [Add default actors to project role](#api-rest-api-3-role-id-actors-post) operation to add default actors to the project role after creating it.

       *Note that although a new project role is available to all projects upon creation, any default actors that are associated with the project role are not added to projects that existed prior to the role being created.*<

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/role
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateUpdateRoleRequestBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectRole)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateUpdateRoleRequestBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectRole)
        RETURNVAR: rest_api_role_create_c180
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. The `name` cannot be empty or start or end with whitespace. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have administrative permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 409
        WHEN: Returned if a project role with the provided name already exists. (HTTP 409)
    CANONICAL_ID: rest.api.role.create_c180
  rest.api.role.delete_b161:
    SUMMARY: Delete project role
    DESC: |-
      Deletes a project role. You must specify a replacement project role if you wish to delete a project role that is in use.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/role/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - swap:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid or if the replacement project role is not found. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have administrative permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project role being deleted is not found. (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Returned if the project role being deleted is in use and a replacement project role is not specified in the request. (HTTP 409)
    CANONICAL_ID: rest.api.role.delete_b161
