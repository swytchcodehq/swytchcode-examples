  rest.api.comment.list:
    SUMMARY: Get comments by IDs
    DESC: |-
      Returns a [paginated](#pagination) list of comments specified by a list of comment IDs.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** Comments are returned where the user:

       *  has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the comment.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If the comment has visibility restrictions, belongs to the group or has the role visibility is restricted to.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/comment/list
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueCommentListRequestBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanComment)
    INPUTS:
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(IssueCommentListRequestBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanComment)
        RETURNVAR: rest_api_comment_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request contains more than 1000 IDs or is empty. (HTTP 400)
    CANONICAL_ID: rest.api.comment.list
  rest.api.properties.get:
    SUMMARY: Get comment property keys
    DESC: |-
      Returns the keys of all the properties of a comment.

      This operation can be accessed anonymously.

