  rest.api.plan.update:
    SUMMARY: Update plan
    DESC: |-
      Updates any of the following details of a plan using [JSON Patch](https://datatracker.ietf.org/doc/html/rfc6902).

       *  name
       *  leadAccountId
       *  scheduling

           *  estimation with StoryPoints, Days or Hours as possible values
           *  startDate

               *  type with DueDate, TargetStartDate, TargetEndDate or DateCustomField as possible values
               *  dateCustomFieldId
           *  endDate

               *  type with DueDate, TargetStartDate, TargetEndDate or DateCustomField as possible values
               *  dateCustomFieldId
           *  inferredDates with None, SprintDates or ReleaseDates as possible values
           *  dependencies with Sequential or Concurrent as possible values
       *  issueSources

           *  type with Board, Project or Filter as possible values
           *  value
       *  exclusionRules

           *  numberOfDaysToShowCompletedIssues
           *  issueIds
           *  workStatusIds
           *  workStatusCategoryIds
           *  issueTypeIds
           *  releaseIds
       *  crossProjectReleases

           *  name
           *  releaseIds
       *  customFields

           *  customFieldId
           *  filter
       *  permissions

           *  type with View or Edit as possible values
           *  holder

               *  type with Group or AccountId as possible values
               *  value

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).

      *Note that "add" operations do not respect array indexes in target locations. Call the "Get plan" endpoint to find out the order of array elements.*
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/plans/plan/{planId}
      HEADERS:
        Content-Type: application/json-patch+json
        Authorization: bearer_token
      CONTENT_TYPE: application/json-patch+json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - planId:
          TYPE: INT
          LOCATION: path
      - useGroupId:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the user is not logged in. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have the Administer Jira global permission. (HTTP 403)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the plan is not found. (HTTP 404)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 409
        WHEN: Returned if the plan is not active. (HTTP 409)
    CANONICAL_ID: rest.api.plan.update
