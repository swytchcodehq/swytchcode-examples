  rest.api.properties.update_dd20:
    SUMMARY: Set project property
    DESC: |-
      Sets the value of the [project property](https://developer.atlassian.com/cloud/jira/platform/storing-data-without-a-database/#a-id-jira-entity-properties-a-jira-entity-properties). You can use project properties to store custom data against the project.

      The value of the request body must be a [valid](http://tools.ietf.org/html/rfc4627), non-empty JSON blob. The maximum length is 32768 characters.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg) or *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project in which the property is created.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/properties/{propertyKey}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(rest.api.properties.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(rest.api.properties.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_properties_update_dd20
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_properties_update_dd20_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the project key or id is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to administer the project. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found. (HTTP 404)
    CANONICAL_ID: rest.api.properties.update_dd20
  rest.api.restore.create_fc02:
    SUMMARY: Restore deleted or archived project
    DESC: |-
      Restores a project that has been archived or placed in the Jira recycle bin.

      **[Permissions](#permissions) required:**

       *  *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg)for Company managed projects.
       *  *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg) or *Administer projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project for Team managed projects.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/restore
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Project)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Project)
        RETURNVAR: rest_api_restore_create_fc02
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have the necessary permission. (HTTP 404)
    CANONICAL_ID: rest.api.restore.create_fc02
  rest.api.role.get:
    SUMMARY: Get project roles for project
    DESC: |-
      Returns a list of [project roles](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-roles/) for the project returning the name and self URL for each role.

      Note that all project roles are shared with all projects in Jira Cloud. See [Get all project roles](#api-rest-api-3-role-get) for more information.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for any project on the site or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/role
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: map[STRING]STRING
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: map[STRING]STRING
        RETURNVAR: rest_api_role_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing or if the user lacks administrative permissions for the project. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or or if the user does not have administrative permissions for the project. (HTTP 404)
    CANONICAL_ID: rest.api.role.get
  rest.api.role.delete:
    SUMMARY: Delete actors from project role
    DESC: |-
      Deletes actors from a project role for the project.

      To remove default actors from the project role, use [Delete default actors from project role](#api-rest-api-3-role-id-actors-delete).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/role/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - id:
          TYPE: INT
          LOCATION: path
      - user:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - group:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - groupId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the project or project role is not found.
           *  the calling user does not have administrative permission. (HTTP 404)
    CANONICAL_ID: rest.api.role.delete
  rest.api.role.get_fad7:
    SUMMARY: Get project role for project
    DESC: |-
      Returns a project role's details and actors associated with the project. The list of actors is sorted by display name.

      To check whether a user belongs to a role based on their group memberships, use [Get user](#api-rest-api-3-user-get) with the `groups` expand parameter selected. Then check whether the user keys and groups match with the actors returned for the project.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/role/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectRole)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - id:
          TYPE: INT
          LOCATION: path
      - excludeInactiveUsers:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectRole)
        RETURNVAR: rest_api_role_get_fad7
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the project or project role is not found.
           *  the user does not have administrative permission. (HTTP 404)
    CANONICAL_ID: rest.api.role.get_fad7
  rest.api.role.create:
