  rest.api.search.list_a240:
    SUMMARY: Search priorities
    DESC: |-
      Returns a [paginated](#pagination) list of priorities. The list can contain all priorities or a subset determined by any combination of these criteria:

       *  a list of priority IDs. Any invalid priority IDs are ignored.
       *  a list of project IDs. Only priorities that are available in these projects will be returned. Any invalid project IDs are ignored.
       *  whether the field configuration is a default. This returns priorities from company-managed (classic) projects only, as there is no concept of default priorities in team-managed projects.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/priority/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanPriority)
    INPUTS:
      - startAt:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: "0"
      - maxResults:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: "50"
      - id:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - projectId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - priorityName:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: ""
      - onlyDefault:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: ""
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanPriority)
        RETURNVAR: rest_api_search_list_a240
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.search.list_a240
