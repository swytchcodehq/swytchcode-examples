VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  basic_auth: Basic <BASE64>
  w_base_url: https://{your-domain}.atlassian.net
METHODS:
  rest.api.announcementBanner.list:
    SUMMARY: Get announcement banner configuration
    DESC: |-
      Returns the current announcement banner configuration.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/announcementBanner
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AnnouncementBannerConfiguration)
    RETURNS:
      - RETURNTYPE: STRUCT(AnnouncementBannerConfiguration)
        RETURNVAR: rest_api_announcementBanner_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.announcementBanner.list
  rest.api.announcementBanner.update:
    SUMMARY: Update announcement banner configuration
    DESC: |-
      Updates the announcement banner configuration.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/announcementBanner
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AnnouncementBannerConfigurationUpdate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(AnnouncementBannerConfigurationUpdate)
          LOCATION: body
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if an invalid parameter is passed. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.announcementBanner.update
  rest.api.configuration.list:
    SUMMARY: Bulk get custom field configurations
    DESC: |-
      Returns a [paginated](#pagination) list of configurations for list of custom fields of a [type](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field-type/) created by a [Forge app](https://developer.atlassian.com/platform/forge/).

      The result can be filtered by one of these criteria:

       *  `id`.
       *  `fieldContextId`.
       *  `issueId`.
       *  `projectKeyOrId` and `issueTypeId`.

      Otherwise, all configurations for the provided list of custom fields are returned.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg). Jira permissions are not required for the Forge app that provided the custom field type.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/app/field/context/configuration/list
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ConfigurationsListParameters)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanBulkContextualConfiguration)
    INPUTS:
      - id:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - fieldContextId:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - issueId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - projectKeyOrId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - issueTypeId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
      - body:
          TYPE: STRUCT(ConfigurationsListParameters)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanBulkContextualConfiguration)
        RETURNVAR: rest_api_configuration_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user is not a Jira admin or the request is not authenticated as from the app that provided the field. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the custom field is not found. (HTTP 404)
    CANONICAL_ID: rest.api.configuration.list
  rest.api.value.create:
    SUMMARY: Update custom fields
    DESC: |-
      Updates the value of one or more custom fields on one or more issues. Combinations of custom field and issue should be unique within the request.

      Apps can only perform this operation on [custom fields](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field/) and [custom field types](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field-type/) declared in their own manifests.

      **[Permissions](#permissions) required:** Only the app that owns the custom field or custom field type can update its values with this operation.

      The new `write:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/app/field/value
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(MultipleCustomFieldValuesUpdateDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - generateChangelog:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - body:
          TYPE: STRUCT(MultipleCustomFieldValuesUpdateDetails)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request is not authenticated as the app that provided all the fields. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if any field is not found. (HTTP 404)
    CANONICAL_ID: rest.api.value.create
  rest.api.configuration.get:
    SUMMARY: Get custom field configurations
    DESC: |-
      Returns a [paginated](#pagination) list of configurations for a custom field of a [type](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field-type/) created by a [Forge app](https://developer.atlassian.com/platform/forge/).

      The result can be filtered by one of these criteria:

       *  `id`.
       *  `fieldContextId`.
       *  `issueId`.
       *  `projectKeyOrId` and `issueTypeId`.

      Otherwise, all configurations are returned.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg). Jira permissions are not required for the Forge app that provided the custom field type.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/app/field/{fieldIdOrKey}/context/configuration
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanContextualConfiguration)
    INPUTS:
      - fieldIdOrKey:
          TYPE: STRING
          LOCATION: path
      - id:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - fieldContextId:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - issueId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - projectKeyOrId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - issueTypeId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanContextualConfiguration)
        RETURNVAR: rest_api_configuration_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user is not a Jira admin or the request is not authenticated as from the app that provided the field. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the custom field is not found. (HTTP 404)
    CANONICAL_ID: rest.api.configuration.get
  rest.api.configuration.update:
    SUMMARY: Update custom field configurations
    DESC: |-
      Update the configuration for contexts of a custom field of a [type](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field-type/) created by a [Forge app](https://developer.atlassian.com/platform/forge/).

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg). Jira permissions are not required for the Forge app that created the custom field type.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/app/field/{fieldIdOrKey}/context/configuration
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CustomFieldConfigurations)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - fieldIdOrKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(CustomFieldConfigurations)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_configuration_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user is not a Jira admin or the request is not authenticated as from the app that provided the field. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the custom field is not found. (HTTP 404)
    CANONICAL_ID: rest.api.configuration.update
  rest.api.value.update:
    SUMMARY: Update custom field value
    DESC: |-
      Updates the value of a custom field on one or more issues.

       Apps can only perform this operation on [custom fields](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field/) and [custom field types](https://developer.atlassian.com/platform/forge/manifest-reference/modules/jira-custom-field-type/) declared in their own manifests.

      **[Permissions](#permissions) required:** Only the app that owns the custom field or custom field type can update its values with this operation.

      The new `write:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/app/field/{fieldIdOrKey}/value
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CustomFieldValueUpdateDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - fieldIdOrKey:
          TYPE: STRING
          LOCATION: path
      - generateChangelog:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - body:
          TYPE: STRUCT(CustomFieldValueUpdateDetails)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request is not authenticated as the app that provided the field. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the field is not found. (HTTP 404)
    CANONICAL_ID: rest.api.value.update
  rest.api.applicationProperties.list:
    SUMMARY: Get application property
    DESC: |-
      Returns all application properties or an application property.

      If you specify a value for the `key` parameter, then an application property is returned as an object (not in an array). Otherwise, an array of all editable application properties is returned. See [Set application property](#api-rest-api-3-application-properties-id-put) for descriptions of editable properties.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/application-properties
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(ApplicationProperty)"
    INPUTS:
      - key:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - permissionLevel:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - keyFilter:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ApplicationProperty)"
        RETURNVAR: rest_api_applicationProperties_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the application property is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.applicationProperties.list
  rest.api.advancedSettings.list:
    SUMMARY: Get advanced settings
    DESC: |-
      Returns the application properties that are accessible on the *Advanced Settings* page. To navigate to the *Advanced Settings* page in Jira, choose the Jira icon > **Jira settings** > **System**, **General Configuration** and then click **Advanced Settings** (in the upper right).

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/application-properties/advanced-settings
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(ApplicationProperty)"
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ApplicationProperty)"
        RETURNVAR: rest_api_advancedSettings_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user is not an administrator. (HTTP 403)
    CANONICAL_ID: rest.api.advancedSettings.list
  rest.api.applicationProperties.update:
    SUMMARY: Set application property
    DESC: |-
      Changes the value of an application property. For example, you can change the value of the `jira.clone.prefix` from its default value of *CLONE -* to *Clone -* if you prefer sentence case capitalization. Editable properties are described below along with their default values.

      #### Advanced settings ####

      The advanced settings below are also accessible in [Jira](https://confluence.atlassian.com/x/vYXKM).

      | Key | Description | Default value |
      | -- | -- | -- |
      | `jira.clone.prefix` | The string of text prefixed to the title of a cloned issue. | `CLONE -` |
      | `jira.date.picker.java.format` | The date format for the Java (server-side) generated dates. This must be the same as the `jira.date.picker.javascript.format` format setting. | `d/MMM/yy` |
      | `jira.date.picker.javascript.format` | The date format for the JavaScript (client-side) generated dates. This must be the same as the `jira.date.picker.java.format` format setting. | `%e/%b/%y` |
      | `jira.date.time.picker.java.format` | The date format for the Java (server-side) generated date times. This must be the same as the `jira.date.time.picker.javascript.format` format setting. | `dd/MMM/yy h:mm a` |
      | `jira.date.time.picker.javascript.format` | The date format for the JavaScript (client-side) generated date times. This must be the same as the `jira.date.time.picker.java.format` format setting. | `%e/%b/%y %I:%M %p` |
      | `jira.issue.actions.order` | The default order of actions (such as *Comments* or *Change history*) displayed on the issue view. | `asc` |
      | `jira.view.issue.links.sort.order` | The sort order of the list of issue links on the issue view. | `type, status, priority` |
       | `jira.comment.collapsing.minimum.hidden` | The minimum number of comments required for comment collapsing to occur. A value of `0` disables comment collapsing. | `4` |
      | `jira.newsletter.tip.delay.days` | The number of days before a prompt to sign up to the Jira Insiders newsletter is shown. A value of `-1` disables this feature. | `7` |

      #### Look and feel ####

      The settings listed below adjust the [look and feel](https://confluence.atlassian.com/x/VwCLLg).

      | Key | Description | Default value |
      | -- | -- | -- |
      | `jira.lf.date.time` | The [ time format](https://docs.oracle.com/javase/6/docs/api/index.html?java/text/SimpleDateFormat.html). | `h:mm a` |
      | `jira.lf.date.day` | The [ day format](https://docs.oracle.com/javase/6/docs/api/index.html?java/text/SimpleDateFormat.html). | `EEEE h:mm a` |
      | `jira.lf.date.complete` | The [ date and time format](https://docs.oracle.com/javase/6/docs/api/index.html?java/text/SimpleDateFormat.html). | `dd/MMM/yy h:mm a` |
      | `jira.lf.date.dmy` | The [ date format](https://docs.oracle.com/javase/6/docs/api/index.html?java/text/SimpleDateFormat.html). | `dd/MMM/yy` |
      | `jira.date.time.picker.use.iso8061` | When enabled, sets Monday as the first day of the week in the date picker, as specified by the ISO8601 standard. | `false` |
      | `jira.lf.logo.url` | The URL of the logo image file. | `/images/icon-jira-logo.png` |
      | `jira.lf.logo.show.application.title` | Controls the visibility of the application title on the sidebar. | `false` |
      | `jira.lf.favicon.url` | The URL of the favicon. | `/favicon.ico` |
      | `jira.lf.favicon.hires.url` | The URL of the high-resolution favicon. | `/images/64jira.png` |
      | `jira.lf.navigation.bgcolour` | The background color of the sidebar. | `#0747A6` |
      | `jira.lf.navigation.highlightcolour` | The color of the text and logo of the sidebar. | `#DEEBFF` |
      | `jira.lf.hero.button.base.bg.colour` | The background color of the hero button. | `#3b7fc4` |
      | `jira.title` | The text for the application title. The application title can also be set in *General settings*. | `Jira` |
      | `jira.option.globalsharing` | Whether filters and dashboards can be shared with anyone signed into Jira. | `true` |
      | `xflow.product.suggestions.enabled` | Whether to expose product suggestions for other Atlassian products within Jira. | `true` |

      #### Other settings ####

      | Key | Description | Default value |
      | -- | -- | -- |
      | `jira.issuenav.criteria.autoupdate` | Whether instant updates to search criteria is active. | `true` |

       *Note: Be careful when changing [application properties and advanced settings](https://confluence.atlassian.com/x/vYXKM).*

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/application-properties/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimpleApplicationPropertyBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApplicationProperty)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(SimpleApplicationPropertyBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ApplicationProperty)
        RETURNVAR: rest_api_applicationProperties_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the data type of the `value` does not match the application property's data type. For example, a string is provided instead of an integer. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have permission to edit the property. (HTTP 403)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the property is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.applicationProperties.update
  rest.api.applicationrole.list:
    SUMMARY: Get all application roles
    DESC: |-
      Returns all application roles. In Jira, application roles are managed using the [Application access configuration](https://confluence.atlassian.com/x/3YxjL) page.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/applicationrole
      HEADERS:
        Authorization: basic_auth
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(ApplicationRole)"
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ApplicationRole)"
        RETURNVAR: rest_api_applicationrole_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user is not an administrator. (HTTP 403)
    CANONICAL_ID: rest.api.applicationrole.list
  rest.api.applicationrole.get:
    SUMMARY: Get application role
    DESC: |-
      Returns an application role.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/applicationrole/{key}
      HEADERS:
        Authorization: basic_auth
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApplicationRole)
    INPUTS:
      - key:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ApplicationRole)
        RETURNVAR: rest_api_applicationrole_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user is not an administrator. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the role is not found. (HTTP 404)
    CANONICAL_ID: rest.api.applicationrole.get
  rest.api.content.get:
    SUMMARY: Get attachment content
    DESC: |-
      Returns the contents of an attachment. A `Range` header can be set to define a range of bytes within the attachment to download. See the [HTTP Range header standard](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Range) for details.

      To return a thumbnail of the attachment, use [Get attachment thumbnail](#api-rest-api-3-attachment-thumbnail-id-get).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** For the issue containing the attachment:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If attachments are added in private comments, the comment-level restriction will be applied.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/attachment/content/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]ANY"
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - redirect:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
    RETURNS:
      - RETURNTYPE: "[]ANY"
        RETURNVAR: rest_api_content_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the range supplied in the `Range` header is malformed. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: The user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the attachment is not found.
           *  attachments are disabled in the Jira settings. (HTTP 404)
      - TYPE: ANY
        STATUS: 416
        WHEN: Returned if the server is unable to satisfy the range of bytes provided. (HTTP 416)
    CANONICAL_ID: rest.api.content.get
  rest.api.meta.list:
    SUMMARY: Get Jira attachment settings
    DESC: |-
      Returns the attachment settings, that is, whether attachments are enabled and the maximum attachment size allowed.

      Note that there are also [project permissions](https://confluence.atlassian.com/x/yodKLg) that restrict whether users can create and delete attachments.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/attachment/meta
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AttachmentSettings)
    RETURNS:
      - RETURNTYPE: STRUCT(AttachmentSettings)
        RETURNVAR: rest_api_meta_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.meta.list
  rest.api.thumbnail.get:
    SUMMARY: Get attachment thumbnail
    DESC: |-
      Returns the thumbnail of an attachment.

      To return the attachment contents, use [Get attachment content](#api-rest-api-3-attachment-content-id-get).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** For the issue containing the attachment:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If attachments are added in private comments, the comment-level restriction will be applied.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/attachment/thumbnail/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]ANY"
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - redirect:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - fallbackToDefault:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - width:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - height:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]ANY"
        RETURNVAR: rest_api_thumbnail_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: The user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the attachment is not found.
           *  attachments are disabled in the Jira settings.
           *  `fallbackToDefault` is `false` and the request thumbnail cannot be downloaded. (HTTP 404)
    CANONICAL_ID: rest.api.thumbnail.get
  rest.api.attachment.delete:
    SUMMARY: Delete attachment
    DESC: |-
      Deletes an attachment from an issue.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** For the project holding the issue containing the attachment:

       *  *Delete own attachments* [project permission](https://confluence.atlassian.com/x/yodKLg) to delete an attachment created by the calling user.
       *  *Delete all attachments* [project permission](https://confluence.atlassian.com/x/yodKLg) to delete an attachment created by any user.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/attachment/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the attachment is not found.
           *  attachments are disabled in the Jira settings. (HTTP 404)
    CANONICAL_ID: rest.api.attachment.delete
  rest.api.attachment.get:
    SUMMARY: Get attachment metadata
    DESC: |-
      Returns the metadata for an attachment. Note that the attachment itself is not returned.

      This operation can be accessed anonymously.

       **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If attachments are added in private comments, the comment-level restriction will be applied.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/attachment/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AttachmentMetadata)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AttachmentMetadata)
        RETURNVAR: rest_api_attachment_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the attachment is not found.
           *  attachments are disabled in the Jira settings. (HTTP 404)
    CANONICAL_ID: rest.api.attachment.get
  rest.api.human.get:
    SUMMARY: Get all metadata for an expanded attachment
    DESC: |-
      Returns the metadata for the contents of an attachment, if it is an archive, and metadata for the attachment itself. For example, if the attachment is a ZIP archive, then information about the files in the archive is returned and metadata for the ZIP archive. Currently, only the ZIP archive format is supported.

      Use this operation to retrieve data that is presented to the user, as this operation returns the metadata for the attachment itself, such as the attachment's ID and name. Otherwise, use [ Get contents metadata for an expanded attachment](#api-rest-api-3-attachment-id-expand-raw-get), which only returns the metadata for the attachment's contents.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** For the issue containing the attachment:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If attachments are added in private comments, the comment-level restriction will be applied.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/attachment/{id}/expand/human
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AttachmentArchiveMetadataReadable)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AttachmentArchiveMetadataReadable)
        RETURNVAR: rest_api_human_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: The user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the attachment is not found.
           *  attachments are disabled in the Jira settings. (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Returned if the attachment is an archive, but not a supported archive format. (HTTP 409)
    CANONICAL_ID: rest.api.human.get
  rest.api.raw.get:
    SUMMARY: Get contents metadata for an expanded attachment
    DESC: |-
      Returns the metadata for the contents of an attachment, if it is an archive. For example, if the attachment is a ZIP archive, then information about the files in the archive is returned. Currently, only the ZIP archive format is supported.

      Use this operation if you are processing the data without presenting it to the user, as this operation only returns the metadata for the contents of the attachment. Otherwise, to retrieve data to present to the user, use [ Get all metadata for an expanded attachment](#api-rest-api-3-attachment-id-expand-human-get) which also returns the metadata for the attachment itself, such as the attachment's ID and name.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** For the issue containing the attachment:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If attachments are added in private comments, the comment-level restriction will be applied.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/attachment/{id}/expand/raw
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AttachmentArchiveImpl)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AttachmentArchiveImpl)
        RETURNVAR: rest_api_raw_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: The user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the attachment is not found.
           *  attachments are disabled in the Jira settings. (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Returned if the attachment is an archive, but not a supported archive format. (HTTP 409)
    CANONICAL_ID: rest.api.raw.get
  rest.api.record.list:
    SUMMARY: Get audit records
    DESC: |-
      Returns a list of audit records. The list can be filtered to include items:

       *  where each item in `filter` has at least one match in any of these fields:

           *  `summary`
           *  `category`
           *  `eventSource`
           *  `objectItem.name` If the object is a user, account ID is available to filter.
           *  `objectItem.parentName`
           *  `objectItem.typeName`
           *  `changedValues.changedFrom`
           *  `changedValues.changedTo`
           *  `remoteAddress`

          For example, if `filter` contains *man ed*, an audit record containing `summary": "User added to group"` and `"category": "group management"` is returned.
       *  created on or after a date and time.
       *  created or or before a date and time.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/auditing/record
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AuditRecords)
    INPUTS:
      - offset:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1000
      - filter:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - from:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - to:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(AuditRecords)
        RETURNVAR: rest_api_record_list
        STATUS: 200
        PAGINATION:
          TYPE: offset
          OFFSET_FIELD: offset
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: |-
          Returned if:

           *  the user does not have the required permissions.
           *  all Jira products are on free plans. Audit logs are available when at least one Jira product is on a paid plan. (HTTP 403)
    CANONICAL_ID: rest.api.record.list
  rest.api.system.get:
    SUMMARY: Get system avatars by type
    DESC: |-
      Returns a list of system avatar details by owner type, where the owner types are issue type, project, user or priority.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/avatar/{type}/system
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SystemAvatars)
    INPUTS:
      - type:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(SystemAvatars)
        RETURNVAR: rest_api_system_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 500
        WHEN: Returned if an error occurs while retrieving the list of avatars. (HTTP 500)
    CANONICAL_ID: rest.api.system.get
  rest.api.issues.delete:
    SUMMARY: Bulk delete issues
    DESC: |-
      Use this API to submit a bulk delete request. You can delete up to 1,000 issues in a single operation.

      **[Permissions](#permissions) required:**

       *  Global bulk change [permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-global-permissions/).
       *  Delete [issues permission](https://support.atlassian.com/jira-cloud-administration/docs/permissions-for-company-managed-projects/#Delete-issues/) in all projects that contain the selected issues.
       *  Browse [project permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in all projects that contain the selected issues.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/bulk/issues/delete
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueBulkDeletePayload)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SubmittedBulkOperation)
    INPUTS:
      - body:
          TYPE: STRUCT(IssueBulkDeletePayload)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SubmittedBulkOperation)
        RETURNVAR: rest_api_issues_delete_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.issues.delete
  rest.api.fields.list:
    SUMMARY: Get bulk editable fields
    DESC: |-
      Use this API to get a list of fields visible to the user to perform bulk edit operations. You can pass single or multiple issues in the query to get eligible editable fields. This API uses pagination to return responses, delivering 50 fields at a time.

      **[Permissions](#permissions) required:**

       *  Global bulk change [permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-global-permissions/).
       *  Browse [project permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in all projects that contain the selected issues.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  Depending on the field, any field-specific permissions required to edit it.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/bulk/issues/fields
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BulkEditGetFields)
    INPUTS:
      - issueIdsOrKeys:
          TYPE: STRING
          LOCATION: query
      - searchText:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - endingBefore:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startingAfter:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(BulkEditGetFields)
        RETURNVAR: rest_api_fields_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 404
        WHEN: Returned if no editable fields are found for the provided issue IDs. (HTTP 404)
    CANONICAL_ID: rest.api.fields.list
  rest.api.fields.create:
    SUMMARY: Bulk edit issues
    DESC: |-
      Use this API to submit a bulk edit request and simultaneously edit multiple issues. There are limits applied to the number of issues and fields that can be edited. A single request can accommodate a maximum of 1000 issues (including subtasks) and 200 fields.

      **[Permissions](#permissions) required:**

       *  Global bulk change [permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-global-permissions/).
       *  Browse [project permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in all projects that contain the selected issues.
       *  Edit [issues permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in all projects that contain the selected issues.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/bulk/issues/fields
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueBulkEditPayload)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SubmittedBulkOperation)
    INPUTS:
      - body:
          TYPE: STRUCT(IssueBulkEditPayload)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SubmittedBulkOperation)
        RETURNVAR: rest_api_fields_create_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.fields.create
  rest.api.move.create:
    SUMMARY: Bulk move issues
    DESC: |-
      Use this API to submit a bulk issue move request. You can move multiple issues, but they must all be moved to and from a single project, issue type, and parent. You can't move more than 1000 issues (including subtasks) at once.

      #### Scenarios: ####

      This is an early version of the API and it doesn't have full feature parity with the Bulk Move UI experience.

       *  Moving issue of type A to issue of type B in the same project or a different project: `SUPPORTED`
       *  Moving multiple issues of type A in one project to multiple issues of type B in the same project or a different project: **`SUPPORTED`**
       *  Moving a standard parent issue of type A with its multiple subtask issue types in one project to standard issue of type B and multiple subtask issue types in the same project or a different project: `SUPPORTED`
       *  Moving an epic issue with its child issues to a different project without losing their relation: `NOT SUPPORTED`
          (Workaround: Move them individually and stitch the relationship back with the Bulk Edit API)

      #### Limits applied to bulk issue moves: ####

      When using the bulk move, keep in mind that there are limits on the number of issues and fields you can include.

       *  You can move up to 1,000 issues in a single operation, including any subtasks.
       *  All issues must originate from the same project and share the same issue type and parent.
       *  The total combined number of fields across all issues must not exceed 1,500,000. For example, if each issue includes 15,000 fields, then the maximum number of issues that can be moved is 100.

      **[Permissions](#permissions) required:**

       *  Global bulk change [permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-global-permissions/).
       *  Move [issues permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in source projects.
       *  Create [issues permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in destination projects.
       *  Browse [project permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in destination projects, if moving subtasks only.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/bulk/issues/move
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueBulkMovePayload)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SubmittedBulkOperation)
    INPUTS:
      - body:
          TYPE: STRUCT(IssueBulkMovePayload)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SubmittedBulkOperation)
        RETURNVAR: rest_api_move_create_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(BulkOperationErrorResponse)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.move.create
  rest.api.transition.list:
    SUMMARY: Get available transitions
    DESC: |-
      Use this API to retrieve a list of transitions available for the specified issues that can be used or bulk transition operations. You can submit either single or multiple issues in the query to obtain the available transitions.

      The response will provide the available transitions for issues, organized by their respective workflows. **Only the transitions that are common among the issues within that workflow and do not involve any additional field updates will be included.** For bulk transitions that require additional field updates, please utilise the Jira Cloud UI.

      You can request available transitions for up to 1,000 issues in a single operation. This API uses pagination to return responses, delivering 50 workflows at a time.

      **[Permissions](#permissions) required:**

       *  Global bulk change [permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-global-permissions/).
       *  Transition [issues permission](https://support.atlassian.com/jira-cloud-administration/docs/permissions-for-company-managed-projects/#Transition-issues/) in all projects that contain the selected issues.
       *  Browse [project permission](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-permissions/) in all projects that contain the selected issues.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: GET
