      NAME: leadUserName
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: This property is no longer available and will be removed from the documentation soon. See the [deprecation notice](https://developer.atlassian.com/cloud/jira/platform/deprecation-notice-user-privacy-api-migration-guide/) for details.
    - name: metadata
      NAME: metadata
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: false
      comment: Compass component's metadata. Can't be updated. Not required for creating a Project Component.
