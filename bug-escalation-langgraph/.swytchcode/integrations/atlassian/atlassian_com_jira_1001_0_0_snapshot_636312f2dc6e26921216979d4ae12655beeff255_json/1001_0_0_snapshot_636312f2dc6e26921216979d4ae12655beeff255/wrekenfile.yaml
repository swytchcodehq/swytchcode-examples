  rest.api.columns.update_9ce:
    SUMMARY: Set issue navigator default columns
    DESC: |-
      Sets the default issue navigator columns.

      The `columns` parameter accepts a navigable field value and is expressed as HTML form data. To specify multiple columns, pass multiple `columns` parameters. For example, in curl:

      `curl -X PUT -d columns=summary -d columns=description https://your-domain.atlassian.net/rest/api/3/settings/columns`

      If no column details are sent, then all default columns are removed.

       A navigable field is one that can be used as a column on the issue navigator. Find details of navigable issue columns using [Get fields](#api-rest-api-3-field-get).

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/settings/columns
      HEADERS:
        Content-Type: "*/*"
        Authorization: basic_auth
      CONTENT_TYPE: "*/*"
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if invalid parameters are passed. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if a navigable field value is not found. (HTTP 404)
    CANONICAL_ID: rest.api.columns.update_9ce
