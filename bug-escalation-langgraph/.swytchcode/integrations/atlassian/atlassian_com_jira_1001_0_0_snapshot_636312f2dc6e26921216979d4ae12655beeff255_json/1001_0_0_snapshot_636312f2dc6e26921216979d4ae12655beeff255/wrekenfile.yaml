          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the time tracking provider is not found. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.timetracking.update
  rest.api.timetracking.list_9537:
    SUMMARY: Get all time tracking providers
    DESC: |-
      Returns all time tracking providers. By default, Jira only has one time tracking provider: *JIRA provided time tracking*. However, you can install other time tracking providers via apps from the Atlassian Marketplace. For more information on time tracking providers, see the documentation for the [ Time Tracking Provider](https://developer.atlassian.com/cloud/jira/platform/modules/time-tracking-provider/) module.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/configuration/timetracking/list
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(TimeTrackingProvider)"
    RETURNS:
      - RETURNTYPE: "[]STRUCT(TimeTrackingProvider)"
        RETURNVAR: rest_api_timetracking_list_9537
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.timetracking.list_9537
  rest.api.options.list:
    SUMMARY: Get time tracking settings
    DESC: |-
      Returns the time tracking settings. This includes settings such as the time format, default time unit, and others. For more information, see [Configuring time tracking](https://confluence.atlassian.com/x/qoXKM).

       **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/configuration/timetracking/options
