      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueFieldOption)
    INPUTS:
      - fieldKey:
          TYPE: STRING
          LOCATION: path
      - optionId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(IssueFieldOption)
          LOCATION: body
    RETURNS:
