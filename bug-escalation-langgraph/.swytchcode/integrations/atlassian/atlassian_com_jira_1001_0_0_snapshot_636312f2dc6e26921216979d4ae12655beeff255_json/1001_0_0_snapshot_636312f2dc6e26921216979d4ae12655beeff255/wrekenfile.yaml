       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If the comment has visibility restrictions, belongs to the group or has the role visibility is restricted to.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/comment/{commentId}/properties
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PropertyKeys)
    INPUTS:
      - commentId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PropertyKeys)
        RETURNVAR: rest_api_properties_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the comment ID is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the comment is not found. (HTTP 404)
    CANONICAL_ID: rest.api.properties.get
  rest.api.properties.delete:
    SUMMARY: Delete comment property
    DESC: |-
      Deletes a comment property.

      **[Permissions](#permissions) required:** either of:

       *  *Edit All Comments* [project permission](https://confluence.atlassian.com/x/yodKLg) to delete a property from any comment.
       *  *Edit Own Comments* [project permission](https://confluence.atlassian.com/x/yodKLg) to delete a property from a comment created by the user.

      Also, when the visibility of a comment is restricted to a role or group the user must be a member of that role or group.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/comment/{commentId}/properties/{propertyKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - commentId:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the comment or the property is not found or the user has the necessary project permissions but isn't a member of the role or group visibility of the comment is restricted to. (HTTP 404)
    CANONICAL_ID: rest.api.properties.delete
  rest.api.properties.get_e2ae:
    SUMMARY: Get comment property
    DESC: |-
