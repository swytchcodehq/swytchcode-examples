  rest.api.jql.list:
    SUMMARY: Search for issues using JQL enhanced search (GET)
    DESC: |-
      Searches for issues using [JQL](https://confluence.atlassian.com/x/egORLQ). Recent updates might not be immediately visible in the returned search results. If you need [read-after-write](https://developer.atlassian.com/cloud/jira/platform/search-and-reconcile/) consistency, you can utilize the `reconcileIssues` parameter to ensure stronger consistency assurances. This operation can be accessed anonymously.

      If the JQL query expression is too large to be encoded as a query parameter, use the [POST](#api-rest-api-3-search-post) version of this resource.

       **[Permissions](#permissions) required:** Issues are included in the response where the user has:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the issue.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/search/jql
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SearchAndReconcileResults)
    INPUTS:
      - jql:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - nextPageToken:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - fields:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - fieldsByKeys:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - failFast:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - reconcileIssues:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(SearchAndReconcileResults)
        RETURNVAR: rest_api_jql_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the search request is invalid (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if any of the ids provided in reconcileIssues were not found (HTTP 404)
    CANONICAL_ID: rest.api.jql.list
