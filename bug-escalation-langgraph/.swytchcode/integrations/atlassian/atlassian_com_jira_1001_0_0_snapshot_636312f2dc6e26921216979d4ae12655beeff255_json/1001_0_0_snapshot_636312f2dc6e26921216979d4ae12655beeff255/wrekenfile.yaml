  rest.api.deleted.list:
    SUMMARY: Get IDs of deleted worklogs
    DESC: |-
      Returns a list of IDs and delete timestamps for worklogs deleted after a date and time.

      This resource is paginated, with a limit of 1000 worklogs per page. Each page lists worklogs from oldest to youngest. If the number of items in the date range exceeds 1000, `until` indicates the timestamp of the youngest item on the page. Also, `nextPage` provides the URL for the next page of worklogs. The `lastPage` parameter is set to true on the last page of worklogs.

      This resource does not return worklogs deleted during the minute preceding the request.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/worklog/deleted
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ChangedWorklogs)
    INPUTS:
      - since:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
    RETURNS:
      - RETURNTYPE: STRUCT(ChangedWorklogs)
        RETURNVAR: rest_api_deleted_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.deleted.list
  rest.api.worklog.list:
    SUMMARY: Get worklogs
    DESC: |-
      Returns worklog details for a list of worklog IDs.

      The returned list of worklogs is limited to 1000 items.

      **[Permissions](#permissions) required:** Permission to access Jira, however, worklogs are only returned where either of the following is true:

       *  the worklog is set as *Viewable by All Users*.
       *  the user is a member of a project role or group with permission to view the worklog.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/worklog/list
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(WorklogIdsRequestBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(Worklog)"
    INPUTS:
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: ""
      - body:
          TYPE: STRUCT(WorklogIdsRequestBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: "[]STRUCT(Worklog)"
        RETURNVAR: rest_api_worklog_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request contains more than 1000 worklog IDs or is empty. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.worklog.list
