    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.component.list
  rest.api.component.create:
    SUMMARY: Create component
    DESC: |-
      Creates a component. Use components to provide containers for issues within a project. Use components to provide containers for issues within a project.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project in which the component is created or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/component
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProjectComponent)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectComponent)
    INPUTS:
      - body:
          TYPE: STRUCT(ProjectComponent)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectComponent)
        RETURNVAR: rest_api_component_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the user is not found.
           *  `name` is not provided.
           *  `name` is over 255 characters in length.
           *  `projectId` is not provided.
           *  `assigneeType` is an invalid value. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to manage the project containing the component or does not have permission to administer Jira. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have permission to browse the project containing the component. (HTTP 404)
    CANONICAL_ID: rest.api.component.create
