        STATUS: 403
        WHEN: Returned if the user does not have permission to read project. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project or project's sender email address is not found. (HTTP 404)
    CANONICAL_ID: rest.api.email.get
  rest.api.email.update:
    SUMMARY: Set project's sender email
    DESC: |-
      Sets the [project's sender email address](https://confluence.atlassian.com/x/dolKLg).

      If `emailAddress` is an empty string, the default email address is restored.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg) or *Administer Projects* [project permission.](https://confluence.atlassian.com/x/yodKLg)
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/project/{projectId}/email
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProjectEmailAddress)
