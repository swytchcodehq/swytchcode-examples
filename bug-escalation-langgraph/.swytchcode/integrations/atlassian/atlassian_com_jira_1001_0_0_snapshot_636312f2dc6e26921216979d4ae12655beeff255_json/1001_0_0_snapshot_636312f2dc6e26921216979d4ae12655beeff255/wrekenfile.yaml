  rest.forge.properties.delete:
    SUMMARY: Delete app property (Forge)
    DESC: |-
      Deletes a Forge app's property.

      **[Permissions](#permissions) required:** Only Forge apps can make this request.

      The new `write:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/forge/1/app/properties/{propertyKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - propertyKey:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: STRUCT(OperationMessage)
        STATUS: 400
        WHEN: Returned if the property key is longer than 127 characters. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request isn't made directly by an app or if it's an impersonated request. (HTTP 403)
      - TYPE: STRUCT(OperationMessage)
        STATUS: 404
        WHEN: Returned if the property isn't found or doesn't belong to the app. (HTTP 404)
    CANONICAL_ID: rest.forge.properties.delete
  rest.forge.properties.update:
    SUMMARY: Set app property (Forge)
    DESC: |-
      Sets the value of a Forge app's property.
      These values can be retrieved in [Jira expressions](/cloud/jira/platform/jira-expressions/)
       through the `app` [context variable](/cloud/jira/platform/jira-expressions/#context-variables).
       They are also available in [entity property display conditions](/platform/forge/manifest-reference/display-conditions/entity-property-conditions/).

      For other use cases, use the [Storage API](/platform/forge/runtime-reference/storage-api/).

      The value of the request body must be a [valid](http://tools.ietf.org/html/rfc4627), non-empty JSON blob. The maximum length is 32768 characters.

      **[Permissions](#permissions) required:** Only Forge apps can make this request.

      The new `write:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/forge/1/app/properties/{propertyKey}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(rest.forge.properties.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OperationMessage)
    INPUTS:
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(rest.forge.properties.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(OperationMessage)
        RETURNVAR: rest_forge_properties_update
        STATUS: 200
      - RETURNTYPE: STRUCT(OperationMessage)
        RETURNVAR: rest_forge_properties_update_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(OperationMessage)
        STATUS: 400
        WHEN: |-
          Returned if:
            * the property key is longer than 127 characters.
            * the value isn't valid JSON.
            * the value is longer than 32768 characters. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request isn't made directly by an app or if it's an impersonated request. (HTTP 403)
    CANONICAL_ID: rest.forge.properties.update
