    RETURNS:
      - RETURNTYPE: STRUCT(Configuration)
        RETURNVAR: rest_api_configuration_list_bdf9
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.configuration.list_bdf9
  rest.api.timetracking.list:
    SUMMARY: Get selected time tracking provider
    DESC: |-
      Returns the time tracking provider that is currently selected. Note that if time tracking is disabled, then a successful but empty response is returned.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
