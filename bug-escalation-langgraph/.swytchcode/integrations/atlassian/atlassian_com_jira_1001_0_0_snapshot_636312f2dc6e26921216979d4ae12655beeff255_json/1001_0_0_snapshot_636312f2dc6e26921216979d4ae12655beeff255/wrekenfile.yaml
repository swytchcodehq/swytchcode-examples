      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.columns.delete
  rest.api.columns.get:
    SUMMARY: Get columns
    DESC: |-
      Returns the columns configured for a filter. The column configuration is used when the filter's results are viewed in *List View* with the *Columns* set to *Filter*.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None, however, column details are only returned for:

       *  filters owned by the user.
       *  filters shared with a group that the user is a member of.
       *  filters shared with a private project that the user has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for.
       *  filters shared with a public project.
       *  filters shared with the public.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/filter/{id}/columns
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
