  rest.api.transitions.get:
    SUMMARY: Get transitions
    DESC: |-
      Returns either all transitions or a transition that can be performed by the user on an issue, based on the issue's status.

      Note, if a request is made for a transition that does not exist or cannot be performed on the issue, given its status, the response will return any empty transitions list.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required: A list or transition is returned only when the user has:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.

      However, if the user does not have the *Transition issues* [ project permission](https://confluence.atlassian.com/x/yodKLg) the response will not list any transitions.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/transitions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transitions)
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - transitionId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - skipRemoteOnlyCondition:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - includeUnavailableTransitions:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - sortByOpsBarAndStatus:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(Transitions)
        RETURNVAR: rest_api_transitions_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.transitions.get
  rest.api.transitions.create:
    SUMMARY: Transition issue
    DESC: |-
      Performs an issue transition and, if the transition has a screen, updates the fields from the transition screen.

      sortByCategory To update the fields on the transition screen, specify the fields in the `fields` or `update` parameters in the request body. Get details about the fields using [ Get transitions](#api-rest-api-3-issue-issueIdOrKey-transitions-get) with the `transitions.fields` expand.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse projects* and *Transition issues* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/transitions
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssueUpdateDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(IssueUpdateDetails)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  no transition is specified.
           *  the user does not have permission to transition the issue.
           *  a field that isn't included on the transition screen is defined in `fields` or `update`.
           *  a field is specified in both `fields` and `update`.
           *  the request is invalid for any other reason. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found or the user does not have permission to view it. (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Returned if the issue could not be updated due to a conflicting update. (HTTP 409)
      - TYPE: ANY
        STATUS: 413
        WHEN: |-
          Returned if a per-issue limit has been breached for one of the following fields:

           *  comments
           *  worklogs
           *  attachments
           *  issue links
           *  remote issue links (HTTP 413)
      - TYPE: ANY
        STATUS: 422
        WHEN: Returned if a configuration problem prevents the creation of the issue. (HTTP 422)
    CANONICAL_ID: rest.api.transitions.create
  rest.api.votes.delete:
    SUMMARY: Delete vote
    DESC: |-
      Deletes a user's vote from an issue. This is the equivalent of the user clicking *Unvote* on an issue in Jira.

      This operation requires the **Allow users to vote on issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/votes
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  voting is disabled.
           *  the user has not voted on the issue.
           *  the issue is not found. (HTTP 404)
    CANONICAL_ID: rest.api.votes.delete
  rest.api.votes.get:
    SUMMARY: Get votes
    DESC: |-
      Returns details about the votes on an issue.

      This operation requires the **Allow users to vote on issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is ini
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.

      Note that users with the necessary permissions for this operation but without the *View voters and watchers* project permissions are not returned details in the `voters` field.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/votes
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Votes)
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Votes)
        RETURNVAR: rest_api_votes_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  voting is disabled.
           *  the user does not have permission to view the issue.
           *  the issue is not found. (HTTP 404)
    CANONICAL_ID: rest.api.votes.get
  rest.api.votes.create:
    SUMMARY: Add vote
    DESC: |-
      Adds the user's vote to an issue. This is the equivalent of the user clicking *Vote* on an issue in Jira.

      This operation requires the **Allow users to vote on issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/votes
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  voting is disabled.
           *  the issue is not found. (HTTP 404)
    CANONICAL_ID: rest.api.votes.create
  rest.api.watchers.delete:
    SUMMARY: Delete watcher
    DESC: |-
      Deletes a user as a watcher of an issue.

      This operation requires the **Allow users to watch issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  To remove users other than themselves from the watchlist, *Manage watcher list* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/watchers
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - username:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if `accountId` is not supplied. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the permission to manage the watcher list. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue or the user is not found or the user does not have permission to view the issue. (HTTP 404)
    CANONICAL_ID: rest.api.watchers.delete
  rest.api.watchers.get:
    SUMMARY: Get issue watchers
    DESC: |-
      Returns the watchers for an issue.

      This operation requires the **Allow users to watch issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is ini
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  To see details of users on the watchlist other than themselves, *View voters and watchers* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/watchers
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Watchers)
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Watchers)
        RETURNVAR: rest_api_watchers_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.watchers.get
  rest.api.watchers.create:
    SUMMARY: Add watcher
    DESC: |-
      Adds a user as a watcher of an issue by passing the account ID of the user. For example, `"5b10ac8d82e05b22cc7d4ef5"`. If no user is specified the calling user is added.

      This operation requires the **Allow users to watch issues** option to be *ON*. This option is set in General configuration for Jira. See [Configuring Jira application options](https://confluence.atlassian.com/x/uYXKM) for details.

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  To add users other than themselves to the watchlist, *Manage watcher list* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/watchers
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(rest.api.watchers.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(rest.api.watchers.createRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the permission to manage the watcher list. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue or the user is not found or the user does not have permission to view the issue. (HTTP 404)
    CANONICAL_ID: rest.api.watchers.create
  rest.api.worklog.delete:
    SUMMARY: Bulk delete worklogs
    DESC: |-
      Deletes a list of worklogs from an issue. This is an experimental API with limitations:

       *  You can't delete more than 5000 worklogs at once.
       *  No notifications will be sent for deleted worklogs.

      Time tracking must be enabled in Jira, otherwise this operation returns an error. For more information, see [Configuring time tracking](https://confluence.atlassian.com/x/qoXKM).

      **[Permissions](#permissions) required:**

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the issue.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  *Delete all worklogs*[ project permission](https://confluence.atlassian.com/x/yodKLg) to delete any worklog.
       *  If any worklog has visibility restrictions, belongs to the group or has the role visibility is restricted to.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/worklog
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(WorklogIdsRequestBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - adjustEstimate:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: auto
      - overrideEditableFlag:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(WorklogIdsRequestBean)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  `request` is not provided or is invalid
           *  the user does not have permission to delete the worklogs
           *  the number of worklogs being deleted exceeds the limit (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the issue is not found or user does not have permission to view the issue
           *  at least one of the worklogs is not associated with the provided issue
           *  time tracking is disabled (HTTP 404)
    CANONICAL_ID: rest.api.worklog.delete
  rest.api.worklog.get:
    SUMMARY: Get issue worklogs
    DESC: |-
      Returns worklogs for an issue (ordered by created time), starting from the oldest worklog or from the worklog started on or after a date and time.

      Time tracking must be enabled in Jira, otherwise this operation returns an error. For more information, see [Configuring time tracking](https://confluence.atlassian.com/x/qoXKM).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** Workloads are only returned where the user has:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
       *  If the worklog has visibility restrictions, belongs to the group or has the role visibility is restricted to.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/worklog
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageOfWorklogs)
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 5000
      - startedAfter:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - startedBefore:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: ""
    RETURNS:
      - RETURNTYPE: STRUCT(PageOfWorklogs)
        RETURNVAR: rest_api_worklog_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the issue is not found or the user does not have permission to view the issue.
           *  `startAt` or `maxResults` has non-numeric values.
           *  time tracking is disabled. (HTTP 404)
    CANONICAL_ID: rest.api.worklog.get
  rest.api.worklog.create:
    SUMMARY: Add worklog
    DESC: |-
      Adds a worklog to an issue.

      Time tracking must be enabled in Jira, otherwise this operation returns an error. For more information, see [Configuring time tracking](https://confluence.atlassian.com/x/qoXKM).

       This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

