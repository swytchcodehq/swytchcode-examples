      BODY:
        TYPE: STRUCT(JqlFunctionPrecomputationGetByIdRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(JqlFunctionPrecomputationGetByIdResponse)
    INPUTS:
      - orderBy:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(JqlFunctionPrecomputationGetByIdRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(JqlFunctionPrecomputationGetByIdResponse)
        RETURNVAR: rest_api_search_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request is not authenticated as the app that provided the function. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the function is not found. (HTTP 404)
    CANONICAL_ID: rest.api.search.create
  rest.api.match.create:
    SUMMARY: Check issues against JQL
    DESC: |-
      Checks whether one or more issues would be returned by one or more JQL queries.

      **[Permissions](#permissions) required:** None, however, issues are only matched against JQL queries where the user has:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project that the issue is in.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/jql/match
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IssuesAndJQLQueries)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueMatches)
    INPUTS:
      - body:
          TYPE: STRUCT(IssuesAndJQLQueries)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(IssueMatches)
        RETURNVAR: rest_api_match_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if `jqls` exceeds the maximum number of JQL queries or `issueIds` exceeds the maximum number of issue IDs. (HTTP 400)
    CANONICAL_ID: rest.api.match.create
  rest.api.parse.create:
    SUMMARY: Parse JQL query
    DESC: |-
      Parses and validates JQL queries.

      Validation is performed in context of the current user.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/jql/parse
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(JqlQueriesToParse)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ParsedJqlQueries)
    INPUTS:
      - validation:
          TYPE: STRING
          REQUIRED: true
          LOCATION: query
          DEFAULT: strict
      - body:
          TYPE: STRUCT(JqlQueriesToParse)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ParsedJqlQueries)
        RETURNVAR: rest_api_parse_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
    CANONICAL_ID: rest.api.parse.create
  rest.api.pdcleaner.create:
    SUMMARY: Convert user identifiers to account IDs in JQL queries
    DESC: |-
      Converts one or more JQL queries with user identifiers (username or user key) to equivalent JQL queries with account IDs.

      You may wish to use this operation if your system stores JQL queries and you want to make them GDPR-compliant. For more information about GDPR-related changes, see the [migration guide](https://developer.atlassian.com/cloud/jira/platform/deprecation-notice-user-privacy-api-migration-guide/).

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/jql/pdcleaner
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(JQLPersonalDataMigrationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ConvertedJQLQueries)
    INPUTS:
      - body:
          TYPE: STRUCT(JQLPersonalDataMigrationRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ConvertedJQLQueries)
        RETURNVAR: rest_api_pdcleaner_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error400)
        STATUS: 400
        WHEN: Returned if at least one of the queries cannot be converted. For example, the JQL has invalid operators or invalid keywords, or the users in the query cannot be found. (HTTP 400)
      - TYPE: STRUCT(Error401)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.pdcleaner.create
  rest.api.sanitize.create:
    SUMMARY: Sanitize JQL queries
    DESC: |-
      Sanitizes one or more JQL queries by converting readable details into IDs where a user doesn't have permission to view the entity.

      For example, if the query contains the clause *project = 'Secret project'*, and a user does not have browse permission for the project "Secret project", the sanitized query replaces the clause with *project = 12345"* (where 12345 is the ID of the project). If a user has the required permission, the clause is not sanitized. If the account ID is null, sanitizing is performed for an anonymous user.

      Note that sanitization doesn't make the queries GDPR-compliant, because it doesn't remove user identifiers (username or user key). If you need to make queries GDPR-compliant, use [Convert user identifiers to account IDs in JQL queries](https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-jql/#api-rest-api-3-jql-sanitize-post).

      Before sanitization each JQL query is parsed. The queries are returned in the same order that they were passed.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/jql/sanitize
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(JqlQueriesToSanitize)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SanitizedJqlQueries)
    INPUTS:
      - body:
          TYPE: STRUCT(JqlQueriesToSanitize)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SanitizedJqlQueries)
        RETURNVAR: rest_api_sanitize_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.sanitize.create
  rest.api.label.list:
    SUMMARY: Get all labels
    DESC: Returns a [paginated](#pagination) list of labels.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/label
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanString)
    INPUTS:
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1000
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanString)
        RETURNVAR: rest_api_label_list
        STATUS: 200
    CANONICAL_ID: rest.api.label.list
  rest.api.approximateLicenseCount.list:
    SUMMARY: Get approximate license count
    DESC: |-
      Returns the approximate number of user accounts across all Jira licenses. Note that this information is cached with a 7-day lifecycle and could be stale at the time of call.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/license/approximateLicenseCount
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(LicenseMetric)
    RETURNS:
      - RETURNTYPE: STRUCT(LicenseMetric)
        RETURNVAR: rest_api_approximateLicenseCount_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollections)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollections)
        STATUS: 403
        WHEN: Returned if the user does not have permission to complete this request. (HTTP 403)
    CANONICAL_ID: rest.api.approximateLicenseCount.list
  rest.api.product.get:
    SUMMARY: Get approximate application license count
    DESC: |-
      Returns the total approximate number of user accounts for a single Jira license. Note that this information is cached with a 7-day lifecycle and could be stale at the time of call.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/license/approximateLicenseCount/product/{applicationKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(LicenseMetric)
    INPUTS:
      - applicationKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(LicenseMetric)
        RETURNVAR: rest_api_product_get
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have permission to complete this request. (HTTP 403)
    CANONICAL_ID: rest.api.product.get
  rest.api.mypermissions.list:
    SUMMARY: Get my permissions
    DESC: |-
      Returns a list of permissions indicating which permissions the user has. Details of the user's permissions can be obtained in a global, project, issue or comment context.

      The user is reported as having a project permission:

       *  in the global context, if the user has the project permission in any project.
       *  for a project, where the project permission is determined using issue data, if the user meets the permission's criteria for any issue in the project. Otherwise, if the user has the project permission in the project.
       *  for an issue, where a project permission is determined using issue data, if the user has the permission in the issue. Otherwise, if the user has the project permission in the project containing the issue.
       *  for a comment, where the user has both the permission to browse the comment and the project permission for the comment's parent issue. Only the BROWSE\_PROJECTS permission is supported. If a `commentId` is provided whose `permissions` does not equal BROWSE\_PROJECTS, a 400 error will be returned.

      This means that users may be shown as having an issue permission (such as EDIT\_ISSUES) in the global context or a project context but may not have the permission for any or all issues. For example, if Reporters have the EDIT\_ISSUES permission a user would be shown as having this permission in the global context or the context of a project, because any user can be a reporter. However, if they are not the user who reported the issue queried they would not have EDIT\ _ISSUES permission for that issue.

      For [Jira Service Management project permissions](https://support.atlassian.com/jira-cloud-administration/docs/customize-jira-service-management-permissions/), this will be evaluated similarly to a user in the customer portal. For example, if the BROWSE\_PROJECTS permission is granted to Service Project Customer - Portal Access, any users with access to the customer portal will have the BROWSE\_PROJECTS permission.

      Global permissions are unaffected by context.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/mypermissions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Permissions)
    INPUTS:
      - projectKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - issueKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - issueId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - permissions:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectUuid:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectConfigurationUuid:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - commentId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(Permissions)
        RETURNVAR: rest_api_mypermissions_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if `permissions` is empty, contains an invalid key, or does not equal BROWSE\_PROJECTS when commentId is provided. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the project or issue is not found or the user does not have permission to view the project or issue. (HTTP 404)
    CANONICAL_ID: rest.api.mypermissions.list
  rest.api.mypreferences.delete:
    SUMMARY: Delete preference
    DESC: |-
      Deletes a preference of the user, which restores the default value of system defined settings.

      Note that these keys are deprecated:

       *  *jira.user.locale* The locale of the user. By default, not set. The user takes the instance locale.
       *  *jira.user.timezone* The time zone of the user. By default, not set. The user takes the instance timezone.

      Use [ Update a user profile](https://developer.atlassian.com/cloud/admin/user-management/rest/#api-users-account-id-manage-profile-patch) from the user management REST API to manage timezone and locale instead.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/mypreferences
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - key:
          TYPE: STRING
          LOCATION: query
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the key is not provided or not found. (HTTP 404)
    CANONICAL_ID: rest.api.mypreferences.delete
  rest.api.mypreferences.list:
    SUMMARY: Get preference
    DESC: |-
      Returns the value of a preference of the current user.

      Note that these keys are deprecated:

       *  *jira.user.locale* The locale of the user. By default this is not set and the user takes the locale of the instance.
       *  *jira.user.timezone* The time zone of the user. By default this is not set and the user takes the timezone of the instance.

      These system preferences keys will be deprecated by 15/07/2024. You can still retrieve these keys, but it will not have any impact on Notification behaviour.

       *  *user.notifications.watcher* Whether the user gets notified when they are watcher.
       *  *user.notifications.assignee* Whether the user gets notified when they are assignee.
       *  *user.notifications.reporter* Whether the user gets notified when they are reporter.
       *  *user.notifications.mentions* Whether the user gets notified when they are mentions.

      Use [ Update a user profile](https://developer.atlassian.com/cloud/admin/user-management/rest/#api-users-account-id-manage-profile-patch) from the user management REST API to manage timezone and locale instead.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/mypreferences
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRING
    INPUTS:
      - key:
          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRING
        RETURNVAR: rest_api_mypreferences_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the key is not provided or not found. (HTTP 404)
    CANONICAL_ID: rest.api.mypreferences.list
  rest.api.mypreferences.update:
    SUMMARY: Set preference
    DESC: |-
      Creates a preference for the user or updates a preference's value by sending a plain text string. For example, `false`. An arbitrary preference can be created with the value containing up to 255 characters. In addition, the following keys define system preferences that can be set or created:

       *  *user.notifications.mimetype* The mime type used in notifications sent to the user. Defaults to `html`.
       *  *user.default.share.private* Whether new [ filters](https://confluence.atlassian.com/x/eQiiLQ) are set to private. Defaults to `true`.
       *  *user.keyboard.shortcuts.disabled* Whether keyboard shortcuts are disabled. Defaults to `false`.
       *  *user.autowatch.disabled* Whether the user automatically watches issues they create or add a comment to. By default, not set: the user takes the instance autowatch setting.
       *  *user.notifiy.own.changes* Whether the user gets notified of their own changes.

      Note that these keys are deprecated:

       *  *jira.user.locale* The locale of the user. By default, not set. The user takes the instance locale.
       *  *jira.user.timezone* The time zone of the user. By default, not set. The user takes the instance timezone.

      These system preferences keys will be deprecated by 15/07/2024. You can still use these keys to create arbitrary preferences, but it will not have any impact on Notification behaviour.

       *  *user.notifications.watcher* Whether the user gets notified when they are watcher.
       *  *user.notifications.assignee* Whether the user gets notified when they are assignee.
       *  *user.notifications.reporter* Whether the user gets notified when they are reporter.
       *  *user.notifications.mentions* Whether the user gets notified when they are mentions.

      Use [ Update a user profile](https://developer.atlassian.com/cloud/admin/user-management/rest/#api-users-account-id-manage-profile-patch) from the user management REST API to manage timezone and locale instead.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/mypreferences
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(rest.api.mypreferences.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - key:
          TYPE: STRING
          LOCATION: query
      - body:
          TYPE: STRUCT(rest.api.mypreferences.updateRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the key or value is not provided or invalid. (HTTP 404)
    CANONICAL_ID: rest.api.mypreferences.update
  rest.api.locale.delete:
    SUMMARY: Delete locale
    DESC: |-
      Deprecated, use [ Update a user profile](https://developer.atlassian.com/cloud/admin/user-management/rest/#api-users-account-id-manage-profile-patch) from the user management REST API instead.

      Deletes the locale of the user, which restores the default setting.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/mypreferences/locale
      HEADERS:
        Authorization: basic_auth
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.locale.delete
  rest.api.locale.list:
    SUMMARY: Get locale
    DESC: |-
      Returns the locale for the user.

      If the user has no language preference set (which is the default setting) or this resource is accessed anonymous, the browser locale detected by Jira is returned. Jira detects the browser locale using the *Accept-Language* header in the request. However, if this doesn't match a locale available Jira, the site default locale is returned.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/mypreferences/locale
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Locale)
    RETURNS:
      - RETURNTYPE: STRUCT(Locale)
        RETURNVAR: rest_api_locale_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.locale.list
  rest.api.locale.update:
    SUMMARY: Set locale
    DESC: |-
      Deprecated, use [ Update a user profile](https://developer.atlassian.com/cloud/admin/user-management/rest/#api-users-account-id-manage-profile-patch) from the user management REST API instead.

      Sets the locale of the user. The locale must be one supported by the instance of Jira.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/mypreferences/locale
      HEADERS:
        Content-Type: application/json
        Authorization: basic_auth
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(Locale)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(Locale)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.locale.update
  rest.api.myself.list:
    SUMMARY: Get current user
    DESC: |-
      Returns details for the current user.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/myself
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(User)
    INPUTS:
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(User)
        RETURNVAR: rest_api_myself_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.myself.list
  rest.api.notificationscheme.list:
    SUMMARY: Get notification schemes paginated
    DESC: |-
      Returns a [paginated](#pagination) list of [notification schemes](https://confluence.atlassian.com/x/8YdKLg) ordered by the display name.

      *Note that you should allow for events without recipients to appear in responses.*

      **[Permissions](#permissions) required:** Permission to access Jira, however, the user must have permission to administer at least one project associated with a notification scheme for it to be returned.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/notificationscheme
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanNotificationScheme)
    INPUTS:
      - startAt:
          TYPE: STRING
