        RETURNVAR: rest_api_worklog_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  `adjustEstimate` is set to `new` but `newEstimate` is not provided or is invalid.
