    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimeTrackingConfiguration)
    RETURNS:
      - RETURNTYPE: STRUCT(TimeTrackingConfiguration)
        RETURNVAR: rest_api_options_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.options.list
  rest.api.options.update:
    SUMMARY: Set time tracking settings
    DESC: |-
      Sets the time tracking settings.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/configuration/timetracking/options
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TimeTrackingConfiguration)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimeTrackingConfiguration)
    INPUTS:
      - body:
          TYPE: STRUCT(TimeTrackingConfiguration)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TimeTrackingConfiguration)
        RETURNVAR: rest_api_options_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request object is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
    CANONICAL_ID: rest.api.options.update
  rest.api.customFieldOption.get:
    SUMMARY: Get custom field option
    DESC: |-
      Returns a custom field option. For example, an option in a select list.

      Note that this operation **only works for issue field select list options created in Jira or using operations from the [Issue custom field options](#api-group-Issue-custom-field-options) resource**, it cannot be used with issue field select list options created by Connect apps.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** The custom field option is returned as follows:

       *  if the user has the *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
       *  if the user has the *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for at least one project the custom field is used in, and the field is visible in at least one layout the user has permission to view.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/customFieldOption/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CustomFieldOption)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CustomFieldOption)
        RETURNVAR: rest_api_customFieldOption_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the custom field option is not found.
           *  the user does not have permission to view the custom field. (HTTP 404)
    CANONICAL_ID: rest.api.customFieldOption.get
  rest.api.dashboard.list:
    SUMMARY: Get all dashboards
    DESC: |-
      Returns a list of dashboards owned by or shared with the user. The list may be filtered to include only favorite or owned dashboards.

       This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/dashboard
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageOfDashboards)
    INPUTS:
      - filter:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 20
    RETURNS:
      - RETURNTYPE: STRUCT(PageOfDashboards)
        RETURNVAR: rest_api_dashboard_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.dashboard.list
  rest.api.dashboard.create:
    SUMMARY: Create dashboard
    DESC: |-
      Creates a dashboard.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/dashboard
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DashboardDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Dashboard)
    INPUTS:
      - extendAdminPermissions:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(DashboardDetails)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Dashboard)
        RETURNVAR: rest_api_dashboard_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.dashboard.create
  rest.api.edit.update:
    SUMMARY: Bulk edit dashboards
    DESC: |-
      Bulk edit dashboards. Maximum number of dashboards to be edited at the same time is 100.

      **[Permissions](#permissions) required:** None

      The dashboards to be updated must be owned by the user, or the user must be an administrator.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/dashboard/bulk/edit
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BulkEditShareableEntityRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BulkEditShareableEntityResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(BulkEditShareableEntityRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BulkEditShareableEntityResponse)
        RETURNVAR: rest_api_edit_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.edit.update
  rest.api.gadgets.list:
    SUMMARY: Get available gadgets
    DESC: |-
      Gets a list of all available gadgets that can be added to all dashboards.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/dashboard/gadgets
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AvailableDashboardGadgetsResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(AvailableDashboardGadgetsResponse)
        RETURNVAR: rest_api_gadgets_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: 400 response (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.gadgets.list
  rest.api.search.list:
    SUMMARY: Search for dashboards
    DESC: |-
      Returns a [paginated](#pagination) list of dashboards. This operation is similar to [Get dashboards](#api-rest-api-3-dashboard-get) except that the results can be refined to include dashboards that have specific attributes. For example, dashboards with a particular name. When multiple attributes are specified only filters matching all attributes are returned.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** The following dashboards that match the query parameters are returned:

       *  Dashboards owned by the user. Not returned for anonymous users.
       *  Dashboards shared with a group that the user is a member of. Not returned for anonymous users.
       *  Dashboards shared with a private project that the user can browse. Not returned for anonymous users.
       *  Dashboards shared with a public project.
       *  Dashboards shared with the public.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/dashboard/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanDashboard)
    INPUTS:
      - dashboardName:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - owner:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - groupname:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - groupId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - orderBy:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: name
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: active
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanDashboard)
        RETURNVAR: rest_api_search_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: |-
          Returned if:

           *  `orderBy` is invalid.
           *  `expand` includes an invalid value.
           *  `accountId` and `owner` are provided.
           *  `groupname` and `groupId` are provided. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: 401 response (HTTP 401)
    CANONICAL_ID: rest.api.search.list
  rest.api.gadget.get:
    SUMMARY: Get gadgets
    DESC: |-
      Returns a list of dashboard gadgets on a dashboard.

      This operation returns:

       *  Gadgets from a list of IDs, when `id` is set.
       *  Gadgets with a module key, when `moduleKey` is set.
       *  Gadgets from a list of URIs, when `uri` is set.
       *  All gadgets, when no other parameters are set.

       This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/dashboard/{dashboardId}/gadget
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DashboardGadgetResponse)
    INPUTS:
      - dashboardId:
          TYPE: INT
          LOCATION: path
      - moduleKey:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - uri:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - gadgetId:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(DashboardGadgetResponse)
        RETURNVAR: rest_api_gadget_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the dashboard is not found. (HTTP 404)
    CANONICAL_ID: rest.api.gadget.get
  rest.api.gadget.create:
    SUMMARY: Add gadget to dashboard
    DESC: |-
      Adds a gadget to a dashboard.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/dashboard/{dashboardId}/gadget
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DashboardGadgetSettings)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DashboardGadget)
    INPUTS:
      - dashboardId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(DashboardGadgetSettings)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(DashboardGadget)
        RETURNVAR: rest_api_gadget_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the dashboard is not found. (HTTP 404)
    CANONICAL_ID: rest.api.gadget.create
  rest.api.gadget.delete:
    SUMMARY: Remove gadget from dashboard
    DESC: |-
      Removes a dashboard gadget from a dashboard.

      When a gadget is removed from a dashboard, other gadgets in the same column are moved up to fill the emptied position.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/dashboard/{dashboardId}/gadget/{gadgetId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
