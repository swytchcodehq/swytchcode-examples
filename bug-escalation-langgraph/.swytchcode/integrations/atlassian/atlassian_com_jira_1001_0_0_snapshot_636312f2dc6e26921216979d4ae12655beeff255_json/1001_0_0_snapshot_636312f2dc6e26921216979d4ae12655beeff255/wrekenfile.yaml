        WHEN: |-
          Returned if:

           *  the filter is not found.
           *  the user does not own the filter. (HTTP 404)
    CANONICAL_ID: rest.api.permission.delete
  rest.api.permission.get_36e2:
    SUMMARY: Get share permission
    DESC: |-
      Returns a share permission for a filter. A filter can be shared with groups, projects, all logged-in users, or the public. Sharing with all logged-in users or the public is known as a global share permission.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None, however, a share permission is only returned for:

       *  filters owned by the user.
       *  filters shared with a group that the user is a member of.
       *  filters shared with a private project that the user has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for.
       *  filters shared with a public project.
       *  filters shared with the public.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/filter/{id}/permission/{permissionId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SharePermission)
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - permissionId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(SharePermission)
        RETURNVAR: rest_api_permission_get_36e2
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the filter is not found.
           *  the permission is not found.
           *  the user does not have permission to view the filter. (HTTP 404)
    CANONICAL_ID: rest.api.permission.get_36e2
