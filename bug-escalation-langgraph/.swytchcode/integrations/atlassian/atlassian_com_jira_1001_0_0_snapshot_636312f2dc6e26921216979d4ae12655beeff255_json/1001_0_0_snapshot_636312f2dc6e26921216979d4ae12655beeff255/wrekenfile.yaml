      ENDPOINT: /rest/api/3/comment/{commentId}/properties/{propertyKey}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EntityProperty)
    INPUTS:
      - commentId:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EntityProperty)
        RETURNVAR: rest_api_properties_get_e2ae
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the comment or the property is not found. (HTTP 404)
    CANONICAL_ID: rest.api.properties.get_e2ae
  rest.api.properties.update:
    SUMMARY: Set comment property
    DESC: |-
      Creates or updates the value of a property for a comment. Use this resource to store custom data against a comment.

      The value of the request body must be a [valid](http://tools.ietf.org/html/rfc4627), non-empty JSON blob. The maximum length is 32768 characters.

      **[Permissions](#permissions) required:** either of:

       *  *Edit All Comments* [project permission](https://confluence.atlassian.com/x/yodKLg) to create or update the value of a property on any comment.
       *  *Edit Own Comments* [project permission](https://confluence.atlassian.com/x/yodKLg) to create or update the value of a property on a comment created by the user.

      Also, when the visibility of a comment is restricted to a role or group the user must be a member of that role or group.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/comment/{commentId}/properties/{propertyKey}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(rest.api.properties.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - commentId:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(rest.api.properties.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_properties_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_properties_update_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the comment is not found. (HTTP 404)
    CANONICAL_ID: rest.api.properties.update
  rest.api.component.list:
