  rest.api.permissionscheme.update:
    SUMMARY: Update permission scheme
    DESC: |-
      Updates a permission scheme. Below are some important things to note when using this resource:

       *  If a permissions list is present in the request, then it is set in the permission scheme, overwriting *all existing* grants.
       *  If you want to update only the name and description, then do not send a permissions list in the request.
       *  Sending an empty list will remove all permission grants from the permission scheme.

      If you want to add or delete a permission grant instead of updating the whole list, see [Create permission grant](#api-rest-api-3-permissionscheme-schemeId-permission-post) or [Delete permission scheme entity](#api-rest-api-3-permissionscheme-schemeId-permission-permissionId-delete).

      See [About permission schemes and grants](../api-group-permission-schemes/#about-permission-schemes-and-grants) for more details.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/permissionscheme/{schemeId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PermissionScheme)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PermissionScheme)
    INPUTS:
      - schemeId:
          TYPE: INT
          LOCATION: path
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(PermissionScheme)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PermissionScheme)
        RETURNVAR: rest_api_permissionscheme_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: |-
          Returned if:

           *  the user does not have the necessary permission to update permission schemes.
           *  the Jira instance is Jira Core Free or Jira Software Free. Permission schemes cannot be updated on free plans. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the permission scheme is not found. (HTTP 404)
    CANONICAL_ID: rest.api.permissionscheme.update
