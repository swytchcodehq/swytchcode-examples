  rest.api.avatar2.create_ac5f:
    SUMMARY: Load project avatar
    DESC: |-
      Loads an avatar for a project.

      Specify the avatar's local file location in the body of the request. Also, include the following headers:

       *  `X-Atlassian-Token: no-check` To prevent XSRF protection blocking the request, for more information see [Special Headers](#special-request-headers).
       *  `Content-Type: image/image type` Valid image types are JPEG, GIF, or PNG.

      For example:
      `curl --request POST `

      `--user email@example.com:<api_token> `

      `--header 'X-Atlassian-Token: no-check' `

      `--header 'Content-Type: image/< image_type>' `

      `--data-binary "<@/path/to/file/with/your/avatar>" `

      `--url 'https://your-domain.atlassian.net/rest/api/3/project/{projectIdOrKey}/avatar2'`

      The avatar is cropped to a square. If no crop parameters are specified, the square originates at the top left of the image. The length of the square's sides is set to the smaller of the height or width of the image.

      The cropped image is then used to create avatars of 16x16, 24x24, 32x32, and 48x48 in size.

      After creating the avatar use [Set project avatar](#api-rest-api-3-project-projectIdOrKey-avatar-put) to set it as the project's displayed avatar.

      **[Permissions](#permissions) required:** *Administer projects* [project permission](https://confluence.atlassian.com/x/yodKLg).
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/avatar2
      HEADERS:
        Content-Type: "*/*"
        Authorization: bearer_token
      CONTENT_TYPE: "*/*"
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Avatar)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - x:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - "y":
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - size:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
    RETURNS:
      - RETURNTYPE: STRUCT(Avatar)
        RETURNVAR: rest_api_avatar2_create_ac5f_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  an image isn't included in the request.
           *  the image type is unsupported.
           *  the crop parameters extend the crop area beyond the edge of the image. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to administer the project or an anonymous call is made to the operation. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have permission to view the project. (HTTP 404)
    CANONICAL_ID: rest.api.avatar2.create_ac5f
