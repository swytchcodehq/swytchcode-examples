      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanVersion)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - orderBy:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - query:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanVersion)
        RETURNVAR: rest_api_version_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.version.get
  rest.api.versions.get:
    SUMMARY: Get project versions
    DESC: |-
      Returns all versions in a project. The response is not paginated. Use [Get project versions paginated](#api-rest-api-3-project-projectIdOrKey-version-get) if you want to get the versions in a project with pagination.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Browse Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/versions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(Version)"
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]STRUCT(Version)"
        RETURNVAR: rest_api_versions_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.versions.get
  rest.api.email.get:
    SUMMARY: Get project's sender email
    DESC: |-
      Returns the [project's sender email address](https://confluence.atlassian.com/x/dolKLg).

      **[Permissions](#permissions) required:** *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project.
    HTTP:
