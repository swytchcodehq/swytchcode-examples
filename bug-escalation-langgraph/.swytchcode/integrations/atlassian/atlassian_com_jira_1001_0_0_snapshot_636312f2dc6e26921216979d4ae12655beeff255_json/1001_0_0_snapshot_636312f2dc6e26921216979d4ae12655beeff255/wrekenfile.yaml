      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to manage the project containing the component or does not have permission to administer Jira. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the component is not found.
           *  the replacement component is not found.
           *  the user does not have permission to browse the project containing the component. (HTTP 404)
    CANONICAL_ID: rest.api.component.delete
  rest.api.component.get:
    SUMMARY: Get component
    DESC: |-
      Returns a component.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for project containing the component.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/component/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectComponent)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectComponent)
        RETURNVAR: rest_api_component_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the component is not found or the user does not have permission to browse the project containing the component. (HTTP 404)
    CANONICAL_ID: rest.api.component.get
  rest.api.component.update:
    SUMMARY: Update component
    DESC: |-
      Updates a component. Any fields included in the request are overwritten. If `leadAccountId` is an empty string ("") the component lead is removed.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the component or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/component/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProjectComponent)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectComponent)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ProjectComponent)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectComponent)
        RETURNVAR: rest_api_component_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the user is not found.
           *  `assigneeType` is an invalid value.
           *  `name` is over 255 characters in length. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have permission to manage the project containing the component or does not have permission to administer Jira. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the component is not found or the user does not have permission to browse the project containing the component. (HTTP 404)
    CANONICAL_ID: rest.api.component.update
  rest.api.relatedIssueCounts.get:
