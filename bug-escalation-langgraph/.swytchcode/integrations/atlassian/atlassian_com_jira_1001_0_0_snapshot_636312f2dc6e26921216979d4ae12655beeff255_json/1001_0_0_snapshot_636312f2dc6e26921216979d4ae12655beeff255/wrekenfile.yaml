           *  An attempt is made to change owner of the default filter. (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the requesting user is not an owner of the filter or does not have *Administer Jira* global permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the filter or the new owner of the filter is not found. (HTTP 404)
    CANONICAL_ID: rest.api.owner.update
  rest.api.permission.get:
    SUMMARY: Get share permissions
    DESC: |-
      Returns the share permissions for a filter. A filter can be shared with groups, projects, all logged-in users, or the public. Sharing with all logged-in users or the public is known as a global share permission.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None, however, share permissions are only returned for:

       *  filters owned by the user.
       *  filters shared with a group that the user is a member of.
       *  filters shared with a private project that the user has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for.
       *  filters shared with a public project.
       *  filters shared with the public.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/filter/{id}/permission
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(SharePermission)"
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(SharePermission)"
        RETURNVAR: rest_api_permission_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the filter is not found.
           *  the user does not have permission to view the filter. (HTTP 404)
    CANONICAL_ID: rest.api.permission.get
  rest.api.permission.create:
    SUMMARY: Add share permission
    DESC: |-
      Add a share permissions to a filter. If you add a global share permission (one for all logged-in users or the public) it will overwrite all share permissions for the filter.

      Be aware that this operation uses different objects for updating share permissions compared to [Update filter](#api-rest-api-3-filter-id-put).

      **[Permissions](#permissions) required:** *Share dashboards and filters* [global permission](https://confluence.atlassian.com/x/x4dKLg) and the user must own the filter.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/filter/{id}/permission
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SharePermissionInputBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(SharePermission)"
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(SharePermissionInputBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: "[]STRUCT(SharePermission)"
        RETURNVAR: rest_api_permission_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the request object is invalid. For example, it contains an invalid type, the ID does not match the type, or the project or group is not found.
           *  the user does not own the filter.
           *  the user does not have the required permissions. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the filter is not found.
           *  the user does not have permission to view the filter. (HTTP 404)
    CANONICAL_ID: rest.api.permission.create
  rest.api.permission.delete:
    SUMMARY: Delete share permission
    DESC: |-
      Deletes a share permission from a filter.

      **[Permissions](#permissions) required:** Permission to access Jira and the user must own the filter.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/filter/{id}/permission/{permissionId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
