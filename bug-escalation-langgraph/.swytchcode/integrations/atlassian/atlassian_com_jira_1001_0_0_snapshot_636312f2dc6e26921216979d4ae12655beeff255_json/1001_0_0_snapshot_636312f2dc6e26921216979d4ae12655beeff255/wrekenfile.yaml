      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the priority scheme. Must be unique.
    - name: priorities
      NAME: priorities
      type: ANY
      TYPE: ANY
      REQUIRED: false
      comment: The priorities in the scheme.
    - name: projects
      NAME: projects
      type: ANY
      TYPE: ANY
      REQUIRED: false
      comment: The projects in the scheme.
