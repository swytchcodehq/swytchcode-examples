    - name: projectRoleId
      NAME: projectRoleId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the project role to share the filter with. Set `type` to `projectRole` and the `projectId` for the project that the role is in.
    - name: rights
      NAME: rights
