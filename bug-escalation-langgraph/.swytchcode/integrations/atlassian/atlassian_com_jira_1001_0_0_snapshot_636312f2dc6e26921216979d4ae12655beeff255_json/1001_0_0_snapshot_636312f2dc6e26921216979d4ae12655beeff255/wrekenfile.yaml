    SUMMARY: Search for issues using JQL (GET)
    DESC: |-
      Searches for issues using [JQL](https://confluence.atlassian.com/x/egORLQ).

      If the JQL query expression is too large to be encoded as a query parameter, use the [POST](#api-rest-api-3-search-post) version of this resource.

       This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** Issues are included in the response where the user has:

       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project containing the issue.
       *  If [issue-level security](https://confluence.atlassian.com/x/J4lKLg) is configured, issue-level security permission to view the issue.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SearchResults)
    INPUTS:
      - jql:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - validateQuery:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: strict
      - fields:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - fieldsByKeys:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - failFast:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(SearchResults)
        RETURNVAR: rest_api_search_list_e317
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the JQL query is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
    CANONICAL_ID: rest.api.search.list_e317
