    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/remotelink
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
