        STATUS: 400
        WHEN: Returned if the request isn't valid. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user doesn't have the necessary permission. (HTTP 403)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the issue resolution isn't found. (HTTP 404)
