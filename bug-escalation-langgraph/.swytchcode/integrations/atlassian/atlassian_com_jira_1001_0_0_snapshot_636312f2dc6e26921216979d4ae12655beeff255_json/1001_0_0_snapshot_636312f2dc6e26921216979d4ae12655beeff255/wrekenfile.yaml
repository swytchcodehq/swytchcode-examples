      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The unique identifier for the component.
    - name: isAssigneeTypeValid
      NAME: isAssigneeTypeValid
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether a user is associated with `assigneeType`. For example, if the `assigneeType` is set to `COMPONENT_LEAD` but the component lead is not set, then `false` is returned.
    - name: lead
      NAME: lead
