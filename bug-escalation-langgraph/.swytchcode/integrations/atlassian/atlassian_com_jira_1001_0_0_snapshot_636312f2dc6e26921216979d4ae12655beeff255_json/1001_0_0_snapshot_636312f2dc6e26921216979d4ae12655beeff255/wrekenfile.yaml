  rest.api.context.get:
    SUMMARY: Get custom field contexts
    DESC: |-
      Returns a [paginated](#pagination) list of [ contexts](https://confluence.atlassian.com/adminjiracloud/what-are-custom-field-contexts-991923859.html) for a custom field. Contexts can be returned as follows:

       *  With no other parameters set, all contexts.
       *  By defining `id` only, all contexts from the list of IDs.
       *  By defining `isAnyIssueType`, limit the list of contexts returned to either those that apply to all issue types (true) or those that apply to only a subset of issue types (false)
       *  By defining `isGlobalContext`, limit the list of contexts return to either those that apply to all projects (global contexts) (true) or those that apply to only a subset of projects (false).

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/field/{fieldId}/context
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanCustomFieldContext)
    INPUTS:
      - fieldId:
          TYPE: STRING
          LOCATION: path
      - isAnyIssueType:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - isGlobalContext:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - contextId:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanCustomFieldContext)
        RETURNVAR: rest_api_context_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the required permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the custom field was not found. (HTTP 404)
    CANONICAL_ID: rest.api.context.get
  rest.api.context.create:
    SUMMARY: Create custom field context
    DESC: |-
      Creates a custom field context.

      If `projectIds` is empty, a global context is created. A global context is one that applies to all project. If `issueTypeIds` is empty, the context applies to all issue types.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
