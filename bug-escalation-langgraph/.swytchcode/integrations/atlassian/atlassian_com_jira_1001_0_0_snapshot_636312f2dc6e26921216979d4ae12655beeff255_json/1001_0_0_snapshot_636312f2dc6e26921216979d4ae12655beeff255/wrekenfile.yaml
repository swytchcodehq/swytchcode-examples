    CANONICAL_ID: rest.api.owner.get
  rest.api.owner.create:
    SUMMARY: Load avatar
    DESC: |-
      Loads a custom avatar for a project, issue type or priority.

      Specify the avatar's local file location in the body of the request. Also, include the following headers:

       *  `X-Atlassian-Token: no-check` To prevent XSRF protection blocking the request, for more information see [Special Headers](#special-request-headers).
       *  `Content-Type: image/image type` Valid image types are JPEG, GIF, or PNG.

      For example:
      `curl --request POST `

      `--user email@example.com:<api_token> `

      `--header 'X-Atlassian-Token: no-check' `

      `--header 'Content-Type: image/< image_type>' `

      `--data-binary "<@/path/to/file/with/your/avatar>" `

      `--url 'https://your-domain.atlassian.net/rest/api/3/universal_avatar/type/{type}/owner/{entityId}'`

      The avatar is cropped to a square. If no crop parameters are specified, the square originates at the top left of the image. The length of the square's sides is set to the smaller of the height or width of the image.

      The cropped image is then used to create avatars of 16x16, 24x24, 32x32, and 48x48 in size.

      After creating the avatar use:

       *  [Update issue type](#api-rest-api-3-issuetype-id-put) to set it as the issue type's displayed avatar.
       *  [Set project avatar](#api-rest-api-3-project-projectIdOrKey-avatar-put) to set it as the project's displayed avatar.
       *  [Update priority](#api-rest-api-3-priority-id-put) to set it as the priority's displayed avatar.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/universal_avatar/type/{type}/owner/{entityId}
      HEADERS:
        Content-Type: "*/*"
        Authorization: bearer_token
      CONTENT_TYPE: "*/*"
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Avatar)
    INPUTS:
      - type:
          TYPE: STRING
          LOCATION: path
      - entityId:
          TYPE: STRING
          LOCATION: path
      - x:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - "y":
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - size:
          TYPE: INT
          REQUIRED: true
          LOCATION: query
          DEFAULT: 0
    RETURNS:
      - RETURNTYPE: STRUCT(Avatar)
        RETURNVAR: rest_api_owner_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  an image isn't included in the request.
           *  the image type is unsupported.
           *  the crop parameters extend the crop area beyond the edge of the image. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the avatar type is invalid, the associated item ID is missing, or the item is not found. (HTTP 404)
    CANONICAL_ID: rest.api.owner.create
