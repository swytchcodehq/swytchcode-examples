      - id:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ColumnItem)"
        RETURNVAR: rest_api_columns_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the user does not have permission to view the filter. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if a column configuration is not set for the filter. (HTTP 404)
    CANONICAL_ID: rest.api.columns.get
  rest.api.columns.update:
    SUMMARY: Set columns
    DESC: |-
      Sets the columns for a filter. Only navigable fields can be set as columns. Use [Get fields](#api-rest-api-3-field-get) to get the list fields in Jira. A navigable field has `navigable` set to `true`.

      The parameters for this resource are expressed as HTML form data. For example, in curl:

      `curl -X PUT -d columns=summary -d columns=description https://your-domain.atlassian.net/rest/api/3/filter/10000/columns`

      **[Permissions](#permissions) required:** Permission to access Jira, however, columns are only set for:

       *  filters owned by the user.
       *  filters shared with a group that the user is a member of.
       *  filters shared with a private project that the user has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for.
       *  filters shared with a public project.
       *  filters shared with the public.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/filter/{id}/columns
      HEADERS:
        Content-Type: "*/*"
        Authorization: bearer_token
      CONTENT_TYPE: "*/*"
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_columns_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  a non-navigable field is set as a column.
           *  the user does not have permission to view the filter. (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the requesting user is not an owner of the filter. (HTTP 403)
    CANONICAL_ID: rest.api.columns.update
  rest.api.favourite.delete:
    SUMMARY: Remove filter as favorite
    DESC: |-
      Removes a filter as a favorite for the user. Note that this operation only removes filters visible to the user from the user's favorites list. For example, if the user favorites a public filter that is subsequently made private (and is therefore no longer visible on their favorites list) they cannot remove it from their favorites list.

      **[Permissions](#permissions) required:** Permission to access Jira.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/filter/{id}/favourite
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Filter)
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(Filter)
        RETURNVAR: rest_api_favourite_delete
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the filter is not found.
           *  the user does not have permission to view the filter. (HTTP 400)
    CANONICAL_ID: rest.api.favourite.delete
  rest.api.favourite.update:
    SUMMARY: Add filter as favorite
    DESC: |-
      Add a filter as a favorite for the user.

      **[Permissions](#permissions) required:** Permission to access Jira, however, the user can only favorite:

       *  filters owned by the user.
       *  filters shared with a group that the user is a member of.
       *  filters shared with a private project that the user has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for.
       *  filters shared with a public project.
       *  filters shared with the public.
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/filter/{id}/favourite
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Filter)
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(Filter)
        RETURNVAR: rest_api_favourite_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  the filter is not found.
           *  the user does not have permission to favorite the filter. (HTTP 400)
    CANONICAL_ID: rest.api.favourite.update
  rest.api.owner.update:
    SUMMARY: Change filter owner
    DESC: |-
      Changes the owner of the filter.

      **[Permissions](#permissions) required:** Permission to access Jira. However, the user must own the filter or have the *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/filter/{id}/owner
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ChangeFilterOwner)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(ChangeFilterOwner)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned when:

