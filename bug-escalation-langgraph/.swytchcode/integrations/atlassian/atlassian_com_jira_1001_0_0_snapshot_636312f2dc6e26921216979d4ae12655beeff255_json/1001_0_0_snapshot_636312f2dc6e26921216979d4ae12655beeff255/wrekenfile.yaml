        TYPE: STRUCT(ComponentIssuesCount)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ComponentIssuesCount)
        RETURNVAR: rest_api_relatedIssueCounts_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the component is not found. (HTTP 404)
    CANONICAL_ID: rest.api.relatedIssueCounts.get
  rest.api.configuration.list_bdf9:
    SUMMARY: Get global settings
    DESC: |-
      Returns the [global settings](https://confluence.atlassian.com/x/qYXKM) in Jira. These settings determine whether optional features (for example, subtasks, time tracking, and others) are enabled. If time tracking is enabled, this operation also returns the time tracking configuration.

      **[Permissions](#permissions) required:** Permission to access Jira.
