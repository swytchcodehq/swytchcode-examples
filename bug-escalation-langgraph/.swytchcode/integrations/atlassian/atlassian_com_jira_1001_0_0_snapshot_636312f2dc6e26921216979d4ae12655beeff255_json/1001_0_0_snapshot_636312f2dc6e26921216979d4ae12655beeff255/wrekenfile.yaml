      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OperationMessage)
    INPUTS:
      - addonKey:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(rest.atlassian-connect.properties.updateRequest)
          LOCATION: body
    RETURNS:
