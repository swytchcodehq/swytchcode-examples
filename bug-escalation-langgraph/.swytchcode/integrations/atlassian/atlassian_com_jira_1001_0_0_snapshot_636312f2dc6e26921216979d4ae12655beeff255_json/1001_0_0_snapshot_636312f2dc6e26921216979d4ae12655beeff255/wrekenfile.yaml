      RESULT:
        TYPE: STRUCT(PageBeanCustomFieldContextOption)
    INPUTS:
      - fieldId:
          TYPE: STRING
          LOCATION: path
      - contextId:
          TYPE: INT
          LOCATION: path
      - optionId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - onlyOptions:
          TYPE: BOOL
