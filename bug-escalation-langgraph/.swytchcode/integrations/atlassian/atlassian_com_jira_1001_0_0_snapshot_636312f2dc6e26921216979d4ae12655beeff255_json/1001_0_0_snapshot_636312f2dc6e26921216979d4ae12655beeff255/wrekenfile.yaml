    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/issueLink/{linkId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IssueLink)
    INPUTS:
      - linkId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
