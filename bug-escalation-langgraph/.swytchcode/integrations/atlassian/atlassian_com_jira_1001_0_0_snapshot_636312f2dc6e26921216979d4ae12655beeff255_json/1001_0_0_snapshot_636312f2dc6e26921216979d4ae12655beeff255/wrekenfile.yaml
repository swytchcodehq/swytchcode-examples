  rest.api.issue.delete_50f4:
    SUMMARY: Replace issue field option
    DESC: |-
      Deselects an issue-field select-list option from all issues where it is selected. A different option can be selected to replace the deselected option. The update can also be limited to a smaller set of issues by using a JQL query.

      Connect and Forge app users with *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg) can override the screen security configuration using `overrideScreenSecurity` and `overrideEditableFlag`.

      This is an [asynchronous operation](#async). The response object contains a link to the long-running task.

      Note that this operation **only works for issue field select list options added by Connect apps**, it cannot be used with issue field select list options created in Jira or using operations from the [Issue custom field options](#api-group-Issue-custom-field-options) resource.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg). Jira permissions are not required for the app providing the field.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/field/{fieldKey}/option/{optionId}/issue
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - replaceWith:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - jql:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - overrideScreenSecurity:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - overrideEditableFlag:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - fieldKey:
          TYPE: STRING
          LOCATION: path
      - optionId:
          TYPE: INT
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the field is not found or does not support options, or the options to be replaced are not found. (HTTP 404)
    CANONICAL_ID: rest.api.issue.delete_50f4
  rest.api.field.delete:
    SUMMARY: Delete custom field
    DESC: |-
      Deletes a custom field. The custom field is deleted whether it is in the trash or not. See [Edit or delete a custom field](https://confluence.atlassian.com/x/Z44fOw) for more information on trashing and deleting custom fields.

      This operation is [asynchronous](#async). Follow the `location` link in the response to determine the status of the task and use [Get task](#api-rest-api-3-task-taskId-get) to obtain subsequent updates.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /rest/api/3/field/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: |-
          Returned if any of these are true:

           *  The custom field is locked.
           *  The custom field is used in a issue security scheme or a permission scheme.
           *  The custom field ID format is incorrect. (HTTP 400)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 404
        WHEN: Returned if the custom field is not found. (HTTP 404)
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 409
        WHEN: Returned if a task to delete the custom field is running. (HTTP 409)
    CANONICAL_ID: rest.api.field.delete
