      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RemoteIssueLinkRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
