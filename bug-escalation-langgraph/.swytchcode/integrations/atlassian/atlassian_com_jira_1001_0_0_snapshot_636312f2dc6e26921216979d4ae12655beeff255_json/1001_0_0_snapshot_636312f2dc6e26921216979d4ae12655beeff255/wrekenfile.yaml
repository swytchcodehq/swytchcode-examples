      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing or if the calling user lacks administrative permissions for the project. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the project is not found.
           *  a user or group is not found.
           *  a group or user is not active. (HTTP 404)
    CANONICAL_ID: rest.api.role.update
  rest.api.roledetails.get:
    SUMMARY: Get project role details
    DESC: |-
      Returns all [project roles](https://support.atlassian.com/jira-cloud-administration/docs/manage-project-roles/) and the details for each role. Note that the list of project roles is common to all projects.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg) or *Administer projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/roledetails
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(ProjectRoleDetails)"
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - currentMember:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - excludeConnectAddons:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ProjectRoleDetails)"
        RETURNVAR: rest_api_roledetails_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or if the user does not have the necessary permissions for the project. (HTTP 404)
    CANONICAL_ID: rest.api.roledetails.get
  rest.api.statuses.get:
    SUMMARY: Get all statuses for project
    DESC: |-
      Returns the valid statuses for a project. The statuses are grouped by issue type, as each project has a set of valid issue types and each issue type has a set of valid statuses.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Browse Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/statuses
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(IssueTypeWithStatus)"
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(IssueTypeWithStatus)"
        RETURNVAR: rest_api_statuses_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project is not found or the user does not have permission to view it. (HTTP 404)
    CANONICAL_ID: rest.api.statuses.get
  rest.api.version.get:
    SUMMARY: Get project versions paginated
