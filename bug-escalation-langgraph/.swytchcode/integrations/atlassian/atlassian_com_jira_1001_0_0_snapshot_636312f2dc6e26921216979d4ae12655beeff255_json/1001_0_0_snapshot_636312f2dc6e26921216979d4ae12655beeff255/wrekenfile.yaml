  rest.api.multiProjectSearch.list:
    SUMMARY: Find users assignable to projects
    DESC: |-
      Returns a list of users who can be assigned issues in one or more projects. The list may be restricted to users whose attributes match a string.

      This operation takes the users in the range defined by `startAt` and `maxResults`, up to the thousandth user, and then returns only the users from that range that can be assigned issues in the projects. This means the operation usually returns fewer users than specified in `maxResults`. To get all the users who can be assigned issues in the projects, use [Get all users](#api-rest-api-3-users-search-get) and filter the records in your code.

      Privacy controls are applied to the response based on the users' preferences. This could mean, for example, that the user's email address is hidden. See the [Profile visibility overview](https://developer.atlassian.com/cloud/jira/platform/profile-visibility/) for more details.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/user/assignable/multiProjectSearch
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(User)"
    INPUTS:
      - query:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - username:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectKeys:
          TYPE: STRING
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
    RETURNS:
      - RETURNTYPE: "[]STRUCT(User)"
        RETURNVAR: rest_api_multiProjectSearch_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  `projectKeys` is missing.
           *  `query` or `accountId` is missing.
           *  `query` and `accountId` are provided. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if one or more of the projects is not found. (HTTP 404)
      - TYPE: ANY
        STATUS: 429
        WHEN: Returned if the rate limit is exceeded. User search endpoints share a collective rate limit for the tenant, in addition to Jira's normal rate limiting you may receive a rate limit for user search. Please respect the Retry-After header. (HTTP 429)
    CANONICAL_ID: rest.api.multiProjectSearch.list
  rest.api.search.list_ca7f:
    SUMMARY: Find users assignable to issues
    DESC: |-
      Returns a list of users that can be assigned to an issue. Use this operation to find the list of users who can be assigned to:

       *  a new issue, by providing the `projectKeyOrId`.
       *  an updated issue, by providing the `issueKey` or `issueId`.
       *  to an issue during a transition (workflow action), by providing the `issueKey` or `issueId` and the transition id in `actionDescriptorId`. You can obtain the IDs of an issue's valid transitions using the `transitions` option in the `expand` parameter of [ Get issue](#api-rest-api-3-issue-issueIdOrKey-get).

      In all these cases, you can pass an account ID to determine if a user can be assigned to an issue. The user is returned in the response if they can be assigned to the issue or issue transition.

      This operation takes the users in the range defined by `startAt` and `maxResults`, up to the thousandth user, and then returns only the users from that range that can be assigned the issue. This means the operation usually returns fewer users than specified in `maxResults`. To get all the users who can be assigned the issue, use [Get all users](#api-rest-api-3-users-search-get) and filter the records in your code.

      Privacy controls are applied to the response based on the users' preferences. This could mean, for example, that the user's email address is hidden. See the [Profile visibility overview](https://developer.atlassian.com/cloud/jira/platform/profile-visibility/) for more details.

      **[Permissions](#permissions) required:** *Browse users and groups* [global permission](https://confluence.atlassian.com/x/x4dKLg) or *Assign issues* [project permission](https://confluence.atlassian.com/x/yodKLg)
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/user/assignable/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(User)"
    INPUTS:
      - query:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - sessionId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - username:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - project:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - issueKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - issueId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - actionDescriptorId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - recommend:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: "[]STRUCT(User)"
        RETURNVAR: rest_api_search_list_ca7f
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  None of `issueKey`, `issueId` or `project` is present.
           *  `issueId` parameter is not valid.
           *  `query` or `accountId` is missing.
           *  `query` and `accountId` are provided. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the project, issue, or transition is not found. (HTTP 404)
      - TYPE: ANY
        STATUS: 429
        WHEN: Returned if the rate limit is exceeded. User search endpoints share a collective rate limit for the tenant, in addition to Jira's normal rate limiting you may receive a rate limit for user search. Please respect the Retry-After header. (HTTP 429)
    CANONICAL_ID: rest.api.search.list_ca7f
