    - name: key
      NAME: key
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Project keys must be unique and start with an uppercase letter followed by one or more uppercase alphanumeric characters. The maximum length is 10 characters.
    - name: lead
