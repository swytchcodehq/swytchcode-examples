      METHOD: DELETE
      ENDPOINT: /rest/api/3/resolution/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - replaceWith:
          TYPE: STRING
          REQUIRED: true
          LOCATION: query
          DEFAULT: ""
    ERRORS:
