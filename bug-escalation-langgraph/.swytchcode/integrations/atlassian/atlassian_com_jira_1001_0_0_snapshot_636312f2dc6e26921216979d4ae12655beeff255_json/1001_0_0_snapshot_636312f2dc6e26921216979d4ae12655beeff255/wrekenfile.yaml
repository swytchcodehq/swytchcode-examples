      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(WorkflowScheme)
    INPUTS:
      - id:
          TYPE: INT
          LOCATION: path
      - updateDraftIfNeeded:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(WorkflowScheme)
        RETURNVAR: rest_api_default_delete_df4e
        STATUS: 200
