  rest.api.autocompletedata.list:
    SUMMARY: Get field reference data (GET)
    DESC: |-
      Returns reference data for JQL searches. This is a downloadable version of the documentation provided in [Advanced searching - fields reference](https://confluence.atlassian.com/x/gwORLQ) and [Advanced searching - functions reference](https://confluence.atlassian.com/x/hgORLQ), along with a list of JQL-reserved words. Use this information to assist with the programmatic creation of JQL queries or the validation of queries built in a custom query builder.

      To filter visible field details by project or collapse non-unique fields by field type then [Get field reference data (POST)](#api-rest-api-3-jql-autocompletedata-post) can be used.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/jql/autocompletedata
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(JQLReferenceData)
    RETURNS:
      - RETURNTYPE: STRUCT(JQLReferenceData)
        RETURNVAR: rest_api_autocompletedata_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
    CANONICAL_ID: rest.api.autocompletedata.list
  rest.api.autocompletedata.create:
    SUMMARY: Get field reference data (POST)
    DESC: |-
      Returns reference data for JQL searches. This is a downloadable version of the documentation provided in [Advanced searching - fields reference](https://confluence.atlassian.com/x/gwORLQ) and [Advanced searching - functions reference](https://confluence.atlassian.com/x/hgORLQ), along with a list of JQL-reserved words. Use this information to assist with the programmatic creation of JQL queries or the validation of queries built in a custom query builder.

      This operation can filter the custom fields returned by project. Invalid project IDs in `projectIds` are ignored. System fields are always returned.

      It can also return the collapsed field for custom fields. Collapsed fields enable searches to be performed across all fields with the same name and of the same field type. For example, the collapsed field `Component - Component[Dropdown]` enables dropdown fields `Component - cf[10061]` and `Component - cf[10062]` to be searched simultaneously.

       **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/jql/autocompletedata
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SearchAutoCompleteFilter)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(JQLReferenceData)
    INPUTS:
      - body:
          TYPE: STRUCT(SearchAutoCompleteFilter)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(JQLReferenceData)
        RETURNVAR: rest_api_autocompletedata_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
    CANONICAL_ID: rest.api.autocompletedata.create
  rest.api.suggestions.list:
    SUMMARY: Get field auto complete suggestions
    DESC: |-
      Returns the JQL search auto complete suggestions for a field.

      Suggestions can be obtained by providing:

       *  `fieldName` to get a list of all values for the field.
       *  `fieldName` and `fieldValue` to get a list of values containing the text in `fieldValue`.
       *  `fieldName` and `predicateName` to get a list of all predicate values for the field.
       *  `fieldName`, `predicateName`, and `predicateValue` to get a list of predicate values containing the text in `predicateValue`.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/jql/autocompletedata/suggestions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AutoCompleteSuggestions)
    INPUTS:
      - fieldName:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - fieldValue:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - predicateName:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - predicateValue:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(AutoCompleteSuggestions)
        RETURNVAR: rest_api_suggestions_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if an invalid combination of parameters is passed. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect. (HTTP 401)
    CANONICAL_ID: rest.api.suggestions.list
  rest.api.computation.list:
    SUMMARY: Get precomputations (apps)
    DESC: |-
      Returns the list of a function's precomputations along with information about when they were created, updated, and last used. Each precomputation has a `value` \- the JQL fragment to replace the custom function clause with.

      **[Permissions](#permissions) required:** This API is only accessible to apps and apps can only inspect their own functions.

      The new `read:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/jql/function/computation
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBean2JqlFunctionPrecomputationBean)
    INPUTS:
      - functionKey:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
      - orderBy:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PageBean2JqlFunctionPrecomputationBean)
        RETURNVAR: rest_api_computation_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request is not authenticated as the app that provided the function. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the function is not found. (HTTP 404)
    CANONICAL_ID: rest.api.computation.list
  rest.api.computation.create:
    SUMMARY: Update precomputations (apps)
    DESC: |-
      Update the precomputation value of a function created by a Forge/Connect app.

      **[Permissions](#permissions) required:** An API for apps to update their own precomputations.

      The new `write:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/jql/function/computation
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(JqlFunctionPrecomputationUpdateRequestBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(JqlFunctionPrecomputationUpdateResponse)
    INPUTS:
      - skipNotFoundPrecomputations:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(JqlFunctionPrecomputationUpdateRequestBean)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(JqlFunctionPrecomputationUpdateResponse)
        RETURNVAR: rest_api_computation_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(JqlFunctionPrecomputationUpdateErrorResponse)
        STATUS: 400
        WHEN: Returned if the request is invalid. (HTTP 400)
      - TYPE: STRUCT(JqlFunctionPrecomputationUpdateErrorResponse)
        STATUS: 403
        WHEN: Returned if the request is not authenticated as the app that provided the function. (HTTP 403)
      - TYPE: STRUCT(JqlFunctionPrecomputationUpdateErrorResponse)
        STATUS: 404
        WHEN: Returned if the function is not found. (HTTP 404)
    CANONICAL_ID: rest.api.computation.create
  rest.api.search.create:
