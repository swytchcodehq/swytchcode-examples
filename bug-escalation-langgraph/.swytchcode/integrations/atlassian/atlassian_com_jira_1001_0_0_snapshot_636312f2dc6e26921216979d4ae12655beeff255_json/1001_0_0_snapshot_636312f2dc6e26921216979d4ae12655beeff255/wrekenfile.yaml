    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/issue/{issueIdOrKey}/worklog
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(Worklog)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Worklog)
    INPUTS:
      - issueIdOrKey:
          TYPE: STRING
          LOCATION: path
      - notifyUsers:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - adjustEstimate:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: auto
      - newEstimate:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - reduceBy:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: ""
      - overrideEditableFlag:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(Worklog)
          LOCATION: body
    RETURNS:
