      To replace all actors for the project, use [Set actors for project role](#api-rest-api-3-project-projectIdOrKey-role-id-put).

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/role/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ActorsMap)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectRole)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
      - id:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(ActorsMap)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectRole)
        RETURNVAR: rest_api_role_create
        STATUS: 200
    ERRORS:
