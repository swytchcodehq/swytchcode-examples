    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - issueTypeId:
          TYPE: STRING
          LOCATION: path
      - propertyKey:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(rest.api.properties.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_properties_update_fdb6
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: rest_api_properties_update_fdb6_201
        STATUS: 201
    ERRORS:
