  rest.api.search.list_21b7:
    SUMMARY: Find users with permissions
    DESC: |-
      Returns a list of users who fulfill these criteria:

       *  their user attributes match a search string.
       *  they have a set of permissions for a project or issue.

      If no search string is provided, a list of all users with the permissions is returned.

      This operation takes the users in the range defined by `startAt` and `maxResults`, up to the thousandth user, and then returns only the users from that range that match the search string and have permission for the project or issue. This means the operation usually returns fewer users than specified in `maxResults`. To get all the users who match the search string and have permission for the project or issue, use [Get all users](#api-rest-api-3-users-search-get) and filter the records in your code.

      Privacy controls are applied to the response based on the users' preferences. This could mean, for example, that the user's email address is hidden. See the [Profile visibility overview](https://developer.atlassian.com/cloud/jira/platform/profile-visibility/) for more details.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:**

       *  *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg), to get users for any project.
       *  *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for a project, to get users for that project.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/user/permission/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(User)"
    INPUTS:
      - query:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - username:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - permissions:
          TYPE: STRING
          LOCATION: query
      - issueKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
    RETURNS:
      - RETURNTYPE: "[]STRUCT(User)"
        RETURNVAR: rest_api_search_list_21b7
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned if:

           *  `issueKey` or `projectKey` is missing.
           *  `query` or `accountId` is missing.
           *  `query` and `accountId` are provided.
           *  `permissions` is empty or contains an invalid entry. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Returned if the issue or project is not found. (HTTP 404)
      - TYPE: ANY
        STATUS: 429
        WHEN: Returned if the rate limit is exceeded. User search endpoints share a collective rate limit for the tenant, in addition to Jira's normal rate limiting you may receive a rate limit for user search. Please respect the Retry-After header. (HTTP 429)
    CANONICAL_ID: rest.api.search.list_21b7
