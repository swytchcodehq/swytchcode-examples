  rest.api.export.update:
    SUMMARY: Export archived issue(s)
    DESC: |
      Enables admins to retrieve details of all archived issues. Upon a successful request, the admin who submitted it will receive an email with a link to download a CSV file with the issue details.

      Note that this API only exports the values of system fields and archival-specific fields (`ArchivedBy` and `ArchivedDate`). Custom fields aren't supported.

      **[Permissions](#permissions) required:** Jira admin or site admin: [global permission](https://confluence.atlassian.com/x/x4dKLg)

      **License required:** Premium or Enterprise

      **Signed-in users only:** This API can't be accessed anonymously.

      **Rate limiting:** Only a single request can be active at any given time.

    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/issues/archive/export
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ArchivedIssuesFilterRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExportArchivedIssuesTaskProgressResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ArchivedIssuesFilterRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ExportArchivedIssuesTaskProgressResponse)
        RETURNVAR: rest_api_export_update_202
        STATUS: 202
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: |-
          Returned when:

           *  The request is invalid, or the filters provided are incorrect
           *  You requested too many issues for export. The limit is one million issues per request (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if no issues were unarchived because the provided authentication credentials are either missing or invalid. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if no issues were unarchived because the user lacks the required Jira admin or site admin permissions. (HTTP 403)
      - TYPE: ANY
        STATUS: 412
        WHEN: Returned if a request to export archived issues is already running. (HTTP 412)
    CANONICAL_ID: rest.api.export.update
