        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing or if the calling user lacks administrative permissions for the project. (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: |-
          Returned if:

           *  the project is not found.
           *  the user or group is not found.
           *  the group or user is not active. (HTTP 404)
    CANONICAL_ID: rest.api.role.create
  rest.api.role.update:
    SUMMARY: Set actors for project role
    DESC: |-
      Sets the actors for a project role for a project, replacing all existing actors.

      To add actors to the project without overwriting the existing list, use [Add actors to project role](#api-rest-api-3-project-projectIdOrKey-role-id-post).

      **[Permissions](#permissions) required:** *Administer Projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for the project or *Administer Jira* [global permission](https://confluence.atlassian.com/x/x4dKLg).
    HTTP:
      METHOD: PUT
      ENDPOINT: /rest/api/3/project/{projectIdOrKey}/role/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProjectRoleActorsUpdateBean)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectRole)
    INPUTS:
      - projectIdOrKey:
          TYPE: STRING
          LOCATION: path
