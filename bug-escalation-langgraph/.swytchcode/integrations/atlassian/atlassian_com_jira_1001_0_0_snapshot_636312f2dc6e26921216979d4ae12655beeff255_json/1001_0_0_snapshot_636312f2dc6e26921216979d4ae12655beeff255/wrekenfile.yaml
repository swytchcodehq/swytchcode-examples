  rest.api.search.list_9386:
    SUMMARY: Search for filters
    DESC: |-
      Returns a [paginated](#pagination) list of filters. Use this operation to get:

       *  specific filters, by defining `id` only.
       *  filters that match all of the specified attributes. For example, all filters for a user with a particular word in their name. When multiple attributes are specified only filters matching all attributes are returned.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** None, however, only the following filters that match the query parameters are returned:

       *  filters owned by the user.
       *  filters shared with a group that the user is a member of.
       *  filters shared with a private project that the user has *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for.
       *  filters shared with a public project.
       *  filters shared with the public.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/filter/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PageBeanFilterDetails)
    INPUTS:
      - filterName:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - owner:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - groupname:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - groupId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - id:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - orderBy:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: name
      - startAt:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - expand:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - overrideSharePermissions:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - isSubstringMatch:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(PageBeanFilterDetails)
        RETURNVAR: rest_api_search_list_9386
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(ErrorCollection)
        STATUS: 400
        WHEN: |-
          Returned if:

           *  `owner` and `accountId` are provided.
           *  `expand` includes an invalid value.
           *  `orderBy` is invalid.
           *  `id` identifies more than 200 filter IDs. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
    CANONICAL_ID: rest.api.search.list_9386
  rest.api.filter.delete:
