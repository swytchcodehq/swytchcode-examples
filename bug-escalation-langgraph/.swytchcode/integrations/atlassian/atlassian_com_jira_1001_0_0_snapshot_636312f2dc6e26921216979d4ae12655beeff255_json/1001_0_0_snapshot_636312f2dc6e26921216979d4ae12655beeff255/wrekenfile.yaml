  rest.api.picker.list:
    SUMMARY: Find groups
    DESC: |-
      Returns a list of groups whose names contain a query string. A list of group names can be provided to exclude groups from the results.

       The primary use case for this resource is to populate a group picker suggestions list. To this end, the returned object includes the `html` field where the matched query term is highlighted in the group name with the HTML strong tag. Also, the groups list is wrapped in a response object that contains a header for use in the picker, specifically *Showing X of Y matching groups*.

       The list returns with the groups sorted. If no groups match the list criteria, an empty list is returned.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg). Anonymous calls and calls by users without the required permission return an empty list.

      *Browse users and groups* [global permission](https://confluence.atlassian.com/x/x4dKLg). Without this permission, calls where query is not an exact match to an existing group will return an empty list.
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/groups/picker
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FoundGroups)
    INPUTS:
      - accountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - query:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - exclude:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - excludeId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - caseInsensitive:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - userName:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(FoundGroups)
        RETURNVAR: rest_api_picker_list
        STATUS: 200
    CANONICAL_ID: rest.api.picker.list
  rest.api.groupuserpicker.list:
    SUMMARY: Find users and groups
    DESC: |-
      Returns a list of users and groups matching a string. The string is used:

       *  for users, to find a case-insensitive match with display name and e-mail address. Note that if a user has hidden their email address in their user profile, partial matches of the email address will not find the user. An exact match is required.
       *  for groups, to find a case-sensitive match with group name.

      For example, if the string *tin* is used, records with the display name *Tina*, email address *sarah@tinplatetraining.com*, and the group *accounting* would be returned.

      Optionally, the search can be refined to:

       *  the projects and issue types associated with a custom field, such as a user picker. The search can then be further refined to return only users and groups that have permission to view specific:

           *  projects.
           *  issue types.

          If multiple projects or issue types are specified, they must be a subset of those enabled for the custom field or no results are returned. For example, if a field is enabled for projects A, B, and C then the search could be limited to projects B and C. However, if the search is limited to projects B and D, nothing is returned.
       *  not return Connect app users and groups.
       *  return groups that have a case-insensitive match with the query.

      The primary use case for this resource is to populate a picker field suggestion list with users or groups. To this end, the returned object includes an `html` field for each list. This field highlights the matched query term in the item name with the HTML strong tag. Also, each list is wrapped in a response object that contains a header for use in a picker, specifically *Showing X of Y matching groups*.

      This operation can be accessed anonymously.

      **[Permissions](#permissions) required:** *Browse users and groups* [global permission](https://confluence.atlassian.com/x/yodKLg).
    HTTP:
      METHOD: GET
      ENDPOINT: /rest/api/3/groupuserpicker
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FoundUsersAndGroups)
    INPUTS:
      - query:
          TYPE: STRING
          LOCATION: query
      - maxResults:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 50
      - showAvatar:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - fieldId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - projectId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - issueTypeId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - avatarSize:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: xsmall
      - caseInsensitive:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - excludeConnectAddons:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(FoundUsersAndGroups)
        RETURNVAR: rest_api_groupuserpicker_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the query parameter is not provided. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the user does not have the necessary permission. (HTTP 403)
      - TYPE: ANY
        STATUS: 429
        WHEN: Returned if the rate limit is exceeded. User search endpoints share a collective rate limit for the tenant, in addition to Jira's normal rate limiting you may receive a rate limit for user search. Please respect the Retry-After header. (HTTP 429)
    CANONICAL_ID: rest.api.groupuserpicker.list
  rest.api.license.list:
