  rest.api.uiModifications.create:
    SUMMARY: Create UI modification
    DESC: |-
      Creates a UI modification. UI modification can only be created by Forge apps.

      Each app can define up to 3000 UI modifications. Each UI modification can define up to 1000 contexts. The same context can be assigned to maximum 100 UI modifications.

      **[Permissions](#permissions) required:**

       *  *None* if the UI modification is created without contexts.
       *  *Browse projects* [project permission](https://confluence.atlassian.com/x/yodKLg) for one or more projects, if the UI modification is created with contexts.

      The new `write:app-data:jira` OAuth scope is 100% optional now, and not using it won't break your app. However, we recommend adding it to your app's scope list because we will eventually make it mandatory.
    HTTP:
      METHOD: POST
      ENDPOINT: /rest/api/3/uiModifications
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateUiModificationDetails)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UiModificationIdentifiers)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateUiModificationDetails)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UiModificationIdentifiers)
        RETURNVAR: rest_api_uiModifications_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Returned if the request is not valid. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Returned if the authentication credentials are incorrect or missing. (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Returned if the request is not from a Forge app. (HTTP 403)
      - TYPE: STRUCT(DetailedErrorCollection)
        STATUS: 404
        WHEN: Returned if a project or an issue type in the context are not found. (HTTP 404)
    CANONICAL_ID: rest.api.uiModifications.create
