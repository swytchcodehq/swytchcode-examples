    - name: allow_rebase_merge
      NAME: allow_rebase_merge
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Either `true` to allow rebase-merging pull requests, or `false` to prevent rebase-merging.
    - name: allow_auto_merge
      NAME: allow_auto_merge
