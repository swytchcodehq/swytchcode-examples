    DESC: Get the total number of clones and breakdown per day or week for the last 14 days. Timestamps are aligned to UTC midnight of the beginning of the day or week. Week begins on Monday.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/traffic/clones
