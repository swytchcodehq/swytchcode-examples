  repos.compare.get:
    SUMMARY: Compare two commits
    DESC: |-
      Compares two commits against one another. You can compare refs (branches or tags) and commit SHAs in the same repository, or you can compare refs and commit SHAs that exist in different repositories within the same repository network, including fork branches. For more information about how to view a repository's network, see "[Understanding connections between repositories](https://docs.github.com/repositories/viewing-activity-and-data-for-your-repository/understanding-connections-between-repositories)."

      This endpoint is equivalent to running the `git log BASE..HEAD` command, but it returns commits in a different order. The `git log BASE..HEAD` command returns commits in reverse chronological order, whereas the API returns commits in chronological order.

      This endpoint supports the following custom media types. For more information, see "[Media types](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types)."

      - **`application/vnd.github.diff`**: Returns the diff of the commit.
      - **`application/vnd.github.patch`**: Returns the patch of the commit. Diffs with binary data will have no `patch` property.

      The API response includes details about the files that were changed between the two commits. This includes the status of the change (if a file was added, removed, modified, or renamed), and details of the change itself. For example, files with a `renamed` status have a `previous_filename` field showing the previous filename of the file, and files with a `modified` status have a `patch` field showing the changes made to the file.

      When calling this endpoint without any paging parameter (`per_page` or `page`), the returned list is limited to 250 commits, and the last commit in the list is the most recent of the entire comparison.

      **Working with large comparisons**

      To process a response with a large number of commits, use a query parameter (`per_page` or `page`) to paginate the results. When using pagination:

      - The list of changed files is only shown on the first page of results, and it includes up to 300 changed files for the entire comparison.
      - The results are returned in chronological order, but the last commit in the returned list may not be the most recent one in the entire set if there are more pages of results.

      For more information on working with pagination, see "[Using pagination in the REST API](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api)."

      **Signature verification object**

      The response will include a `verification` object that describes the result of verifying the commit's signature. The `verification` object includes the following fields:

      | Name | Type | Description |
      | ---- | ---- | ----------- |
      | `verified` | `boolean` | Indicates whether GitHub considers the signature in this commit to be verified. |
      | `reason` | `string` | The reason for verified value. Possible values and their meanings are enumerated in table below. |
      | `signature` | `string` | The signature that was extracted from the commit. |
      | `payload` | `string` | The value that was signed. |
      | `verified_at` | `string` | The date the signature was verified by GitHub. |

      These are the possible values for `reason` in the `verification` object:

      | Value | Description |
      | ----- | ----------- |
      | `expired_key` | The key that made the signature is expired. |
      | `not_signing_key` | The "signing" flag is not among the usage flags in the GPG key that made the signature. |
      | `gpgverify_error` | There was an error communicating with the signature verification service. |
      | `gpgverify_unavailable` | The signature verification service is currently unavailable. |
      | `unsigned` | The object does not include a signature. |
      | `unknown_signature_type` | A non-PGP signature was found in the commit. |
      | `no_user` | No user was associated with the `committer` email address in the commit. |
      | `unverified_email` | The `committer` email address in the commit was associated with a user, but the email address is not verified on their account. |
      | `bad_email` | The `committer` email address in the commit is not included in the identities of the PGP key that made the signature. |
      | `unknown_key` | The key that made the signature has not been registered with any user's account. |
      | `malformed_signature` | There was an error parsing the signature. |
      | `invalid` | The signature could not be cryptographically verified using the key whose key-id was found in the signature. |
      | `valid` | None of the above errors applied, so the signature is considered to be verified. |
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/compare/{basehead}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(commit-comparison)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - basehead:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(commit-comparison)
        RETURNVAR: repos_compare_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 500
        WHEN: Server error (HTTP 500)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: repos.compare.get
  repos.content.get:
    SUMMARY: Get repository content
    DESC: |-
      Gets the contents of a file or directory in a repository. Specify the file path or directory with the `path` parameter. If you omit the `path` parameter, you will receive the contents of the repository's root directory.

      This endpoint supports the following custom media types. For more information, see "[Media types](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types)."

      - **`application/vnd.github.raw+json`**: Returns the raw file contents for files and symlinks.
      - **`application/vnd.github.html+json`**: Returns the file contents in HTML. Markup languages are rendered to HTML using GitHub's open-source [Markup library](https://github.com/github/markup).
      - **`application/vnd.github.object+json`**: Returns the contents in a consistent object format regardless of the content type. For example, instead of an array of objects for a directory, the response will be an object with an `entries` attribute containing the array of objects.

      If the content is a directory: The response will be an array of objects, one object for each item in the directory.

      If the content is a symlink and the symlink's target is a normal file in the repository, then the API responds with the content of the file. Otherwise, the API responds with an object describing the symlink itself.

      If the content is a submodule, the `submodule_git_url` field identifies the location of the submodule repository, and the `sha` identifies a specific commit within the submodule repository. Git uses the given URL when cloning the submodule repository, and checks out the submodule at that specific commit. If the submodule repository is not hosted on github.com, the Git URLs (`git_url` and `_links["git"]`) and the github.com URLs (`html_url` and `_links["html"]`) will have null values.

      **Notes**:

      - To get a repository's contents recursively, you can [recursively get the tree](https://docs.github.com/rest/git/trees#get-a-tree).
      - This API has an upper limit of 1,000 files for a directory. If you need to retrieve
      more files, use the [Git Trees API](https://docs.github.com/rest/git/trees#get-a-tree).
      - Download URLs expire and are meant to be used just once. To ensure the download URL does not expire, please use the contents API to obtain a fresh download URL for each download.
      - If the requested file's size is:
        - 1 MB or smaller: All features of this endpoint are supported.
        - Between 1-100 MB: Only the `raw` or `object` custom media types are supported. Both will work as normal, except that when using the `object` media type, the `content` field will be an empty
      string and the `encoding` field will be `"none"`. To get the contents of these larger files, use the `raw` media type.
        - Greater than 100 MB: This endpoint is not supported.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/contents/{path}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.github.object
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
      - ref:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: repos_content_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: repos.content.get
  repos.content.update:
    SUMMARY: Create or update file contents
    DESC: |-
      Creates a new file or replaces an existing file in a repository.

      > [!NOTE]
      > If you use this endpoint and the "[Delete a file](https://docs.github.com/rest/repos/contents/#delete-a-file)" endpoint in parallel, the concurrent requests will conflict and you will receive errors. You must use these endpoints serially instead.

      OAuth app tokens and personal access tokens (classic) need the `repo` scope to use this endpoint. The `workflow` scope is also required in order to modify files in the `.github/workflows` directory.
    HTTP:
      METHOD: PUT
      ENDPOINT: /repos/{owner}/{repo}/contents/{path}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.content.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(file-commit)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
