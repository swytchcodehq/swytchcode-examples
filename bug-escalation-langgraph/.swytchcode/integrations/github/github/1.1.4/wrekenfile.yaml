  repos.releas.assets.create:
    SUMMARY: Upload a release asset
    DESC: |-
      This endpoint makes use of a [Hypermedia relation](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#hypermedia) to determine which URL to access. The endpoint you call to upload release assets is specific to your release. Use the `upload_url` returned in
      the response of the [Create a release endpoint](https://docs.github.com/rest/releases/releases#create-a-release) to upload a release asset.

      You need to use an HTTP client which supports [SNI](http://en.wikipedia.org/wiki/Server_Name_Indication) to make calls to this endpoint.

      Most libraries will set the required `Content-Length` header automatically. Use the required `Content-Type` header to provide the media type of the asset. For a list of media types, see [Media Types](https://www.iana.org/assignments/media-types/media-types.xhtml). For example:

      `application/zip`

      GitHub expects the asset data in its raw binary form, rather than JSON. You will send the raw binary content of the asset as the request body. Everything else about the endpoint is the same as the rest of the API. For example,
      you'll still need to pass your authentication to be able to upload an asset.

      When an upstream failure occurs, you will receive a `502 Bad Gateway` status. This may leave an empty asset with a state of `starter`. It can be safely deleted.

      **Notes:**
      *   GitHub renames asset filenames that have special characters, non-alphanumeric characters, and leading or trailing periods. The "[List release assets](https://docs.github.com/rest/releases/assets#list-release-assets)"
      endpoint lists the renamed filenames. For more information and help, contact [GitHub Support](https://support.github.com/contact?tags=dotcom-rest-api).
      *   To find the `release_id` query the [`GET /repos/{owner}/{repo}/releases/latest` endpoint](https://docs.github.com/rest/releases/releases#get-the-latest-release).
      *   If you upload an asset with the same filename as another uploaded asset, you'll receive an error and must delete the old file before you can re-upload the new asset.
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/releases/{release_id}/assets
      HEADERS:
        Content-Type: application/octet-stream
      CONTENT_TYPE: application/octet-stream
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(release-asset)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - release_id:
          TYPE: INT
          LOCATION: path
      - name:
          TYPE: STRING
          LOCATION: query
      - label:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(release-asset)
        RETURNVAR: repos_releas_assets_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Response if you upload an asset with the same filename as another uploaded asset (HTTP 422)
    CANONICAL_ID: repos.releas.assets.create
