          TYPE: STRUCT(private-vulnerability-report-create)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(repository-advisory)
        RETURNVAR: repos_security-advisory_reports_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.security-advisory.reports.create
  repos.security-advisory.get_a930:
    SUMMARY: Get a repository security advisory
    DESC: |-
      Get a repository security advisory using its GitHub Security Advisory (GHSA) identifier.

      Anyone can access any published security advisory on a public repository.

      The authenticated user can access an unpublished security advisory from a repository if they are a security manager or administrator of that repository, or if they are a
      collaborator on the security advisory.

      OAuth app tokens and personal access tokens (classic) need the `repo` or `repository_advisories:read` scope to to get a published security advisory in a private repository, or any unpublished security advisory that the authenticated user has access to.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/security-advisories/{ghsa_id}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(repository-advisory)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - ghsa_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(repository-advisory)
        RETURNVAR: repos_security-advisory_get_a930
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: repos.security-advisory.get_a930
  repos.security-advisory.update:
    SUMMARY: Update a repository security advisory
    DESC: |-
      Update a repository security advisory using its GitHub Security Advisory (GHSA) identifier.

      In order to update any security advisory, the authenticated user must be a security manager or administrator of that repository,
      or a collaborator on the repository security advisory.

      OAuth app tokens and personal access tokens (classic) need the `repo` or `repository_advisories:write` scope to use this endpoint.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /repos/{owner}/{repo}/security-advisories/{ghsa_id}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repository-advisory-update)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(repository-advisory)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - ghsa_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repository-advisory-update)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(repository-advisory)
        RETURNVAR: repos_security-advisory_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: STRUCT(validation-error)
        STATUS: 422
        WHEN: Validation failed, or the endpoint has been spammed. (HTTP 422)
    CANONICAL_ID: repos.security-advisory.update
  repos.security-advisory.cve.create:
    SUMMARY: Request a CVE for a repository security advisory
    DESC: |-
      If you want a CVE identification number for the security vulnerability in your project, and don't already have one, you can request a CVE identification number from GitHub. For more information see "[Requesting a CVE identification number](https://docs.github.com/code-security/security-advisories/repository-security-advisories/publishing-a-repository-security-advisory#requesting-a-cve-identification-number-optional)."

      You may request a CVE for public repositories, but cannot do so for private repositories.

      In order to request a CVE for a repository security advisory, the authenticated user must be a security manager or administrator of that repository.

      OAuth app tokens and personal access tokens (classic) need the `repo` or `repository_advisories:write` scope to use this endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/security-advisories/{ghsa_id}/cve
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - ghsa_id:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.security-advisory.cve.create
  repos.security-advisory.forks.create:
    SUMMARY: Create a temporary private fork
    DESC: |-
      Create a temporary private fork to collaborate on fixing a security vulnerability in your repository.

      > [!NOTE]
      > Forking a repository happens asynchronously. You may have to wait up to 5 minutes before you can access the fork.
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/security-advisories/{ghsa_id}/forks
      HEADERS:
