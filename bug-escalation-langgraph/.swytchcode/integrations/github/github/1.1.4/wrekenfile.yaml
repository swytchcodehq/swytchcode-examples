  notifications.thread.subscription.update:
    SUMMARY: Set a thread subscription
    DESC: |-
      If you are watching a repository, you receive notifications for all threads by default. Use this endpoint to ignore future notifications for threads until you comment on the thread or get an **@mention**.

      You can also use this endpoint to subscribe to threads that you are currently not receiving notifications for or to subscribed to threads that you have previously ignored.

      Unsubscribing from a conversation in a repository that you are not watching is functionally equivalent to the [Delete a thread subscription](https://docs.github.com/rest/activity/notifications#delete-a-thread-subscription) endpoint.
    HTTP:
      METHOD: PUT
      ENDPOINT: /notifications/threads/{thread_id}/subscription
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(notifications.thread.subscription.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(thread-subscription)
    INPUTS:
      - thread_id:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(notifications.thread.subscription.updateRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(thread-subscription)
        RETURNVAR: notifications_thread_subscription_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: notifications.thread.subscription.update
  notifications.thread.subscription.delete:
    SUMMARY: Delete a thread subscription
    DESC: Mutes all future notifications for a conversation until you comment on the thread or get an **@mention**. If you are watching the repository of the thread, you will still receive notifications. To ignore future notifications for a repository you are watching, use the [Set a thread subscription](https://docs.github.com/rest/activity/notifications#set-a-thread-subscription) endpoint and set `ignore` to `true`.
    HTTP:
