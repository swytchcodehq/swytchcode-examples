      - head:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - base:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: created
      - direction:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
