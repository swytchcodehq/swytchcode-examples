          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - per:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: day
    RETURNS:
      - RETURNTYPE: STRUCT(clone-traffic)
        RETURNVAR: repos_traffic_clones_get
        STATUS: 200
    ERRORS:
