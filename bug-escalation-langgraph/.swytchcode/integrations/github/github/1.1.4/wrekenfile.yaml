        TYPE: STRUCT(full-repository)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - ghsa_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(full-repository)
        RETURNVAR: repos_security-advisory_forks_create_202
        STATUS: 202
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.security-advisory.forks.create
  repos.stargazer.get:
    SUMMARY: List stargazers
    DESC: |-
      Lists the people that have starred the repository.

      This endpoint supports the following custom media types. For more information, see "[Media types](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types)."

      - **`application/vnd.github.star+json`**: Includes a timestamp of when the star was created.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/stargazers
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: repos_stargazer_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.stargazer.get
  repos.stat.codeFrequency.get:
    SUMMARY: Get the weekly commit activity
    DESC: |-
      Returns a weekly aggregate of the number of additions and deletions pushed to a repository.

      > [!NOTE]
      > This endpoint can only be used for repositories with fewer than 10,000 commits. If the repository contains 10,000 or more commits, a 422 status code will be returned.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/stats/code_frequency
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]ANY"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]ANY"
        RETURNVAR: repos_stat_codeFrequency_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Repository contains more than 10,000 commits (HTTP 422)
    CANONICAL_ID: repos.stat.codeFrequency.get
  repos.stat.commitActivity.get:
    SUMMARY: Get the last year of commit activity
    DESC: Returns the last year of commit activity grouped by week. The `days` array is a group of commits per day, starting on `Sunday`.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/stats/commit_activity
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(commit-activity)"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(commit-activity)"
        RETURNVAR: repos_stat_commitActivity_get
        STATUS: 200
    CANONICAL_ID: repos.stat.commitActivity.get
  repos.stat.contributors.get:
    SUMMARY: Get all contributor commit activity
    DESC: |-

      Returns the `total` number of commits authored by the contributor. In addition, the response includes a Weekly Hash (`weeks` array) with the following information:

      *   `w` - Start of the week, given as a [Unix timestamp](https://en.wikipedia.org/wiki/Unix_time).
      *   `a` - Number of additions
      *   `d` - Number of deletions
      *   `c` - Number of commits

      > [!NOTE]
      > This endpoint will return `0` values for all addition and deletion counts in repositories with 10,000 or more commits.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/stats/contributors
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(contributor-activity)"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(contributor-activity)"
        RETURNVAR: repos_stat_contributors_get
        STATUS: 200
    CANONICAL_ID: repos.stat.contributors.get
  repos.stat.participation.get:
    SUMMARY: Get the weekly commit count
    DESC: |-
      Returns the total commit counts for the `owner` and total commit counts in `all`. `all` is everyone combined, including the `owner` in the last 52 weeks. If you'd like to get the commit counts for non-owners, you can subtract `owner` from `all`.

      The array order is oldest week (index 0) to most recent week.

      The most recent week is seven days ago at UTC midnight to today at UTC midnight.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/stats/participation
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(participation-stats)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(participation-stats)
        RETURNVAR: repos_stat_participation_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: repos.stat.participation.get
  repos.stat.punchCard.get:
    SUMMARY: Get the hourly commit count for each day
    DESC: |-
      Each array contains the day number, hour number, and number of commits:

      *   `0-6`: Sunday - Saturday
      *   `0-23`: Hour of day
      *   Number of commits

      For example, `[2, 14, 25]` indicates that there were 25 total commits, during the 2:00pm hour on Tuesdays. All times are based on the time zone of individual commits.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/stats/punch_card
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]ANY"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]ANY"
        RETURNVAR: repos_stat_punchCard_get
        STATUS: 200
    CANONICAL_ID: repos.stat.punchCard.get
  repos.status.create:
    SUMMARY: Create a commit status
    DESC: |-
      Users with push access in a repository can create commit statuses for a given SHA.

      Note: there is a limit of 1000 statuses per `sha` and `context` within a repository. Attempts to create more than 1000 statuses will result in a validation error.
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/statuses/{sha}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.status.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(status)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - sha:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.status.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(status)
        RETURNVAR: repos_status_create_201
        STATUS: 201
    CANONICAL_ID: repos.status.create
  repos.subscriber.get:
    SUMMARY: List watchers
    DESC: Lists the people watching the specified repository.
    HTTP:
      METHOD: GET
