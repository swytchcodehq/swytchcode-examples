      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(content-traffic)"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(content-traffic)"
        RETURNVAR: repos_traffic_paths_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: repos.traffic.paths.get
  repos.traffic.referrers.get:
    SUMMARY: Get top referral sources
    DESC: Get the top 10 referrers over the last 14 days.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/traffic/popular/referrers
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(referrer-traffic)"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(referrer-traffic)"
        RETURNVAR: repos_traffic_referrers_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: repos.traffic.referrers.get
  repos.traffic.views.get:
    SUMMARY: Get page views
    DESC: Get the total number of views and breakdown per day or week for the last 14 days. Timestamps are aligned to UTC midnight of the beginning of the day or week. Week begins on Monday.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/traffic/views
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(view-traffic)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - per:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: day
    RETURNS:
      - RETURNTYPE: STRUCT(view-traffic)
        RETURNVAR: repos_traffic_views_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: repos.traffic.views.get
  repos.transfer.create:
    SUMMARY: Transfer a repository
    DESC: A transfer request will need to be accepted by the new owner when transferring a personal repository to another user. The response will contain the original `owner`, and the transfer will continue asynchronously. For more details on the requirements to transfer personal and organization-owned repositories, see [about repository transfers](https://docs.github.com/articles/about-repository-transfers/).
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/transfer
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.transfer.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(minimal-repository)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.transfer.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(minimal-repository)
        RETURNVAR: repos_transfer_create_202
        STATUS: 202
    CANONICAL_ID: repos.transfer.create
  repos.vulnerability-alert.get:
    SUMMARY: Check if vulnerability alerts are enabled for a repository
    DESC: Shows whether dependency alerts are enabled or disabled for a repository. The authenticated user must have admin read access to the repository. For more information, see "[About security alerts for vulnerable dependencies](https://docs.github.com/articles/about-security-alerts-for-vulnerable-dependencies)".
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/vulnerability-alerts
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Not Found if repository is not enabled with vulnerability alerts (HTTP 404)
    CANONICAL_ID: repos.vulnerability-alert.get
  repos.vulnerability-alert.update:
    SUMMARY: Enable vulnerability alerts
    DESC: Enables dependency alerts and the dependency graph for a repository. The authenticated user must have admin access to the repository. For more information, see "[About security alerts for vulnerable dependencies](https://docs.github.com/articles/about-security-alerts-for-vulnerable-dependencies)".
    HTTP:
      METHOD: PUT
      ENDPOINT: /repos/{owner}/{repo}/vulnerability-alerts
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    CANONICAL_ID: repos.vulnerability-alert.update
  repos.vulnerability-alert.delete:
    SUMMARY: Disable vulnerability alerts
    DESC: |-
      Disables dependency alerts and the dependency graph for a repository.
      The authenticated user must have admin access to the repository. For more information,
      see "[About security alerts for vulnerable dependencies](https://docs.github.com/articles/about-security-alerts-for-vulnerable-dependencies)".
    HTTP:
      METHOD: DELETE
      ENDPOINT: /repos/{owner}/{repo}/vulnerability-alerts
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    CANONICAL_ID: repos.vulnerability-alert.delete
  repos.zipball.get:
    SUMMARY: Download a repository archive (zip)
    DESC: |-
      Gets a redirect URL to download a zip archive for a repository. If you omit `:ref`, the repository’s default branch (usually
      `main`) will be used. Please make sure your HTTP framework is configured to follow redirects or you will need to use
      the `Location` header to make a second `GET` request.

      > [!NOTE]
      > For private repositories, these links are temporary and expire after five minutes. If the repository is empty, you will receive a 404 when you follow the redirect.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/zipball/{ref}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - ref:
          TYPE: STRING
          LOCATION: path
    CANONICAL_ID: repos.zipball.get
  repos.generate.create:
    SUMMARY: Create a repository using a template
    DESC: |-
      Creates a new repository using a repository template. Use the `template_owner` and `template_repo` route parameters to specify the repository to use as the template. If the repository is not public, the authenticated user must own or be a member of an organization that owns the repository. To check if a repository is available to use as a template, get the repository's information using the [Get a repository](https://docs.github.com/rest/repos/repos#get-a-repository) endpoint and check that the `is_template` key is `true`.

      OAuth app tokens and personal access tokens (classic) need the `public_repo` or `repo` scope to create a public repository, and `repo` scope to create a private repository.
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{template_owner}/{template_repo}/generate
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.generate.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(full-repository)
    INPUTS:
      - template_owner:
          TYPE: STRING
          LOCATION: path
      - template_repo:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.generate.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(full-repository)
        RETURNVAR: repos_generate_create_201
        STATUS: 201
    CANONICAL_ID: repos.generate.create
  repositories.repository.list:
    SUMMARY: List public repositories
    DESC: |-
      Lists all public repositories in the order that they were created.

      Note:
      - For GitHub Enterprise Server, this endpoint will only list repositories available to all users on the enterprise.
      - Pagination is powered exclusively by the `since` parameter. Use the [Link header](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api#using-link-headers) to get the URL for the next page of repositories.
    HTTP:
      METHOD: GET
      ENDPOINT: /repositories
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(minimal-repository)"
    INPUTS:
      - since:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]STRUCT(minimal-repository)"
        RETURNVAR: repositories_repository_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repositories.repository.list
  repositories.issue.issueFieldValues.create:
    SUMMARY: Add issue field values to an issue
    DESC: |-
      Add custom field values to an issue. You can set values for organization-level issue fields that have been defined for the repository's organization.
      Adding an empty array will clear all existing field values for the issue.

      This endpoint supports the following field data types:
      - **`text`**: String values for text fields
      - **`single_select`**: Option names for single-select fields (must match an existing option name)
      - **`number`**: Numeric values for number fields
      - **`date`**: ISO 8601 date strings for date fields

      Only users with push access to the repository can add issue field values. If you don't have the proper permissions, you'll receive a `403 Forbidden` response.

      This endpoint triggers [notifications](https://docs.github.com/github/managing-subscriptions-and-notifications-on-github/about-notifications). Creating content too quickly using this endpoint may result in secondary rate limiting. For more information, see "[Rate limits for the API](https://docs.github.com/rest/using-the-rest-api/rate-limits-for-the-rest-api#about-secondary-rate-limits)"
      and "[Best practices for using the REST API](https://docs.github.com/rest/guides/best-practices-for-using-the-rest-api)."
    HTTP:
      METHOD: POST
      ENDPOINT: /repositories/{repository_id}/issues/{issue_number}/issue-field-values
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repositories.issue.issueFieldValues.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(issue-field-value)"
    INPUTS:
      - repository_id:
          TYPE: INT
          LOCATION: path
      - issue_number:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(repositories.issue.issueFieldValues.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: "[]STRUCT(issue-field-value)"
        RETURNVAR: repositories_issue_issueFieldValues_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: repositories.issue.issueFieldValues.create
  repositories.issue.issueFieldValues.update:
    SUMMARY: Set issue field values for an issue
    DESC: |-
      Set custom field values for an issue, replacing any existing values. You can set values for organization-level issue fields that have been defined for the repository's organization.

      This endpoint supports the following field data types:
      - **`text`**: String values for text fields
      - **`single_select`**: Option names for single-select fields (must match an existing option name)
      - **`number`**: Numeric values for number fields
      - **`date`**: ISO 8601 date strings for date fields

      This operation will replace all existing field values with the provided ones. If you want to add field values without replacing existing ones, use the `POST` endpoint instead.

      Only users with push access to the repository can set issue field values. If you don't have the proper permissions, you'll receive a `403 Forbidden` response.

      This endpoint triggers [notifications](https://docs.github.com/github/managing-subscriptions-and-notifications-on-github/about-notifications). Creating content too quickly using this endpoint may result in secondary rate limiting. For more information, see "[Rate limits for the API](https://docs.github.com/rest/using-the-rest-api/rate-limits-for-the-rest-api#about-secondary-rate-limits)"
      and "[Best practices for using the REST API](https://docs.github.com/rest/guides/best-practices-for-using-the-rest-api)."
    HTTP:
      METHOD: PUT
      ENDPOINT: /repositories/{repository_id}/issues/{issue_number}/issue-field-values
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repositories.issue.issueFieldValues.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(issue-field-value)"
    INPUTS:
      - repository_id:
          TYPE: INT
          LOCATION: path
      - issue_number:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(repositories.issue.issueFieldValues.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: "[]STRUCT(issue-field-value)"
        RETURNVAR: repositories_issue_issueFieldValues_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: repositories.issue.issueFieldValues.update
  repositories.issue.issueFieldValues.delete:
    SUMMARY: Delete an issue field value from an issue
    DESC: |-
      Remove a specific custom field value from an issue.

      Only users with push access to the repository can delete issue field values. If you don't have the proper permissions, you'll receive a `403 Forbidden` response.

      If the specified field does not have a value set on the issue, this operation will return a `404` error.

      This endpoint triggers [notifications](https://docs.github.com/github/managing-subscriptions-and-notifications-on-github/about-notifications). Creating content too quickly using this endpoint may result in secondary rate limiting. For more information, see "[Rate limits for the API](https://docs.github.com/rest/using-the-rest-api/rate-limits-for-the-rest-api#about-secondary-rate-limits)"
      and "[Best practices for using the REST API](https://docs.github.com/rest/guides/best-practices-for-using-the-rest-api)."
    HTTP:
      METHOD: DELETE
      ENDPOINT: /repositories/{repository_id}/issues/{issue_number}/issue-field-values/{issue_field_id}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - repository_id:
          TYPE: INT
          LOCATION: path
      - issue_number:
          TYPE: INT
          LOCATION: path
      - issue_field_id:
          TYPE: INT
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: repositories.issue.issueFieldValues.delete
  search.code.list:
    SUMMARY: Search code
    DESC: |-
      Searches for query terms inside of a file. This method returns up to 100 results [per page](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api).

      When searching for code, you can get text match metadata for the file **content** and file **path** fields when you pass the `text-match` media type. For more details about how to receive highlighted search results, see [Text match metadata](https://docs.github.com/rest/search/search#text-match-metadata).

      For example, if you want to find the definition of the `addClass` function inside [jQuery](https://github.com/jquery/jquery) repository, your query would look something like this:

      `q=addClass+in:file+language:js+repo:jquery/jquery`

      This query searches for the keyword `addClass` within a file's contents. The query limits the search to files where the language is JavaScript in the `jquery/jquery` repository.

      Considerations for code search:

      Due to the complexity of searching code, there are a few restrictions on how searches are performed:

      *   Only the _default branch_ is considered. In most cases, this will be the `master` branch.
      *   Only files smaller than 384 KB are searchable.
      *   You must always include at least one search term when searching source code. For example, searching for [`language:go`](https://github.com/search?utf8=%E2%9C%93&q=language%3Ago&type=Code) is not valid, while [`amazing
      language:go`](https://github.com/search?utf8=%E2%9C%93&q=amazing+language%3Ago&type=Code) is.

      This endpoint requires you to authenticate and limits you to 10 requests per minute.
    HTTP:
      METHOD: GET
      ENDPOINT: /search/code
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(search.code.listResponse200)
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - sort:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: desc
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: STRUCT(search.code.listResponse200)
        RETURNVAR: search_code_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: search.code.list
  search.commit.list:
    SUMMARY: Search commits
    DESC: |-
      Find commits via various criteria on the default branch (usually `main`). This method returns up to 100 results [per page](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api).

      When searching for commits, you can get text match metadata for the **message** field when you provide the `text-match` media type. For more details about how to receive highlighted search results, see [Text match
      metadata](https://docs.github.com/rest/search/search#text-match-metadata).

      For example, if you want to find commits related to CSS in the [octocat/Spoon-Knife](https://github.com/octocat/Spoon-Knife) repository. Your query would look something like this:

      `q=repo:octocat/Spoon-Knife+css`
    HTTP:
      METHOD: GET
      ENDPOINT: /search/commits
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(search.commit.listResponse200)
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - sort:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: desc
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: STRUCT(search.commit.listResponse200)
        RETURNVAR: search_commit_list
        STATUS: 200
    CANONICAL_ID: search.commit.list
  search.issue.list:
    SUMMARY: Search issues and pull requests
    DESC: |-
      Find issues by state and keyword. This method returns up to 100 results [per page](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api).

      When searching for issues, you can get text match metadata for the issue **title**, issue **body**, and issue **comment body** fields when you pass the `text-match` media type. For more details about how to receive highlighted
      search results, see [Text match metadata](https://docs.github.com/rest/search/search#text-match-metadata).

      For example, if you want to find the oldest unresolved Python bugs on Windows. Your query might look something like this.

      `q=windows+label:bug+language:python+state:open&sort=created&order=asc`

      This query searches for the keyword `windows`, within any open issue that is labeled as `bug`. The search runs across repositories whose primary language is Python. The results are sorted by creation date in ascending order, which means the oldest issues appear first in the search results.

      > [!NOTE]
      > For requests made by GitHub Apps with a user access token, you can't retrieve a combination of issues and pull requests in a single query. Requests that don't include the `is:issue` or `is:pull-request` qualifier will receive an HTTP `422 Unprocessable Entity` response. To get results for both issues and pull requests, you must send separate queries for issues and pull requests. For more information about the `is` qualifier, see "[Searching only issues or pull requests](https://docs.github.com/github/searching-for-information-on-github/searching-issues-and-pull-requests#search-only-issues-or-pull-requests)."
    HTTP:
      METHOD: GET
      ENDPOINT: /search/issues
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(search.issue.listResponse200)
    INPUTS:
      - q:
          TYPE: STRING
          LOCATION: query
      - sort:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: desc
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
      - advanced_search:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(search.issue.listResponse200)
        RETURNVAR: search_issue_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: search.issue.list
  search.label.list:
    SUMMARY: Search labels
    DESC: |-
      Find labels in a repository with names or descriptions that match search keywords. Returns up to 100 results [per page](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api).

      When searching for labels, you can get text match metadata for the label **name** and **description** fields when you pass the `text-match` media type. For more details about how to receive highlighted search results, see [Text match metadata](https://docs.github.com/rest/search/search#text-match-metadata).

      For example, if you want to find labels in the `linguist` repository that match `bug`, `defect`, or `enhancement`. Your query might look like this:

      `q=bug+defect+enhancement&repository_id=64778136`

      The labels that best match the query appear first in the search results.
    HTTP:
      METHOD: GET
      ENDPOINT: /search/labels
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(search.label.listResponse200)
    INPUTS:
      - repository_id:
          TYPE: INT
          LOCATION: query
      - q:
          TYPE: STRING
          LOCATION: query
      - sort:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: desc
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
