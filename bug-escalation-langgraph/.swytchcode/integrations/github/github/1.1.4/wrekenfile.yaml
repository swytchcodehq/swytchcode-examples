      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(simple-user)"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: "[]STRUCT(simple-user)"
        RETURNVAR: repos_subscriber_get
        STATUS: 200
    CANONICAL_ID: repos.subscriber.get
  repos.subscription.get:
    SUMMARY: Get a repository subscription
    DESC: Gets information about whether the authenticated user is subscribed to the repository.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/subscription
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(repository-subscription)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(repository-subscription)
        RETURNVAR: repos_subscription_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Not Found if you don't subscribe to the repository (HTTP 404)
    CANONICAL_ID: repos.subscription.get
  repos.subscription.update:
    SUMMARY: Set a repository subscription
    DESC: If you would like to watch a repository, set `subscribed` to `true`. If you would like to ignore notifications made within a repository, set `ignored` to `true`. If you would like to stop watching a repository, [delete the repository's subscription](https://docs.github.com/rest/activity/watching#delete-a-repository-subscription) completely.
    HTTP:
      METHOD: PUT
      ENDPOINT: /repos/{owner}/{repo}/subscription
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.subscription.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(repository-subscription)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.subscription.updateRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(repository-subscription)
        RETURNVAR: repos_subscription_update
        STATUS: 200
    CANONICAL_ID: repos.subscription.update
  repos.subscription.delete:
    SUMMARY: Delete a repository subscription
    DESC: This endpoint should only be used to stop watching a repository. To control whether or not you wish to receive notifications from a repository, [set the repository's subscription manually](https://docs.github.com/rest/activity/watching#set-a-repository-subscription).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /repos/{owner}/{repo}/subscription
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    CANONICAL_ID: repos.subscription.delete
