    CANONICAL_ID: repos.repo.update
  repos.repo.delete:
    SUMMARY: Delete a repository
    DESC: |-
      Deleting a repository requires admin access.

      If an organization owner has configured the organization to prevent members from deleting organization-owned
      repositories, you will get a `403 Forbidden` response.

      OAuth app tokens and personal access tokens (classic) need the `delete_repo` scope to use this endpoint.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /repos/{owner}/{repo}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: STRUCT(Error403)
        STATUS: 403
        WHEN: "If an organization owner has configured the organization to prevent members from deleting organization-owned repositories, a member will get this response: (HTTP 403)"
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Client error (HTTP 409)
    CANONICAL_ID: repos.repo.delete
