    RETURNS:
      - RETURNTYPE: STRUCT(topic)
        RETURNVAR: repos_topic_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
