VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://api.github.com
METHODS:
  api.resource.execute:
    SUMMARY: GitHub API Root
    DESC: Get Hypermedia links to resources accessible in GitHub's REST API
    HTTP:
      METHOD: GET
      ENDPOINT: /
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(root)
    RETURNS:
      - RETURNTYPE: STRUCT(root)
        RETURNVAR: api_resource_execute
        STATUS: 200
    CANONICAL_ID: api.resource.execute
  advisories.advisory.list:
    SUMMARY: List global security advisories
    DESC: |-
      Lists all global security advisories that match the specified parameters. If no other parameters are defined, the request will return only GitHub-reviewed advisories that are not malware.

      By default, all responses will exclude advisories for malware, because malware are not standard vulnerabilities. To list advisories for malware, you must include the `type` parameter in your request, with the value `malware`. For more information about the different types of security advisories, see "[About the GitHub Advisory database](https://docs.github.com/code-security/security-advisories/global-security-advisories/about-the-github-advisory-database#about-types-of-security-advisories)."
    HTTP:
      METHOD: GET
      ENDPOINT: /advisories
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(global-advisory)"
    INPUTS:
      - ghsa_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: reviewed
      - cve_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - ecosystem:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - severity:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - cwes:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - is_withdrawn:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - affects:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - published:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - updated:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - modified:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - epss_percentage:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - epss_percentile:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - direction:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: desc
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - sort:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: published
    RETURNS:
      - RETURNTYPE: "[]STRUCT(global-advisory)"
        RETURNVAR: advisories_advisory_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: STRUCT(basic-error)
        STATUS: 429
        WHEN: Too many requests (HTTP 429)
    CANONICAL_ID: advisories.advisory.list
  advisories.advisory.get:
    SUMMARY: Get a global security advisory
    DESC: Gets a global security advisory using its GitHub Security Advisory (GHSA) identifier.
    HTTP:
      METHOD: GET
      ENDPOINT: /advisories/{ghsa_id}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(global-advisory)
    INPUTS:
      - ghsa_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(global-advisory)
        RETURNVAR: advisories_advisory_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: advisories.advisory.get
  app.app.list:
    SUMMARY: Get the authenticated app
    DESC: |-
      Returns the GitHub App associated with the authentication credentials used. To see how many app installations are associated with this GitHub App, see the `installations_count` in the response. For more details about your app's installations, see the "[List installations for the authenticated app](https://docs.github.com/rest/apps/apps#list-installations-for-the-authenticated-app)" endpoint.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /app
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(integration)
    RETURNS:
      - RETURNTYPE: STRUCT(integration)
        RETURNVAR: app_app_list
        STATUS: 200
    CANONICAL_ID: app.app.list
  app-manifests.conversion.create:
    SUMMARY: Create a GitHub App from a manifest
    DESC: Use this endpoint to complete the handshake necessary when implementing the [GitHub App Manifest flow](https://docs.github.com/apps/building-github-apps/creating-github-apps-from-a-manifest/). When you create a GitHub App with the manifest flow, you receive a temporary `code` used to retrieve the GitHub App's `id`, `pem` (private key), and `webhook_secret`.
    HTTP:
      METHOD: POST
      ENDPOINT: /app-manifests/{code}/conversions
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - code:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: app-manifests_conversion_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: app-manifests.conversion.create
  app.hook.config.list:
    SUMMARY: Get a webhook configuration for an app
    DESC: |-
      Returns the webhook configuration for a GitHub App. For more information about configuring a webhook for your app, see "[Creating a GitHub App](/developers/apps/creating-a-github-app)."

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /app/hook/config
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(webhook-config)
    RETURNS:
      - RETURNTYPE: STRUCT(webhook-config)
        RETURNVAR: app_hook_config_list
        STATUS: 200
    CANONICAL_ID: app.hook.config.list
  app.hook.config.update:
    SUMMARY: Update a webhook configuration for an app
    DESC: |-
      Updates the webhook configuration for a GitHub App. For more information about configuring a webhook for your app, see "[Creating a GitHub App](/developers/apps/creating-a-github-app)."

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /app/hook/config
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(app.hook.config.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(webhook-config)
    INPUTS:
      - body:
          TYPE: STRUCT(app.hook.config.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(webhook-config)
        RETURNVAR: app_hook_config_update
        STATUS: 200
    CANONICAL_ID: app.hook.config.update
  app.hook.deliveries.list:
    SUMMARY: List deliveries for an app webhook
    DESC: |-
      Returns a list of webhook deliveries for the webhook configured for a GitHub App.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /app/hook/deliveries
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(hook-delivery-item)"
    INPUTS:
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]STRUCT(hook-delivery-item)"
        RETURNVAR: app_hook_deliveries_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: app.hook.deliveries.list
  app.hook.deliveries.get:
    SUMMARY: Get a delivery for an app webhook
    DESC: |-
      Returns a delivery for the webhook configured for a GitHub App.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /app/hook/deliveries/{delivery_id}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(hook-delivery)
    INPUTS:
      - delivery_id:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(hook-delivery)
        RETURNVAR: app_hook_deliveries_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: app.hook.deliveries.get
  app.hook.attempts.create:
    SUMMARY: Redeliver a delivery for an app webhook
    DESC: |-
      Redeliver a delivery for the webhook configured for a GitHub App.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /app/hook/deliveries/{delivery_id}/attempts
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - delivery_id:
          TYPE: INT
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: app.hook.attempts.create
  app.installation-request.list:
    SUMMARY: List installation requests for the authenticated app
    DESC: Lists all the pending installation requests for the authenticated GitHub App.
    HTTP:
      METHOD: GET
      ENDPOINT: /app/installation-requests
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(integration-installation-request)"
    INPUTS:
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: "[]STRUCT(integration-installation-request)"
        RETURNVAR: app_installation-request_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: app.installation-request.list
  app.installation.list:
    SUMMARY: List installations for the authenticated app
    DESC: |-
      The permissions the installation has are included under the `permissions` key.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /app/installations
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(installation)"
    INPUTS:
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
      - since:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - outdated:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: "[]STRUCT(installation)"
        RETURNVAR: app_installation_list
        STATUS: 200
    CANONICAL_ID: app.installation.list
  app.installation.get:
    SUMMARY: Get an installation for the authenticated app
    DESC: |-
      Enables an authenticated GitHub App to find an installation's information using the installation id.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /app/installations/{installation_id}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(installation)
    INPUTS:
      - installation_id:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(installation)
        RETURNVAR: app_installation_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: app.installation.get
  app.installation.delete:
    SUMMARY: Delete an installation for the authenticated app
    DESC: |-
      Uninstalls a GitHub App on a user, organization, or enterprise account. If you prefer to temporarily suspend an app's access to your account's resources, then we recommend the "[Suspend an app installation](https://docs.github.com/rest/apps/apps#suspend-an-app-installation)" endpoint.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /app/installations/{installation_id}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - installation_id:
          TYPE: INT
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: app.installation.delete
  app.installation.accessTokens.create:
    SUMMARY: Create an installation access token for an app
    DESC: |-
      Creates an installation access token that enables a GitHub App to make authenticated API requests for the app's installation on an organization or individual account. Installation tokens expire one hour from the time you create them. Using an expired token produces a status code of `401 - Unauthorized`, and requires creating a new installation token. By default the installation token has access to all repositories that the installation can access.

      Optionally, you can use the `repositories` or `repository_ids` body parameters to specify individual repositories that the installation access token can access. If you don't use `repositories` or `repository_ids` to grant access to specific repositories, the installation access token will have access to all repositories that the installation was granted access to. The installation access token cannot be granted access to repositories that the installation was not granted access to. Up to 500 repositories can be listed in this manner.

      Optionally, use the `permissions` body parameter to specify the permissions that the installation access token should have. If `permissions` is not specified, the installation access token will have all of the permissions that were granted to the app. The installation access token cannot be granted permissions that the app was not granted.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /app/installations/{installation_id}/access_tokens
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(app.installation.accessTokens.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(installation-token)
    INPUTS:
      - installation_id:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(app.installation.accessTokens.createRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(installation-token)
        RETURNVAR: app_installation_accessTokens_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: app.installation.accessTokens.create
  app.installation.suspended.update:
    SUMMARY: Suspend an app installation
    DESC: |-
      Suspends a GitHub App on a user, organization, or enterprise account, which blocks the app from accessing the account's resources. When a GitHub App is suspended, the app's access to the GitHub API or webhook events is blocked for that account.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: PUT
      ENDPOINT: /app/installations/{installation_id}/suspended
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - installation_id:
          TYPE: INT
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: app.installation.suspended.update
  app.installation.suspended.delete:
    SUMMARY: Unsuspend an app installation
    DESC: |-
      Removes a GitHub App installation suspension.

      You must use a [JWT](https://docs.github.com/apps/building-github-apps/authenticating-with-github-apps/#authenticating-as-a-github-app) to access this endpoint.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /app/installations/{installation_id}/suspended
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - installation_id:
          TYPE: INT
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: app.installation.suspended.delete
  applications.grant.delete:
    SUMMARY: Delete an app authorization
    DESC: |-
      OAuth and GitHub application owners can revoke a grant for their application and a specific user. You must provide a valid OAuth `access_token` as an input parameter and the grant for the token's owner will be deleted.
      Deleting an application's grant will also delete all OAuth tokens associated with the application for the user. Once deleted, the application will have no access to the user's account and will no longer be listed on [the application authorizations settings screen within GitHub](https://github.com/settings/applications#authorized).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /applications/{client_id}/grant
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(applications.grant.deleteRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - client_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(applications.grant.deleteRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: applications.grant.delete
  applications.token.create:
    SUMMARY: Check a token
    DESC: OAuth applications and GitHub applications with OAuth authorizations can use this API method for checking OAuth token validity without exceeding the normal rate limits for failed login attempts. Authentication works differently with this particular endpoint. Invalid tokens will return `404 NOT FOUND`.
    HTTP:
      METHOD: POST
      ENDPOINT: /applications/{client_id}/token
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(applications.token.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(authorization)
    INPUTS:
      - client_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(applications.token.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(authorization)
        RETURNVAR: applications_token_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: applications.token.create
  applications.token.update:
    SUMMARY: Reset a token
    DESC: OAuth applications and GitHub applications with OAuth authorizations can use this API method to reset a valid OAuth token without end-user involvement. Applications must save the "token" property in the response because changes take effect immediately. Invalid tokens will return `404 NOT FOUND`.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /applications/{client_id}/token
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(applications.token.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(authorization)
    INPUTS:
      - client_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(applications.token.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(authorization)
        RETURNVAR: applications_token_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: applications.token.update
  applications.token.delete:
    SUMMARY: Delete an app token
    DESC: OAuth  or GitHub application owners can revoke a single token for an OAuth application or a GitHub application with an OAuth authorization.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /applications/{client_id}/token
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(applications.token.deleteRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - client_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(applications.token.deleteRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: applications.token.delete
  applications.token.scoped.create:
    SUMMARY: Create a scoped access token
    DESC: |-
      Use a non-scoped user access token to create a repository-scoped and/or permission-scoped user access token. You can specify
      which repositories the token can access and which permissions are granted to the
      token.

      Invalid tokens will return `404 NOT FOUND`.
    HTTP:
      METHOD: POST
      ENDPOINT: /applications/{client_id}/token/scoped
      HEADERS:
        Content-Type: application/json
