      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(pull-request-simple)"
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
