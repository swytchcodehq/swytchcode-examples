        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Not Found if the sarif id does not match any upload (HTTP 404)
      - TYPE: ANY
        STATUS: 503
        WHEN: Server error (HTTP 503)
    CANONICAL_ID: repos.code-scanning.sarifs.get
