  orgs.team.metrics.get:
    SUMMARY: Get Copilot metrics for a team
    DESC: |-
      Use this endpoint to see a breakdown of aggregated metrics for various GitHub Copilot features. See the response schema tab for detailed metrics definitions.

      > [!NOTE]
      > This endpoint will only return results for a given day if the team had **five or more members with active Copilot licenses** on that day, as evaluated at the end of that day.

      The response contains metrics for up to 100 days prior. Metrics are processed once per day for the previous day,
      and the response will only include data up until yesterday. In order for an end user to be counted towards these metrics,
      they must have telemetry enabled in their IDE.

      To access this endpoint, the Copilot Metrics API access policy must be enabled for the organization containing the team within GitHub settings.
      Only organization owners for the organization that contains this team and owners and billing managers of the parent enterprise can view Copilot metrics for a team.

      OAuth app tokens and personal access tokens (classic) need either the `manage_billing:copilot`, `read:org`, or `read:enterprise` scopes to use this endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/team/{team_slug}/copilot/metrics
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(copilot-usage-metrics-day)"
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - since:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - until:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
    RETURNS:
      - RETURNTYPE: "[]STRUCT(copilot-usage-metrics-day)"
        RETURNVAR: orgs_team_metrics_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
      - TYPE: ANY
        STATUS: 500
        WHEN: Server error (HTTP 500)
    CANONICAL_ID: orgs.team.metrics.get
  orgs.team.get:
    SUMMARY: List teams
    DESC: Lists all teams in an organization that are visible to the authenticated user.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(team)"
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
      - team_type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: all
    RETURNS:
      - RETURNTYPE: "[]STRUCT(team)"
        RETURNVAR: orgs_team_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: orgs.team.get
  orgs.team.create:
    SUMMARY: Create a team
    DESC: |-
      To create a team, the authenticated user must be a member or owner of `{org}`. By default, organization members can create teams. Organization owners can limit team creation to organization owners. For more information, see "[Setting team creation permissions](https://docs.github.com/articles/setting-team-creation-permissions-in-your-organization)."

      When you create a new team, you automatically become a team maintainer without explicitly adding yourself to the optional array of `maintainers`. For more information, see "[About teams](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/about-teams)".
    HTTP:
      METHOD: POST
      ENDPOINT: /orgs/{org}/teams
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(orgs.team.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(team-full)
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(orgs.team.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(team-full)
        RETURNVAR: orgs_team_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: orgs.team.create
  orgs.team.get_828b:
    SUMMARY: Get a team by name
    DESC: |-
      Gets a team using the team's `slug`. To create the `slug`, GitHub replaces special characters in the `name` string, changes all words to lowercase, and replaces spaces with a `-` separator. For example, `"My TEam Näme"` would become `my-team-name`.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `GET /organizations/{org_id}/team/{team_id}`.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(team-full)
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(team-full)
        RETURNVAR: orgs_team_get_828b
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: orgs.team.get_828b
  orgs.team.update:
    SUMMARY: Update a team
    DESC: |-
      To edit a team, the authenticated user must either be an organization owner or a team maintainer.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `PATCH /organizations/{org_id}/team/{team_id}`.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /orgs/{org}/teams/{team_slug}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(orgs.team.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(team-full)
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(orgs.team.updateRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(team-full)
        RETURNVAR: orgs_team_update
        STATUS: 200
      - RETURNTYPE: STRUCT(team-full)
        RETURNVAR: orgs_team_update_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: orgs.team.update
  orgs.team.delete:
    SUMMARY: Delete a team
    DESC: |-
      To delete a team, the authenticated user must be an organization owner or team maintainer.

      If you are an organization owner, deleting a parent team will delete all of its child teams as well.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `DELETE /organizations/{org_id}/team/{team_id}`.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /orgs/{org}/teams/{team_slug}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: orgs.team.delete
  orgs.team.invitations.get:
    SUMMARY: List pending team invitations
    DESC: |-
      The return hash contains a `role` field which refers to the Organization Invitation role and will be one of the following values: `direct_member`, `admin`, `billing_manager`, `hiring_manager`, or `reinstate`. If the invitee is not a GitHub member, the `login` field in the return hash will be `null`.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `GET /organizations/{org_id}/team/{team_id}/invitations`.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}/invitations
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(organization-invitation)"
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: "[]STRUCT(organization-invitation)"
        RETURNVAR: orgs_team_invitations_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: orgs.team.invitations.get
  orgs.team.members.get:
    SUMMARY: List team members
    DESC: |-
      Team members will include the members of child teams.

      To list members in a team, the team must be visible to the authenticated user.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}/members
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(simple-user)"
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - role:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: all
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: "[]STRUCT(simple-user)"
        RETURNVAR: orgs_team_members_get
        STATUS: 200
    CANONICAL_ID: orgs.team.members.get
  orgs.team.memberships.get:
    SUMMARY: Get team membership for a user
    DESC: |-
      Team members will include the members of child teams.

      To get a user's membership with a team, the team must be visible to the authenticated user.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `GET /organizations/{org_id}/team/{team_id}/memberships/{username}`.

      > [!NOTE]
      > The response contains the `state` of the membership and the member's `role`.

      The `role` for organization owners is set to `maintainer`. For more information about `maintainer` roles, see [Create a team](https://docs.github.com/rest/teams/teams#create-a-team).
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}/memberships/{username}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(team-membership)
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - username:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(team-membership)
        RETURNVAR: orgs_team_memberships_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: if user has no team membership (HTTP 404)
    CANONICAL_ID: orgs.team.memberships.get
  orgs.team.memberships.update:
    SUMMARY: Add or update team membership for a user
    DESC: |-
      Adds an organization member to a team. An authenticated organization owner or team maintainer can add organization members to a team.

      Team synchronization is available for organizations using GitHub Enterprise Cloud. For more information, see [GitHub's products](https://docs.github.com/github/getting-started-with-github/githubs-products) in the GitHub Help documentation.

      > [!NOTE]
      > When you have team synchronization set up for a team with your organization's identity provider (IdP), you will see an error if you attempt to use the API for making changes to the team's membership. If you have access to manage group membership in your IdP, you can manage GitHub team membership through your identity provider, which automatically adds and removes team members in an organization. For more information, see "[Synchronizing teams between your identity provider and GitHub](https://docs.github.com/articles/synchronizing-teams-between-your-identity-provider-and-github/)."

      An organization owner can add someone who is not part of the team's organization to a team. When an organization owner adds someone to a team who is not an organization member, this endpoint will send an invitation to the person via email. This newly-created membership will be in the "pending" state until the person accepts the invitation, at which point the membership will transition to the "active" state and the user will be added as a member of the team.

      If the user is already a member of the team, this endpoint will update the role of the team member's role. To update the membership of a team member, the authenticated user must be an organization owner or a team maintainer.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `PUT /organizations/{org_id}/team/{team_id}/memberships/{username}`.
    HTTP:
      METHOD: PUT
      ENDPOINT: /orgs/{org}/teams/{team_slug}/memberships/{username}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(orgs.team.memberships.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(team-membership)
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - username:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(orgs.team.memberships.updateRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(team-membership)
        RETURNVAR: orgs_team_memberships_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Forbidden if team synchronization is set up (HTTP 403)
      - TYPE: ANY
        STATUS: 422
        WHEN: Unprocessable Entity if you attempt to add an organization to a team (HTTP 422)
    CANONICAL_ID: orgs.team.memberships.update
  orgs.team.memberships.delete:
    SUMMARY: Remove team membership for a user
    DESC: |-
      To remove a membership between a user and a team, the authenticated user must have 'admin' permissions to the team or be an owner of the organization that the team is associated with. Removing team membership does not delete the user, it just removes their membership from the team.

      Team synchronization is available for organizations using GitHub Enterprise Cloud. For more information, see [GitHub's products](https://docs.github.com/github/getting-started-with-github/githubs-products) in the GitHub Help documentation.

      > [!NOTE]
      > When you have team synchronization set up for a team with your organization's identity provider (IdP), you will see an error if you attempt to use the API for making changes to the team's membership. If you have access to manage group membership in your IdP, you can manage GitHub team membership through your identity provider, which automatically adds and removes team members in an organization. For more information, see "[Synchronizing teams between your identity provider and GitHub](https://docs.github.com/articles/synchronizing-teams-between-your-identity-provider-and-github/)."

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `DELETE /organizations/{org_id}/team/{team_id}/memberships/{username}`.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /orgs/{org}/teams/{team_slug}/memberships/{username}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - username:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Forbidden if team synchronization is set up (HTTP 403)
    CANONICAL_ID: orgs.team.memberships.delete
  orgs.team.repos.get:
    SUMMARY: List team repositories
    DESC: |-
      Lists a team's repositories visible to the authenticated user.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `GET /organizations/{org_id}/team/{team_id}/repos`.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}/repos
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(minimal-repository)"
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: "[]STRUCT(minimal-repository)"
        RETURNVAR: orgs_team_repos_get
        STATUS: 200
    CANONICAL_ID: orgs.team.repos.get
  orgs.team.repos.get_febb:
    SUMMARY: Check team permissions for a repository
    DESC: |-
      Checks whether a team has `admin`, `push`, `maintain`, `triage`, or `pull` permission for a repository. Repositories inherited through a parent team will also be checked.

      You can also get information about the specified repository, including what permissions the team grants on it, by passing the following custom [media type](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types/) via the `application/vnd.github.v3.repository+json` accept header.

      If a team doesn't have permission for the repository, you will receive a `404 Not Found` response status.

      If the repository is private, you must have at least `read` permission for that repository, and your token must have the `repo` or `admin:org` scope. Otherwise, you will receive a `404 Not Found` response status.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `GET /organizations/{org_id}/team/{team_id}/repos/{owner}/{repo}`.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(team-repository)
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(team-repository)
        RETURNVAR: orgs_team_repos_get_febb
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Not Found if team does not have permission for the repository (HTTP 404)
    CANONICAL_ID: orgs.team.repos.get_febb
  orgs.team.repos.update:
    SUMMARY: Add or update team repository permissions
    DESC: |-
      To add a repository to a team or update the team's permission on a repository, the authenticated user must have admin access to the repository, and must be able to see the team. The repository must be owned by the organization, or a direct fork of a repository owned by the organization. You will get a `422 Unprocessable Entity` status if you attempt to add a repository to a team that is not owned by the organization. Note that, if you choose not to pass any parameters, you'll need to set `Content-Length` to zero when calling out to this endpoint. For more information, see "[HTTP method](https://docs.github.com/rest/guides/getting-started-with-the-rest-api#http-method)."

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `PUT /organizations/{org_id}/team/{team_id}/repos/{owner}/{repo}`.

      For more information about the permission levels, see "[Repository permission levels for an organization](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/repository-permission-levels-for-an-organization#permission-levels-for-repositories-owned-by-an-organization)".
    HTTP:
      METHOD: PUT
      ENDPOINT: /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(orgs.team.repos.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(orgs.team.repos.updateRequest)
          REQUIRED: false
          LOCATION: body
    CANONICAL_ID: orgs.team.repos.update
  orgs.team.repos.delete:
    SUMMARY: Remove a repository from a team
    DESC: |-
      If the authenticated user is an organization owner or a team maintainer, they can remove any repositories from the team. To remove a repository from a team as an organization member, the authenticated user must have admin access to the repository and must be able to see the team. This does not delete the repository, it just removes it from the team.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `DELETE /organizations/{org_id}/team/{team_id}/repos/{owner}/{repo}`.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    CANONICAL_ID: orgs.team.repos.delete
  orgs.team.teams.get:
    SUMMARY: List child teams
    DESC: |-
      Lists the child teams of the team specified by `{team_slug}`.

      > [!NOTE]
      > You can also specify a team by `org_id` and `team_id` using the route `GET /organizations/{org_id}/team/{team_id}/teams`.
    HTTP:
      METHOD: GET
      ENDPOINT: /orgs/{org}/teams/{team_slug}/teams
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(team)"
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - team_slug:
          TYPE: STRING
          LOCATION: path
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: "[]STRUCT(team)"
        RETURNVAR: orgs_team_teams_get
        STATUS: 200
    CANONICAL_ID: orgs.team.teams.get
  orgs.org.create:
    SUMMARY: Enable or disable a security feature for an organization
    DESC: |-
      > [!WARNING]
      > **Closing down notice:** The ability to enable or disable a security feature for all eligible repositories in an organization is closing down. Please use [code security configurations](https://docs.github.com/rest/code-security/configurations) instead. For more information, see the [changelog](https://github.blog/changelog/2024-07-22-deprecation-of-api-endpoint-to-enable-or-disable-a-security-feature-for-an-organization/).

      Enables or disables the specified security feature for all eligible repositories in an organization. For more information, see "[Managing security managers in your organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."

      The authenticated user must be an organization owner or be member of a team with the security manager role to use this endpoint.

      OAuth app tokens and personal access tokens (classic) need the `admin:org`, `write:org`, or `repo` scopes to use this endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /orgs/{org}/{security_product}/{enablement}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(orgs.org.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org:
          TYPE: STRING
          LOCATION: path
      - security_product:
          TYPE: STRING
          LOCATION: path
      - enablement:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(orgs.org.createRequest)
          REQUIRED: false
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 422
        WHEN: The action could not be taken due to an in progress enablement, or a policy is preventing enablement (HTTP 422)
    CANONICAL_ID: orgs.org.create
  rate_limit.rate_limit.list:
    SUMMARY: Get rate limit status for the authenticated user
    DESC: |-
      > [!NOTE]
      > Accessing this endpoint does not count against your REST API rate limit.

      Some categories of endpoints have custom rate limits that are separate from the rate limit governing the other REST API endpoints. For this reason, the API response categorizes your rate limit. Under `resources`, you'll see objects relating to different categories:
      * The `core` object provides your rate limit status for all non-search-related resources in the REST API.
      * The `search` object provides your rate limit status for the REST API for searching (excluding code searches). For more information, see "[Search](https://docs.github.com/rest/search/search)."
      * The `code_search` object provides your rate limit status for the REST API for searching code. For more information, see "[Search code](https://docs.github.com/rest/search/search#search-code)."
      * The `graphql` object provides your rate limit status for the GraphQL API. For more information, see "[Resource limitations](https://docs.github.com/graphql/overview/resource-limitations#rate-limit)."
      * The `integration_manifest` object provides your rate limit status for the `POST /app-manifests/{code}/conversions` operation. For more information, see "[Creating a GitHub App from a manifest](https://docs.github.com/apps/creating-github-apps/setting-up-a-github-app/creating-a-github-app-from-a-manifest#3-you-exchange-the-temporary-code-to-retrieve-the-app-configuration)."
      * The `dependency_snapshots` object provides your rate limit status for submitting snapshots to the dependency graph. For more information, see "[Dependency graph](https://docs.github.com/rest/dependency-graph)."
      * The `dependency_sbom` object provides your rate limit status for requesting SBOMs from the dependency graph. For more information, see "[Dependency graph](https://docs.github.com/rest/dependency-graph)."
      * The `code_scanning_upload` object provides your rate limit status for uploading SARIF results to code scanning. For more information, see "[Uploading a SARIF file to GitHub](https://docs.github.com/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github)."
      * The `actions_runner_registration` object provides your rate limit status for registering self-hosted runners in GitHub Actions. For more information, see "[Self-hosted runners](https://docs.github.com/rest/actions/self-hosted-runners)."
      * The `source_import` object is no longer in use for any API endpoints, and it will be removed in the next API version. For more information about API versions, see "[API Versions](https://docs.github.com/rest/about-the-rest-api/api-versions)."

      > [!NOTE]
      > The `rate` object is closing down. If you're writing new API client code or updating existing code, you should use the `core` object instead of the `rate` object. The `core` object contains the same information that is present in the `rate` object.
    HTTP:
      METHOD: GET
      ENDPOINT: /rate_limit
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(rate-limit-overview)
    RETURNS:
      - RETURNTYPE: STRUCT(rate-limit-overview)
        RETURNVAR: rate_limit_rate_limit_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: rate_limit.rate_limit.list
  repos.repo.get:
    SUMMARY: Get a repository
    DESC: |-
      The `parent` and `source` objects are present when the repository is a fork. `parent` is the repository this repository was forked from, `source` is the ultimate source for the network.

      > [!NOTE]
      > - In order to see the `security_and_analysis` block for a repository you must have admin permissions for the repository or be an owner or security manager for the organization that owns the repository. For more information, see "[Managing security managers in your organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."
      > - To view merge-related settings, you must have the `contents:read` and `contents:write` permissions.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(full-repository)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(full-repository)
        RETURNVAR: repos_repo_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: repos.repo.get
  repos.repo.update:
    SUMMARY: Update a repository
    DESC: "**Note**: To edit a repository's topics, use the [Replace all repository topics](https://docs.github.com/rest/repos/repos#replace-all-repository-topics) endpoint."
