      METHOD: POST
      ENDPOINT: /users/{username}/attestations/bulk-list
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(users.attestation.listRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(users.attestation.listResponse200)
    INPUTS:
      - per_page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 30
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - username:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(users.attestation.listRequest)
          LOCATION: body
    RETURNS:
