    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(pages-health-check)
        RETURNVAR: repos_page_health_get
        STATUS: 200
      - RETURNTYPE: STRUCT(empty-object)
        RETURNVAR: repos_page_health_get_202
        STATUS: 202
    ERRORS:
