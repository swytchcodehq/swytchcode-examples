      TYPE: BOOL
      REQUIRED: false
      comment: Either `true` to allow auto-merge on pull requests, or `false` to disallow auto-merge.
    - name: delete_branch_on_merge
      NAME: delete_branch_on_merge
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Either `true` to allow automatically deleting head branches when pull requests are merged, or `false` to prevent automatic deletion.
    - name: allow_update_branch
      NAME: allow_update_branch
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Either `true` to always allow a pull request head branch that is behind its base branch to be updated even if it is not required to be up to date before merging, or false otherwise.
    - name: use_squash_pr_title_as_default
      NAME: use_squash_pr_title_as_default
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Either `true` to allow squash-merge commits to use pull request title, or `false` to use commit message. **This property is closing down. Please use `squash_merge_commit_title` instead.
    - name: squash_merge_commit_title
      NAME: squash_merge_commit_title
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        Required when using `squash_merge_commit_message`.

        The default value for a squash merge commit title:

        - `PR_TITLE` - default to the pull request's title.
        - `COMMIT_OR_PR_TITLE` - default to the commit's title (if only one commit) or the pull request's title (when more than one commit).
    - name: squash_merge_commit_message
      NAME: squash_merge_commit_message
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        The default value for a squash merge commit message:

        - `PR_BODY` - default to the pull request's body.
        - `COMMIT_MESSAGES` - default to the branch's commit messages.
        - `BLANK` - default to a blank commit message.
    - name: merge_commit_title
      NAME: merge_commit_title
      type: STRING
      TYPE: STRING
