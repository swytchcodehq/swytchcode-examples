          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.content.deleteRequest)
          LOCATION: body
    RETURNS:
