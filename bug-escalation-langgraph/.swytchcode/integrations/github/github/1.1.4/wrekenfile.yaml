  repos.git.tags.create:
    SUMMARY: Create a tag object
    DESC: |-
      Note that creating a tag object does not create the reference that makes a tag in Git. If you want to create an annotated tag in Git, you have to do this call to create the tag object, and then [create](https://docs.github.com/rest/git/refs#create-a-reference) the `refs/tags/[tag]` reference. If you want to create a lightweight tag, you only have to [create](https://docs.github.com/rest/git/refs#create-a-reference) the tag reference - this call would be unnecessary.

      **Signature verification object**

      The response will include a `verification` object that describes the result of verifying the commit's signature. The following fields are included in the `verification` object:

      | Name | Type | Description |
      | ---- | ---- | ----------- |
      | `verified` | `boolean` | Indicates whether GitHub considers the signature in this commit to be verified. |
      | `reason` | `string` | The reason for verified value. Possible values and their meanings are enumerated in table below. |
      | `signature` | `string` | The signature that was extracted from the commit. |
      | `payload` | `string` | The value that was signed. |
      | `verified_at` | `string` | The date the signature was verified by GitHub. |

      These are the possible values for `reason` in the `verification` object:

      | Value | Description |
      | ----- | ----------- |
      | `expired_key` | The key that made the signature is expired. |
      | `not_signing_key` | The "signing" flag is not among the usage flags in the GPG key that made the signature. |
      | `gpgverify_error` | There was an error communicating with the signature verification service. |
      | `gpgverify_unavailable` | The signature verification service is currently unavailable. |
      | `unsigned` | The object does not include a signature. |
      | `unknown_signature_type` | A non-PGP signature was found in the commit. |
      | `no_user` | No user was associated with the `committer` email address in the commit. |
      | `unverified_email` | The `committer` email address in the commit was associated with a user, but the email address is not verified on their account. |
      | `bad_email` | The `committer` email address in the commit is not included in the identities of the PGP key that made the signature. |
      | `unknown_key` | The key that made the signature has not been registered with any user's account. |
      | `malformed_signature` | There was an error parsing the signature. |
      | `invalid` | The signature could not be cryptographically verified using the key whose key-id was found in the signature. |
      | `valid` | None of the above errors applied, so the signature is considered to be verified. |
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/git/tags
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.git.tags.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(git-tag)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.git.tags.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(git-tag)
        RETURNVAR: repos_git_tags_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 409
        WHEN: Client error (HTTP 409)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.git.tags.create
  repos.git.tags.get:
    SUMMARY: Get a tag
    DESC: |-
      **Signature verification object**

      The response will include a `verification` object that describes the result of verifying the commit's signature. The following fields are included in the `verification` object:

      | Name | Type | Description |
      | ---- | ---- | ----------- |
      | `verified` | `boolean` | Indicates whether GitHub considers the signature in this commit to be verified. |
      | `reason` | `string` | The reason for verified value. Possible values and their meanings are enumerated in table below. |
      | `signature` | `string` | The signature that was extracted from the commit. |
      | `payload` | `string` | The value that was signed. |
      | `verified_at` | `string` | The date the signature was verified by GitHub. |

      These are the possible values for `reason` in the `verification` object:

      | Value | Description |
      | ----- | ----------- |
      | `expired_key` | The key that made the signature is expired. |
      | `not_signing_key` | The "signing" flag is not among the usage flags in the GPG key that made the signature. |
      | `gpgverify_error` | There was an error communicating with the signature verification service. |
      | `gpgverify_unavailable` | The signature verification service is currently unavailable. |
      | `unsigned` | The object does not include a signature. |
      | `unknown_signature_type` | A non-PGP signature was found in the commit. |
      | `no_user` | No user was associated with the `committer` email address in the commit. |
      | `unverified_email` | The `committer` email address in the commit was associated with a user, but the email address is not verified on their account. |
      | `bad_email` | The `committer` email address in the commit is not included in the identities of the PGP key that made the signature. |
      | `unknown_key` | The key that made the signature has not been registered with any user's account. |
      | `malformed_signature` | There was an error parsing the signature. |
      | `invalid` | The signature could not be cryptographically verified using the key whose key-id was found in the signature. |
      | `valid` | None of the above errors applied, so the signature is considered to be verified. |
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/git/tags/{tag_sha}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(git-tag)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - tag_sha:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(git-tag)
        RETURNVAR: repos_git_tags_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Client error (HTTP 409)
    CANONICAL_ID: repos.git.tags.get
  repos.git.trees.create:
    SUMMARY: Create a tree
    DESC: |-
      The tree creation API accepts nested entries. If you specify both a tree and a nested path modifying that tree, this endpoint will overwrite the contents of the tree with the new path contents, and create a new tree structure.

      If you use this endpoint to add, delete, or modify the file contents in a tree, you will need to commit the tree and then update a branch to point to the commit. For more information see "[Create a commit](https://docs.github.com/rest/git/commits#create-a-commit)" and "[Update a reference](https://docs.github.com/rest/git/refs#update-a-reference)."

      Returns an error if you try to delete a file that does not exist.
    HTTP:
      METHOD: POST
      ENDPOINT: /repos/{owner}/{repo}/git/trees
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(repos.git.trees.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(git-tree)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(repos.git.trees.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(git-tree)
        RETURNVAR: repos_git_trees_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Client error (HTTP 409)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.git.trees.create
  repos.git.trees.get:
    SUMMARY: Get a tree
    DESC: |-
      Returns a single tree using the SHA1 value or ref name for that tree.

      If `truncated` is `true` in the response then the number of items in the `tree` array exceeded our maximum limit. If you need to fetch more items, use the non-recursive method of fetching trees, and fetch one sub-tree at a time.

      > [!NOTE]
      > The limit for the `tree` array is 100,000 entries with a maximum size of 7 MB when using the `recursive` parameter.
    HTTP:
      METHOD: GET
      ENDPOINT: /repos/{owner}/{repo}/git/trees/{tree_sha}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(git-tree)
    INPUTS:
      - owner:
          TYPE: STRING
          LOCATION: path
      - repo:
          TYPE: STRING
          LOCATION: path
      - tree_sha:
          TYPE: STRING
          LOCATION: path
      - recursive:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(git-tree)
        RETURNVAR: repos_git_trees_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Client error (HTTP 409)
      - TYPE: ANY
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: repos.git.trees.get
  repos.hook.get:
