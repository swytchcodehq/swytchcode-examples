VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.labels.list:
    SUMMARY: Read association label limits
    DESC: Returns limits and usage for custom association labels
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/limits/associations/labels
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseAssociationLabelLimitResponseNoPaging)
    INPUTS:
      - fromObjectTypeId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - toObjectTypeId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseAssociationLabelLimitResponseNoPaging)
        RETURNVAR: crm_v3_labels_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_labels_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.labels.list
  crm.v3.records.get:
    SUMMARY: Read record association limits between two objects
    DESC: Returns records approaching or at association limits between two objects
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/limits/associations/records/{fromObjectTypeId}/{toObjectTypeId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AssociationRecordLimitResponse)
    INPUTS:
      - fromObjectTypeId:
          TYPE: STRING
          LOCATION: path
      - toObjectTypeId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AssociationRecordLimitResponse)
        RETURNVAR: crm_v3_records_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_records_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.records.get
  crm.v3.to.get:
    SUMMARY: Read record association limits from an object
    DESC: Returns objects for which the from object has records approaching or at association limits
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/limits/associations/records/{fromObjectTypeId}/to
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseObjectTypeNearOrAtAssociationLimitNoPaging)
    INPUTS:
      - fromObjectTypeId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseObjectTypeNearOrAtAssociationLimitNoPaging)
        RETURNVAR: crm_v3_to_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_to_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.to.get
  crm.v3.customObjectTypes.list:
    SUMMARY: Read custom object limits
    DESC: Returns limits and usage for custom object schemas
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/limits/custom-object-types
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CustomObjectLimitResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(CustomObjectLimitResponse)
        RETURNVAR: crm_v3_customObjectTypes_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_customObjectTypes_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.customObjectTypes.list
  crm.v3.customProperties.list:
