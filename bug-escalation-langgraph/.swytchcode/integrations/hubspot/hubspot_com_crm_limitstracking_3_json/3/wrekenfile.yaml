        RETURNVAR: crm_v3_customProperties_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.customProperties.list
  crm.v3.from.list:
    SUMMARY: Read record association limits
    DESC: Returns objects with records approaching or at association limits
