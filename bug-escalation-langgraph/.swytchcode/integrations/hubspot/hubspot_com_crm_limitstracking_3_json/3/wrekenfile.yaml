    CANONICAL_ID: crm.v3.records.list
  crm.v3.pipelines.list:
    SUMMARY: Read pipeline limits
    DESC: Returns limits and usage per object for pipelines
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/limits/pipelines
