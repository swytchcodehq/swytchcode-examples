  SubscriptionResponse:
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: When this subscription was created. Formatted as milliseconds from the [Unix epoch](#).
    - name: objectTypeId
      NAME: objectTypeId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The identifier of the object type associated with the subscription.
    - name: propertyName
      NAME: propertyName
      type: STRING
      TYPE: STRING
