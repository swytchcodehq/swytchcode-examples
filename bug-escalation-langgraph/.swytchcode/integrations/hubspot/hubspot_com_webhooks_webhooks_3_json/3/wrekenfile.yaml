      comment: The internal name of the property being monitored for changes. Only applies when `eventType` is `propertyChange`.
    - name: active
      NAME: active
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Determines if the subscription is active or paused.
    - name: eventType
      NAME: eventType
