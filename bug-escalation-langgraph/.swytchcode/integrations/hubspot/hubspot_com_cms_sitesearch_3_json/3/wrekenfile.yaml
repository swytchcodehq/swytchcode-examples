VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.indexedData.get:
    SUMMARY: Get indexed properties.
    DESC: For a given account and document ID (page ID, blog post ID, HubDB row ID, etc.), return all indexed data for that document. This is useful when debugging why a particular document is not returned from a custom search.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/site-search/indexed-data/{contentId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IndexedData)
    INPUTS:
      - contentId:
          TYPE: STRING
          LOCATION: path
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(IndexedData)
        RETURNVAR: cms_v3_indexedData_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_indexedData_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.indexedData.get
  cms.v3.search.list:
    SUMMARY: Search your site.
    DESC: Returns any website content matching the given search criteria for a given HubSpot account. Searches can be filtered by content type, domain, or URL path.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/site-search/search
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicSearchResults)
    INPUTS:
      - q:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - offset:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - language:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - matchPrefix:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - autocomplete:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - popularityBoost:
          TYPE: FLOAT
          REQUIRED: false
          LOCATION: query
      - boostLimit:
          TYPE: FLOAT
          REQUIRED: false
          LOCATION: query
      - boostRecent:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - tableId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - hubdbQuery:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - domain:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - pathPrefix:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - length:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - groupId:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicSearchResults)
        RETURNVAR: cms_v3_search_list
        STATUS: 200
        PAGINATION:
          TYPE: offset
          OFFSET_FIELD: offset
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_search_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.search.list
STRUCTS:
  ContentSearchResult:
    - name: combinedId
      NAME: combinedId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the document in HubSpot.
    - name: description
      NAME: description
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The result's description. The content will be determined by the value of `length` in the request.
    - name: language
      NAME: language
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The document's language.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of document. Can be `SITE_PAGE`, `LANDING_PAGE`, `BLOG_POST`, `LISTING_PAGE`, or `KNOWLEDGE_ARTICLE`.
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The title of the returned document.
    - name: url
      NAME: url
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The url of the document.
    - name: tags
      NAME: tags
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: If a blog post, the tags associated with it.
    - name: rowId
      NAME: rowId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: If a dynamic page, the row ID in the HubDB table.
    - name: featuredImageUrl
      NAME: featuredImageUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: URL of the featured image.
    - name: score
      NAME: score
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The matching score of the document.
    - name: authorFullName
      NAME: authorFullName
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Name of the author.
    - name: domain
      NAME: domain
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The domain the document is hosted on.
    - name: tableId
      NAME: tableId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: If a dynamic page, the ID of the HubDB table.
    - name: id
      NAME: id
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The ID of the content.
    - name: publishedDate
      NAME: publishedDate
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The date the content was published.
    - name: category
      NAME: category
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: For knowledge articles, the category of the article.
    - name: subcategory
      NAME: subcategory
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: For knowledge articles, the subcategory of the article.
  PublicSearchResults:
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: searchTerm
      NAME: searchTerm
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: offset
      NAME: offset
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: limit
      NAME: limit
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: page
      NAME: page
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: results
      NAME: results
      type: "[]STRUCT(ContentSearchResult)"
      TYPE: "[]STRUCT(ContentSearchResult)"
      REQUIRED: true
  IndexedData:
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the document in HubSpot.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of document. Can be `SITE_PAGE`, `LANDING_PAGE`, `BLOG_POST`, `LISTING_PAGE`, or `KNOWLEDGE_ARTICLE`.
    - name: fields
      NAME: fields
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: true
      comment: The indexed fields in HubSpot.
