VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  scheduler.v3.book.get:
    SUMMARY: Perform operation get-/scheduler/v3/meetings/meeting-links/book/{slug}
    HTTP:
      METHOD: GET
      ENDPOINT: /scheduler/v3/meetings/meeting-links/book/{slug}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExternalBookingInfo)
    INPUTS:
      - slug:
          TYPE: STRING
          LOCATION: path
      - timezone:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ExternalBookingInfo)
        RETURNVAR: scheduler_v3_book_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: scheduler_v3_book_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: scheduler.v3.book.get
  scheduler.v3.meetingLinks.list:
    SUMMARY: Perform operation get-/scheduler/v3/meetings/meeting-links
    HTTP:
      METHOD: GET
      ENDPOINT: /scheduler/v3/meetings/meeting-links
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalExternalLinkMetadataForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - name:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - organizerUserId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalExternalLinkMetadataForwardPaging)
        RETURNVAR: scheduler_v3_meetingLinks_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: scheduler_v3_meetingLinks_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: scheduler.v3.meetingLinks.list
  scheduler.v3.book.create:
    SUMMARY: Perform operation post-/scheduler/v3/meetings/meeting-links/book
    HTTP:
      METHOD: POST
      ENDPOINT: /scheduler/v3/meetings/meeting-links/book
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ExternalMeetingBooking)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExternalMeetingBookingResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ExternalMeetingBooking)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ExternalMeetingBookingResponse)
        RETURNVAR: scheduler_v3_book_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: scheduler_v3_book_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: scheduler.v3.book.create
  scheduler.v3.availabilityPage.get:
    SUMMARY: Perform operation get-/scheduler/v3/meetings/meeting-links/book/availability-page/{slug}
    HTTP:
      METHOD: GET
      ENDPOINT: /scheduler/v3/meetings/meeting-links/book/availability-page/{slug}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExternalLinkAvailabilityAndBusyTimes)
    INPUTS:
      - slug:
          TYPE: STRING
          LOCATION: path
      - timezone:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - monthOffset:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ExternalLinkAvailabilityAndBusyTimes)
        RETURNVAR: scheduler_v3_availabilityPage_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: scheduler_v3_availabilityPage_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: scheduler.v3.availabilityPage.get
