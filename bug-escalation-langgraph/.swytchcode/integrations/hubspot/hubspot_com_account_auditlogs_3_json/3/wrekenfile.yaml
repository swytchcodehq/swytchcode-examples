VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  account-info.v3.login.list:
    SUMMARY: Retrieve login activity
    DESC: Retrieve logs of user actions related to [login activity](https://knowledge.hubspot.com/account-management/view-and-export-account-activity-history#account-login-history).
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/activity/login
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicLoginAuditForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - userId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicLoginAuditForwardPaging)
        RETURNVAR: account-info_v3_login_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_login_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.login.list
  account-info.v3.auditLogs.list:
    SUMMARY: Retrieve audit logs
    DESC: Retrieve activity history for user actions related to approvals, content updates, CRM object updates, security activity, and more (Enterprise only). Learn more about [activities included in audit log exports](https://knowledge.hubspot.com/account-management/view-and-export-account-activity-history-in-a-centralized-audit-log?hubs_content=knowledge.hubspot.com/account-management/view-and-export-account-activity-history&hubs_content-cta=centralized%20audit%20log#data-included-in-the-centralized-audit-log).
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/activity/audit-logs
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicApiUserActionEventForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - actingUserId:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - occurredAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - occurredBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicApiUserActionEventForwardPaging)
        RETURNVAR: account-info_v3_auditLogs_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_auditLogs_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.auditLogs.list
  account-info.v3.security.list:
    SUMMARY: Retrieve security history
    DESC: Retrieve logs of user actions related to [security activity](https://knowledge.hubspot.com/account-management/view-and-export-account-activity-history#security-activity-history).
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/activity/security
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseHydratedCriticalActionForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - userId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - fromTimestamp:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - toTimestamp:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseHydratedCriticalActionForwardPaging)
        RETURNVAR: account-info_v3_security_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_security_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.security.list
