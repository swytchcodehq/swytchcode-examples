  cms.v3.setNewLangPrimary.update:
    SUMMARY: Set a new primary language
    DESC: Set the primary language of a [multi-language group](https://developers.hubspot.com/docs/guides/cms/content/multi-language-content) to the language of the provided post (specified as an ID in the request body)
    HTTP:
      METHOD: PUT
      ENDPOINT: /cms/v3/blogs/posts/multi-language/set-new-lang-primary
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SetNewLanguagePrimaryRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(SetNewLanguagePrimaryRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_setNewLangPrimary_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.setNewLangPrimary.update
  cms.v3.posts.get:
    SUMMARY: Retrieve a blog post
    DESC: Retrieve a blog post by the post ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blogs/posts/{objectId}
      HEADERS:
