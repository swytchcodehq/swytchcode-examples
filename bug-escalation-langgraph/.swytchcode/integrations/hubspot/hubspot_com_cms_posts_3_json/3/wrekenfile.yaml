VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.schedule.create:
    SUMMARY: Schedule a post to be published
    DESC: Schedule a blog post to be published at a specified time.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/schedule
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ContentScheduleRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(ContentScheduleRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_schedule_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.schedule.create
  cms.v3.read.create:
    SUMMARY: Retrieve a batch of Blog Posts
    DESC: Retrieve a batch of blog posts by ID. identified in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/batch/read
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputString)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseBlogPost)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputString)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseBlogPost)
        RETURNVAR: cms_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseBlogPostWithErrors)
        RETURNVAR: cms_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.read.create
  cms.v3.updateLanguages.create:
    SUMMARY: Update languages of multi-language group
    DESC: Explicitly set new languages for each post in a [multi-language group](https://developers.hubspot.com/docs/guides/cms/content/multi-language-content).
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/multi-language/update-languages
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UpdateLanguagesRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(UpdateLanguagesRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_updateLanguages_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_updateLanguages_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.updateLanguages.create
  cms.v3.batch.create:
    SUMMARY: Create a batch of blog posts
    DESC: Create a batch of blog posts, specifying their content in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/batch/create
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputBlogPost)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseBlogPost)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputBlogPost)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseBlogPost)
        RETURNVAR: cms_v3_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseBlogPostWithErrors)
        RETURNVAR: cms_v3_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.batch.create
  cms.v3.batch.update:
    SUMMARY: Update a batch of Blog Posts
    DESC: Update a batch of blog posts.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/batch/update
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputJsonNode)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseBlogPost)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputJsonNode)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseBlogPost)
        RETURNVAR: cms_v3_batch_update
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseBlogPostWithErrors)
        RETURNVAR: cms_v3_batch_update_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_batch_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.batch.update
  cms.v3.draft.get:
    SUMMARY: Retrieve the full draft version of the Blog Post
    DESC: Retrieve the full draft version of a blog post.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/draft
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_draft_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_draft_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.draft.get
  cms.v3.draft.update:
    SUMMARY: Update the draft of a post
    DESC: Partially updates the draft version of a single blog post by ID. You only need to specify the values that you want to update.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/draft
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BlogPost)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BlogPost)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_draft_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_draft_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.draft.update
  cms.v3.revisions.get:
    SUMMARY: Retrieve a previous version of a blog post
    DESC: Retrieve a previous version of a blog post.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/revisions/{revisionId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VersionBlogPost)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VersionBlogPost)
        RETURNVAR: cms_v3_revisions_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_revisions_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.revisions.get
  cms.v3.restoreToDraft.create:
    SUMMARY: Restore a draft to a previous version
    DESC: Takes a specified version of a blog post, sets it as the new draft version of the blog post.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/revisions/{revisionId}/restore-to-draft
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_restoreToDraft_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_restoreToDraft_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.restoreToDraft.create
  cms.v3.createLanguageVariation.create:
    SUMMARY: Create a language variation
    DESC: Create a new language variation from an existing blog post
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/multi-language/create-language-variation
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BlogPostLanguageCloneRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - body:
          TYPE: STRUCT(BlogPostLanguageCloneRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_createLanguageVariation_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_createLanguageVariation_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.createLanguageVariation.create
  cms.v3.posts.list:
    SUMMARY: Get all posts
    DESC: Retrieve all blog posts, with paging and filtering options. This method would be useful for an integration that ingests posts and suggests edits.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blogs/posts
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalBlogPostForwardPaging)
    INPUTS:
      - createdAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalBlogPostForwardPaging)
        RETURNVAR: cms_v3_posts_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_posts_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.posts.list
  cms.v3.posts.create:
    SUMMARY: Create a new post
    DESC: Create a new blog post, specifying its content in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BlogPost)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - body:
          TYPE: STRUCT(BlogPost)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_posts_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_posts_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.posts.create
  cms.v3.clone.create:
    SUMMARY: Clone a blog post
    DESC: Clone a blog post, making a copy of it in a new blog post.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/clone
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ContentCloneRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - body:
          TYPE: STRUCT(ContentCloneRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_clone_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_clone_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.clone.create
  cms.v3.restore.create:
    SUMMARY: Restore a previous version
    DESC: Restores a blog post to one of its previous versions.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/revisions/{revisionId}/restore
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogPost)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(BlogPost)
        RETURNVAR: cms_v3_restore_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_restore_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.restore.create
  cms.v3.detachFromLangGroup.create:
    SUMMARY: Detach post from a multi-language group
    DESC: Detach a blog post from a [multi-language group](https://developers.hubspot.com/docs/guides/cms/content/multi-language-content).
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/multi-language/detach-from-lang-group
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DetachFromLangGroupRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(DetachFromLangGroupRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_detachFromLangGroup_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_detachFromLangGroup_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.detachFromLangGroup.create
  cms.v3.pushLive.create:
    SUMMARY: Publish blog post draft
    DESC: Publish the draft version of the blog post, sending its content to the live page.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/draft/push-live
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_pushLive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.pushLive.create
  cms.v3.archive.create:
    SUMMARY: Delete a batch of blog posts
    DESC: |-
      Delete a blog post by ID.
      Note: This is not the same as the in-app `archive` function. To perform a dashboard `archive` send an normal update with the `archivedInDashboard` field set to `true`.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/batch/archive
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputString)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputString)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_archive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.archive.create
  cms.v3.reset.create:
    SUMMARY: Reset post draft to the live version
    DESC: Discard all drafted content, resetting the draft to contain the content in the currently published version.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/posts/{objectId}/draft/reset
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_reset_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.reset.create
  cms.v3.attachToLangGroup.create:
    SUMMARY: Attach post to a multi-language group
    DESC: Attach a blog post to a [multi-language group](https://developers.hubspot.com/docs/guides/cms/content/multi-language-content).
