          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_folders_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.folders.delete
  crm.v3.memberships.get_dad5:
    SUMMARY: Fetch List Memberships Ordered by ID
    DESC: |-
      Fetch the memberships of a list in order sorted by the `recordId` of the records in the list.

      The `recordId`s are sorted in *ascending* order if an `after` offset or no offset is provided. If only a `before` offset is provided, then the records are sorted in *descending* order.

      The `after` offset parameter will take precedence over the `before` offset in a case where both are provided.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/lists/{listId}/memberships
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApiCollectionResponseJoinTimeAndRecordId)
    INPUTS:
      - listId:
          TYPE: STRING
          LOCATION: path
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
    RETURNS:
      - RETURNTYPE: STRUCT(ApiCollectionResponseJoinTimeAndRecordId)
        RETURNVAR: crm_v3_memberships_get_dad5
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_memberships_get_dad5_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.memberships.get_dad5
  crm.v3.memberships.delete:
    SUMMARY: Delete All Records from a List
    DESC: |-
      Remove **all** of the records from a list. ***Note:*** *The list is not deleted.*

      This endpoint only works for lists that have a `processingType` of `MANUAL` or `SNAPSHOT`.

      This endpoint only supports lists that have less than 100,000 memberships.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/lists/{listId}/memberships
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - listId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_memberships_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.memberships.delete
  crm.v3.memberships.remove_740f:
    SUMMARY: Remove Records from a List
    DESC: |-
      Remove the records provided from the list. Records that do not exist or that are not members of the list are ignored.

      This endpoint only works for lists that have a `processingType` of `MANUAL` or `SNAPSHOT`.
    HTTP:
      METHOD: PUT
      ENDPOINT: /crm/v3/lists/{listId}/memberships/remove
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(crm.v3.memberships.removeRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(MembershipsUpdateResponse)
    INPUTS:
      - listId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(crm.v3.memberships.removeRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(MembershipsUpdateResponse)
        RETURNVAR: crm_v3_memberships_remove_740f
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_memberships_remove_740f_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.memberships.remove_740f
