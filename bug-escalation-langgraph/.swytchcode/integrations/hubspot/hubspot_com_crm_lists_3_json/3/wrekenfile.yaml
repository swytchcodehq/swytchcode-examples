        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_folders_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.folders.create
  crm.v3.folders.delete:
    SUMMARY: Deletes a folder
    DESC: Deletes the folder with the given Id.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/lists/folders/{folderId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
