VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.authors.get:
    SUMMARY: Retrieve a Blog Author
    DESC: Retrieve the Blog Author object identified by the id in the path.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blogs/authors/{objectId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogAuthor)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(BlogAuthor)
        RETURNVAR: cms_v3_authors_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_authors_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.authors.get
  cms.v3.authors.delete:
    SUMMARY: Delete a Blog Author
    DESC: Delete the Blog Author object identified by the id in the path.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /cms/v3/blogs/authors/{objectId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_authors_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.authors.delete
  cms.v3.authors.update:
    SUMMARY: Update a Blog Author
    DESC: |
      Sparse updates a single Blog Author object identified by the id in the path.
      All the column values need not be specified. Only the that need to be modified can be specified.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /cms/v3/blogs/authors/{objectId}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BlogAuthor)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BlogAuthor)
    INPUTS:
      - objectId:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BlogAuthor)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BlogAuthor)
        RETURNVAR: cms_v3_authors_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_authors_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.authors.update
  cms.v3.batch.update:
    SUMMARY: Update a batch of Blog Authors
    DESC: Update the Blog Author objects identified in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/authors/batch/update
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
