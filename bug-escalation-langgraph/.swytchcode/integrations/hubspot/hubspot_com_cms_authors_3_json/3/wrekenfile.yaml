  cms.v3.authors.list:
    SUMMARY: Get all Blog Authors
    DESC: |
      Get the list of blog authors. Supports paging and filtering. This method would be useful for an integration that examined these models and used an external service to suggest edits.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blogs/authors
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalBlogAuthorForwardPaging)
    INPUTS:
      - createdAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalBlogAuthorForwardPaging)
        RETURNVAR: cms_v3_authors_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_authors_list_NaN
        STATUS: .nan
    ERRORS:
