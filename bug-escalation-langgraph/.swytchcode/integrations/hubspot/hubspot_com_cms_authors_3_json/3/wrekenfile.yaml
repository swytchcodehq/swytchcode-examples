    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the object to add to a multi-language group.
    - name: primaryId
      NAME: primaryId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of primary language object in multi-language group.
    - name: primaryLanguage
      NAME: primaryLanguage
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Primary language of the multi-language group.
  BatchResponseBlogAuthor:
    - name: completedAt
      NAME: completedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: Time of batch operation completion.
    - name: requestedAt
