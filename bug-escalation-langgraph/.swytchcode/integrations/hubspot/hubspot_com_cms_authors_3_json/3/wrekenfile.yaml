        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.archive.create
  cms.v3.batch.create:
    SUMMARY: Create a batch of Blog Authors
    DESC: Create the Blog Author objects detailed in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/authors/batch/create
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputBlogAuthor)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseBlogAuthor)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputBlogAuthor)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseBlogAuthor)
        RETURNVAR: cms_v3_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseBlogAuthorWithErrors)
        RETURNVAR: cms_v3_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.batch.create
  cms.v3.read.create:
    SUMMARY: Retrieve a batch of Blog Authors
    DESC: Retrieve the Blog Author objects identified in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/authors/batch/read
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
