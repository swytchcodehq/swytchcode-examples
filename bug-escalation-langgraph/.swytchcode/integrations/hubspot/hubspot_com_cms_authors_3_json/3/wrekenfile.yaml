  BatchInputBlogAuthor:
    - name: inputs
      NAME: inputs
      type: "[]STRUCT(BlogAuthor)"
      TYPE: "[]STRUCT(BlogAuthor)"
      REQUIRED: true
      comment: Blog authors to input.
  BlogAuthor:
    - name: website
      NAME: website
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL to the website of the Blog Author.
    - name: displayName
      NAME: displayName
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The full name of the Blog Author to be displayed.
    - name: created
      NAME: created
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: facebook
      NAME: facebook
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL to the Blog Author's Facebook page.
    - name: fullName
      NAME: fullName
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: bio
      NAME: bio
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A short biography of the blog author.
    - name: language
      NAME: language
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The explicitly defined ISO 639 language code of the blog author.
    - name: linkedin
      NAME: linkedin
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL to the blog author's LinkedIn page.
    - name: avatar
      NAME: avatar
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL to the blog author's avatar, if supplying a custom one.
    - name: translatedFromId
      NAME: translatedFromId
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: ID of the primary blog author this object was translated from.
    - name: twitter
      NAME: twitter
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL or username of the Twitter account associated with the Blog Author. This will be normalized into the Twitter url for said user.
    - name: deletedAt
      NAME: deletedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The timestamp (ISO8601 format) when this Blog Author was deleted.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of the Blog Author.
    - name: updated
      NAME: updated
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: email
      NAME: email
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Email address of the Blog Author.
    - name: slug
      NAME: slug
      type: STRING
      TYPE: STRING
      REQUIRED: true
  StandardError:
    - name: subCategory
      NAME: subCategory
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: Error subcategory.
    - name: context
      NAME: context
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: true
      comment: Error context.
    - name: links
      NAME: links
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
      comment: Error links.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Error ID.
    - name: category
      NAME: category
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Error category.
    - name: message
      NAME: message
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Error message.
    - name: errors
      NAME: errors
      type: "[]STRUCT(ErrorDetail)"
      TYPE: "[]STRUCT(ErrorDetail)"
      REQUIRED: true
      comment: List of error details.
    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Error status.
  ErrorDetail:
    - name: subCategory
      NAME: subCategory
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A specific category that contains more specific detail about the error
    - name: code
      NAME: code
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The status code associated with the error detail
    - name: in
      NAME: in
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the field or parameter in which the error was found.
    - name: context
      NAME: context
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: false
      comment: Context about the error condition
    - name: message
      NAME: message
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A human readable message describing the error along with remediation steps where appropriate
