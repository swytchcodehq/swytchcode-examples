    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseBlogAuthor)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputJsonNode)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseBlogAuthor)
        RETURNVAR: cms_v3_batch_update
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseBlogAuthorWithErrors)
        RETURNVAR: cms_v3_batch_update_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_batch_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.batch.update
  cms.v3.detachFromLangGroup.create:
