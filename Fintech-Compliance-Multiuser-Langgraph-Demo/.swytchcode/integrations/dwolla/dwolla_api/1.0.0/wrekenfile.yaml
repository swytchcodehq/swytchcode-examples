      METHOD: GET
      ENDPOINT: /customers/{id}/available-exchange-connections
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_available-exchange-connection_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: customers.available-exchange-connection.get
  client-tokens.client-token.create:
    SUMMARY: Create a client token
    DESC: Create a client token for secure authentication within Dwolla Drop-in components. Requires a granular permission action and a Customer link to define what operations the end user can perform within the component. Returns a short-lived token for configuring client-side Drop-in components including customer creation, verification, funding source management, and payment processing. Essential for implementing secure, embeddable UI components without exposing application credentials to the frontend.
    HTTP:
      METHOD: POST
      ENDPOINT: /client-tokens
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
      BODY:
        TYPE: STRUCT(client-tokens.client-token.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - body:
          TYPE: STRUCT(client-tokens.client-token.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: client-tokens_client-token_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
    CANONICAL_ID: client-tokens.client-token.create
