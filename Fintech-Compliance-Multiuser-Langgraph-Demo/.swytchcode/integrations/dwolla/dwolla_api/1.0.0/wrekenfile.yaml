VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  w_base_url: https://api.dwolla.com
METHODS:
  token.token.create:
    SUMMARY: Create an application access token
    DESC: Generate an application access token using OAuth 2.0 client credentials flow for server-to-server authentication. Requires client ID and secret sent via Basic authentication header with grant_type=client_credentials in the request body. Returns a bearer access token with expiration time for authenticating API requests scoped to your application. Essential for secure API access.
    HTTP:
      METHOD: POST
      ENDPOINT: /token
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(token.token.createResponse200)
    INPUTS:
      - grant_type:
          TYPE: STRING
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(token.token.createResponse200)
        RETURNVAR: token_token_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error401)
        STATUS: 401
        WHEN: Unauthorized (HTTP 401)
    CANONICAL_ID: token.token.create
  api.resource.execute:
    SUMMARY: root
    DESC: Retrieve the API root entry point to discover available resources and endpoints based on your OAuth access token permissions. Returns HAL+JSON with navigation links to accessible resources including accounts, customers, events, and webhook subscriptions depending on token scope. Essential for API exploration, dynamic resource discovery, and building adaptive client applications that respond to available permissions.
    HTTP:
      METHOD: GET
      ENDPOINT: /
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: api_resource_execute
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: unauthorized (HTTP 401)
    CANONICAL_ID: api.resource.execute
  accounts.account.get:
    SUMMARY: Retrieve account details
    DESC: Returns basic account information for your authorized Main Dwolla Account, including account ID, name, and links to related resources such as funding sources, transfers, and customers.
    HTTP:
      METHOD: GET
      ENDPOINT: /accounts/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: accounts_account_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: accounts.account.get
  funding-sources.funding-source.create:
    SUMMARY: Create a funding source for an account
    DESC: |
      Create a funding source by adding a bank account to a Main Dwolla Account. This endpoint allows you to connect a checking or savings account using either manual bank account details or an exchange resource.

      For more information about funding sources, see the [Funding Sources API Reference](https://developers.dwolla.com/docs/api-reference/funding-sources).
    HTTP:
      METHOD: POST
      ENDPOINT: /funding-sources
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateAccountFundingSource)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - body:
          TYPE: STRUCT(CreateAccountFundingSource)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad request or duplicate resource (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
    CANONICAL_ID: funding-sources.funding-source.create
  accounts.funding-source.get:
    SUMMARY: List funding sources for an account
    DESC: |
      Get a list of all funding sources associated with a specific Main Dwolla Account. This endpoint returns both bank accounts and balance funding sources, with detailed information about each funding source's status, type, and available processing channels.
    HTTP:
      METHOD: GET
      ENDPOINT: /accounts/{id}/funding-sources
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - removed:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: accounts_funding-source_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: accounts.funding-source.get
  accounts.transfer.get:
    SUMMARY: List and search account transfers
    DESC: Returns a paginated, searchable list of transfers associated with the specified Main Dwolla account. Supports advanced filtering by amount range, date range, transfer status, and correlation ID. Results are limited to 10,000 transfers per query; use date range filters for historical data beyond this limit.
    HTTP:
      METHOD: GET
      ENDPOINT: /accounts/{id}/transfers
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - search:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startAmount:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - endAmount:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startDate:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - endDate:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - correlationId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - offset:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: accounts_transfer_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: accounts.transfer.get
  accounts.mass-payment.get:
    SUMMARY: List account mass payments
    DESC: Returns a paginated list of mass payments created by your Main Dwolla account. Results are sorted by creation date in descending order (newest first) and can be filtered by correlation ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /accounts/{id}/mass-payments
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 25
      - offset:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 0
      - correlationId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: accounts_mass-payment_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: accounts.mass-payment.get
  customers.customer.list:
    SUMMARY: List and search customers
    DESC: Returns a paginated list of customers sorted by creation date. Supports fuzzy search across customer names, business names, and email addresses, plus exact filtering by email and verification status. Default limit is 25 customers per page, maximum 200.
    HTTP:
      METHOD: GET
      ENDPOINT: /customers
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - offset:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - search:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_customer_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
    CANONICAL_ID: customers.customer.list
  customers.customer.create:
    SUMMARY: Create a customer
    DESC: Creates a new customer with different verification levels and capabilities. Supports personal verified customers (individuals), business verified customers (businesses), unverified customers, and receive-only users. Customer type determines transaction limits, verification requirements, and available features.
    HTTP:
      METHOD: POST
      ENDPOINT: /customers
      HEADERS:
        Content-Type: application/vnd.dwolla.v1.hal+json
        Authorization: bearer_token
      CONTENT_TYPE: application/vnd.dwolla.v1.hal+json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: customers.customer.create
  customers.customer.get:
    SUMMARY: Retrieve a customer
    DESC: Retrieve identifying information for a specific customer. The returned data varies by customer type - verified customers include contact details, address information, and verification status, while unverified customers and receive-only users contain basic contact information only.
    HTTP:
      METHOD: GET
      ENDPOINT: /customers/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_customer_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: customers.customer.get
  customers.customer.create_6099:
    SUMMARY: Update a customer
    DESC: Update Customer information, upgrade an unverified Customer to a verified Customer, suspend a Customer, deactivate a Customer, reactivate a Customer, and update a verified Customer's information to retry verification.
    HTTP:
      METHOD: POST
      ENDPOINT: /customers/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
      BODY:
        TYPE: STRUCT(customers.customer.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - body:
          TYPE: STRUCT(customers.customer.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_customer_create_6099
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: bad request (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
    CANONICAL_ID: customers.customer.create_6099
  business-classifications.business-classification.list:
    SUMMARY: List business classifications
    DESC: Returns a directory of business and industry classifications required for creating business verified customers. Each business classification contains multiple industry classifications. The industry classification ID must be provided in the businessClassification parameter during business customer creation for verification.
    HTTP:
      METHOD: GET
      ENDPOINT: /business-classifications
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: business-classifications_business-classification_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: business-classifications.business-classification.list
  business-classifications.business-classification.get:
    SUMMARY: Retrieve a business classification
    DESC: Returns a specific business classification with its embedded industry classifications. Use this endpoint to browse available industry options within a business category and obtain the industry classification ID required for the businessClassification parameter when creating business verified customers.
    HTTP:
      METHOD: GET
      ENDPOINT: /business-classifications/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: business-classifications_business-classification_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: business-classifications.business-classification.get
  customers.beneficial-owner.get:
    SUMMARY: List customer beneficial owners
    DESC: Returns all beneficial owners associated with a business verified customer. Beneficial owners are individuals who directly or indirectly own 25% or more of the company's equity. Includes personal information, verification status, and address details for each owner.
    HTTP:
      METHOD: GET
      ENDPOINT: /customers/{id}/beneficial-owners
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_beneficial-owner_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: customers.beneficial-owner.get
  customers.beneficial-owner.create:
    SUMMARY: Create customer beneficial owner
    DESC: Creates a new beneficial owner for a business verified customer. Beneficial owners are individuals who own 25% or more of the company's equity. Requires personal information, address, and SSN or passport for identity verification.
    HTTP:
      METHOD: POST
      ENDPOINT: /customers/{id}/beneficial-owners
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(customers.beneficial-owner.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - body:
          TYPE: STRUCT(customers.beneficial-owner.createRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: customers.beneficial-owner.create
  beneficial-owners.beneficial-owner.get:
    SUMMARY: Retrieve beneficial owner
    DESC: Returns detailed information for a specific beneficial owner, including personal information, address, and verification status. The verification status indicates the owner's identity verification progress and affects the business customer's transaction capabilities.
    HTTP:
      METHOD: GET
      ENDPOINT: /beneficial-owners/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: beneficial-owners_beneficial-owner_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: beneficial-owners.beneficial-owner.get
  beneficial-owners.beneficial-owner.create:
    SUMMARY: Update beneficial owner
    DESC: Updates a beneficial owner's information to retry verification when their status is "incomplete". Only beneficial owners with incomplete verification status can be updated. Used to correct information that caused initial verification to fail.
    HTTP:
      METHOD: POST
      ENDPOINT: /beneficial-owners/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
      BODY:
        TYPE: STRUCT(beneficial-owners.beneficial-owner.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - body:
          TYPE: STRUCT(beneficial-owners.beneficial-owner.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: beneficial-owners_beneficial-owner_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: ValidationError (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: beneficial-owners.beneficial-owner.create
  beneficial-owners.beneficial-owner.delete:
    SUMMARY: Remove beneficial owner
    DESC: Permanently removes a beneficial owner from a business customer. This action is irreversible and the beneficial owner cannot be retrieved after removal. Removing a beneficial owner will change the customer's certification status to "recertify".
    HTTP:
      METHOD: DELETE
      ENDPOINT: /beneficial-owners/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: beneficial-owners_beneficial-owner_delete
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: beneficial-owners.beneficial-owner.delete
  customers.beneficial-ownership.get:
    SUMMARY: Retrieve beneficial ownership status
    DESC: Returns the certification status of beneficial ownership for a business verified customer. Status indicates whether beneficial owner information has been certified and affects the customer's ability to send funds. Possible values include uncertified, certified, and recertify.
    HTTP:
      METHOD: GET
      ENDPOINT: /customers/{id}/beneficial-ownership
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_beneficial-ownership_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: not found (HTTP 404)
    CANONICAL_ID: customers.beneficial-ownership.get
  customers.beneficial-ownership.create:
    SUMMARY: Certify beneficial ownership
    DESC: Updates the beneficial ownership certification status to "certified", confirming that all beneficial owner information is accurate and complete. This action enables the business customer to send funds and is required to complete the verification process.
    HTTP:
      METHOD: POST
      ENDPOINT: /customers/{id}/beneficial-ownership
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
      BODY:
        TYPE: STRUCT(customers.beneficial-ownership.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - Accept:
          TYPE: STRING
          REQUIRED: true
          LOCATION: header
          DEFAULT: application/vnd.dwolla.v1.hal+json
      - body:
          TYPE: STRUCT(customers.beneficial-ownership.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: customers_beneficial-ownership_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: ValidationError (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: forbidden (HTTP 403)
    CANONICAL_ID: customers.beneficial-ownership.create
  customers.document.get:
    SUMMARY: List documents for customer
    DESC: Returns all identity verification documents submitted for a customer. Includes document status, verification results, document type (passport, driver's license, etc.), and failure reasons if verification was rejected. Used to track document submission and verification progress during the business verification process.
    HTTP:
      METHOD: GET
      ENDPOINT: /customers/{id}/documents
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/vnd.dwolla.v1.hal+json
    EXECUTION:
