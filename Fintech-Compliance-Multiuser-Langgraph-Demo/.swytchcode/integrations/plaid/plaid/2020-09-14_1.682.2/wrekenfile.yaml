        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: session.token.create
  transfer.get.create:
    SUMMARY: Retrieve a transfer
    DESC: The `/transfer/get` endpoint fetches information about the transfer corresponding to the given `transfer_id` or `authorization_id`. One of `transfer_id` or `authorization_id` must be populated but not both.
