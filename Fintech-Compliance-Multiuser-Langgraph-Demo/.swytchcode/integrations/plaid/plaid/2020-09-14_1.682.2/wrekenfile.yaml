        TYPE: STRUCT(BankTransferGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(BankTransferGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BankTransferGetResponse)
        RETURNVAR: bank_transfer_get_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
