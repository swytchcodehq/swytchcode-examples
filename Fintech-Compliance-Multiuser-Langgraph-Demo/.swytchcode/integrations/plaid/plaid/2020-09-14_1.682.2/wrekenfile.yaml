    CANONICAL_ID: credit.relay.get
  credit.relay.pdf.get:
    SUMMARY: Retrieve the pdf reports associated with a relay token that was shared with you (beta)
    DESC: |-
      `/credit/relay/pdf/get` allows third parties to receive a pdf report that was shared with them, using a `relay_token` that was created by the report owner.

      The `/credit/relay/pdf/get` endpoint retrieves the Asset Report in PDF format. Before calling `/credit/relay/pdf/get`, you must first create the Asset Report using `/credit/relay/create` and then wait for the [`PRODUCT_READY`](https://plaid.com/docs/api/products/assets/#product_ready) webhook to fire, indicating that the Report is ready to be retrieved.

      The response to `/credit/relay/pdf/get` is the PDF binary data. The `request_id` is returned in the `Plaid-Request-ID` header.

      [View a sample PDF Asset Report](https://plaid.com/documents/sample-asset-report.pdf).
    HTTP:
      METHOD: POST
      ENDPOINT: /credit/relay/pdf/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/pdf
      BODY:
        TYPE: STRUCT(CreditRelayPDFGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(CreditRelayPDFGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: credit_relay_pdf_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: credit_relay_pdf_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: credit.relay.pdf.get
  credit.relay.refresh:
    SUMMARY: Refresh a report of a relay token
    DESC: The `/credit/relay/refresh` endpoint allows third parties to refresh a report that was relayed to them, using a `relay_token` that was created by the report owner. A new report will be created with the original report parameters, but with the most recent data available based on the `days_requested` value of the original report.
    HTTP:
      METHOD: POST
      ENDPOINT: /credit/relay/refresh
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
