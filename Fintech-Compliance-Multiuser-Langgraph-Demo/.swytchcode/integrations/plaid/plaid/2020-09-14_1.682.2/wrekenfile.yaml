      REQUIRED: true
      comment: An array containing transactions from the account. Transactions are returned in reverse chronological order, with the most recent at the beginning of the array. The maximum number of transactions returned is determined by the `count` parameter.
    - name: total_transactions
      NAME: total_transactions
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The total number of transactions available within the date range specified. If `total_transactions` is larger than the size of the `transactions` array, more transactions are available and can be fetched via manipulating the `offset` parameter.
    - name: item
      NAME: item
      type: STRUCT(Item)
      TYPE: STRUCT(Item)
      REQUIRED: true
    - name: request_id
      NAME: request_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
  Transaction:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the account in which this transaction occurred.
    - name: amount
      NAME: amount
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: "The settled value of the transaction, denominated in the transactions's currency, as stated in `iso_currency_code` or `unofficial_currency_code`. For all products except Income: Positive values when money moves out of the account; negative values when money moves in. For example, debit card purchases are positive; credit card payments, direct deposits, and refunds are negative. For Income endpoints, values are positive when representing income."
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the transaction. Always `null` if `unofficial_currency_code` is non-null.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The unofficial currency code associated with the transaction. Always `null` if `iso_currency_code` is non-`null`. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `iso_currency_code`s.
    - name: category
      NAME: category
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: |-
        A hierarchical array of the categories to which this transaction belongs. For a full list of categories, see [`/categories/get`](https://plaid.com/docs/api/products/transactions/#categoriesget).

        All Transactions implementations are recommended to use the new `personal_finance_category` instead of `category`, as it provides greater accuracy and more meaningful categorization.

        If the `transactions` object was returned by an Assets endpoint such as `/asset_report/get/` or `/asset_report/pdf/get`, this field will only appear in an Asset Report with Insights.
    - name: category_id
      NAME: category_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        The ID of the category to which this transaction belongs. For a full list of categories, see [`/categories/get`](https://plaid.com/docs/api/products/transactions/#categoriesget).

        All Transactions implementations are recommended to use the new `personal_finance_category` instead of `category`, as it provides greater accuracy and more meaningful categorization.

        If the `transactions` object was returned by an Assets endpoint such as `/asset_report/get/` or `/asset_report/pdf/get`, this field will only appear in an Asset Report with Insights.
    - name: check_number
      NAME: check_number
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The check number of the transaction. This field is only populated for check transactions.
    - name: date
      NAME: date
      type: DATE
      TYPE: DATE
      REQUIRED: true
      comment: For pending transactions, the date that the transaction occurred; for posted transactions, the date that the transaction posted. Both dates are returned in an [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DD` ). To receive information about the date that a posted transaction was initiated, see the `authorized_date` field.
    - name: location
      NAME: location
      type: STRUCT(Location)
      TYPE: STRUCT(Location)
      REQUIRED: false
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        The merchant name or transaction description.

        Note: While Plaid does not currently plan to remove this field, it is a legacy field that is not actively maintained. Use `merchant_name` instead for the merchant name.

        If the `transactions` object was returned by a Transactions endpoint such as `/transactions/sync` or `/transactions/get`, this field will always appear. If the `transactions` object was returned by an Assets endpoint such as `/asset_report/get/` or `/asset_report/pdf/get`, this field will only appear in an Asset Report with Insights.
    - name: merchant_name
      NAME: merchant_name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The merchant name, as enriched by Plaid from the `name` field. This is typically a more human-readable version of the merchant counterparty in the transaction. For some bank transactions (such as checks or account transfers) where there is no meaningful merchant name, this value will be `null`.
    - name: original_description
      NAME: original_description
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The string returned by the financial institution to describe the transaction. For transactions returned by `/transactions/sync` or `/transactions/get`, this field will only be included if the client has set `options.include_original_description` to `true`.
    - name: payment_meta
      NAME: payment_meta
      type: STRUCT(PaymentMeta)
      TYPE: STRUCT(PaymentMeta)
      REQUIRED: false
    - name: pending
      NAME: pending
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When `true`, identifies the transaction as pending or unsettled. Pending transaction details (name, type, amount, category ID) may change before they are settled. Not all institutions provide pending transactions.
    - name: pending_transaction_id
      NAME: pending_transaction_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of a posted transaction's associated pending transaction, where applicable. Not all institutions provide pending transactions.
    - name: account_owner
      NAME: account_owner
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: This field is not typically populated and only relevant when dealing with sub-accounts. A sub-account most commonly exists in cases where a single account is linked to multiple cards, each with its own card number and card holder name; each card will be considered a sub-account. If the account does have sub-accounts, this field will typically be some combination of the sub-account owner's name and/or the sub-account mask. The format of this field is not standardized and will vary based on institution.
    - name: transaction_id
      NAME: transaction_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of the transaction. Like all Plaid identifiers, the `transaction_id` is case sensitive.
    - name: transaction_type
      NAME: transaction_type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |
        Please use the `payment_channel` field, `transaction_type` will be deprecated in the future.

        `digital:` transactions that took place online.

        `place:` transactions that were made at a physical location.

        `special:` transactions that relate to banks, e.g. fees or deposits.

        `unresolved:` transactions that do not fit into the other three types.
    - name: logo_url
      NAME: logo_url
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The URL of a logo associated with this transaction, if available. The logo will always be 100×100 pixel PNG file.
    - name: website
      NAME: website
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The website associated with this transaction, if available.
    - name: authorized_date
      NAME: authorized_date
      type: DATE
      TYPE: DATE
      REQUIRED: true
      comment: The date that the transaction was authorized. For posted transactions, the `date` field will indicate the posted date, but `authorized_date` will indicate the day the transaction was authorized by the financial institution. If presenting transactions to the user in a UI, the `authorized_date`, when available, is generally preferable to use over the `date` field for posted transactions, as it will generally represent the date the user actually made the transaction. Dates are returned in an [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DD` ).
    - name: authorized_datetime
      NAME: authorized_datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: |-
        Date and time when a transaction was authorized in [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DDTHH:mm:ssZ` ). For posted transactions, the `datetime` field will indicate the posted date, but `authorized_datetime` will indicate the day the transaction was authorized by the financial institution. If presenting transactions to the user in a UI, the `authorized_datetime`, when available, is generally preferable to use over the `datetime` field for posted transactions, as it will generally represent the date the user actually made the transaction.

        This field is returned for select financial institutions and comes as provided by the institution. It may contain default time values (such as 00:00:00). This field is only populated in API version 2019-05-29 and later.
    - name: datetime
      NAME: datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: |-
        Date and time when a transaction was posted in [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DDTHH:mm:ssZ` ). For the date that the transaction was initiated, rather than posted, see the `authorized_datetime` field.

        This field is returned for select financial institutions and comes as provided by the institution. It may contain default time values (such as 00:00:00). This field is only populated in API version 2019-05-29 and later.
    - name: payment_channel
      NAME: payment_channel
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |
        The channel used to make a payment.
        `online:` transactions that took place online.

        `in store:` transactions that were made at a physical location.

        `other:` transactions that relate to banks, e.g. fees or deposits.

        This field replaces the `transaction_type` field.
    - name: personal_finance_category
      NAME: personal_finance_category
      type: STRUCT(PersonalFinanceCategory)
      TYPE: STRUCT(PersonalFinanceCategory)
      REQUIRED: false
    - name: business_finance_category
      NAME: business_finance_category
      type: STRUCT(BusinessFinanceCategory)
      TYPE: STRUCT(BusinessFinanceCategory)
      REQUIRED: false
    - name: transaction_code
      NAME: transaction_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: personal_finance_category_icon_url
      NAME: personal_finance_category_icon_url
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The URL of an icon associated with the primary personal finance category. The icon will always be 100×100 pixel PNG file.
    - name: counterparties
      NAME: counterparties
      type: "[]STRUCT(TransactionCounterparty)"
      TYPE: "[]STRUCT(TransactionCounterparty)"
      REQUIRED: false
      comment: The counterparties present in the transaction. Counterparties, such as the merchant or the financial institution, are extracted by Plaid from the raw description.
    - name: merchant_entity_id
      NAME: merchant_entity_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A unique, stable, Plaid-generated ID that maps to the merchant. In the case of a merchant with multiple retail locations, this field will map to the broader merchant, not a specific location or store.
    - name: client_customization
      NAME: client_customization
      type: STRUCT(ClientCustomization)
      TYPE: STRUCT(ClientCustomization)
      REQUIRED: false
