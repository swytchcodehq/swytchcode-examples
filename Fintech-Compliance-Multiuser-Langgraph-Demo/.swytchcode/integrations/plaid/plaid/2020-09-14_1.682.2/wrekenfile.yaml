  transfer.capability.get:
    SUMMARY: Get RTP eligibility information of a transfer
    DESC: Use the `/transfer/capabilities/get` endpoint to determine the RTP eligibility information of an account to be used with Transfer. This endpoint works on all Transfer-capable Items, including those created by `/transfer/migrate_account`.
    HTTP:
