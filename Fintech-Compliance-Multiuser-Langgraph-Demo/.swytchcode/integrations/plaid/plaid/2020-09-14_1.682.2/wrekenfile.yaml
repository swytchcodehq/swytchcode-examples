      NAME: amount
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The settled value of the transaction, denominated in the transaction's currency, as stated in `iso_currency_code` or `unofficial_currency_code`. Positive values when money moves out of the account; negative values when money moves in. For example, debit card purchases are positive; credit card payments, direct deposits, and refunds are negative.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the transaction. Always `null` if `unofficial_currency_code` is non-null.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The unofficial currency code associated with the transaction. Always `null` if `iso_currency_code` is non-`null`. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `unofficial_currency_code`s.
