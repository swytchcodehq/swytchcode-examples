      METHOD: POST
      ENDPOINT: /transfer/refund/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TransferRefundCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TransferRefundCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(TransferRefundCreateRequest)
          LOCATION: body
    RETURNS:
