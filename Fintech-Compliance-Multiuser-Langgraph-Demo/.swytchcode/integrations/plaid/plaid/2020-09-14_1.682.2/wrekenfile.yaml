      type: "[]STRUCT(AccountBase)"
      TYPE: "[]STRUCT(AccountBase)"
      REQUIRED: true
      comment: An array of accounts at a financial institution associated with the transactions in this response. Only accounts that have associated transactions will be shown. For example, `investment`-type accounts will be omitted.
    - name: added
