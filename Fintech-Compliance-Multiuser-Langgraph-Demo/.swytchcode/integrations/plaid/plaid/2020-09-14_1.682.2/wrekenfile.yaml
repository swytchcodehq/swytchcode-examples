  BaseReportAccount:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Plaid’s unique identifier for the account. This value will not change unless Plaid can't reconcile the account with the data returned by the financial institution. This may occur, for example, when the name of the account changes. If this happens a new `account_id` will be assigned to the account.

        If an account with a specific `account_id` disappears instead of changing, the account is likely closed. Closed accounts are not returned by the Plaid API.

        Like all Plaid identifiers, the `account_id` is case sensitive.
    - name: balances
      NAME: balances
      type: STRUCT(BaseReportAccountBalances)
      TYPE: STRUCT(BaseReportAccountBalances)
      REQUIRED: true
    - name: consumer_disputes
      NAME: consumer_disputes
      type: "[]STRUCT(ConsumerDispute)"
      TYPE: "[]STRUCT(ConsumerDispute)"
      REQUIRED: true
      comment: The information about previously submitted valid dispute statements by the consumer
    - name: mask
      NAME: mask
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The last 2-4 alphanumeric characters of an account's official account number. Note that the mask may be non-unique between an Item's accounts, and it may also not match the mask that the bank displays to the user.
    - name: metadata
      NAME: metadata
      type: STRUCT(BaseReportAccountMetadata)
      TYPE: STRUCT(BaseReportAccountMetadata)
      REQUIRED: true
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the account, either assigned by the user or by the financial institution itself
    - name: official_name
