    INPUTS:
      - body:
          TYPE: STRUCT(SignalScheduleRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignalScheduleResponse)
        RETURNVAR: signal_schedule_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: signal_schedule_create_NaN
        STATUS: .nan
    ERRORS:
