      `/oauth/introspect` returns metadata about an access token or refresh token.

      Note: This endpoint supports `Content-Type: application/x-www-form-urlencoded` as well as JSON. The fields for the form are equivalent to the fields for JSON and conform to the OAuth 2.0 specification.
    HTTP:
      METHOD: POST
      ENDPOINT: /oauth/introspect
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(OAuthIntrospectRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OAuthIntrospectResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(OAuthIntrospectRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(OAuthIntrospectResponse)
        RETURNVAR: oauth_introspect_create
        STATUS: 200
      - RETURNTYPE: STRUCT(OAuthErrorResponse)
        RETURNVAR: oauth_introspect_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(OAuthErrorResponse)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: oauth.introspect.create
  oauth.revoke.create:
    SUMMARY: Revoke an OAuth token
    DESC: |-
      `/oauth/revoke` revokes an access or refresh token, preventing any further use. If a refresh token is revoked, all access and refresh tokens derived from it are also revoked, including exchanged tokens.

