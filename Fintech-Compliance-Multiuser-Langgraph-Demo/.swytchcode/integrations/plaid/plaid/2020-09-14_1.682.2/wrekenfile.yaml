      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: user
      NAME: user
      type: STRUCT(NetworkStatusGetUser)
      TYPE: STRUCT(NetworkStatusGetUser)
      REQUIRED: true
    - name: template_id
      NAME: template_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The id of a template defined in Plaid Dashboard. This field is used if you have additional criteria that you want to check against (e.g. Layer eligibility).
  NetworkStatusGetUser:
    - name: phone_number
      NAME: phone_number
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The user's phone number in [E.164](https://en.wikipedia.org/wiki/E.164) format.
  ProfileNetworkStatusGetRequest:
    - name: client_id
      NAME: client_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: secret
      NAME: secret
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: user
      NAME: user
      type: STRUCT(NetworkStatusGetUser)
      TYPE: STRUCT(NetworkStatusGetUser)
      REQUIRED: true
  NetworkStatusGetResponse:
    - name: network_status
      NAME: network_status
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: layer
      NAME: layer
      type: STRUCT(NetworkStatusGetResponseLayer)
      TYPE: STRUCT(NetworkStatusGetResponseLayer)
      REQUIRED: false
    - name: request_id
      NAME: request_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
  NetworkStatusGetResponseLayer:
    - name: eligible
      NAME: eligible
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Indicates if the user is eligible for a Layer session.
  ProfileNetworkStatusGetResponse:
    - name: network_status
      NAME: network_status
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: request_id
      NAME: request_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
  AuthGetRequest:
    - name: client_id
      NAME: client_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: secret
      NAME: secret
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: access_token
      NAME: access_token
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: options
      NAME: options
      type: STRUCT(AuthGetRequestOptions)
      TYPE: STRUCT(AuthGetRequestOptions)
      REQUIRED: false
  AuthGetRequestOptions:
    - name: account_ids
      NAME: account_ids
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: |-
        A list of `account_ids` to retrieve for the Item.
        Note: An error will be returned if a provided `account_id` is not associated with the Item.
  AuthGetResponse:
    - name: accounts
      NAME: accounts
      type: "[]STRUCT(AccountBase)"
      TYPE: "[]STRUCT(AccountBase)"
      REQUIRED: true
      comment: The `accounts` for which numbers are being retrieved.
    - name: numbers
      NAME: numbers
      type: STRUCT(AuthGetNumbers)
      TYPE: STRUCT(AuthGetNumbers)
      REQUIRED: true
    - name: item
      NAME: item
      type: STRUCT(Item)
      TYPE: STRUCT(Item)
      REQUIRED: true
    - name: request_id
      NAME: request_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
  AccountBase:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Plaid’s unique identifier for the account. This value will not change unless Plaid can't reconcile the account with the data returned by the financial institution. This may occur, for example, when the name of the account changes. If this happens a new `account_id` will be assigned to the account.

        The `account_id` can also change if the `access_token` is deleted and the same credentials that were used to generate that `access_token` are used to generate a new `access_token` on a later date. In that case, the new `account_id` will be different from the old `account_id`.

        If an account with a specific `account_id` disappears instead of changing, the account is likely closed. Closed accounts are not returned by the Plaid API.

        When using a CRA endpoint (an endpoint associated with Plaid Check Consumer Report, i.e. any endpoint beginning with `/cra/`), the `account_id` returned will not match the `account_id` returned by a non-CRA endpoint.

        Like all Plaid identifiers, the `account_id` is case sensitive.
    - name: balances
      NAME: balances
      type: STRUCT(AccountBalance)
      TYPE: STRUCT(AccountBalance)
      REQUIRED: true
    - name: mask
      NAME: mask
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The last 2-4 alphanumeric characters of either the account’s displayed mask or the account’s official account number. Note that the mask may be non-unique between an Item’s accounts.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the account, either assigned by the user or by the financial institution itself
    - name: official_name
      NAME: official_name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The official name of the account as given by the financial institution
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: subtype
      NAME: subtype
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: verification_status
      NAME: verification_status
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        Indicates an Item's micro-deposit-based verification or database verification status. This field is only populated when using Auth and falling back to micro-deposit or database verification. Possible values are:

        `pending_automatic_verification`: The Item is pending automatic verification.

        `pending_manual_verification`: The Item is pending manual micro-deposit verification. Items remain in this state until the user successfully verifies the code.

        `automatically_verified`: The Item has successfully been automatically verified.

        `manually_verified`: The Item has successfully been manually verified.

        `verification_expired`: Plaid was unable to automatically verify the deposit within 7 calendar days and will no longer attempt to validate the Item. Users may retry by submitting their information again through Link.

        `verification_failed`: The Item failed manual micro-deposit verification because the user exhausted all 3 verification attempts. Users may retry by submitting their information again through Link.

        `unsent`: The Item is pending micro-deposit verification, but Plaid has not yet sent the micro-deposit.

        `database_insights_pending`: The Database Auth result is pending and will be available upon Auth request.

        `database_insights_fail`: The Item's numbers have been verified using Plaid's data sources and have signal for being invalid and/or have no signal for being valid. Typically this indicates that the routing number is invalid, the account number does not match the account number format associated with the routing number, or the account has been reported as closed or frozen. Only returned for Auth Items created via Database Auth.

        `database_insights_pass`: The Item's numbers have been verified using Plaid's data sources: the routing and account number match a routing and account number of an account recognized on the Plaid network, and the account is not known by Plaid to be frozen or closed. Only returned for Auth Items created via Database Auth.

        `database_insights_pass_with_caution`: The Item's numbers have been verified using Plaid's data sources and have some signal for being valid: the routing and account number were not recognized on the Plaid network, but the routing number is valid and the account number is a potential valid account number for that routing number. Only returned for Auth Items created via Database Auth.

        `database_matched`: (deprecated) The Item has successfully been verified using Plaid's data sources. Only returned for Auth Items created via Database Match.

        `null` or empty string: Neither micro-deposit-based verification nor database verification are being used for the Item.
    - name: verification_name
      NAME: verification_name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The account holder name that was used for micro-deposit and/or database verification. Only returned for Auth Items created via micro-deposit or database verification. This name was manually-entered by the user during Link, unless it was otherwise provided via the `user.legal_name` request field in `/link/token/create` for the Link session that created the Item.
    - name: verification_insights
      NAME: verification_insights
      type: STRUCT(AccountVerificationInsights)
      TYPE: STRUCT(AccountVerificationInsights)
      REQUIRED: false
    - name: persistent_account_id
      NAME: persistent_account_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A unique and persistent identifier for accounts that can be used to trace multiple instances of the same account across different Items for depository accounts. This field is currently supported only for Items at institutions that use Tokenized Account Numbers (i.e., Chase and PNC, and in May 2025 US Bank). Because these accounts have a different account number each time they are linked, this field may be used instead of the account number to uniquely identify an account across multiple Items for payments use cases, helping to reduce duplicate Items or attempted fraud. In Sandbox, this field is populated for TAN-based institutions (`ins_56`, `ins_13`) as well as the OAuth Sandbox institution (`ins_127287`); in Production, it will only be populated for accounts at applicable institutions.
    - name: holder_category
      NAME: holder_category
      type: STRING
      TYPE: STRING
      REQUIRED: false
  AccountBalance:
    - name: available
      NAME: available
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The amount of funds available to be withdrawn from the account, as determined by the financial institution.

        For `credit`-type accounts, the `available` balance typically equals the `limit` less the `current` balance, less any pending outflows plus any pending inflows.

        For `depository`-type accounts, the `available` balance typically equals the `current` balance less any pending outflows plus any pending inflows. For `depository`-type accounts, the `available` balance does not include the overdraft limit.

        For `investment`-type accounts (or `brokerage`-type accounts for API versions 2018-05-22 and earlier), the `available` balance is the total cash available to withdraw as presented by the institution.

        Note that not all institutions calculate the `available`  balance. In the event that `available` balance is unavailable, Plaid will return an `available` balance value of `null`.

        Available balance may be cached and is not guaranteed to be up-to-date in realtime unless the value was returned by `/accounts/balance/get`, or by `/signal/evaluate` with a Balance-only ruleset.

        If `current` is `null` this field is guaranteed not to be `null`.
    - name: current
      NAME: current
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The total amount of funds in or owed by the account.

        For `credit`-type accounts, a positive balance indicates the amount owed; a negative amount indicates the lender owing the account holder.

        For `loan`-type accounts, the current balance is the principal remaining on the loan, except in the case of student loan accounts at Sallie Mae (`ins_116944`). For Sallie Mae student loans, the account's balance includes both principal and any outstanding interest. Similar to `credit`-type accounts, a positive balance is typically expected, while a negative amount indicates the lender owing the account holder.

        For `investment`-type accounts (or `brokerage`-type accounts for API versions 2018-05-22 and earlier), the current balance is the total value of assets as presented by the institution.

        Note that balance information may be cached unless the value was returned by `/accounts/balance/get` or by `/signal/evaluate` with a Balance-only ruleset; if the Item is enabled for Transactions, the balance will be at least as recent as the most recent Transaction update. If you require realtime balance information, use the `available` balance as provided by `/accounts/balance/get` or `/signal/evaluate` called with a Balance-only `ruleset_key`.

        When returned by `/accounts/balance/get`, this field may be `null`. When this happens, `available` is guaranteed not to be `null`.
    - name: limit
      NAME: limit
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        For `credit`-type accounts, this represents the credit limit.

        For `depository`-type accounts, this represents the pre-arranged overdraft limit, which is common for current (checking) accounts in Europe.

        In North America, this field is typically only available for `credit`-type accounts.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the balance. Always null if `unofficial_currency_code` is non-null.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The unofficial currency code associated with the balance. Always null if `iso_currency_code` is non-null. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `unofficial_currency_code`s.
    - name: last_updated_datetime
      NAME: last_updated_datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: |-
        Timestamp in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format (`YYYY-MM-DDTHH:mm:ssZ`) indicating the last time the balance was updated.

        This field is returned only when the institution is `ins_128026` (Capital One).
  AccountVerificationInsights:
    - name: name_match_score
      NAME: name_match_score
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Indicates the score of the name match between the given name provided during database verification (available in the [`verification_name`](https://plaid.com/docs/api/products/auth/#auth-get-response-accounts-verification-name) field if using standard Database Auth, or provided in the request if using `/auth/verify`) and matched Plaid network accounts. If defined, will be a value between 0 and 100. Will be undefined if name matching was not enabled for the database verification session or if there were no eligible Plaid network matches to compare the given name with.
    - name: network_status
      NAME: network_status
      type: STRUCT(AccountVerificationInsightsNetworkStatus)
      TYPE: STRUCT(AccountVerificationInsightsNetworkStatus)
      REQUIRED: true
    - name: previous_returns
      NAME: previous_returns
      type: STRUCT(AccountVerificationInsightsPreviousReturns)
      TYPE: STRUCT(AccountVerificationInsightsPreviousReturns)
      REQUIRED: false
    - name: account_number_format
      NAME: account_number_format
      type: STRING
      TYPE: STRING
      REQUIRED: true
  AccountVerificationInsightsNetworkStatus:
    - name: has_numbers_match
      NAME: has_numbers_match
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Indicates whether we found at least one matching account for the ACH account and routing number.
    - name: is_numbers_match_verified
      NAME: is_numbers_match_verified
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Indicates if at least one matching account for the ACH account and routing number is already verified.
  AccountVerificationInsightsPreviousReturns:
    - name: has_previous_administrative_return
      NAME: has_previous_administrative_return
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Indicates whether Plaid's data sources include a known administrative ACH return for this account and routing number.
  AuthGetNumbers:
    - name: ach
      NAME: ach
      type: "[]STRUCT(NumbersACH)"
      TYPE: "[]STRUCT(NumbersACH)"
      REQUIRED: true
      comment: An array of ACH numbers identifying accounts.
    - name: eft
      NAME: eft
      type: "[]STRUCT(NumbersEFT)"
      TYPE: "[]STRUCT(NumbersEFT)"
      REQUIRED: true
      comment: An array of EFT numbers identifying accounts.
    - name: international
      NAME: international
      type: "[]STRUCT(NumbersInternational)"
      TYPE: "[]STRUCT(NumbersInternational)"
      REQUIRED: true
      comment: An array of IBAN numbers identifying accounts.
    - name: bacs
