      NAME: proxy_security_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: In certain cases, Plaid will provide the ID of another security whose performance resembles this security, typically when the original security has low volume, or when a private security can be modeled with a publicly traded security.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A descriptive name for the security, suitable for display.
    - name: ticker_symbol
      NAME: ticker_symbol
      type: STRING
      TYPE: STRING
      REQUIRED: true
