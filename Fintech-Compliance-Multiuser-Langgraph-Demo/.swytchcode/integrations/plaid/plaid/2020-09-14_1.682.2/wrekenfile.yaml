      REQUIRED: true
      comment: An identifier given to the security by the institution
    - name: institution_id
      NAME: institution_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: If `institution_security_id` is present, this field indicates the Plaid `institution_id` of the institution to whom the identifier belongs.
