      REQUIRED: true
      comment: |
        Price of the security at the close of the previous trading session. Null for non-public securities.

        If the security is a foreign currency this field will be updated daily and will be priced in USD.

        If the security is a cryptocurrency, this field will be updated multiple times a day. As crypto prices can fluctuate quickly and data may become stale sooner than other asset classes, refer to `update_datetime` with the time when the price was last updated.
    - name: close_price_as_of
      NAME: close_price_as_of
      type: DATE
      TYPE: DATE
      REQUIRED: true
      comment: Date for which `close_price` is accurate. Always `null` if `close_price` is `null`.
    - name: update_datetime
      NAME: update_datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: Date and time at which `close_price` is accurate, in ISO 8601 format (YYYY-MM-DDTHH:mm:ssZ). Always `null` if `close_price` is `null`.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the price given. Always `null` if `unofficial_currency_code` is non-`null`.
    - name: unofficial_currency_code
