      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Database Match has been deprecated and replaced with Database Auth. Use the [Account Verification Dashboard](https://dashboard.plaid.com/account-verification) to enable Database Auth.
    - name: database_insights_enabled
      NAME: database_insights_enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Database Insights has been deprecated and replaced with Database Auth. Use the [Account Verification Dashboard](https://dashboard.plaid.com/account-verification) to enable Database Auth.
