  credit.relay.create:
    SUMMARY: Create a relay token to share an Asset Report with a partner client
    DESC: |-
      Plaid can share an Asset Report directly with a participating third party on your behalf. The shared Asset Report is the exact same Asset Report originally created in `/asset_report/create`.

      To grant a third party access to an Asset Report, use the `/credit/relay/create` endpoint to create a `relay_token` and then pass that token to your third party. Each third party has its own `secondary_client_id`; for example, `ce5bd328dcd34123456`. You'll need to create a separate `relay_token` for each third party that needs access to the report on your behalf.
    HTTP:
      METHOD: POST
      ENDPOINT: /credit/relay/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreditRelayCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreditRelayCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(CreditRelayCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreditRelayCreateResponse)
        RETURNVAR: credit_relay_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: credit_relay_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: credit.relay.create
