  beacon.report.list:
    SUMMARY: List Beacon Reports for a Beacon User
    DESC: Use the `/beacon/report/list` endpoint to view all Beacon Reports you created for a specific Beacon User. The reports returned by this endpoint are exclusively reports you created for a specific user. A Beacon User can only have one active report at a time, but a new report can be created if a previous report has been deleted. The results from this endpoint are paginated; the `next_cursor` field will be populated if there is another page of results that can be retrieved. To fetch the next page, pass the `next_cursor` value as the `cursor` parameter in the next request.
    HTTP:
      METHOD: POST
      ENDPOINT: /beacon/report/list
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
