      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The combined value of all fees applied to this transaction
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: subtype
      NAME: subtype
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the transaction. Always `null` if `unofficial_currency_code` is non-`null`.
    - name: unofficial_currency_code
