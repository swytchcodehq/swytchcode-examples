  processor.token.webhook.update:
    SUMMARY: Update a processor token's webhook URL
    DESC: This endpoint allows you, the processor, to update the webhook URL associated with a processor token. This request triggers a `WEBHOOK_UPDATE_ACKNOWLEDGED` webhook to the newly specified webhook URL.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/token/webhook/update
      HEADERS:
