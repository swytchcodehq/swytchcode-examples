      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CraMonitoringInsightsSubscribeResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(CraMonitoringInsightsSubscribeRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CraMonitoringInsightsSubscribeResponse)
        RETURNVAR: cra_monitoring_insight_subscribe_create
