      TYPE: STRUCT(MonthlyAverage)
      REQUIRED: false
    - name: transactions_count
      NAME: transactions_count
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The total number of outflow transactions in this expenses group, within the given time window across all the accounts in the report.
    - name: percentage_of_income
      NAME: percentage_of_income
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: |-
        The percentage of the total inflows that was spent in this expenses group, within the given time window across all the accounts in the report.
        For example, a value of 100 represents that 100% of the inflows were spent on transactions that fall into this expenditure group.
        If there's no available income for the giving time period, this field value will be `-1`.
    - name: top_categories
      NAME: top_categories
      type: "[]STRUCT(CategoryExpenses)"
      TYPE: "[]STRUCT(CategoryExpenses)"
      REQUIRED: false
      comment: |-
        The primary credit categories of the expenses within the given time window, across all the accounts in the report.

        The categories are sorted in descending order by the total value spent.
        See the [category taxonomy](https://plaid.com/documents/credit-category-taxonomy.csv) for a full listing of category IDs.
  OutlierTransactionsInsights:
    - name: transactions_count
      NAME: transactions_count
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The total number of transactions whose value is above the threshold of normal amounts for a given account.
    - name: total_amount
      NAME: total_amount
      type: STRUCT(AmountWithCurrency)
      TYPE: STRUCT(AmountWithCurrency)
      REQUIRED: false
    - name: top_categories
      NAME: top_categories
      type: "[]STRUCT(CategoryExpenses)"
      TYPE: "[]STRUCT(CategoryExpenses)"
      REQUIRED: false
      comment: Up to 3 top categories of expenses in this group.
  IncomeInsights:
    - name: total_income
      NAME: total_income
