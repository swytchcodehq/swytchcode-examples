  AssetReportItem:
    - name: item_id
      NAME: item_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: institution_name
      NAME: institution_name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The full financial institution name associated with the Item.
    - name: institution_id
      NAME: institution_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The id of the financial institution associated with the Item.
    - name: date_last_updated
      NAME: date_last_updated
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The date and time when this Item’s data was last retrieved from the financial institution, in [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format.
    - name: accounts
      NAME: accounts
      type: "[]STRUCT(AccountAssets)"
      TYPE: "[]STRUCT(AccountAssets)"
      REQUIRED: true
      comment: Data about each of the accounts open on the Item.
  AccountAssets:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Plaid’s unique identifier for the account. This value will not change unless Plaid can't reconcile the account with the data returned by the financial institution. This may occur, for example, when the name of the account changes. If this happens a new `account_id` will be assigned to the account.

        The `account_id` can also change if the `access_token` is deleted and the same credentials that were used to generate that `access_token` are used to generate a new `access_token` on a later date. In that case, the new `account_id` will be different from the old `account_id`.

        If an account with a specific `account_id` disappears instead of changing, the account is likely closed. Closed accounts are not returned by the Plaid API.

        Like all Plaid identifiers, the `account_id` is case sensitive.
    - name: balances
      NAME: balances
      type: STRUCT(AssetReportAccountBalance)
      TYPE: STRUCT(AssetReportAccountBalance)
      REQUIRED: true
    - name: mask
      NAME: mask
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The last 2-4 alphanumeric characters of an account's official account number. Note that the mask may be non-unique between an Item's accounts, and it may also not match the mask that the bank displays to the user.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the account, either assigned by the user or by the financial institution itself
    - name: official_name
      NAME: official_name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The official name of the account as given by the financial institution
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: subtype
      NAME: subtype
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: verification_status
      NAME: verification_status
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: "The current verification status of an Auth Item initiated through Automated or Manual micro-deposits.  Returned for Auth Items only.\n\n`pending_automatic_verification`: The Item is pending automatic verification\n\n`pending_manual_verification`: The Item is pending manual micro-deposit verification. Items remain in this state until the user successfully verifies the micro-deposit.\n\n`automatically_verified`: The Item has successfully been automatically verified\t\n\n`manually_verified`: The Item has successfully been manually verified\n\n`verification_expired`: Plaid was unable to automatically verify the deposit within 7 calendar days and will no longer attempt to validate the Item. Users may retry by submitting their information again through Link.\n\n`verification_failed`: The Item failed manual micro-deposit verification because the user exhausted all 3 verification attempts. Users may retry by submitting their information again through Link.\n\n`database_matched`: The Item has successfully been verified using Plaid's data sources. Note: Database Match is currently a beta feature, please contact your account manager for more information.\t\n\t"
    - name: persistent_account_id
      NAME: persistent_account_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A unique and persistent identifier for accounts that can be used to trace multiple instances of the same account across different Items for depository accounts. This is currently an opt-in field and only supported for Chase Items.
    - name: days_available
      NAME: days_available
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The duration of transaction history available within this report for this Item, typically defined as the time since the date of the earliest transaction in that account.
    - name: transactions
      NAME: transactions
      type: "[]STRUCT(AssetReportTransaction)"
      TYPE: "[]STRUCT(AssetReportTransaction)"
      REQUIRED: true
      comment: Transaction history associated with the account.
    - name: investments
      NAME: investments
      type: STRUCT(AssetReportInvestments)
      TYPE: STRUCT(AssetReportInvestments)
      REQUIRED: false
    - name: owners
      NAME: owners
      type: "[]STRUCT(Owner)"
      TYPE: "[]STRUCT(Owner)"
      REQUIRED: true
      comment: Data returned by the financial institution about the account owner or owners.For business accounts, the name reported may be either the name of the individual or the name of the business, depending on the institution. Multiple owners on a single account will be represented in the same `owner` object, not in multiple owner objects within the array. In API versions 2018-05-22 and earlier, the `owners` object is not returned, and instead identity information is returned in the top level `identity` object. For more details, see [Plaid API versioning](https://plaid.com/docs/api/versioning/#version-2019-05-29)
    - name: ownership_type
      NAME: ownership_type
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: historical_balances
      NAME: historical_balances
      type: "[]STRUCT(HistoricalBalance)"
      TYPE: "[]STRUCT(HistoricalBalance)"
      REQUIRED: true
      comment: |-
        Calculated data about the historical balances on the account.

        Available for `credit` and `depository` type accounts.
    - name: account_insights
      NAME: account_insights
      type: STRUCT(AccountInsights)
      TYPE: STRUCT(AccountInsights)
      REQUIRED: false
  AssetReportAccountBalance:
    - name: available
      NAME: available
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The amount of funds available to be withdrawn from the account, as determined by the financial institution.

        For `credit`-type accounts, the `available` balance typically equals the `limit` less the `current` balance, less any pending outflows plus any pending inflows.

        For `depository`-type accounts, the `available` balance typically equals the `current` balance less any pending outflows plus any pending inflows. For `depository`-type accounts, the `available` balance does not include the overdraft limit.

        For `investment`-type accounts (or `brokerage`-type accounts for API versions 2018-05-22 and earlier), the `available` balance is the total cash available to withdraw as presented by the institution.

        Note that not all institutions calculate the `available`  balance. In the event that `available` balance is unavailable, Plaid will return an `available` balance value of `null`.

        Available balance may be cached and is not guaranteed to be up-to-date in realtime unless the value was returned by `/accounts/balance/get`.

        If `current` is `null` this field is guaranteed not to be `null`.
    - name: current
      NAME: current
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The total amount of funds in or owed by the account.

        For `credit`-type accounts, a positive balance indicates the amount owed; a negative amount indicates the lender owing the account holder.

        For `loan`-type accounts, the current balance is the principal remaining on the loan, except in the case of student loan accounts at Sallie Mae (`ins_116944`). For Sallie Mae student loans, the account's balance includes both principal and any outstanding interest.

        For `investment`-type accounts (or `brokerage`-type accounts for API versions 2018-05-22 and earlier), the current balance is the total value of assets as presented by the institution.

        Note that balance information may be cached unless the value was returned by `/accounts/balance/get`; if the Item is enabled for Transactions, the balance will be at least as recent as the most recent Transaction update. If you require realtime balance information, use the `available` balance as provided by `/accounts/balance/get`.

        When returned by `/accounts/balance/get`, this field may be `null`. When this happens, `available` is guaranteed not to be `null`.
    - name: limit
      NAME: limit
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        For `credit`-type accounts, this represents the credit limit.

        For `depository`-type accounts, this represents the pre-arranged overdraft limit, which is common for current (checking) accounts in Europe.

        In North America, this field is typically only available for `credit`-type accounts.
    - name: margin_loan_amount
      NAME: margin_loan_amount
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The total amount of borrowed funds in the account, as determined by the financial institution.
        For investment-type accounts, the margin balance is the total value of borrowed assets in the account, as presented by the institution.
        This is commonly referred to as margin or a loan.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the balance. Always null if `unofficial_currency_code` is non-null.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The unofficial currency code associated with the balance. Always null if `iso_currency_code` is non-null. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `unofficial_currency_code`s.
    - name: last_updated_datetime
      NAME: last_updated_datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: |-
        Timestamp in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format (`YYYY-MM-DDTHH:mm:ssZ`) indicating the oldest acceptable balance when making a request to `/accounts/balance/get`.

        This field is only used and expected when the institution is `ins_128026` (Capital One) and the Item contains one or more accounts with a non-depository account type, in which case a value must be provided or an `INVALID_REQUEST` error with the code of `INVALID_FIELD` will be returned. For Capital One depository accounts as well as all other account types on all other institutions, this field is ignored. See [account type schema](https://plaid.com/docs/api/accounts/#account-type-schema) for a full list of account types.

        If the balance that is pulled is older than the given timestamp for Items with this field required, an `INVALID_REQUEST` error with the code of `LAST_UPDATED_DATETIME_OUT_OF_RANGE` will be returned with the most recent timestamp for the requested account contained in the response.
  AssetReportTransaction:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the account in which this transaction occurred.
    - name: amount
      NAME: amount
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The settled value of the transaction, denominated in the transaction's currency, as stated in `iso_currency_code` or `unofficial_currency_code`. Positive values when money moves out of the account; negative values when money moves in. For example, debit card purchases are positive; credit card payments, direct deposits, and refunds are negative.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
