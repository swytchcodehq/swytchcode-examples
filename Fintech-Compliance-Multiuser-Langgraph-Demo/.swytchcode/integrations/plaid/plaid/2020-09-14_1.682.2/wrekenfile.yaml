    CANONICAL_ID: processor.token.webhook.update
  processor.stripe.bankAccountToken.create:
    SUMMARY: Create Stripe bank account token
    DESC: |-

      Used to create a token suitable for sending to Stripe to enable Plaid-Stripe integrations. For a detailed guide on integrating Stripe, see [Add Stripe to your app](https://plaid.com/docs/auth/partnerships/stripe/).

      Note that the Stripe bank account token is a one-time use token. To store bank account information for later use, you can use a Stripe customer object and create an associated bank account from the token, or you can use a Stripe Custom account and create an associated external bank account from the token. This bank account information should work indefinitely, unless the user's bank account information changes or they revoke Plaid's permissions to access their account. Stripe bank account information cannot be modified once the bank account token has been created. If you ever need to change the bank account details used by Stripe for a specific customer, have the user go through Link again and create a new bank account token from the new `access_token`.

      To revoke a bank account token, the entire underlying access token must be revoked using `/item/remove`.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/stripe/bank_account_token/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorStripeBankAccountTokenCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorStripeBankAccountTokenCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorStripeBankAccountTokenCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorStripeBankAccountTokenCreateResponse)
        RETURNVAR: processor_stripe_bankAccountToken_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_stripe_bankAccountToken_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.stripe.bankAccountToken.create
  processor.apex.processorToken.create:
    SUMMARY: Create Apex bank account token
    DESC: Used to create a token suitable for sending to Apex to enable Plaid-Apex integrations.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/apex/processor_token/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
