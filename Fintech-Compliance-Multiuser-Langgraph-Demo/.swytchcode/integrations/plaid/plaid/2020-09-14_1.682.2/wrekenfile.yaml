      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreditAuditCopyTokenCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(CreditAuditCopyTokenCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreditAuditCopyTokenCreateResponse)
        RETURNVAR: credit_audit_copy_token_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: credit_audit_copy_token_create_NaN
