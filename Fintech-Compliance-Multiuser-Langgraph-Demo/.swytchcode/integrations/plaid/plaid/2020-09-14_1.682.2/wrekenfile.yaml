      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BankTransferBalanceGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(BankTransferBalanceGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BankTransferBalanceGetResponse)
        RETURNVAR: bank_transfer_balance_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: bank_transfer_balance_get_NaN
        STATUS: .nan
    ERRORS:
