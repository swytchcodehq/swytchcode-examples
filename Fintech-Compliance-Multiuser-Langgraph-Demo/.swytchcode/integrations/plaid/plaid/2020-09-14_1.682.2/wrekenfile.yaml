      NAME: days_available
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The duration of transaction history available within this report for this Item, typically defined as the time since the date of the earliest transaction in that account.
    - name: transactions
      NAME: transactions
      type: "[]STRUCT(BaseReportTransaction)"
      TYPE: "[]STRUCT(BaseReportTransaction)"
      REQUIRED: true
      comment: Transaction history associated with the account. Transaction history returned by endpoints such as `/transactions/get` or `/investments/transactions/get` will be returned in the top-level `transactions` field instead. Some transactions may have their details masked in accordance to the FCRA. These will appear with a `credit_category` of `MASKED_TRANSACTION_CATEGORY`.
    - name: owners
      NAME: owners
      type: "[]STRUCT(Owner)"
      TYPE: "[]STRUCT(Owner)"
      REQUIRED: true
      comment: Data returned by the financial institution about the account owner or owners. For business accounts, the name reported may be either the name of the individual or the name of the business, depending on the institution. Multiple owners on a single account will be represented in the same `owner` object, not in multiple owner objects within the array. This array can also be empty if no owners are found.
    - name: ownership_type
      NAME: ownership_type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: historical_balances
      NAME: historical_balances
      type: "[]STRUCT(BaseReportHistoricalBalance)"
      TYPE: "[]STRUCT(BaseReportHistoricalBalance)"
      REQUIRED: false
      comment: Calculated data about the historical balances on the account. Currently not supported by `brokerage` or `investment` accounts.
    - name: account_insights
      NAME: account_insights
      type: STRUCT(BaseReportAccountInsights)
      TYPE: STRUCT(BaseReportAccountInsights)
      REQUIRED: false
    - name: attributes
      NAME: attributes
      type: STRUCT(BaseReportAttributes)
      TYPE: STRUCT(BaseReportAttributes)
      REQUIRED: false
  BaseReportAccountBalances:
    - name: available
      NAME: available
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The amount of funds available to be withdrawn from the account, as determined by the financial institution.

        For `credit`-type accounts, the `available` balance typically equals the `limit` less the `current` balance, less any pending outflows plus any pending inflows.

        For `depository`-type accounts, the `available` balance typically equals the `current` balance less any pending outflows plus any pending inflows. For `depository`-type accounts, the `available` balance does not include the overdraft limit.

        For `investment`-type accounts (or `brokerage`-type accounts for API versions 2018-05-22 and earlier), the `available` balance is the total cash available to withdraw as presented by the institution.

        Note that not all institutions calculate the `available`  balance. In the event that `available` balance is unavailable, Plaid will return an `available` balance value of `null`.

        Available balance may be cached and is not guaranteed to be up-to-date in realtime unless the value was returned by `/accounts/balance/get`.

        If `current` is `null` this field is guaranteed not to be `null`.
    - name: current
      NAME: current
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        The total amount of funds in or owed by the account.

        For `credit`-type accounts, a positive balance indicates the amount owed; a negative amount indicates the lender owing the account holder.

        For `loan`-type accounts, the current balance is the principal remaining on the loan, except in the case of student loan accounts at Sallie Mae (`ins_116944`). For Sallie Mae student loans, the account's balance includes both principal and any outstanding interest.

        For `investment`-type accounts (or `brokerage`-type accounts for API versions 2018-05-22 and earlier), the current balance is the total value of assets as presented by the institution.

        Note that balance information may be cached unless the value was returned by `/accounts/balance/get`; if the Item is enabled for Transactions, the balance will be at least as recent as the most recent Transaction update. If you require realtime balance information, use the `available` balance as provided by `/accounts/balance/get`.

        When returned by `/accounts/balance/get`, this field may be `null`. When this happens, `available` is guaranteed not to be `null`.
    - name: limit
      NAME: limit
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: |-
        For `credit`-type accounts, this represents the credit limit.

        For `depository`-type accounts, this represents the pre-arranged overdraft limit, which is common for current (checking) accounts in Europe.

        In North America, this field is typically only available for `credit`-type accounts.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the balance. Always null if `unofficial_currency_code` is non-null.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The unofficial currency code associated with the balance. Always null if `iso_currency_code` is non-null. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `unofficial_currency_code`s.
    - name: last_updated_datetime
      NAME: last_updated_datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: |-
        Timestamp in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format (`YYYY-MM-DDTHH:mm:ssZ`) indicating the oldest acceptable balance when making a request to `/accounts/balance/get`.

        This field is only used and expected when the institution is `ins_128026` (Capital One) and the Item contains one or more accounts with a non-depository account type, in which case a value must be provided or an `INVALID_REQUEST` error with the code of `INVALID_FIELD` will be returned. For Capital One depository accounts as well as all other account types on all other institutions, this field is ignored. See [account type schema](https://plaid.com/docs/api/accounts/#account-type-schema) for a full list of account types.

        If the balance that is pulled is older than the given timestamp for Items with this field required, an `INVALID_REQUEST` error with the code of `LAST_UPDATED_DATETIME_OUT_OF_RANGE` will be returned with the most recent timestamp for the requested account contained in the response.
    - name: average_balance
      NAME: average_balance
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The average historical balance for the entire report
    - name: average_monthly_balances
      NAME: average_monthly_balances
      type: "[]STRUCT(BaseReportAverageMonthlyBalances)"
      TYPE: "[]STRUCT(BaseReportAverageMonthlyBalances)"
      REQUIRED: false
      comment: The average historical balance of each calendar month
    - name: most_recent_thirty_day_average_balance
      NAME: most_recent_thirty_day_average_balance
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The average historical balance from the most recent 30 days
