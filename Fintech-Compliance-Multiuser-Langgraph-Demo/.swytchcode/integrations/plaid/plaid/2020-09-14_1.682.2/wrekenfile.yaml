  processor.auth.get:
    SUMMARY: Retrieve Auth data
    DESC: |
      The `/processor/auth/get` endpoint returns the bank account and bank identification number (such as the routing number, for US accounts), for a checking, savings, or cash management account that''s associated with a given `processor_token`. The endpoint also returns high-level account data and balances when available.

      Versioning note: API versions 2019-05-29 and earlier use a different schema for the `numbers` object returned by this endpoint. For details, see [Plaid API versioning](https://plaid.com/docs/api/versioning/#version-2020-09-14).
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/auth/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorAuthGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorAuthGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorAuthGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorAuthGetResponse)
        RETURNVAR: processor_auth_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_auth_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.auth.get
  processor.account.get:
    SUMMARY: Retrieve the account associated with a processor token
    DESC: |
      This endpoint returns the account associated with a given processor token.

      This endpoint retrieves cached information, rather than extracting fresh information from the institution. As a result, the account balance returned may not be up-to-date; for realtime balance information, use `/processor/balance/get` instead. Note that some information is nullable.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/account/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorAccountGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorAccountGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorAccountGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorAccountGetResponse)
        RETURNVAR: processor_account_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_account_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.account.get
  processor.investment.holdings.get:
    SUMMARY: Retrieve Investment Holdings
    DESC: |
      This endpoint returns the stock position data of the account associated with a given processor token.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/investments/holdings/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorInvestmentsHoldingsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorInvestmentsHoldingsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorInvestmentsHoldingsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorInvestmentsHoldingsGetResponse)
        RETURNVAR: processor_investment_holdings_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_investment_holdings_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.investment.holdings.get
  processor.investment.transactions.get:
    SUMMARY: Get investment transactions data
    DESC: |-
      The `/processor/investments/transactions/get` endpoint allows developers to retrieve up to 24 months of user-authorized transaction data for the investment account associated with the processor token.

      Transactions are returned in reverse-chronological order, and the sequence of transaction ordering is stable and will not shift.

      Due to the potentially large number of investment transactions associated with the account, results are paginated. Manipulate the count and offset parameters in conjunction with the `total_investment_transactions` response body field to fetch all available investment transactions.

      Note that Investments does not have a webhook to indicate when initial transaction data has loaded (unless you use the `async_update` option). Instead, if transactions data is not ready when `/processor/investments/transactions/get` is first called, Plaid will wait for the data. For this reason, calling `/processor/investments/transactions/get` immediately after Link may take up to one to two minutes to return.

      Data returned by the asynchronous investments extraction flow (when `async_update` is set to true) may not be immediately available to `/processor/investments/transactions/get`. To be alerted when the data is ready to be fetched, listen for the `HISTORICAL_UPDATE` webhook. If no investments history is ready when `/processor/investments/transactions/get` is called, it will return a `PRODUCT_NOT_READY` error.

      To receive Investments Transactions webhooks for a processor token, set its webhook URL via the [`/processor/token/webhook/update`](https://plaid.com/docs/api/processor-partners/#processortokenwebhookupdate) endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/investments/transactions/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorInvestmentsTransactionsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorInvestmentsTransactionsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorInvestmentsTransactionsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorInvestmentsTransactionsGetResponse)
        RETURNVAR: processor_investment_transactions_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_investment_transactions_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.investment.transactions.get
  processor.transaction.get:
    SUMMARY: Get transaction data
    DESC: |-
      The `/processor/transactions/get` endpoint allows developers to receive user-authorized transaction data for credit, depository, and some loan-type accounts (only those with account subtype `student`; coverage may be limited). Transaction data is standardized across financial institutions, and in many cases transactions are linked to a clean name, entity type, location, and category. Similarly, account data is standardized and returned with a clean name, number, balance, and other meta information where available.

      Transactions are returned in reverse-chronological order, and the sequence of transaction ordering is stable and will not shift.  Transactions are not immutable and can also be removed altogether by the institution; a removed transaction will no longer appear in `/processor/transactions/get`.  For more details, see [Pending and posted transactions](https://plaid.com/docs/transactions/transactions-data/#pending-and-posted-transactions).

      Due to the potentially large number of transactions associated with a processor token, results are paginated. Manipulate the `count` and `offset` parameters in conjunction with the `total_transactions` response body field to fetch all available transactions.

      Data returned by `/processor/transactions/get` will be the data available for the processor token as of the most recent successful check for new transactions. Plaid typically checks for new data multiple times a day, but these checks may occur less frequently, such as once a day, depending on the institution. To force Plaid to check for new transactions, you can use the `/processor/transactions/refresh` endpoint.

      Note that data may not be immediately available to `/processor/transactions/get`. Plaid will begin to prepare transactions data upon Item link, if Link was initialized with `transactions`, or upon the first call to `/processor/transactions/get`, if it wasn't. If no transaction history is ready when `/processor/transactions/get` is called, it will return a `PRODUCT_NOT_READY` error.

      To receive Transactions webhooks for a processor token, set its webhook URL via the [`/processor/token/webhook/update`](https://plaid.com/docs/api/processor-partners/#processortokenwebhookupdate) endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/transactions/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorTransactionsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorTransactionsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorTransactionsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTransactionsGetResponse)
        RETURNVAR: processor_transaction_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_transaction_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.transaction.get
  processor.transaction.sync.create:
    SUMMARY: Get incremental transaction updates on a processor token
    DESC: |-

      The `/processor/transactions/sync` endpoint retrieves transactions associated with an Item and can fetch updates using a cursor to track which updates have already been seen.

      For important instructions on integrating with `/processor/transactions/sync`, see the [Transactions integration overview](https://plaid.com/docs/transactions/#integration-overview). If you are migrating from an existing integration using `/processor/transactions/get`, see the [Transactions Sync migration guide](https://plaid.com/docs/transactions/sync-migration/).

      This endpoint supports `credit`, `depository`, and some `loan`-type accounts (only those with account subtype `student`). For `investments` accounts, use `/investments/transactions/get` instead.

      When retrieving paginated updates, track both the `next_cursor` from the latest response and the original cursor from the first call in which `has_more` was `true`; if a call to `/processor/transactions/sync` fails when retrieving a paginated update (e.g due to the [`TRANSACTIONS_SYNC_MUTATION_DURING_PAGINATION`](https://plaid.com/docs/errors/transactions/#transactions_sync_mutation_during_pagination) error), the entire pagination request loop must be restarted beginning with the cursor for the first page of the update, rather than retrying only the single request that failed.

      If transactions data is not yet available for the Item, which can happen if the Item was not initialized with transactions during the `/link/token/create` call or if `/processor/transactions/sync` was called within a few seconds of Item creation, `/processor/transactions/sync` will return empty transactions arrays.

      Plaid typically checks for new transactions data between one and four times per day, depending on the institution. To find out when transactions were last updated for an Item, use the [Item Debugger](https://plaid.com/docs/account/activity/#troubleshooting-with-item-debugger) or call `/item/get`; the `item.status.transactions.last_successful_update` field will show the timestamp of the most recent successful update. To force Plaid to check for new transactions, use the `/processor/transactions/refresh` endpoint.

      To be alerted when new transactions are available, listen for the [`SYNC_UPDATES_AVAILABLE`](https://plaid.com/docs/api/products/transactions/#sync_updates_available) webhook.

      To receive Transactions webhooks for a processor token, set its webhook URL via the [`/processor/token/webhook/update`](https://plaid.com/docs/api/processor-partners/#processortokenwebhookupdate) endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/transactions/sync
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorTransactionsSyncRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorTransactionsSyncResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorTransactionsSyncRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTransactionsSyncResponse)
        RETURNVAR: processor_transaction_sync_create
        STATUS: 200
        PAGINATION:
          TYPE: cursor
          CURSOR_FIELD: next_cursor
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_transaction_sync_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.transaction.sync.create
  processor.transaction.refresh:
    SUMMARY: Refresh transaction data
    DESC: |-
      `/processor/transactions/refresh` is an optional endpoint for users of the Transactions product. It initiates an on-demand extraction to fetch the newest transactions for a processor token. This on-demand extraction takes place in addition to the periodic extractions that automatically occur one or more times per day for any Transactions-enabled processor token. If changes to transactions are discovered after calling `/processor/transactions/refresh`, Plaid will fire a webhook: for `/transactions/sync` users, [`SYNC_UPDATES_AVAILABLE`](https://plaid.com/docs/api/products/transactions/#sync_updates_available) will be fired if there are any transactions updated, added, or removed. For users of both `/processor/transactions/sync` and `/processor/transactions/get`, [`TRANSACTIONS_REMOVED`](https://plaid.com/docs/api/products/transactions/#transactions_removed) will be fired if any removed transactions are detected, and [`DEFAULT_UPDATE`](https://plaid.com/docs/api/products/transactions/#default_update) will be fired if any new transactions are detected. New transactions can be fetched by calling `/processor/transactions/get` or `/processor/transactions/sync`. Note that the `/transactions/refresh` endpoint is not supported for Capital One (`ins_128026`) non-depository accounts and will result in a `PRODUCTS_NOT_SUPPORTED` error if called on an Item that contains only non-depository accounts from that institution.

      As this endpoint triggers a synchronous request for fresh data, latency may be higher than for other Plaid endpoints (typically less than 10 seconds, but occasionally up to 30 seconds or more); if you encounter errors, you may find it necessary to adjust your timeout period when making requests.

      `/processor/transactions/refresh` is offered as an add-on to Transactions and has a separate [fee model](https://plaid.com/docs/account/billing/#per-request-flat-fee). To request access to this endpoint, submit a [product access request](https://dashboard.plaid.com/team/products) or contact your Plaid account manager.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/transactions/refresh
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorTransactionsRefreshRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorTransactionsRefreshResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorTransactionsRefreshRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTransactionsRefreshResponse)
        RETURNVAR: processor_transaction_refresh
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_transaction_refresh_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.transaction.refresh
  processor.transaction.recurring.get:
    SUMMARY: Fetch recurring transaction streams
    DESC: |-
      The `/processor/transactions/recurring/get` endpoint allows developers to receive a summary of the recurring outflow and inflow streams (expenses and deposits) from a user’s checking, savings or credit card accounts. Additionally, Plaid provides key insights about each recurring stream including the category, merchant, last amount, and more. Developers can use these insights to build tools and experiences that help their users better manage cash flow, monitor subscriptions, reduce spend, and stay on track with bill payments.

      This endpoint is offered as an add-on to Transactions. To request access to this endpoint, submit a [product access request](https://dashboard.plaid.com/team/products) or contact your Plaid account manager.

      This endpoint can only be called on a processor token that has already been initialized with Transactions (either during Link, by specifying it in `/link/token/create`; or after Link, by calling `/processor/transactions/get` or `/processor/transactions/sync`). Once all historical transactions have been fetched, call `/processor/transactions/recurring/get` to receive the Recurring Transactions streams and subscribe to the [`RECURRING_TRANSACTIONS_UPDATE`](https://plaid.com/docs/api/products/transactions/#recurring_transactions_update) webhook. To know when historical transactions have been fetched, if you are using `/processor/transactions/sync` listen for the [`SYNC_UPDATES_AVAILABLE`](https://plaid.com/docs/api/products/transactions/#SyncUpdatesAvailableWebhook-historical-update-complete) webhook and check that the `historical_update_complete` field in the payload is `true`. If using `/processor/transactions/get`, listen for the [`HISTORICAL_UPDATE`](https://plaid.com/docs/api/products/transactions/#historical_update) webhook.

      After the initial call, you can call `/processor/transactions/recurring/get` endpoint at any point in the future to retrieve the latest summary of recurring streams. Listen to the [`RECURRING_TRANSACTIONS_UPDATE`](https://plaid.com/docs/api/products/transactions/#recurring_transactions_update) webhook to be notified when new updates are available.

      To receive Transactions webhooks for a processor token, set its webhook URL via the [`/processor/token/webhook/update`](https://plaid.com/docs/api/processor-partners/#processortokenwebhookupdate) endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/transactions/recurring/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorTransactionsRecurringGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorTransactionsRecurringGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorTransactionsRecurringGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTransactionsRecurringGetResponse)
        RETURNVAR: processor_transaction_recurring_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_transaction_recurring_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.transaction.recurring.get
  processor.signal.evaluate.create:
    SUMMARY: Evaluate a planned ACH transaction
    DESC: |-
      Use `/signal/evaluate` to evaluate a planned ACH transaction to get a return risk assessment and additional risk signals.

      `/signal/evaluate` is used with Rulesets that are configured on the end customer Dashboard can can be used with either the Signal Transaction Scores product or the Balance product. Which product is used will be determined by the `ruleset_key` that you provide. For more details, see [Signal Rules](https://plaid.com/docs/signal/signal-rules/).

      Note: This request may have higher latency if Signal Transaction Scores is being added to an existing Item for the first time, or when using a Balance-only ruleset. This is because Plaid must communicate directly with the institution to request data.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/signal/evaluate
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorSignalEvaluateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorSignalEvaluateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorSignalEvaluateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorSignalEvaluateResponse)
        RETURNVAR: processor_signal_evaluate_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_signal_evaluate_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: processor.signal.evaluate.create
  processor.signal.report.create:
    SUMMARY: Report whether you initiated an ACH transaction
    DESC: |-
      After you call `/processor/signal/evaluate`, Plaid will normally infer the outcome from your Signal Rules. However, if you are not using Signal Rules, if the Signal Rules outcome was `REVIEW`, or if you take a different action than the one determined by the Signal Rules, you will need to call `/processor/signal/decision/report`. This helps improve Signal Transaction Score accuracy for your account and is necessary for proper functioning of the rule performance and rule tuning capabilities in the Dashboard. If your effective decision changes after calling `/processor/signal/decision/report` (for example, you indicated that you accepted a transaction, but later on, your payment processor rejected it, so it was never initiated), call `/processor/signal/decision/report` again for the transaction to correct Plaid's records.

      If you are using Plaid Transfer as your payment processor, you also do not need to call `/processor/signal/decision/report`, as Plaid can infer outcomes from your Transfer activity.

      If using a Balance-only ruleset, this endpoint will not impact scores (Balance does not use scores), but is necessary to view accurate transaction outcomes and tune rule logic in the Dashboard.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/signal/decision/report
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorSignalDecisionReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorSignalDecisionReportResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorSignalDecisionReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorSignalDecisionReportResponse)
        RETURNVAR: processor_signal_report_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_signal_report_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: processor.signal.report.create
  processor.signal.report.create_d506:
    SUMMARY: Report a return for an ACH transaction
    DESC: |-
      Call the `/processor/signal/return/report` endpoint to report a returned transaction that was previously sent to the `/processor/signal/evaluate` endpoint. Your feedback will be used by the model to incorporate the latest risk trend in your portfolio.

      If you are using the [Plaid Transfer product](https://plaid.com/docs/transfer) to create transfers, it is not necessary to use this endpoint, as Plaid already knows whether the transfer was returned.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/signal/return/report
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorSignalReturnReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorSignalReturnReportResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorSignalReturnReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorSignalReturnReportResponse)
        RETURNVAR: processor_signal_report_create_d506
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_signal_report_create_d506_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: processor.signal.report.create_d506
  processor.signal.prepare.create:
    SUMMARY: Opt-in a processor token to Signal
    DESC: |-
      When a processor token is not initialized with `signal`, call `/processor/signal/prepare` to opt-in that processor token to the data collection process, which will improve the accuracy of the Signal Transaction Score.

      If this endpoint is called with a processor token that is already initialized with `signal`, it will return a 200 response and will not modify the processor token.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/signal/prepare
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorSignalPrepareRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorSignalPrepareResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorSignalPrepareRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorSignalPrepareResponse)
        RETURNVAR: processor_signal_prepare_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_signal_prepare_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: processor.signal.prepare.create
  processor.bank_transfer.create:
    SUMMARY: Create a bank transfer as a processor
    DESC: Use the `/processor/bank_transfer/create` endpoint to initiate a new bank transfer as a processor
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/bank_transfer/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorBankTransferCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorBankTransferCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorBankTransferCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorBankTransferCreateResponse)
        RETURNVAR: processor_bank_transfer_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_bank_transfer_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.bank_transfer.create
  processor.liability.get:
    SUMMARY: Retrieve Liabilities data
    DESC: |-
      The `/processor/liabilities/get` endpoint returns various details about a loan or credit account. Liabilities data is available primarily for US financial institutions, with some limited coverage of Canadian institutions. Currently supported account types are account type `credit` with account subtype `credit card` or `paypal`, and account type `loan` with account subtype `student` or `mortgage`.

      The types of information returned by Liabilities can include balances and due dates, loan terms, and account details such as original loan amount and guarantor. Data is refreshed approximately once per day; the latest data can be retrieved by calling `/processor/liabilities/get`.

      Note: This request may take some time to complete if `liabilities` was not specified as an initial product when creating the processor token. This is because Plaid must communicate directly with the institution to retrieve the additional data.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/liabilities/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorLiabilitiesGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorLiabilitiesGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorLiabilitiesGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorLiabilitiesGetResponse)
        RETURNVAR: processor_liability_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_liability_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.liability.get
  processor.identity.get:
    SUMMARY: Retrieve Identity data
    DESC: The `/processor/identity/get` endpoint allows you to retrieve various account holder information on file with the financial institution, including names, emails, phone numbers, and addresses.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/identity/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorIdentityGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorIdentityGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorIdentityGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorIdentityGetResponse)
        RETURNVAR: processor_identity_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_identity_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.identity.get
  processor.identity.match.create:
    SUMMARY: Retrieve identity match score
    DESC: |-
      The `/processor/identity/match` endpoint generates a match score, which indicates how well the provided identity data matches the identity information on file with the account holder's financial institution.

      Fields within the `balances` object will always be null when retrieved by `/identity/match`. Instead, use the free `/accounts/get` endpoint to request balance cached data, or `/accounts/balance/get` for real-time data.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/identity/match
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorIdentityMatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorIdentityMatchResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorIdentityMatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorIdentityMatchResponse)
        RETURNVAR: processor_identity_match_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_identity_match_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.identity.match.create
  processor.balance.get:
    SUMMARY: Retrieve Balance data
    DESC: "The `/processor/balance/get` endpoint returns the real-time balance for each of an Item's accounts. While other endpoints may return a balance object, only `/processor/balance/get` forces the available and current balance fields to be refreshed rather than cached. "
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/balance/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorBalanceGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorBalanceGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorBalanceGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorBalanceGetResponse)
        RETURNVAR: processor_balance_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_balance_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.balance.get
  item.webhook.update:
    SUMMARY: Update Webhook URL
    DESC: The POST `/item/webhook/update` allows you to update the webhook URL associated with an Item. This request triggers a [`WEBHOOK_UPDATE_ACKNOWLEDGED`](https://plaid.com/docs/api/items/#webhook_update_acknowledged) webhook to the newly specified webhook URL.
    HTTP:
      METHOD: POST
      ENDPOINT: /item/webhook/update
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ItemWebhookUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ItemWebhookUpdateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ItemWebhookUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ItemWebhookUpdateResponse)
        RETURNVAR: item_webhook_update
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: item_webhook_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: item.webhook.update
  item.access_token.invalidate.create:
    SUMMARY: Invalidate access_token
    DESC: |
      By default, the `access_token` associated with an Item does not expire and should be stored in a persistent, secure manner.

      You can use the `/item/access_token/invalidate` endpoint to rotate the `access_token` associated with an Item. The endpoint returns a new `access_token` and immediately invalidates the previous `access_token`.
    HTTP:
      METHOD: POST
      ENDPOINT: /item/access_token/invalidate
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ItemAccessTokenInvalidateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ItemAccessTokenInvalidateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ItemAccessTokenInvalidateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ItemAccessTokenInvalidateResponse)
        RETURNVAR: item_access_token_invalidate_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: item_access_token_invalidate_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: item.access_token.invalidate.create
  webhook_verification_key.get.create:
    SUMMARY: Get webhook verification key
    DESC: |-
      Plaid signs all outgoing webhooks and provides JSON Web Tokens (JWTs) so that you can verify the authenticity of any incoming webhooks to your application. A message signature is included in the `Plaid-Verification` header.

      The `/webhook_verification_key/get` endpoint provides a JSON Web Key (JWK) that can be used to verify a JWT.
    HTTP:
      METHOD: POST
      ENDPOINT: /webhook_verification_key/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(WebhookVerificationKeyGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(WebhookVerificationKeyGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(WebhookVerificationKeyGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(WebhookVerificationKeyGetResponse)
        RETURNVAR: webhook_verification_key_get_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: webhook_verification_key_get_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: webhook_verification_key.get.create
  liabilities.get.create:
    SUMMARY: Retrieve Liabilities data
    DESC: |-
      The `/liabilities/get` endpoint returns various details about an Item with loan or credit accounts. Liabilities data is available primarily for US financial institutions, with some limited coverage of Canadian institutions. Currently supported account types are account type `credit` with account subtype `credit card` or `paypal`, and account type `loan` with account subtype `student` or `mortgage`. To limit accounts listed in Link to types and subtypes supported by Liabilities, you can use the `account_filters` parameter when [creating a Link token](https://plaid.com/docs/api/link/#linktokencreate).

      The types of information returned by Liabilities can include balances and due dates, loan terms, and account details such as original loan amount and guarantor. Data is refreshed approximately once per day; the latest data can be retrieved by calling `/liabilities/get`.
    HTTP:
      METHOD: POST
      ENDPOINT: /liabilities/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(LiabilitiesGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(LiabilitiesGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(LiabilitiesGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(LiabilitiesGetResponse)
        RETURNVAR: liabilities_get_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: liabilities_get_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: liabilities.get.create
  payment_initiation.recipient.create:
    SUMMARY: Create payment recipient
    DESC: |
      Create a payment recipient for payment initiation.  The recipient must be in Europe, within a country that is a member of the Single Euro Payment Area (SEPA) or a non-Eurozone country [supported](https://plaid.com/global) by Plaid. For a standing order (recurring) payment, the recipient must be in the UK.

      It is recommended to use `bacs` in the UK and `iban` in EU.

      The endpoint is idempotent: if a developer has already made a request with the same payment details, Plaid will return the same `recipient_id`.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/recipient/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationRecipientCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationRecipientCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationRecipientCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationRecipientCreateResponse)
        RETURNVAR: payment_initiation_recipient_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_recipient_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.recipient.create
  payment_initiation.payment.reverse.create:
    SUMMARY: Reverse an existing payment
    DESC: |
      Reverse a settled payment from a Plaid virtual account.

      The original payment must be in a settled state to be refunded.
      To refund partially, specify the amount as part of the request.
      If the amount is not specified, the refund amount will be equal to all
      of the remaining payment amount that has not been refunded yet.

      The refund will go back to the source account that initiated the payment.
      The original payment must have been initiated to a Plaid virtual account
      so that this account can be used to initiate the refund.

      Providing counterparty information such as date of birth and address increases
      the likelihood of refund being successful without human intervention.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/payment/reverse
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationPaymentReverseRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationPaymentReverseResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationPaymentReverseRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationPaymentReverseResponse)
        RETURNVAR: payment_initiation_payment_reverse_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_payment_reverse_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.payment.reverse.create
  payment_initiation.recipient.get:
    SUMMARY: Get payment recipient
    DESC: Get details about a payment recipient you have previously created.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/recipient/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationRecipientGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationRecipientGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationRecipientGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationRecipientGetResponse)
        RETURNVAR: payment_initiation_recipient_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_recipient_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.recipient.get
  payment_initiation.recipient.list:
    SUMMARY: List payment recipients
    DESC: The `/payment_initiation/recipient/list` endpoint list the payment recipients that you have previously created.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/recipient/list
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationRecipientListRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationRecipientListResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationRecipientListRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationRecipientListResponse)
        RETURNVAR: payment_initiation_recipient_list
        STATUS: 200
        PAGINATION:
          TYPE: cursor
          CURSOR_FIELD: next_cursor
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_recipient_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.recipient.list
  payment_initiation.payment.create:
    SUMMARY: Create a payment
    DESC: |-
      After creating a payment recipient, you can use the `/payment_initiation/payment/create` endpoint to create a payment to that recipient.  Payments can be one-time or standing order (recurring) and can be denominated in either EUR, GBP or other chosen [currency](https://plaid.com/docs/api/products/payment-initiation/#payment_initiation-payment-create-request-amount-currency).  If making domestic GBP-denominated payments, your recipient must have been created with BACS numbers. In general, EUR-denominated payments will be sent via SEPA Credit Transfer, GBP-denominated payments will be sent via the Faster Payments network and for non-Eurozone markets typically via the local payment scheme, but the payment network used will be determined by the institution. Payments sent via Faster Payments will typically arrive immediately, while payments sent via SEPA Credit Transfer or other local payment schemes will typically arrive in one business day.

      Standing orders (recurring payments) must be denominated in GBP and can only be sent to recipients in the UK. Once created, standing order payments cannot be modified or canceled via the API. An end user can cancel or modify a standing order directly on their banking application or website, or by contacting the bank. Standing orders will follow the payment rules of the underlying rails (Faster Payments in UK). Payments can be sent Monday to Friday, excluding bank holidays. If the pre-arranged date falls on a weekend or bank holiday, the payment is made on the next working day. It is not possible to guarantee the exact time the payment will reach the recipient’s account, although at least 90% of standing order payments are sent by 6am.

      In Limited Production, payments must be below 5 GBP or other chosen [currency](https://plaid.com/docs/api/products/payment-initiation/#payment_initiation-payment-create-request-amount-currency), and standing orders, variable recurring payments, and Virtual Accounts are not supported.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/payment/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationPaymentCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationPaymentCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationPaymentCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationPaymentCreateResponse)
        RETURNVAR: payment_initiation_payment_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_payment_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.payment.create
  payment_initiation.payment.token.create:
    SUMMARY: Create payment token
    DESC: |-
      The `/payment_initiation/payment/token/create` endpoint has been deprecated. New Plaid customers will be unable to use this endpoint, and existing customers are encouraged to migrate to the newer, `link_token`-based flow. The recommended flow is to provide the `payment_id` to `/link/token/create`, which returns a `link_token` used to initialize Link.

      The `/payment_initiation/payment/token/create` is used to create a `payment_token`, which can then be used in Link initialization to enter a payment initiation flow. You can only use a `payment_token` once. If this attempt fails, the end user aborts the flow, or the token expires, you will need to create a new payment token. Creating a new payment token does not require end user input.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/payment/token/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationPaymentTokenCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationPaymentTokenCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationPaymentTokenCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationPaymentTokenCreateResponse)
        RETURNVAR: payment_initiation_payment_token_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_payment_token_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.payment.token.create
  payment_initiation.consent.create:
    SUMMARY: Create payment consent
    DESC: |-
      The `/payment_initiation/consent/create` endpoint is used to create a payment consent, which can be used to initiate payments on behalf of the user. Payment consents are created with `UNAUTHORISED` status by default and must be authorised by the user before payments can be initiated.

      Consents can be limited in time and scope, and have constraints that describe limitations for payments.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/consent/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationConsentCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationConsentCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationConsentCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationConsentCreateResponse)
        RETURNVAR: payment_initiation_consent_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_consent_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.consent.create
  payment_initiation.consent.get:
    SUMMARY: Get payment consent
    DESC: The `/payment_initiation/consent/get` endpoint can be used to check the status of a payment consent, as well as to receive basic information such as recipient and constraints.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/consent/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationConsentGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationConsentGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationConsentGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationConsentGetResponse)
        RETURNVAR: payment_initiation_consent_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_consent_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.consent.get
  payment_initiation.consent.revoke.create:
    SUMMARY: Revoke payment consent
    DESC: The `/payment_initiation/consent/revoke` endpoint can be used to revoke the payment consent. Once the consent is revoked, it is not possible to initiate payments using it.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/consent/revoke
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationConsentRevokeRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationConsentRevokeResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationConsentRevokeRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationConsentRevokeResponse)
        RETURNVAR: payment_initiation_consent_revoke_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_consent_revoke_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.consent.revoke.create
  payment_initiation.consent.payment.execute:
    SUMMARY: Execute a single payment using consent
    DESC: The `/payment_initiation/consent/payment/execute` endpoint can be used to execute payments using payment consent.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/consent/payment/execute
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationConsentPaymentExecuteRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationConsentPaymentExecuteResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationConsentPaymentExecuteRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationConsentPaymentExecuteResponse)
        RETURNVAR: payment_initiation_consent_payment_execute
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_consent_payment_execute_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.consent.payment.execute
  sandbox.item.resetLogin.create:
    SUMMARY: Force a Sandbox Item into an error state
    DESC: |-
      `/sandbox/item/reset_login/` forces an Item into an `ITEM_LOGIN_REQUIRED` state in order to simulate an Item whose login is no longer valid. This makes it easy to test Link's [update mode](https://plaid.com/docs/link/update-mode) flow in the Sandbox environment.  After calling `/sandbox/item/reset_login`, You can then use Plaid Link update mode to restore the Item to a good state. An `ITEM_LOGIN_REQUIRED` webhook will also be fired after a call to this endpoint, if one is associated with the Item.

      In the Sandbox, Items will transition to an `ITEM_LOGIN_REQUIRED` error state automatically after 30 days, even if this endpoint is not called.
    HTTP:
      METHOD: POST
      ENDPOINT: /sandbox/item/reset_login
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SandboxItemResetLoginRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SandboxItemResetLoginResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SandboxItemResetLoginRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SandboxItemResetLoginResponse)
        RETURNVAR: sandbox_item_resetLogin_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: sandbox_item_resetLogin_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: sandbox.item.resetLogin.create
  sandbox.item.setVerificationStatus.create:
    SUMMARY: Set verification status for Sandbox account
    DESC: |-
      The `/sandbox/item/set_verification_status` endpoint can be used to change the verification status of an Item in in the Sandbox in order to simulate the Automated Micro-deposit flow.

      For more information on testing Automated Micro-deposits in Sandbox, see [Auth full coverage testing](https://plaid.com/docs/auth/coverage/testing#).
    HTTP:
      METHOD: POST
      ENDPOINT: /sandbox/item/set_verification_status
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SandboxItemSetVerificationStatusRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SandboxItemSetVerificationStatusResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SandboxItemSetVerificationStatusRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SandboxItemSetVerificationStatusResponse)
        RETURNVAR: sandbox_item_setVerificationStatus_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: sandbox_item_setVerificationStatus_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: sandbox.item.setVerificationStatus.create
  sandbox.user.resetLogin.create:
    SUMMARY: Force item(s) for a Sandbox User into an error state
    DESC: |-
      `/sandbox/user/reset_login/` functions the same as `/sandbox/item/reset_login`, but will modify Items related to a User. This endpoint forces each Item into an `ITEM_LOGIN_REQUIRED` state in order to simulate an Item whose login is no longer valid. This makes it easy to test Link's [update mode](https://plaid.com/docs/link/update-mode) flow in the Sandbox environment.  After calling `/sandbox/user/reset_login`, You can then use Plaid Link update mode to restore Items associated with the User to a good state. An `ITEM_LOGIN_REQUIRED` webhook will also be fired after a call to this endpoint, if one is associated with the Item.

      In the Sandbox, Items will transition to an `ITEM_LOGIN_REQUIRED` error state automatically after 30 days, even if this endpoint is not called.
    HTTP:
      METHOD: POST
      ENDPOINT: /sandbox/user/reset_login
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SandboxUserResetLoginRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SandboxUserResetLoginResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SandboxUserResetLoginRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SandboxUserResetLoginResponse)
        RETURNVAR: sandbox_user_resetLogin_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: sandbox_user_resetLogin_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: sandbox.user.resetLogin.create
  item.public_token.exchange.create:
    SUMMARY: Exchange public token for an access token
    DESC: |-
      Exchange a Link `public_token` for an API `access_token`. Link hands off the `public_token` client-side via the `onSuccess` callback once a user has successfully created an Item. The `public_token` is ephemeral and expires after 30 minutes. An `access_token` does not expire, but can be revoked by calling `/item/remove`.

      The response also includes an `item_id` that should be stored with the `access_token`. The `item_id` is used to identify an Item in a webhook. The `item_id` can also be retrieved by making an `/item/get` request.
    HTTP:
      METHOD: POST
      ENDPOINT: /item/public_token/exchange
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ItemPublicTokenExchangeRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ItemPublicTokenExchangeResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ItemPublicTokenExchangeRequest)
          LOCATION: body
      - plaid-client-id:
          TYPE: STRING
          LOCATION: header
      - plaid-secret:
          TYPE: STRING
          LOCATION: header
      - plaid-version:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(ItemPublicTokenExchangeResponse)
        RETURNVAR: item_public_token_exchange_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: item_public_token_exchange_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: item.public_token.exchange.create
  item.public_token.create:
    SUMMARY: Create public token
    DESC: |-
      Note: As of July 2020, the `/item/public_token/create` endpoint is deprecated. Instead, use `/link/token/create` with an `access_token` to create a Link token for use with [update mode](https://plaid.com/docs/link/update-mode).

      If you need your user to take action to restore or resolve an error associated with an Item, generate a public token with the `/item/public_token/create` endpoint and then initialize Link with that `public_token`.

      A `public_token` is one-time use and expires after 30 minutes. You use a `public_token` to initialize Link in [update mode](https://plaid.com/docs/link/update-mode) for a particular Item. You can generate a `public_token` for an Item even if you did not use Link to create the Item originally.

      The `/item/public_token/create` endpoint is **not** used to create your initial `public_token`. If you have not already received an `access_token` for a specific Item, use Link to obtain your `public_token` instead. See the [Quickstart](https://plaid.com/docs/quickstart) for more information.
    HTTP:
      METHOD: POST
      ENDPOINT: /item/public_token/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ItemPublicTokenCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ItemPublicTokenCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ItemPublicTokenCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ItemPublicTokenCreateResponse)
        RETURNVAR: item_public_token_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: item_public_token_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: item.public_token.create
  user.create.create:
    SUMMARY: Create user
    DESC: |-
      For Plaid products and flows that use the user object, `/user/create` provides you a single token to access all data associated with the user. You must call this endpoint before calling `/link/token/create` if you are using any of the following: Plaid Check, Income Verification, Multi-Item Link, or Plaid Protect.

      For customers who began using this endpoint on or after December 10, 2025, this endpoint takes a `client_user_id` and an `identity` object and will return a `user_id`. For customers who began using it before that date, the endpoint takes a `client_user_id` and a `consumer_report_user_identity` object and will return a `user_token` and `user_id`. For more details, see [New User APIs](https://plaid.com/docs/api/users/user-apis).

      In order to create a Plaid Check Consumer Report for a user, the `identity` (new) or `consumer_report_user_identity` (legacy) object must be present. If it is not provided during the `/user/create` call, it can be added later by calling `/user/update`.

      In order to generate a Plaid Check Consumer Report, the following `identity` fields, at minimum, are required and must be non-empty: `name`, `date_of_birth`, `emails`, `phone_numbers`, and `addresses`, (with at least one email, phone number, and address designated as `primary`). Plaid Check Consumer Reports can only be created for US-based users; the user's address country must be `US`. If creating a report for sharing with a GSE such as Fannie or Freddie, the user's full SSN must be provided via the `id_numbers` field. Providing at least a partial SSN is also strongly recommended for all use cases, since it improves the accuracy of matching user records during compliance processes such as file disclosure, dispute, or security freeze requests.

      When using Plaid Protect, it is highly recommended that you provide an `identity` object to better identify and block fraud across your Link sessions.

      Plaid will normalize identity fields before storing them and utilize the same identity across different user-based products.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserCreateResponse)
    INPUTS:
      - Plaid-New-User-API-Enabled:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: header
          DEFAULT: false
      - body:
          TYPE: STRUCT(UserCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserCreateResponse)
        RETURNVAR: user_create_create
        STATUS: 200
      - RETURNTYPE: STRUCT(UserCreateResponse)
        RETURNVAR: user_create_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_create_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.create.create
  user.get.create:
    SUMMARY: Retrieve user identity and information
    DESC: Get user details using a `user_id`. This endpoint only supports users that were created on the new user API flow, without a `user_token`. For more details, see [New User APIs](https://plaid.com/docs/api/users/user-apis).
    HTTP:
      METHOD: POST
      ENDPOINT: /user/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserGetResponse)
    INPUTS:
      - Plaid-New-User-API-Enabled:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: header
          DEFAULT: false
      - body:
          TYPE: STRUCT(UserGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserGetResponse)
        RETURNVAR: user_get_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_get_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: user.get.create
  user.identity.remove:
    SUMMARY: Remove user identity data
    DESC: This endpoint allows customers to explicitly purge identity/PII data provided to Plaid for a given user. This is not exposed to customers by default, as it is meant for special scenarios or requests, but Plaid is obligated to enable customers to delete PII provided to us.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/identity/remove
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserIdentityRemoveRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserIdentityRemoveResponse)
    INPUTS:
      - Plaid-New-User-API-Enabled:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: header
          DEFAULT: false
      - body:
          TYPE: STRUCT(UserIdentityRemoveRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserIdentityRemoveResponse)
        RETURNVAR: user_identity_remove
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_identity_remove_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.identity.remove
  user.update.create:
    SUMMARY: Update user information
    DESC: |-
      This endpoint updates user information for an existing `user_id` or `user_token`. If an existing `user_id` or `user_token` is missing fields required for a given use case (e.g. creating a Consumer Report) use `/user/update` to add values for those fields.

      Identity updates use merge semantics: provided fields overwrite existing ones; omitted fields remain unchanged.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/update
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserUpdateResponse)
    INPUTS:
      - Plaid-New-User-API-Enabled:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: header
          DEFAULT: false
      - body:
          TYPE: STRUCT(UserUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserUpdateResponse)
        RETURNVAR: user_update_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_update_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.update.create
  user.remove.create:
    SUMMARY: Remove user
    DESC: "`/user/remove` deletes a `user_id` or `user_token` and and associated information, including any Items associated with the user."
    HTTP:
      METHOD: POST
      ENDPOINT: /user/remove
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserRemoveRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserRemoveResponse)
    INPUTS:
      - Plaid-New-User-API-Enabled:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: header
          DEFAULT: false
      - body:
          TYPE: STRUCT(UserRemoveRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserRemoveResponse)
        RETURNVAR: user_remove_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_remove_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.remove.create
  user.product.terminate.create:
    SUMMARY: Terminate user-based products
    DESC: "`/user/products/terminate` terminates user-based recurring subscriptions for a given client user. This will remove user-based products (Financial Management, Protect, and CRA products) from all items associated with the user."
    HTTP:
      METHOD: POST
      ENDPOINT: /user/products/terminate
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserProductsTerminateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserProductsTerminateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UserProductsTerminateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserProductsTerminateResponse)
        RETURNVAR: user_product_terminate_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_product_terminate_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.product.terminate.create
  user.item.get:
    SUMMARY: Get Items associated with a User
    DESC: Returns Items associated with a `user_id`, along with their corresponding statuses. Plaid associates an Item with a User when it has been successfully connected within a Link session initialized with that `user_id`.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/items/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserItemsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserItemsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UserItemsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserItemsGetResponse)
        RETURNVAR: user_item_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_item_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.item.get
  user.item.associate.create:
    SUMMARY: Associate Items to a User
    DESC: Associates Items to the target user. If an Item is already associated to another user, the Item will be disassociated with the existing user and associated to the target user. This operation supports a max of 100 Items.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/items/associate
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserItemsAssociateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserItemsAssociateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UserItemsAssociateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserItemsAssociateResponse)
        RETURNVAR: user_item_associate_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_item_associate_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.item.associate.create
  user.item.remove:
    SUMMARY: Remove Items from a User
    DESC: |-
      This endpoint is used to delete Items for a given User. Either a `user_id` or `user_token` must be provided. If any of the Items are not associated with the provided User, an error will be returned, and no Items will be deleted.
      This is equivalent to calling `/item/remove` on each Item, but this endpoint supports User-based use cases (CRA) where `/item/remove` is not supported. To obtain a list of Items associated with a User, call `/user/items/get`. After an Item is deleted, it will no longer appear in `/user/items/get`. Item deletion via `/user/items/remove` will permanently and irreversibly delete the Item; to re-create the Item, send the User back through the Link flow.
      This endpoint is not intended to remove all data for a User, as it will only remove items and no other data for the User. In the case of a user deleting their account with your product, call `/user/products/terminate` to stop billing for unneeded services. For a user initiated data deletion request, see the [Consumer Service Center](https://plaid.com/check/consumer-service-center/) to revoke access to data.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/items/remove
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserItemsRemoveRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserItemsRemoveResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UserItemsRemoveRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserItemsRemoveResponse)
        RETURNVAR: user_item_remove
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_item_remove_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: user.item.remove
  user.third_party_token.create:
    SUMMARY: Create a third-party user token
    DESC: |-
      This endpoint is used to create a third-party user token. This token can be shared with and used by a specified third-party client to access data associated with the user through supported endpoints.

      Ensure you store the `third_party_user_token` along with the `user_token` and `third_party_client_id`, as it is not possible to retrieve a previously created `third_party_user_token`.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/third_party_token/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserThirdPartyTokenCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserThirdPartyTokenCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UserThirdPartyTokenCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserThirdPartyTokenCreateResponse)
        RETURNVAR: user_third_party_token_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_third_party_token_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: user.third_party_token.create
  user.third_party_token.remove:
    SUMMARY: Remove a third-party user token
    DESC: |-
      This endpoint is used to delete a third-party user token. Once removed, the token can longer be used to access data associated with the user.

      Any subsequent calls to retrieve information using the same third-party user token will result in an error stating the third-party user token does not exist.
    HTTP:
      METHOD: POST
      ENDPOINT: /user/third_party_token/remove
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserThirdPartyTokenRemoveRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UserThirdPartyTokenRemoveResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UserThirdPartyTokenRemoveRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UserThirdPartyTokenRemoveResponse)
        RETURNVAR: user_third_party_token_remove
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: user_third_party_token_remove_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: user.third_party_token.remove
  credit.session.get:
    SUMMARY: Retrieve Link sessions for your user
    DESC: |-
      This endpoint can be used for your end users after they complete the Link flow. This endpoint returns a list of Link sessions that your user completed, where each session includes the results from the Link flow.

      These results include details about the Item that was created and some product related metadata (showing, for example, whether the user finished the bank income verification step).
    HTTP:
      METHOD: POST
      ENDPOINT: /credit/sessions/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreditSessionsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreditSessionsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(CreditSessionsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreditSessionsGetResponse)
        RETURNVAR: credit_session_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: credit_session_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: credit.session.get
  payment_initiation.payment.get:
    SUMMARY: Get payment details
    DESC: |-
      The `/payment_initiation/payment/get` endpoint can be used to check the status of a payment, as well as to receive basic information such as recipient and payment amount. In the case of standing orders, the `/payment_initiation/payment/get` endpoint will provide information about the status of the overall standing order itself; the API cannot be used to retrieve payment status for individual payments within a standing order.

      Polling for status updates in Production is highly discouraged. Repeatedly calling `/payment_initiation/payment/get` to check a payment's status is unreliable and may trigger API rate limits. Only the `payment_status_update` webhook should be used to receive real-time status updates in Production.

      In the case of standing orders, the `/payment_initiation/payment/get` endpoint will provide information about the status of the overall standing order itself; the API cannot be used to retrieve payment status for individual payments within a standing order.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/payment/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationPaymentGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationPaymentGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationPaymentGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationPaymentGetResponse)
        RETURNVAR: payment_initiation_payment_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_payment_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.payment.get
  payment_initiation.payment.list:
    SUMMARY: List payments
    DESC: The `/payment_initiation/payment/list` endpoint can be used to retrieve all created payments. By default, the 10 most recent payments are returned. You can request more payments and paginate through the results using the optional `count` and `cursor` parameters.
    HTTP:
      METHOD: POST
      ENDPOINT: /payment_initiation/payment/list
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PaymentInitiationPaymentListRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PaymentInitiationPaymentListResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(PaymentInitiationPaymentListRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PaymentInitiationPaymentListResponse)
        RETURNVAR: payment_initiation_payment_list
        STATUS: 200
        PAGINATION:
          TYPE: cursor
          CURSOR_FIELD: next_cursor
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: payment_initiation_payment_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: payment_initiation.payment.list
  investments.holding.get:
    SUMMARY: Get Investment holdings
    DESC: The `/investments/holdings/get` endpoint allows developers to receive user-authorized stock position data for `investment`-type accounts.
    HTTP:
      METHOD: POST
      ENDPOINT: /investments/holdings/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(InvestmentsHoldingsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(InvestmentsHoldingsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(InvestmentsHoldingsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(InvestmentsHoldingsGetResponse)
        RETURNVAR: investments_holding_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: investments_holding_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: investments.holding.get
  investments.transaction.get:
    SUMMARY: Get investment transactions
    DESC: |-
      The `/investments/transactions/get` endpoint allows developers to retrieve up to 24 months of user-authorized transaction data for investment accounts.

      Transactions are returned in reverse-chronological order, and the sequence of transaction ordering is stable and will not shift.

      Due to the potentially large number of investment transactions associated with an Item, results are paginated. Manipulate the count and offset parameters in conjunction with the `total_investment_transactions` response body field to fetch all available investment transactions.

      Note that Investments does not have a webhook to indicate when initial transaction data has loaded (unless you use the `async_update` option). Instead, if transactions data is not ready when `/investments/transactions/get` is first called, Plaid will wait for the data. For this reason, calling `/investments/transactions/get` immediately after Link may take up to one to two minutes to return.

      Data returned by the asynchronous investments extraction flow (when `async_update` is set to true) may not be immediately available to `/investments/transactions/get`. To be alerted when the data is ready to be fetched, listen for the `HISTORICAL_UPDATE` webhook. If no investments history is ready when `/investments/transactions/get` is called, it will return a `PRODUCT_NOT_READY` error.
    HTTP:
      METHOD: POST
      ENDPOINT: /investments/transactions/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(InvestmentsTransactionsGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(InvestmentsTransactionsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(InvestmentsTransactionsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(InvestmentsTransactionsGetResponse)
        RETURNVAR: investments_transaction_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: investments_transaction_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: investments.transaction.get
  investments.refresh.create:
    SUMMARY: Refresh investment data
    DESC: |-
      `/investments/refresh` is an optional endpoint for users of the Investments product. It initiates an on-demand extraction to fetch the newest investment holdings and transactions for an Item. This on-demand extraction takes place in addition to the periodic extractions that automatically occur one or more times per day for any Investments-enabled Item. If changes to investments are discovered after calling `/investments/refresh`, Plaid will fire webhooks: [`HOLDINGS: DEFAULT_UPDATE`](https://plaid.com/docs/api/products/investments/#holdings-default_update) if any new holdings are detected, and [`INVESTMENTS_TRANSACTIONS: DEFAULT_UPDATE`](https://plaid.com/docs/api/products/investments/#investments_transactions-default_update) if any new investment transactions are detected. This webhook will typically not fire in the Sandbox environment, due to the lack of dynamic investment transactions and holdings data. To test this webhook in Sandbox, call `/sandbox/item/fire_webhook`. Updated holdings and investment transactions can be fetched by calling `/investments/holdings/get` and `/investments/transactions/get`. Note that the `/investments/refresh` endpoint is not supported by all institutions. If called on an Item from an institution that does not support this functionality, it will return a `PRODUCT_NOT_SUPPORTED` error.

      As this endpoint triggers a synchronous request for fresh data, latency may be higher than for other Plaid endpoints (typically less than 10 seconds, but occasionally up to 30 seconds or more); if you encounter errors, you may find it necessary to adjust your timeout period when making requests.

      `/investments/refresh` is offered as an add-on to Investments and has a separate [fee model](https://plaid.com/docs/account/billing/#per-request-flat-fee). To request access to this endpoint, submit a [product access request](https://dashboard.plaid.com/team/products) or contact your Plaid account manager.
    HTTP:
      METHOD: POST
      ENDPOINT: /investments/refresh
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(InvestmentsRefreshRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(InvestmentsRefreshResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(InvestmentsRefreshRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(InvestmentsRefreshResponse)
        RETURNVAR: investments_refresh_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: investments_refresh_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: investments.refresh.create
  investments.auth.get:
    SUMMARY: Get data needed to authorize an investments transfer
    DESC: The `/investments/auth/get` endpoint allows developers to receive user-authorized data to facilitate the transfer of holdings
    HTTP:
      METHOD: POST
      ENDPOINT: /investments/auth/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(InvestmentsAuthGetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(InvestmentsAuthGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(InvestmentsAuthGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(InvestmentsAuthGetResponse)
        RETURNVAR: investments_auth_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: investments_auth_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: investments.auth.get
  processor.token.create:
    SUMMARY: Create processor token
    DESC: Used to create a token suitable for sending to one of Plaid's partners to enable integrations. Note that Stripe partnerships use bank account tokens instead; see `/processor/stripe/bank_account_token/create` for creating tokens for use with Stripe integrations. If using multiple processors, multiple different processor tokens can be created for a single access token. Once created, a processor token for a given Item can be modified by calling `/processor/token/permissions/set`. To revoke the processor's access, the entire Item must be deleted by calling `/item/remove`.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/token/create
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorTokenCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorTokenCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorTokenCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTokenCreateResponse)
        RETURNVAR: processor_token_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_token_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.token.create
  processor.token.set.create:
    SUMMARY: Control a processor's access to products
    DESC: Used to control a processor's access to products on the given processor token. By default, a processor will have access to all available products on the corresponding item. To restrict access to a particular set of products, call this endpoint with the desired products. To restore access to all available products, call this endpoint with an empty list. This endpoint can be called multiple times as your needs and your processor's needs change.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/token/permissions/set
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProcessorTokenPermissionsSetRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProcessorTokenPermissionsSetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ProcessorTokenPermissionsSetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTokenPermissionsSetResponse)
        RETURNVAR: processor_token_set_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: processor_token_set_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response (HTTP default)
    CANONICAL_ID: processor.token.set.create
  processor.token.permissions.get:
    SUMMARY: Get a processor token's product permissions
    DESC: Used to get a processor token's product permissions. The `products` field will be an empty list if the processor can access all available products.
    HTTP:
      METHOD: POST
      ENDPOINT: /processor/token/permissions/get
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
