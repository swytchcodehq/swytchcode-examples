    CANONICAL_ID: signal.schedule.create
  signal.decision.report.create:
    SUMMARY: Report whether you initiated an ACH transaction
    DESC: |-
      After you call `/signal/evaluate`, Plaid will normally infer the outcome from your Signal Rules. However, if you are not using Signal Rules, if the Signal Rules outcome was `REVIEW`, or if you take a different action than the one determined by the Signal Rules, you will need to call `/signal/decision/report`. This helps improve Signal Transaction Score accuracy for your account and is necessary for proper functioning of the rule performance and rule tuning capabilities in the Dashboard. If your effective decision changes after calling `/signal/decision/report` (for example, you indicated that you accepted a transaction, but later on, your payment processor rejected it, so it was never initiated), call `/signal/decision/report` again for the transaction to correct Plaid's records.

      If you are using Plaid Transfer as your payment processor, you also do not need to call `/signal/decision/report`, as Plaid can infer outcomes from your Transfer activity.

      If using a Balance-only ruleset, this endpoint will not impact scores (Balance does not use scores), but is necessary to view accurate transaction outcomes and tune rule logic in the Dashboard.
    HTTP:
      METHOD: POST
      ENDPOINT: /signal/decision/report
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignalDecisionReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignalDecisionReportResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignalDecisionReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignalDecisionReportResponse)
        RETURNVAR: signal_decision_report_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: signal_decision_report_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: signal.decision.report.create
  signal.return.report.create:
    SUMMARY: Report a return for an ACH transaction
    DESC: Call the `/signal/return/report` endpoint to report a returned transaction that was previously sent to the `/signal/evaluate` endpoint. Your feedback will be used by the model to incorporate the latest risk trends into your scores and tune rule logic. If using a Balance-only ruleset, this endpoint will not impact scores (as Balance does not use scores), but is necessary to view accurate transaction outcomes and tune rule logic in the Dashboard.
    HTTP:
      METHOD: POST
      ENDPOINT: /signal/return/report
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignalReturnReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignalReturnReportResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignalReturnReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignalReturnReportResponse)
        RETURNVAR: signal_return_report_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: signal_return_report_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: signal.return.report.create
  signal.prepare.create:
    SUMMARY: Opt-in an Item to Signal Transaction Scores
    DESC: |-
      When an Item is not initialized with `signal`, call `/signal/prepare` to opt-in that Item to the data collection process used to develop a Signal Transaction Score. This should be done on Items where `signal` was added in the `additional_consented_products` array but not in the `products`, `optional_products`, or `required_if_supported_products` array. If `/signal/prepare` is skipped on an Item that is not initialized with `signal`, the initial call to `/signal/evaluate` on that Item will be less accurate, because Plaid will have access to less data for computing the Signal Transaction Score.

      If your integration is purely Balance-only, this endpoint will have no effect, as Balance-only rulesets do not calculate a Signal Transaction Score.

      If run on an Item that is already initialized with `signal`, this endpoint will return a 200 response and will not modify the Item.
    HTTP:
      METHOD: POST
      ENDPOINT: /signal/prepare
      HEADERS:
        Content-Type: application/json
        PLAID-CLIENT-ID: plaid-client-id
        PLAID-SECRET: plaid-secret
        Plaid-Version: plaid-version
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignalPrepareRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignalPrepareResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignalPrepareRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignalPrepareResponse)
        RETURNVAR: signal_prepare_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: signal_prepare_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(PlaidError)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: signal.prepare.create
