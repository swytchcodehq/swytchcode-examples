      comment: |-
        The unofficial currency code associated with the transaction. Always `null` if `iso_currency_code` is non-`null`. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `unofficial_currency_code`s.
    - name: original_description
      NAME: original_description
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The string returned by the financial institution to describe the transaction.
    - name: category
      NAME: category
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: |-
        A hierarchical array of the categories to which this transaction belongs. For a full list of categories, see [`/categories/get`](https://plaid.com/docs/api/products/transactions/#categoriesget).

        This field will only appear in an Asset Report with Insights.
    - name: category_id
      NAME: category_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        The ID of the category to which this transaction belongs. For a full list of categories, see [`/categories/get`](https://plaid.com/docs/api/products/transactions/#categoriesget).

        This field will only appear in an Asset Report with Insights.
    - name: credit_category
      NAME: credit_category
      type: STRUCT(CreditCategory)
      TYPE: STRUCT(CreditCategory)
      REQUIRED: false
    - name: check_number
      NAME: check_number
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The check number of the transaction. This field is only populated for check transactions.
    - name: date
      NAME: date
      type: DATE
      TYPE: DATE
      REQUIRED: true
      comment: For pending transactions, the date that the transaction occurred; for posted transactions, the date that the transaction posted. Both dates are returned in an [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DD` ).
    - name: date_transacted
      NAME: date_transacted
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The date on which the transaction took place, in IS0 8601 format.
    - name: location
      NAME: location
      type: STRUCT(Location)
      TYPE: STRUCT(Location)
      REQUIRED: false
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        The merchant name or transaction description. This is a legacy field that is no longer maintained. For merchant name, use the `merchant_name` field. For description, use the `original_description` field.

        This field will only appear in an Asset Report with Insights.
    - name: merchant_name
      NAME: merchant_name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The merchant name, as enriched by Plaid. This is typically a more human-readable version of the merchant counterparty in the transaction. For some bank transactions (such as checks or account transfers) where there is no meaningful merchant name, this value will be `null`.
    - name: payment_meta
      NAME: payment_meta
      type: STRUCT(PaymentMeta)
      TYPE: STRUCT(PaymentMeta)
      REQUIRED: false
    - name: pending
      NAME: pending
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When `true`, identifies the transaction as pending or unsettled. Pending transaction details (name, type, amount, category ID) may change before they are settled.
    - name: pending_transaction_id
      NAME: pending_transaction_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of a posted transaction's associated pending transaction, where applicable.
    - name: account_owner
      NAME: account_owner
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the account owner. This field is not typically populated and only relevant when dealing with sub-accounts.
    - name: transaction_id
      NAME: transaction_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of the transaction. Like all Plaid identifiers, the `transaction_id` is case sensitive.
    - name: transaction_type
      NAME: transaction_type
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: income_source_id
      NAME: income_source_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A unique identifier for an income source.
  AssetReportInvestments:
    - name: holdings
      NAME: holdings
      type: "[]STRUCT(AssetReportInvestmentHolding)"
      TYPE: "[]STRUCT(AssetReportInvestmentHolding)"
      REQUIRED: false
      comment: Quantities and values of securities held in the investment account. Map to the `securities` array for security details.
