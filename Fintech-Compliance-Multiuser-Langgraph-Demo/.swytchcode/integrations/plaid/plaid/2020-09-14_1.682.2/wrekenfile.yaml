      NAME: auth_type_select_enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Specifies whether Auth Type Select is enabled for the Link session, allowing the end user to choose between linking via a credentials-based flow (i.e. Instant Auth, Instant Match, Automated Micro-deposits) or a manual flow that does not require login (all other Auth flows) prior to selecting their financial institution. Default behavior is `false`.
    - name: automated_microdeposits_enabled
      NAME: automated_microdeposits_enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Specifies whether the Link session is enabled for the Automated Micro-deposits flow. Default behavior is `false`.
    - name: instant_match_enabled
      NAME: instant_match_enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Specifies whether the Link session is enabled for the Instant Match flow. Instant Match is enabled by default. Instant Match can be disabled by setting this field to `false`.
    - name: same_day_microdeposits_enabled
      NAME: same_day_microdeposits_enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Specifies whether the Link session is enabled for the Same Day Micro-deposits flow.  Default behavior is `false`.
    - name: instant_microdeposits_enabled
      NAME: instant_microdeposits_enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Specifies whether the Link session is enabled for the Instant Micro-deposits flow.  Default behavior for Plaid teams created after November 2023 is `false`; default behavior for Plaid teams created before that date is `true`.
    - name: reroute_to_credentials
