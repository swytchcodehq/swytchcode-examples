        Plaid’s unique identifier for the account. This value will not change unless Plaid can't reconcile the account with the data returned by the financial institution. This may occur, for example, when the name of the account changes. If this happens a new `account_id` will be assigned to the account.

        The `account_id` can also change if the `access_token` is deleted and the same credentials that were used to generate that `access_token` are used to generate a new `access_token` on a later date. In that case, the new `account_id` will be different from the old `account_id`.

        If an account with a specific `account_id` disappears instead of changing, the account is likely closed. Closed accounts are not returned by the Plaid API.

        When using a CRA endpoint (an endpoint associated with Plaid Check Consumer Report, i.e. any endpoint beginning with `/cra/`), the `account_id` returned will not match the `account_id` returned by a non-CRA endpoint.

        Like all Plaid identifiers, the `account_id` is case sensitive.
    - name: balances
      NAME: balances
      type: STRUCT(AccountBalance)
      TYPE: STRUCT(AccountBalance)
      REQUIRED: true
    - name: mask
      NAME: mask
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The last 2-4 alphanumeric characters of either the account’s displayed mask or the account’s official account number. Note that the mask may be non-unique between an Item’s accounts.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the account, either assigned by the user or by the financial institution itself
    - name: official_name
      NAME: official_name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The official name of the account as given by the financial institution
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: subtype
      NAME: subtype
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: verification_status
      NAME: verification_status
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        Indicates an Item's micro-deposit-based verification or database verification status. This field is only populated when using Auth and falling back to micro-deposit or database verification. Possible values are:

        `pending_automatic_verification`: The Item is pending automatic verification.

        `pending_manual_verification`: The Item is pending manual micro-deposit verification. Items remain in this state until the user successfully verifies the code.

        `automatically_verified`: The Item has successfully been automatically verified.

        `manually_verified`: The Item has successfully been manually verified.

        `verification_expired`: Plaid was unable to automatically verify the deposit within 7 calendar days and will no longer attempt to validate the Item. Users may retry by submitting their information again through Link.

        `verification_failed`: The Item failed manual micro-deposit verification because the user exhausted all 3 verification attempts. Users may retry by submitting their information again through Link.

        `unsent`: The Item is pending micro-deposit verification, but Plaid has not yet sent the micro-deposit.

        `database_insights_pending`: The Database Auth result is pending and will be available upon Auth request.

        `database_insights_fail`: The Item's numbers have been verified using Plaid's data sources and have signal for being invalid and/or have no signal for being valid. Typically this indicates that the routing number is invalid, the account number does not match the account number format associated with the routing number, or the account has been reported as closed or frozen. Only returned for Auth Items created via Database Auth.

        `database_insights_pass`: The Item's numbers have been verified using Plaid's data sources: the routing and account number match a routing and account number of an account recognized on the Plaid network, and the account is not known by Plaid to be frozen or closed. Only returned for Auth Items created via Database Auth.

        `database_insights_pass_with_caution`: The Item's numbers have been verified using Plaid's data sources and have some signal for being valid: the routing and account number were not recognized on the Plaid network, but the routing number is valid and the account number is a potential valid account number for that routing number. Only returned for Auth Items created via Database Auth.

        `database_matched`: (deprecated) The Item has successfully been verified using Plaid's data sources. Only returned for Auth Items created via Database Match.

        `null` or empty string: Neither micro-deposit-based verification nor database verification are being used for the Item.
    - name: verification_name
      NAME: verification_name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The account holder name that was used for micro-deposit and/or database verification. Only returned for Auth Items created via micro-deposit or database verification. This name was manually-entered by the user during Link, unless it was otherwise provided via the `user.legal_name` request field in `/link/token/create` for the Link session that created the Item.
    - name: verification_insights
      NAME: verification_insights
      type: STRUCT(AccountVerificationInsights)
      TYPE: STRUCT(AccountVerificationInsights)
      REQUIRED: false
    - name: persistent_account_id
      NAME: persistent_account_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A unique and persistent identifier for accounts that can be used to trace multiple instances of the same account across different Items for depository accounts. This field is currently supported only for Items at institutions that use Tokenized Account Numbers (i.e., Chase and PNC, and in May 2025 US Bank). Because these accounts have a different account number each time they are linked, this field may be used instead of the account number to uniquely identify an account across multiple Items for payments use cases, helping to reduce duplicate Items or attempted fraud. In Sandbox, this field is populated for TAN-based institutions (`ins_56`, `ins_13`) as well as the OAuth Sandbox institution (`ins_127287`); in Production, it will only be populated for accounts at applicable institutions.
    - name: holder_category
      NAME: holder_category
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: owners
      NAME: owners
      type: "[]STRUCT(Owner)"
      TYPE: "[]STRUCT(Owner)"
      REQUIRED: false
      comment: Data returned by the financial institution about the account owner or owners. For business accounts, the name reported may be either the name of the individual or the name of the business, depending on the institution. Multiple owners on a single account will be represented in the same owner object, not in multiple owner objects within the array.
  Owner:
    - name: names
      NAME: names
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: |-
        A list of names associated with the account by the financial institution. In the case of a joint account, Plaid will make a best effort to report the names of all account holders.

        If an Item contains multiple accounts with different owner names, some institutions will report all names associated with the Item in each account's `names` array.
    - name: phone_numbers
      NAME: phone_numbers
      type: "[]STRUCT(PhoneNumber)"
      TYPE: "[]STRUCT(PhoneNumber)"
      REQUIRED: true
      comment: A list of phone numbers associated with the account by the financial institution. May be an empty array if no relevant information is returned from the financial institution.
    - name: emails
      NAME: emails
      type: "[]STRUCT(Email)"
      TYPE: "[]STRUCT(Email)"
      REQUIRED: true
      comment: A list of email addresses associated with the account by the financial institution. May be an empty array if no relevant information is returned from the financial institution.
    - name: addresses
      NAME: addresses
      type: "[]STRUCT(Address)"
      TYPE: "[]STRUCT(Address)"
      REQUIRED: true
      comment: Data about the various addresses associated with the account by the financial institution. May be an empty array if no relevant information is returned from the financial institution.
  PhoneNumber:
    - name: data
      NAME: data
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The phone number.
    - name: primary
      NAME: primary
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When `true`, identifies the phone number as the primary number on an account.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of phone number.
  Email:
    - name: data
      NAME: data
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The email address.
    - name: primary
      NAME: primary
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When `true`, identifies the email address as the primary email on an account.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of email account as described by the financial institution.
  Address:
    - name: data
      NAME: data
      type: STRUCT(AddressData)
      TYPE: STRUCT(AddressData)
      REQUIRED: true
    - name: primary
      NAME: primary
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: When `true`, identifies the address as the primary address on an account.
  AddressData:
    - name: city
      NAME: city
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The full city name
    - name: region
      NAME: region
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The region or state. In API versions 2018-05-22 and earlier, this field is called `state`.
        Example: `"NC"`
    - name: street
      NAME: street
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The full street address
        Example: `"564 Main Street, APT 15"`
    - name: postal_code
      NAME: postal_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The postal code. In API versions 2018-05-22 and earlier, this field is called `zip`.
    - name: country
      NAME: country
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO 3166-1 alpha-2 country code
  CashflowReportTransaction:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the account in which this transaction occurred.
    - name: amount
      NAME: amount
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: "The settled value of the transaction, denominated in the transactions's currency, as stated in `iso_currency_code` or `unofficial_currency_code`. For all products except Income: Positive values when money moves out of the account; negative values when money moves in. For example, debit card purchases are positive; credit card payments, direct deposits, and refunds are negative. For Income endpoints, values are positive when representing income."
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the transaction. Always `null` if `unofficial_currency_code` is non-null.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The unofficial currency code associated with the transaction. Always `null` if `iso_currency_code` is non-`null`. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `iso_currency_code`s.
    - name: check_number
      NAME: check_number
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The check number of the transaction. This field is only populated for check transactions.
    - name: date
      NAME: date
      type: DATE
      TYPE: DATE
      REQUIRED: true
      comment: For pending transactions, the date that the transaction occurred; for posted transactions, the date that the transaction posted. Both dates are returned in an [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DD` ). To receive information about the date that a posted transaction was initiated, see the `authorized_date` field.
    - name: location
      NAME: location
      type: STRUCT(Location)
      TYPE: STRUCT(Location)
      REQUIRED: true
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The merchant name or transaction description.

        Note: This is a legacy field that is not actively maintained. Use `merchant_name` instead for the merchant name.

        If the `transactions` object was returned by a Transactions endpoint such as `/transactions/sync` or `/transactions/get`, this field will always appear. If the `transactions` object was returned by an Assets endpoint such as `/asset_report/get/` or `/asset_report/pdf/get`, this field will only appear in an Asset Report with Insights.
    - name: merchant_name
      NAME: merchant_name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The merchant name, as enriched by Plaid from the `name` field. This is typically a more human-readable version of the merchant counterparty in the transaction. For some bank transactions (such as checks or account transfers) where there is no meaningful merchant name, this value will be `null`.
    - name: original_description
      NAME: original_description
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The string returned by the financial institution to describe the transaction. For transactions returned by `/transactions/sync` or `/transactions/get`, this field will only be included if the client has set `options.include_original_description` to `true`.
    - name: payment_meta
      NAME: payment_meta
      type: STRUCT(CashflowReportPaymentMeta)
      TYPE: STRUCT(CashflowReportPaymentMeta)
      REQUIRED: true
    - name: pending
      NAME: pending
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When `true`, identifies the transaction as pending or unsettled. Pending transaction details (name, type, amount, category ID) may change before they are settled. Not all institutions provide pending transactions.
    - name: pending_transaction_id
      NAME: pending_transaction_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of a posted transaction's associated pending transaction, where applicable. Not all institutions provide pending transactions.
    - name: account_owner
      NAME: account_owner
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: This field is not typically populated and only relevant when dealing with sub-accounts. A sub-account most commonly exists in cases where a single account is linked to multiple cards, each with its own card number and card holder name; each card will be considered a sub-account. If the account does have sub-accounts, this field will typically be some combination of the sub-account owner's name and/or the sub-account mask. The format of this field is not standardized and will vary based on institution.
    - name: transaction_id
      NAME: transaction_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of the transaction. Like all Plaid identifiers, the `transaction_id` is case sensitive.
    - name: logo_url
      NAME: logo_url
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The URL of a logo associated with this transaction, if available. The logo will always be 100×100 pixel PNG file.
    - name: website
      NAME: website
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The website associated with this transaction, if available.
    - name: authorized_date
      NAME: authorized_date
      type: DATE
      TYPE: DATE
      REQUIRED: true
      comment: The date that the transaction was authorized. For posted transactions, the `date` field will indicate the posted date, but `authorized_date` will indicate the day the transaction was authorized by the financial institution. If presenting transactions to the user in a UI, the `authorized_date`, when available, is generally preferable to use over the `date` field for posted transactions, as it will generally represent the date the user actually made the transaction. Dates are returned in an [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DD` ).
    - name: authorized_datetime
      NAME: authorized_datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: |-
        Date and time when a transaction was authorized in [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DDTHH:mm:ssZ` ). For posted transactions, the `datetime` field will indicate the posted date, but `authorized_datetime` will indicate the day the transaction was authorized by the financial institution. If presenting transactions to the user in a UI, the `authorized_datetime`, when available, is generally preferable to use over the `datetime` field for posted transactions, as it will generally represent the date the user actually made the transaction.

        This field is returned for select financial institutions and comes as provided by the institution. It may contain default time values (such as 00:00:00). This field is only populated in API version 2019-05-29 and later.
    - name: datetime
      NAME: datetime
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: |-
        Date and time when a transaction was posted in [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format ( `YYYY-MM-DDTHH:mm:ssZ` ). For the date that the transaction was initiated, rather than posted, see the `authorized_datetime` field.

        This field is returned for select financial institutions and comes as provided by the institution. It may contain default time values (such as 00:00:00). This field is only populated in API version 2019-05-29 and later.
    - name: payment_channel
      NAME: payment_channel
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: personal_finance_category
      NAME: personal_finance_category
      type: STRUCT(PersonalFinanceCategory)
      TYPE: STRUCT(PersonalFinanceCategory)
      REQUIRED: false
    - name: business_finance_category
      NAME: business_finance_category
      type: STRUCT(BusinessFinanceCategory)
      TYPE: STRUCT(BusinessFinanceCategory)
      REQUIRED: false
    - name: credit_category
      NAME: credit_category
      type: STRUCT(CreditCategory)
      TYPE: STRUCT(CreditCategory)
      REQUIRED: false
    - name: transaction_code
      NAME: transaction_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: personal_finance_category_icon_url
      NAME: personal_finance_category_icon_url
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The URL of an icon associated with the primary personal finance category. The icon will always be 100×100 pixel PNG file.
    - name: counterparties
      NAME: counterparties
      type: "[]STRUCT(TransactionCounterparty)"
      TYPE: "[]STRUCT(TransactionCounterparty)"
      REQUIRED: false
      comment: The counterparties present in the transaction. Counterparties, such as the merchant or the financial institution, are extracted by Plaid from the raw description.
    - name: merchant_entity_id
      NAME: merchant_entity_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A unique, stable, Plaid-generated ID that maps to the merchant. In the case of a merchant with multiple retail locations, this field will map to the broader merchant, not a specific location or store.
  CashflowReportPaymentMeta:
