      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(InstitutionsGetResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(InstitutionsGetRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(InstitutionsGetResponse)
        RETURNVAR: institutions_get_create
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
        RETURNVAR: institutions_get_create_NaN
        STATUS: .nan
    ERRORS:
