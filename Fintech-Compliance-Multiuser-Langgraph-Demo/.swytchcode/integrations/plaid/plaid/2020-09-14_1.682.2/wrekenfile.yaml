      TYPE: FLOAT
      REQUIRED: true
      comment: The value of the holding, as reported by the institution.
    - name: cost_basis
      NAME: cost_basis
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The original total value of the holding. This field is calculated by Plaid as the sum of the purchase price of all of the shares in the holding.
    - name: quantity
      NAME: quantity
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The total quantity of the asset held, as reported by the financial institution. If the security is an option, `quantity` will reflect the total number of options (typically the number of contracts multiplied by 100), not the number of contracts.
    - name: iso_currency_code
      NAME: iso_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ISO-4217 currency code of the holding. Always `null` if `unofficial_currency_code` is non-`null`.
    - name: unofficial_currency_code
      NAME: unofficial_currency_code
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |
        The unofficial currency code associated with the holding. Always `null` if `iso_currency_code` is non-`null`. Unofficial currency codes are used for currencies that do not have official ISO currency codes, such as cryptocurrencies and the currencies of certain countries.

        See the [currency code schema](https://plaid.com/docs/api/accounts#currency-code-schema) for a full listing of supported `iso_currency_code`s.
  AssetReportInvestmentSecurity:
    - name: security_id
      NAME: security_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A unique, Plaid-specific identifier for the security, used to associate securities with holdings. Like all Plaid identifiers, the `security_id` is case sensitive. The `security_id` may change if inherent details of the security change due to a corporate action, for example, in the event of a ticker symbol change or CUSIP change.
    - name: name
