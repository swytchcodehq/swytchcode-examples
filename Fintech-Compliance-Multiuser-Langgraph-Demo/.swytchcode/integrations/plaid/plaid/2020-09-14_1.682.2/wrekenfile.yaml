  AssetReportInvestmentHolding:
    - name: account_id
      NAME: account_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The Plaid `account_id` associated with the holding.
    - name: security_id
      NAME: security_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The Plaid `security_id` associated with the holding. Security data is not specific to a user's account; any user who held the same security at the same financial institution at the same time would have identical security data. The `security_id` for the same security will typically be the same across different institutions, but this is not guaranteed. The `security_id` does not typically change, but may change if inherent details of the security change due to a corporate action, for example, in the event of a ticker symbol change or CUSIP change.
    - name: ticker_symbol
      NAME: ticker_symbol
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The holding's trading symbol for publicly traded holdings, and otherwise a short identifier if available.
    - name: institution_price
      NAME: institution_price
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The last price given by the institution for this security.
    - name: institution_price_as_of
