      REQUIRED: false
      comment: A user token generated using `/user/create`. Any Item created during the Link session will be associated with the user. Integrations that began using Plaid Protect, Multi-Item Link, or Plaid Check Consumer Report before December 10, 2025 use this field instead of the `user_id`.
  LinkTokenCreateRequestUser:
    - name: client_user_id
      NAME: client_user_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A unique ID representing the end user. Typically this will be a user ID number from your application. Personally identifiable information, such as an email address or phone number, should not be used in the `client_user_id`. It is currently used as a means of searching logs for the given user in the Plaid Dashboard.
    - name: legal_name
      NAME: legal_name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The user's full legal name, used for [micro-deposit based verification flows](https://plaid.com/docs/auth/coverage/). For a small number of customers on legacy flows, providing this field is required to enable micro-deposit-based flows. For all other customers, this field is optional. Providing the user's name in this field when using micro-deposit-based verification will streamline the end user experience, as the user will not be prompted to enter their name during the Link flow; Plaid will use the provided legal name instead.
    - name: name
      NAME: name
      type: ANY
      TYPE: ANY
      REQUIRED: false
    - name: phone_number
      NAME: phone_number
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The user's phone number in [E.164](https://en.wikipedia.org/wiki/E.164) format. If supplied, will be used when applicable to prefill phone number fields in Link for the [returning user flow](https://plaid.com/docs/link/returning-user) and the [Identity Verification flow](https://plaid.com/docs/identity-verification). Phone number input is validated against valid number ranges; number strings that do not match a real-world phone numbering scheme may cause the request to fail, even in the Sandbox test environment.
    - name: phone_number_verified_time
      NAME: phone_number_verified_time
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: |
        The date and time the phone number was verified in [ISO 8601](https://wikipedia.org/wiki/ISO_8601) format (`YYYY-MM-DDThh:mm:ssZ`). This was previously an optional field used in the [returning user experience](https://plaid.com/docs/link/returning-user). This field is no longer required to enable the returning user experience.

         Only pass a verification time for a phone number that you have verified. If you have performed verification but don’t have the time, you may supply a signal value of the start of the UNIX epoch.

         Example: `2020-01-01T00:00:00Z`
    - name: email_address
      NAME: email_address
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The user's email address. Can be used to prefill Link fields when used with [Identity Verification](https://plaid.com/docs/identity-verification).
    - name: email_address_verified_time
      NAME: email_address_verified_time
