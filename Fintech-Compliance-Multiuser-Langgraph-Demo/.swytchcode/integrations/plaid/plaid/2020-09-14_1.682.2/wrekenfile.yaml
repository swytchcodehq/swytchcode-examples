    - name: average_balance_30_days
      NAME: average_balance_30_days
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The average balance in the account over the last 30 days. Calculated using the derived historical balances.
    - name: average_balance_60_days
      NAME: average_balance_60_days
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The average balance in the account over the last 60 days. Calculated using the derived historical balances.
    - name: nsf_overdraft_transactions_count
      NAME: nsf_overdraft_transactions_count
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: true
      comment: The number of net NSF fee transactions in the time range for the report in the given account (not counting any fees that were reversed within the time range).
  CraVoaReportAccountHistoricalBalance:
    - name: current
