          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProcessorTokenPermissionsGetResponse)
        RETURNVAR: processor_token_permissions_get
        STATUS: 200
      - RETURNTYPE: STRUCT(PlaidError)
