VERSION: 2.0.2
DEFAULTS:
  query_hapikey: <HAPIKEY>
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  conversations.v3.customChannels.get:
    SUMMARY: Get a custom channel
    DESC: Retrieve the details about a custom channel. This API allows you to see a custom channel's current capabilties and other configuration metadata
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/custom-channels/{channelId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelIntegrationChannel)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelIntegrationChannel)
        RETURNVAR: conversations_v3_customChannels_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_customChannels_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.customChannels.get
  conversations.v3.customChannels.delete:
    SUMMARY: Archive a custom channel
    DESC: Use this API to archive a registered custom channel
    HTTP:
      METHOD: DELETE
      ENDPOINT: /conversations/v3/custom-channels/{channelId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_customChannels_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.customChannels.delete
  conversations.v3.customChannels.update:
    SUMMARY: Update a custom channel
    DESC: This endpoint can be used to update a channel's capabilities. You can also use it to update the channel's webhookUri and its channelAccountConnectionRedirectUrl.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /conversations/v3/custom-channels/{channelId}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicChannelIntegrationChannelPatch)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelIntegrationChannel)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicChannelIntegrationChannelPatch)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelIntegrationChannel)
        RETURNVAR: conversations_v3_customChannels_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_customChannels_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.customChannels.update
  conversations.v3.messages.get:
    SUMMARY: Get a message
    DESC: Get the PublicConversationsMessage that represents a message sent over a custom channel
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/messages/{messageId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicConversationsMessage)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - messageId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicConversationsMessage)
        RETURNVAR: conversations_v3_messages_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_messages_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.messages.get
  conversations.v3.messages.update:
    SUMMARY: "Update message "
    DESC: Use this API to update a message's status to indicate if it was successfully sent, failed to send, or was read
    HTTP:
      METHOD: PATCH
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/messages/{messageId}
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicChannelIntegrationMessageUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicConversationsMessage)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - messageId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicChannelIntegrationMessageUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicConversationsMessage)
        RETURNVAR: conversations_v3_messages_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_messages_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.messages.update
  conversations.v3.channelAccountStagingTokens.update:
    SUMMARY: Update a channel account staging token
    DESC: This API is used for integrators creating public apps. Use this API to update a channel account staging token's account name and delivery identifier. This information will be applied to the channel account created from this staging token.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/channel-account-staging-tokens/{accountToken}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicChannelAccountStagingTokenUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelAccountStagingToken)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - accountToken:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicChannelAccountStagingTokenUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelAccountStagingToken)
        RETURNVAR: conversations_v3_channelAccountStagingTokens_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_channelAccountStagingTokens_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channelAccountStagingTokens.update
  conversations.v3.channelAccounts.get:
    SUMMARY: Query channel accounts
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/channel-accounts
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalPublicChannelAccountForwardPaging)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - deliveryIdentifierType:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - deliveryIdentifierValue:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - defaultPageLength:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalPublicChannelAccountForwardPaging)
        RETURNVAR: conversations_v3_channelAccounts_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_channelAccounts_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channelAccounts.get
  conversations.v3.channelAccounts.create:
    SUMMARY: Create a channel account
    DESC: This API allows you to create one or more accounts that all talk over a single channel but using different delivery identifiers.
    HTTP:
      METHOD: POST
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/channel-accounts
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicChannelAccountEgg)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelAccount)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicChannelAccountEgg)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelAccount)
        RETURNVAR: conversations_v3_channelAccounts_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_channelAccounts_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channelAccounts.create
  conversations.v3.channelAccounts.get_cd69:
    SUMMARY: Get a channel account by id
    DESC: Retrieve a PublicChannelAccount that contains all the metadata about your channel account. This includes information like its channel, associated inbox id, and delivery identifier information.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/channel-accounts/{channelAccountId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelAccount)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - channelAccountId:
          TYPE: INT
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelAccount)
        RETURNVAR: conversations_v3_channelAccounts_get_cd69
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_channelAccounts_get_cd69_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channelAccounts.get_cd69
  conversations.v3.channelAccounts.update:
    SUMMARY: Update a channel account
    DESC: This API is used to update the name of the channel account and it's isAuthorized status. Setting to isAuthorized flag to False disables the channel account.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/channel-accounts/{channelAccountId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicChannelAccountUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelAccount)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
      - channelAccountId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicChannelAccountUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelAccount)
