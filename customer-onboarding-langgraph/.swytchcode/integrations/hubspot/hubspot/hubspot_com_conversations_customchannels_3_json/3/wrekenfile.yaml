    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - defaultPageLength:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalPublicChannelIntegrationChannelForwardPaging)
        RETURNVAR: conversations_v3_customChannels_list
