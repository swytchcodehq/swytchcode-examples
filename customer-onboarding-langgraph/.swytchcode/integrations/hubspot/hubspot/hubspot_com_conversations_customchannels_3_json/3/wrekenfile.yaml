    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.customChannels.list
  conversations.v3.customChannels.create:
    SUMMARY: Create a custom channel
    DESC: Register a new channel along with its capabilities and the webhook url that will be used to receive messages published over the channel
    HTTP:
      METHOD: POST
      ENDPOINT: /conversations/v3/custom-channels/
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicChannelIntegrationChannelCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannelIntegrationChannel)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicChannelIntegrationChannelCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannelIntegrationChannel)
        RETURNVAR: conversations_v3_customChannels_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_customChannels_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.customChannels.create
  conversations.v3.messages.create:
    SUMMARY: Publish a message
    DESC: Publish a message over your custom channel
    HTTP:
      METHOD: POST
      ENDPOINT: /conversations/v3/custom-channels/{channelId}/messages
      HEADERS:
        Content-Type: application/json
        private-app: private-app
