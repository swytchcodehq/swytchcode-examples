    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channelAccounts.update
  conversations.v3.customChannels.list:
    SUMMARY: Get all channels for app
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/custom-channels/
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
