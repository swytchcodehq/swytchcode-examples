VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.owners.list:
    SUMMARY: Get a page of owners
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/owners/
      HEADERS:
        private-app-legacy: private-app-legacy
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicOwnerForwardPaging)
    INPUTS:
      - email:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicOwnerForwardPaging)
        RETURNVAR: crm_v3_owners_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_owners_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.owners.list
  crm.v3.owners.get:
    SUMMARY: Read an owner by given `id` or `userId`
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/owners/{ownerId}
      HEADERS:
        private-app-legacy: private-app-legacy
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicOwner)
    INPUTS:
      - ownerId:
          TYPE: INT
          LOCATION: path
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: id
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(PublicOwner)
        RETURNVAR: crm_v3_owners_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_owners_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.owners.get
STRUCTS:
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  PublicOwner:
    - name: firstName
      NAME: firstName
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: lastName
      NAME: lastName
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: archived
      NAME: archived
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
    - name: teams
      NAME: teams
      type: "[]STRUCT(PublicTeam)"
      TYPE: "[]STRUCT(PublicTeam)"
      REQUIRED: false
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: userIdIncludingInactive
      NAME: userIdIncludingInactive
      type: INT
      TYPE: INT
      REQUIRED: false
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: userId
      NAME: userId
      type: INT
      TYPE: INT
      REQUIRED: false
    - name: email
      NAME: email
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: updatedAt
      NAME: updatedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
  PublicTeam:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: primary
      NAME: primary
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
  CollectionResponsePublicOwnerForwardPaging:
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(PublicOwner)"
      TYPE: "[]STRUCT(PublicOwner)"
      REQUIRED: true
