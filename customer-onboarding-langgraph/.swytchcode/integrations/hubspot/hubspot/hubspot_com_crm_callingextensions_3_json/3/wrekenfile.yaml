      TYPE: BOOL
      REQUIRED: true
      comment: If true, this app will be considered to support channel connection
    - name: url
      NAME: url
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The URL to fetch phone numbers available for channel connection
  RecordingSettingsResponse:
    - name: urlToRetrieveAuthedRecording
      NAME: urlToRetrieveAuthedRecording
      type: STRING
      TYPE: STRING
      REQUIRED: true
  SettingsResponse:
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: When this calling extension was created.
    - name: supportsCustomObjects
      NAME: supportsCustomObjects
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When true, users will be able to click to dial from custom objects.
    - name: usesRemote
      NAME: usesRemote
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: "When false, this indicates that your calling app does not use the anchored calling remote within the HubSpot app. "
    - name: isReady
      NAME: isReady
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: When true, this indicates that your calling app is ready for production. Users will be able to select your calling app as their provider and can then click to dial within HubSpot.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of your calling service to display to users.
    - name: width
      NAME: width
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The target width of the iframe that will contain your phone/calling UI.
    - name: usesCallingWindow
      NAME: usesCallingWindow
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: "When false, this indicates that your calling app does not require the use of the separate calling window to hold the call connection. "
    - name: supportsInboundCalling
