      REQUIRED: true
      comment: "When true, this indicates that your calling app supports inbound calling within HubSpot. "
    - name: url
      NAME: url
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The URL to your phone/calling UI, built with the [Calling SDK](#).
    - name: height
      NAME: height
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The target height of the iframe that will contain your phone/calling UI.
    - name: updatedAt
      NAME: updatedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The last time the settings for this calling extension were modified.
