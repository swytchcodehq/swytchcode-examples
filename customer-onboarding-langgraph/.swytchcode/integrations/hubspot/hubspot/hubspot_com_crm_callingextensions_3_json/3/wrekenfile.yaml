VERSION: 2.0.2
DEFAULTS:
  query_hapikey: <HAPIKEY>
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.settings.get:
    SUMMARY: Retrieve settings
    DESC: Retrieve the settings configured for the app.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(SettingsResponse)
        RETURNVAR: crm_v3_settings_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_settings_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.settings.get
  crm.v3.settings.create:
    SUMMARY: Configure a calling extension
    DESC: Set the menu label, target iframe URL, and dimensions for your calling extension.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SettingsRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(SettingsRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SettingsResponse)
        RETURNVAR: crm_v3_settings_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_settings_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.settings.create
  crm.v3.settings.delete:
    SUMMARY: Delete calling settings
    DESC: Delete a calling extension. This will remove your service as an option for all connected accounts.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_settings_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.settings.delete
  crm.v3.settings.update:
    SUMMARY: Update settings
    DESC: Update existing calling extension settings.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SettingsPatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(SettingsPatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SettingsResponse)
        RETURNVAR: crm_v3_settings_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_settings_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.settings.update
  crm.v3.recording.get:
    SUMMARY: Retrieve recording settings
    DESC: Retrieve the URL that is registered for [call recording](https://developers.hubspot.com/docs/guides/apps/extensions/calling-extensions/recordings-and-transcriptions#register-your-app-s-endpoint-with-hubspot-using-the-calling-settings-api).
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/recording
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RecordingSettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(RecordingSettingsResponse)
        RETURNVAR: crm_v3_recording_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_recording_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.recording.get
  crm.v3.recording.create:
    SUMMARY: Enable the app for call recording
    DESC: Register an external URL that HubSpot will use to retrieve [call recordings](https://developers.hubspot.com/docs/guides/apps/extensions/calling-extensions/recordings-and-transcriptions#register-your-app-s-endpoint-with-hubspot-using-the-calling-settings-api).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/recording
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RecordingSettingsRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RecordingSettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(RecordingSettingsRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RecordingSettingsResponse)
        RETURNVAR: crm_v3_recording_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_recording_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.recording.create
  crm.v3.recording.update:
    SUMMARY: Update recording settings
    DESC: Update the URL that HubSpot will use to retrieve [call recordings](https://developers.hubspot.com/docs/guides/apps/extensions/calling-extensions/recordings-and-transcriptions#register-your-app-s-endpoint-with-hubspot-using-the-calling-settings-api).
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/recording
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RecordingSettingsPatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RecordingSettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(RecordingSettingsPatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RecordingSettingsResponse)
        RETURNVAR: crm_v3_recording_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_recording_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.recording.update
  crm.v3.ready.create:
    SUMMARY: Mark recording as ready for transcription
    DESC: Mark a call recording as ready for transcription, specifying the call by its ID (`engagementid`).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/extensions/calling/recordings/ready
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(MarkRecordingAsReadyRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(MarkRecordingAsReadyRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_ready_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.ready.create
  crm.v3.channelConnection.get:
    SUMMARY: Retrieve channel connection settings
    DESC: Retrieve the settings related to the app's [channel connection](https://developers.hubspot.com/docs/guides/api/crm/extensions/third-party-calling#fetch-existing-channel-connection-settings).
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/channel-connection
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ChannelConnectionSettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ChannelConnectionSettingsResponse)
        RETURNVAR: crm_v3_channelConnection_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_channelConnection_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.channelConnection.get
  crm.v3.channelConnection.create:
    SUMMARY: Configure channel connection settings
    DESC: "Configure [channel connection settings](https://developers.hubspot.com/docs/guides/api/crm/extensions/third-party-calling#create-channel-connection-settings) for the app. "
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/channel-connection
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ChannelConnectionSettingsRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ChannelConnectionSettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(ChannelConnectionSettingsRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ChannelConnectionSettingsResponse)
        RETURNVAR: crm_v3_channelConnection_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_channelConnection_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.channelConnection.create
  crm.v3.channelConnection.delete:
    SUMMARY: Delete channel connection settings
    DESC: Delete the [channel connection settings](https://developers.hubspot.com/docs/guides/api/crm/extensions/third-party-calling#delete-existing-channel-connection-settings) for the app.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/channel-connection
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_channelConnection_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.channelConnection.delete
  crm.v3.channelConnection.update:
    SUMMARY: Update channel connection settings
    DESC: Update existing [channel connection settings](https://developers.hubspot.com/docs/guides/api/crm/extensions/third-party-calling#manage-the-webhook-settings-for-channel-connection) for your app.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/extensions/calling/{appId}/settings/channel-connection
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ChannelConnectionSettingsPatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ChannelConnectionSettingsResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(ChannelConnectionSettingsPatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ChannelConnectionSettingsResponse)
        RETURNVAR: crm_v3_channelConnection_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_channelConnection_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.channelConnection.update
STRUCTS:
  ChannelConnectionSettingsRequest:
    - name: isReady
      NAME: isReady
