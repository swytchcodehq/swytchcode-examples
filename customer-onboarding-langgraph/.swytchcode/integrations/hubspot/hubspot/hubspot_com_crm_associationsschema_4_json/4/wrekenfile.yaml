VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v4.all.list:
    SUMMARY: Read All
    DESC: Returns all user configurations available on a given portal
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v4/associations/definitions/configurations/all
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicAssociationDefinitionUserConfigurationNoPaging)
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicAssociationDefinitionUserConfigurationNoPaging)
        RETURNVAR: crm_v4_all_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_all_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.all.list
  crm.v4.configurations.get:
    SUMMARY: Read
    DESC: Returns user configurations on all association definitions between two object types
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v4/associations/definitions/configurations/{fromObjectType}/{toObjectType}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicAssociationDefinitionUserConfigurationNoPaging)
    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicAssociationDefinitionUserConfigurationNoPaging)
        RETURNVAR: crm_v4_configurations_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_configurations_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.configurations.get
