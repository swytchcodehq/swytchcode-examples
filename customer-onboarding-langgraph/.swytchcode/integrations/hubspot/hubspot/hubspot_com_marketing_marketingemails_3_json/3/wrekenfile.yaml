VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  marketing.v3.statistics.list:
    SUMMARY: Get aggregated statistics.
    DESC: Use this endpoint to get aggregated statistics of emails sent in a specified time span. It also returns the list of emails that were sent during the time span.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/statistics/list
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AggregateEmailStatistics)
    INPUTS:
      - startTimestamp:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - endTimestamp:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - emailIds:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(AggregateEmailStatistics)
        RETURNVAR: marketing_v3_statistics_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_statistics_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.statistics.list
  marketing.v3.publish.create:
    SUMMARY: Publish or send a marketing email.
    DESC: If you have a Marketing Hub Enterprise account or the transactional email add-on, you can use this endpoint to publish an automated email or send/schedule a regular email.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/{emailId}/publish
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_publish_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.publish.create
  marketing.v3.createVariation.create:
    SUMMARY: Create an A/B test variation of a marketing email.
    DESC: Create a variation of a marketing email for an A/B test. The new variation will be created as a draft. If an active variation already exists, a new one won't be created.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/ab-test/create-variation
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AbTestCreateRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - body:
          TYPE: STRUCT(AbTestCreateRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_createVariation_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_createVariation_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.createVariation.create
  marketing.v3.histogram.list:
    SUMMARY: Get aggregated statistic intervals.
    DESC: Get aggregated statistics in intervals for a specified time span. Each interval contains aggregated statistics of the emails that were sent in that time.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/statistics/histogram
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalEmailStatisticIntervalNoPaging)
    INPUTS:
      - interval:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - startTimestamp:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - endTimestamp:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - emailIds:
          TYPE: "[]INT"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalEmailStatisticIntervalNoPaging)
        RETURNVAR: marketing_v3_histogram_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_histogram_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.histogram.list
  marketing.v3.getVariation.get:
    SUMMARY: Get the variation of a an A/B marketing email
    DESC: This endpoint lets you obtain the variation of an A/B marketing email. If the email is variation A (master) it will return variation B (variant) and vice versa.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/{emailId}/ab-test/get-variation
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_getVariation_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_getVariation_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.getVariation.get
  marketing.v3.reset.create:
    SUMMARY: Reset Draft
    DESC: Resets the draft back to a copy of the live object.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/{emailId}/draft/reset
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_reset_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.reset.create
  marketing.v3.restoreToDraft.create:
    SUMMARY: Restore a revision of a marketing email to DRAFT state
    DESC: "Restores a previous revision of a marketing email to DRAFT state. If there is currently something in the draft for that object, it is overwritten. "
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/{emailId}/revisions/{revisionId}/restore-to-draft
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_restoreToDraft_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_restoreToDraft_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.restoreToDraft.create
  marketing.v3.draft.get:
    SUMMARY: Get draft version of a marketing email
    DESC: Get the draft version of an email (if it exists). If no draft version exists, the published email is returned.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/{emailId}/draft
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_draft_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_draft_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.draft.get
  marketing.v3.draft.update:
    SUMMARY: Create or update draft version
    DESC: Create or update the draft version of a marketing email. If no draft exists, the system creates a draft from the current “live” email then applies the request body to that draft. The draft version only lives on the buffer—the email is not cloned.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /marketing/v3/emails/{emailId}/draft
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(EmailUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(EmailUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_draft_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_draft_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.draft.update
  marketing.v3.revisions.get:
    SUMMARY: Get revisions of a marketing email
    DESC: Get a list of all versions of a marketing email, with each entry including the full state of that particular version. The current revision has the ID -1.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/{emailId}/revisions
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalVersionPublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalVersionPublicEmail)
        RETURNVAR: marketing_v3_revisions_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_revisions_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.revisions.get
  marketing.v3.unpublish.create:
    SUMMARY: Unpublish or cancel a marketing email.
    DESC: If you have a Marketing Hub Enterprise account or the transactional email add-on, you can use this endpoint to unpublish an automated email or cancel a regular email. If the email is already in the process of being sent, canceling might not be possible.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/{emailId}/unpublish
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_unpublish_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.unpublish.create
  marketing.v3.revisions.get_963f:
    SUMMARY: Get a revision of a marketing email.
    DESC: Get a specific revision of a marketing email.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/{emailId}/revisions/{revisionId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VersionPublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VersionPublicEmail)
        RETURNVAR: marketing_v3_revisions_get_963f
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_revisions_get_963f_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.revisions.get_963f
  marketing.v3.clone.create:
    SUMMARY: Clone a marketing email.
    DESC: This will create a duplicate email with the same properties as the original, with the exception of a unique ID.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/clone
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(EmailCloneRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - body:
          TYPE: STRUCT(EmailCloneRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_clone_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_clone_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.clone.create
  marketing.v3.emails.list:
    SUMMARY: Get all marketing emails for a HubSpot account.
    DESC: The results can be filtered, allowing you to find a specific set of emails. See the table below for a full list of filtering options.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalPublicEmailForwardPaging)
    INPUTS:
      - createdAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - includeStats:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - marketingCampaignNames:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - workflowNames:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - isPublished:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - includedProperties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - campaign:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalPublicEmailForwardPaging)
        RETURNVAR: marketing_v3_emails_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_emails_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.emails.list
  marketing.v3.emails.create:
    SUMMARY: Create a new marketing email.
    DESC: Use this endpoint to create a new marketing email.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(EmailCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - body:
          TYPE: STRUCT(EmailCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_emails_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_emails_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.emails.create
  marketing.v3.restore.create:
    SUMMARY: Restore a revision of a marketing email
    DESC: Restores a previous revision of a marketing email. The current revision becomes old, and the restored revision is given a new version number.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/emails/{emailId}/revisions/{revisionId}/restore
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_restore_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.restore.create
  marketing.v3.emails.get:
    SUMMARY: Get the details of a specified marketing email.
    DESC: Get the details for a marketing email.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/emails/{emailId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - includeStats:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - marketingCampaignNames:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - workflowNames:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - includedProperties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_emails_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_emails_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.emails.get
  marketing.v3.emails.delete:
    SUMMARY: Delete a marketing email.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /marketing/v3/emails/{emailId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_emails_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.emails.delete
  marketing.v3.emails.update:
    SUMMARY: Update a marketing email.
    DESC: Change properties of a marketing email.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /marketing/v3/emails/{emailId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(EmailUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicEmail)
    INPUTS:
      - emailId:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(EmailUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicEmail)
        RETURNVAR: marketing_v3_emails_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_emails_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.emails.update
