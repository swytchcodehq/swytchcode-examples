VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  visitor-identification.v3.tokens.create:
    SUMMARY: Generate a token
    DESC: Generates a new visitor identification token. This token will be unique every time this endpoint is called, even if called with the same email address. This token is temporary and will expire after 12 hours
    HTTP:
      METHOD: POST
      ENDPOINT: /visitor-identification/v3/tokens/create
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IdentificationTokenGenerationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IdentificationTokenResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(IdentificationTokenGenerationRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(IdentificationTokenResponse)
        RETURNVAR: visitor-identification_v3_tokens_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: visitor-identification_v3_tokens_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: visitor-identification.v3.tokens.create
STRUCTS:
  IdentificationTokenResponse:
    - name: token
      NAME: token
      type: STRING
      TYPE: STRING
      REQUIRED: true
  IdentificationTokenGenerationRequest:
    - name: firstName
      NAME: firstName
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The first name of the visitor that you wish to identify. This value will only be set in HubSpot for new contacts and existing contacts where first name is unknown. Optional.
    - name: lastName
      NAME: lastName
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The last name of the visitor that you wish to identify. This value will only be set in HubSpot for new contacts and existing contacts where last name is unknown. Optional.
    - name: email
      NAME: email
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The email of the visitor that you wish to identify
