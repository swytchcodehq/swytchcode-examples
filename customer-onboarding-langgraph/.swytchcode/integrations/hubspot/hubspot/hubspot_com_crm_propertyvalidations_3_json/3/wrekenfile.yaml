VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.propertyValidations.get:
    SUMMARY: Read all property validation rules for an object
    DESC: Read all properties with validation rules for a given object.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/property-validations/{objectTypeId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicPropertyValidationRuleMapNoPaging)
    INPUTS:
      - objectTypeId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicPropertyValidationRuleMapNoPaging)
        RETURNVAR: crm_v3_propertyValidations_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_propertyValidations_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.propertyValidations.get
  crm.v3.propertyValidations.get_fe07:
    SUMMARY: Read validation rules for a property
    DESC: Read a property's validation rules identified by {propertyName}.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/property-validations/{objectTypeId}/{propertyName}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicPropertyValidationRuleNoPaging)
    INPUTS:
      - objectTypeId:
          TYPE: STRING
          LOCATION: path
      - propertyName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicPropertyValidationRuleNoPaging)
        RETURNVAR: crm_v3_propertyValidations_get_fe07
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_propertyValidations_get_fe07_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.propertyValidations.get_fe07
STRUCTS:
  PublicPropertyValidationRuleMap:
    - name: propertyName
      NAME: propertyName
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: propertyValidationRules
      NAME: propertyValidationRules
      type: "[]STRUCT(PublicPropertyValidationRule)"
      TYPE: "[]STRUCT(PublicPropertyValidationRule)"
      REQUIRED: true
  PublicPropertyValidationRule:
    - name: ruleType
      NAME: ruleType
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: ruleArguments
      NAME: ruleArguments
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
  CollectionResponsePublicPropertyValidationRuleNoPaging:
    - name: results
      NAME: results
      type: "[]STRUCT(PublicPropertyValidationRule)"
      TYPE: "[]STRUCT(PublicPropertyValidationRule)"
      REQUIRED: true
  CollectionResponsePublicPropertyValidationRuleMapNoPaging:
    - name: results
      NAME: results
      type: "[]STRUCT(PublicPropertyValidationRuleMap)"
      TYPE: "[]STRUCT(PublicPropertyValidationRuleMap)"
      REQUIRED: true
