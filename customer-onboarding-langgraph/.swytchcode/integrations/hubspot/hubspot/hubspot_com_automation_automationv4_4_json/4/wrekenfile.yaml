VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  automation.v4.read.create:
    SUMMARY: Retrieve a batch of workflows
    DESC: Retrieve a batch of workflows by ID.
    HTTP:
      METHOD: POST
      ENDPOINT: /automation/v4/flows/batch/read
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ApiFlowBatchInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseApiFlow)
    INPUTS:
      - body:
          TYPE: STRUCT(ApiFlowBatchInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseApiFlow)
        RETURNVAR: automation_v4_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseApiFlowWithErrors)
        RETURNVAR: automation_v4_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.read.create
  automation.v4.emailCampaigns.list:
    SUMMARY: Retrieve workflow emails
    DESC: Retrieve emails sent by a workflow by ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /automation/v4/flows/email-campaigns
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseApiFlowEmailCampaign)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - flowId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseApiFlowEmailCampaign)
        RETURNVAR: automation_v4_emailCampaigns_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_emailCampaigns_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.emailCampaigns.list
  automation.v4.read.create_ce2d:
    SUMMARY: Retrieve migrated workflow mappings
    DESC: Retrieve the IDs of v3 workflows that have been migrated to the v4 API.
    HTTP:
      METHOD: POST
      ENDPOINT: /automation/v4/workflow-id-mappings/batch/read
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ApiFlowBatchMigrationInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseFlowIdWorkflowIdMappingResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ApiFlowBatchMigrationInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseFlowIdWorkflowIdMappingResponse)
        RETURNVAR: automation_v4_read_create_ce2d
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseFlowIdWorkflowIdMappingResponseWithErrors)
        RETURNVAR: automation_v4_read_create_ce2d_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_read_create_ce2d_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.read.create_ce2d
  automation.v4.flows.list:
    SUMMARY: Retrieve workflows
    DESC: Retrieve all workflows from an account.
    HTTP:
      METHOD: GET
      ENDPOINT: /automation/v4/flows
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseApiFlowListingForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseApiFlowListingForwardPaging)
        RETURNVAR: automation_v4_flows_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_flows_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.flows.list
  automation.v4.flows.create:
    SUMMARY: Create a new workflow
    DESC: Create a new workflow.
    HTTP:
      METHOD: POST
      ENDPOINT: /automation/v4/flows
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ApiFlowCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApiFlow)
    INPUTS:
      - body:
          TYPE: STRUCT(ApiFlowCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ApiFlow)
        RETURNVAR: automation_v4_flows_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_flows_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.flows.create
  automation.v4.flows.get:
    SUMMARY: Retrieve workflow details
    DESC: Retrieve all details for a specific workflow by ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /automation/v4/flows/{flowId}
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApiFlow)
    INPUTS:
      - flowId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ApiFlow)
        RETURNVAR: automation_v4_flows_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_flows_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.flows.get
  automation.v4.flows.update:
    SUMMARY: Update a workflow
    DESC: Update a workflow by ID.
    HTTP:
      METHOD: PUT
      ENDPOINT: /automation/v4/flows/{flowId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ApiFlowPutRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApiFlow)
    INPUTS:
      - flowId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ApiFlowPutRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ApiFlow)
        RETURNVAR: automation_v4_flows_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_flows_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.flows.update
  automation.v4.flows.delete:
    SUMMARY: Delete a workflow
    DESC: Fully delete a workflow by ID. Deleted workflows cannot be restored via the API. If you need to restore an accidentally deleted flow, you'll need to contact support.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /automation/v4/flows/{flowId}
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - flowId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_flows_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.flows.delete
