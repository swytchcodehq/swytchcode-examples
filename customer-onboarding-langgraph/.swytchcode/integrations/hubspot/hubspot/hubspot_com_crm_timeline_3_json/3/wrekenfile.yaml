VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  query_hapikey: <HAPIKEY>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  integrators.timeline.detail.get:
    SUMMARY: Gets the detailTemplate as rendered
    DESC: This will take the `detailTemplate` from the event template and return an object rendering the specified event. If the template references `extraData` that isn't found in the event, it will be ignored and we'll render without it.
    HTTP:
      METHOD: GET
      ENDPOINT: /integrators/timeline/v3/events/{eventTemplateId}/{eventId}/detail
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EventDetail)
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - eventId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EventDetail)
        RETURNVAR: integrators_timeline_detail_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_detail_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.detail.get
  integrators.timeline.events.create:
    SUMMARY: Create a single event
    DESC: Creates an instance of a timeline event based on an event template. Once created, this event is immutable on the object timeline and cannot be modified. If the event template was configured to update object properties via `objectPropertyName`, this call will also attempt to updates those properties, or add them if they don't exist.
    HTTP:
      METHOD: POST
      ENDPOINT: /integrators/timeline/v3/events
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TimelineEvent)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(TimelineEvent)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventResponse)
        RETURNVAR: integrators_timeline_events_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_events_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.events.create
  integrators.timeline.tokens.update:
    SUMMARY: Updates an existing token on an event template
    DESC: This will update the existing token on an event template. Name and type can't be changed on existing tokens.
    HTTP:
      METHOD: PUT
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates/{eventTemplateId}/tokens/{tokenName}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TimelineEventTemplateTokenUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventTemplateToken)
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - tokenName:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(TimelineEventTemplateTokenUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventTemplateToken)
        RETURNVAR: integrators_timeline_tokens_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_tokens_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.tokens.update
  integrators.timeline.tokens.delete:
    SUMMARY: Removes a token from the event template
    DESC: |-
      This will remove the token from an existing template. Existing events and CRM objects will still retain the token and its mapped object properties, but new ones will not.

      The timeline will still display this property for older CRM objects if it's still referenced in the template `Markdown`. New events will not.

      Any lists or reports referencing deleted tokens will no longer return new contacts, but old ones will still exist in the lists.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates/{eventTemplateId}/tokens/{tokenName}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - tokenName:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_tokens_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.tokens.delete
  integrators.timeline.events.get:
    SUMMARY: Gets the event
    DESC: This returns the previously created event. It contains all existing info for the event, but not necessarily the CRM object.
    HTTP:
      METHOD: GET
      ENDPOINT: /integrators/timeline/v3/events/{eventTemplateId}/{eventId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventResponse)
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - eventId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventResponse)
        RETURNVAR: integrators_timeline_events_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_events_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.events.get
  integrators.timeline.batch.create:
    SUMMARY: Creates multiple events
    DESC: Creates multiple instances of timeline events based on an event template. Once created, these event are immutable on the object timeline and cannot be modified. If the event template was configured to update object properties via `objectPropertyName`, this call will also attempt to updates those properties, or add them if they don't exist.
    HTTP:
      METHOD: POST
      ENDPOINT: /integrators/timeline/v3/events/batch/create
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputTimelineEvent)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputTimelineEvent)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_batch_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseTimelineEventResponse)
        RETURNVAR: integrators_timeline_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseTimelineEventResponseWithErrors)
        RETURNVAR: integrators_timeline_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.batch.create
  integrators.timeline.render.get:
    SUMMARY: Renders the header or detail as HTML
    DESC: This will take either the `headerTemplate` or `detailTemplate` from the event template and render for the specified event as HTML. If the template references `extraData` that isn't found in the event, it will be ignored and we'll render without it.
    HTTP:
      METHOD: GET
      ENDPOINT: /integrators/timeline/v3/events/{eventTemplateId}/{eventId}/render
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: text/html
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - eventId:
          TYPE: STRING
          LOCATION: path
      - detail:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_render_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_render_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.render.get
  integrators.timeline.eventTemplates.get:
    SUMMARY: List all event templates for your app
    DESC: Use this to list all event templates owned by your app.
    HTTP:
      METHOD: GET
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseTimelineEventTemplateNoPaging)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseTimelineEventTemplateNoPaging)
        RETURNVAR: integrators_timeline_eventTemplates_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_eventTemplates_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.eventTemplates.get
  integrators.timeline.eventTemplates.create:
    SUMMARY: Create an event template for your app
    DESC: |-
      Event templates define the general structure for a custom timeline event. This includes formatted copy for its heading and details, as well as any custom property definitions. The event could be something like viewing a video, registering for a webinar, or filling out a survey. A single app can define multiple event templates.

      Event templates will be created for contacts by default, but they can be created for companies, tickets, and deals as well.

      Each event template contains its own set of tokens and `Markdown` templates. These tokens can be associated with any CRM object properties via the `objectPropertyName` field to fully build out CRM objects.

      You must create an event template before you can create events.
    HTTP:
      METHOD: POST
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TimelineEventTemplateCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventTemplate)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(TimelineEventTemplateCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventTemplate)
        RETURNVAR: integrators_timeline_eventTemplates_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_eventTemplates_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.eventTemplates.create
  integrators.timeline.eventTemplates.get_2c0:
    SUMMARY: Gets a specific event template for your app
    DESC: View the current state of a specific template and its tokens.
    HTTP:
      METHOD: GET
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates/{eventTemplateId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventTemplate)
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventTemplate)
        RETURNVAR: integrators_timeline_eventTemplates_get_2c0
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_eventTemplates_get_2c0_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.eventTemplates.get_2c0
  integrators.timeline.eventTemplates.update:
    SUMMARY: Update an existing event template
    DESC: |-
      Updates an existing template and its tokens. This is primarily used to update the headerTemplate/detailTemplate, and those changes will take effect for existing events.

      You can also update or replace all the tokens in the template here instead of doing individual API calls on the `/tokens` endpoint.
    HTTP:
      METHOD: PUT
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates/{eventTemplateId}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TimelineEventTemplateUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventTemplate)
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(TimelineEventTemplateUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventTemplate)
        RETURNVAR: integrators_timeline_eventTemplates_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_eventTemplates_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.eventTemplates.update
  integrators.timeline.eventTemplates.delete:
    SUMMARY: Deletes an event template for the app
    DESC: |-
      This will delete the event template. All associated events will be removed from search results and the timeline UI.

      This action can't be undone, so it's highly recommended that you stop using any associated events before deleting a template.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates/{eventTemplateId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_eventTemplates_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.eventTemplates.delete
  integrators.timeline.tokens.create:
    SUMMARY: Adds a token to an existing event template
    DESC: |-
      Once you've defined an event template, it's likely that you'll want to define tokens for it as well. You can do this on the event template itself or update individual tokens here.

      Event type tokens allow you to attach custom data to events displayed in a timeline or used for list segmentation.

      You can also use `objectPropertyName` to associate any CRM object properties. This will allow you to fully build out CRM objects.

      Token names should be unique across the template.
    HTTP:
      METHOD: POST
      ENDPOINT: /integrators/timeline/v3/{appId}/event-templates/{eventTemplateId}/tokens
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TimelineEventTemplateToken)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TimelineEventTemplateToken)
    INPUTS:
      - eventTemplateId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(TimelineEventTemplateToken)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TimelineEventTemplateToken)
        RETURNVAR: integrators_timeline_tokens_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: integrators_timeline_tokens_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: integrators.timeline.tokens.create
STRUCTS:
  TimelineEvent:
    - name: eventTemplateId
      NAME: eventTemplateId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The event template ID.
    - name: extraData
      NAME: extraData
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: Additional event-specific data that can be interpreted by the template's markdown.
    - name: timelineIFrame
      NAME: timelineIFrame
      type: STRUCT(TimelineEventIFrame)
      TYPE: STRUCT(TimelineEventIFrame)
      REQUIRED: false
    - name: domain
      NAME: domain
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The event domain (often paired with utk).
    - name: tokens
      NAME: tokens
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
      comment: A collection of token keys and values associated with the template tokens.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Identifier for the event. This is optional, and we recommend you do not pass this in. We will create one for you if you omit this. You can also use `{{uuid}}` anywhere in the ID to generate a unique string, guaranteeing uniqueness.
    - name: utk
      NAME: utk
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Use the `utk` parameter to associate an event with a contact by `usertoken`. This is recommended if you don't know a user's email, but have an identifying user token in your cookie.
    - name: email
      NAME: email
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The email address used for contact-specific events. This can be used to identify existing contacts, create new ones, or change the email for an existing contact (if paired with the `objectId`).
    - name: objectId
      NAME: objectId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The CRM object identifier. This is required for every event other than contacts (where utk or email can be used).
    - name: timestamp
      NAME: timestamp
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: The time the event occurred. If not passed in, the curren time will be assumed. This is used to determine where an event is shown on a CRM object's timeline.
  TimelineEventIFrame:
    - name: linkLabel
      NAME: linkLabel
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The text displaying the link that will display the iframe.
    - name: headerLabel
      NAME: headerLabel
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The label of the modal window that displays the iframe contents.
    - name: width
      NAME: width
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The width of the modal window in pixels.
    - name: url
      NAME: url
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The URI of the iframe contents.
    - name: height
      NAME: height
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The height of the modal window in pixels.
  StandardError:
    - name: subCategory
      NAME: subCategory
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: context
      NAME: context
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: true
    - name: links
      NAME: links
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: category
      NAME: category
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: message
      NAME: message
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: errors
      NAME: errors
      type: "[]STRUCT(ErrorDetail)"
      TYPE: "[]STRUCT(ErrorDetail)"
      REQUIRED: true
    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: true
  ErrorDetail:
    - name: subCategory
      NAME: subCategory
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A specific category that contains more specific detail about the error
    - name: code
      NAME: code
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The status code associated with the error detail
    - name: in
      NAME: in
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the field or parameter in which the error was found.
    - name: context
      NAME: context
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: false
      comment: Context about the error condition
    - name: message
      NAME: message
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A human readable message describing the error along with remediation steps where appropriate
  EventDetail:
    - name: details
      NAME: details
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The details Markdown rendered as HTML.
  TimelineEventTemplateCreateRequest:
    - name: detailTemplate
      NAME: detailTemplate
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: This uses Markdown syntax with Handlebars and event-specific data to render HTML on a timeline when you expand the details.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The template name.
    - name: tokens
      NAME: tokens
      type: "[]STRUCT(TimelineEventTemplateToken)"
      TYPE: "[]STRUCT(TimelineEventTemplateToken)"
      REQUIRED: true
      comment: A collection of tokens that can be used as custom properties on the event and to create fully fledged CRM objects.
    - name: headerTemplate
      NAME: headerTemplate
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: This uses Markdown syntax with Handlebars and event-specific data to render HTML on a timeline as a header.
    - name: objectType
      NAME: objectType
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of CRM object this template is for. [Contacts, companies, tickets, and deals] are supported.
  TimelineEventTemplateToken:
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: The date and time that the Event Template Token was created, as an ISO 8601 timestamp. Will be null if the template was created before Feb 18th, 2020.
    - name: options
      NAME: options
      type: "[]STRUCT(TimelineEventTemplateTokenOption)"
      TYPE: "[]STRUCT(TimelineEventTemplateTokenOption)"
      REQUIRED: false
      comment: If type is `enumeration`, we should have a list of options to choose from.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the token referenced in the templates. This must be unique for the specific template. It may only contain alphanumeric characters, periods, dashes, or underscores (. - _).
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Used for list segmentation and reporting.
    - name: objectPropertyName
      NAME: objectPropertyName
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the CRM object property. This will populate the CRM object property associated with the event. With enough of these, you can fully build CRM objects via the Timeline API.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The data type of the token. You can currently choose from [string, number, date, enumeration].
    - name: updatedAt
      NAME: updatedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: The date and time that the Event Template Token was last updated, as an ISO 8601 timestamp. Will be null if the template was created before Feb 18th, 2020.
  TimelineEventTemplateTokenOption:
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: value
      NAME: value
      type: STRING
      TYPE: STRING
      REQUIRED: true
  TimelineEventTemplateUpdateRequest:
    - name: detailTemplate
      NAME: detailTemplate
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: This uses Markdown syntax with Handlebars and event-specific data to render HTML on a timeline when you expand the details.
