VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.batch.update:
    SUMMARY: Update a batch of Blog Tags
    DESC: Update the Blog Tag objects identified in the request body.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/tags/batch/update
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputJsonNode)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseTag)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputJsonNode)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseTag)
        RETURNVAR: cms_v3_batch_update
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseTagWithErrors)
        RETURNVAR: cms_v3_batch_update_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_batch_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.batch.update
  cms.v3.updateLanguages.create:
    SUMMARY: Update languages of multi-language group
    DESC: Explicitly set new languages for each Blog Tag in a multi-language group.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blogs/tags/multi-language/update-languages
