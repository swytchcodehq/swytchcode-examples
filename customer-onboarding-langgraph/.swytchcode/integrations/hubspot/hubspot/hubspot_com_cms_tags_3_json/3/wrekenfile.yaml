      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UpdateLanguagesRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(UpdateLanguagesRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_updateLanguages_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_updateLanguages_create_NaN
        STATUS: .nan
    ERRORS:
