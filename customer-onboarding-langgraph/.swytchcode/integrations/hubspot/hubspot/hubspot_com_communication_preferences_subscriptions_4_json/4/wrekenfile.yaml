METHODS:
  communication-preferences.v4.write.create:
    SUMMARY: Batch update subscription status
    DESC: Update the subscription status for a set of contacts.
    HTTP:
      METHOD: POST
      ENDPOINT: /communication-preferences/v4/statuses/batch/write
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicStatusRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponsePublicStatus)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputPublicStatusRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponsePublicStatus)
        RETURNVAR: communication-preferences_v4_write_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: communication-preferences_v4_write_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: communication-preferences.v4.write.create
  communication-preferences.v4.unsubscribeAll.get:
    SUMMARY: Retrieve a contact's unsubscribed status
    DESC: Check whether a contact has unsubscribed from all email subscriptions. If a contact has not opted out of all communications, the response `results` array will be empty.
    HTTP:
      METHOD: GET
      ENDPOINT: /communication-preferences/v4/statuses/{subscriberIdString}/unsubscribe-all
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ActionResponseWithResultsPublicWideStatus)
    INPUTS:
      - subscriberIdString:
          TYPE: STRING
          LOCATION: path
      - businessUnitId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - verbose:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - channel:
          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ActionResponseWithResultsPublicWideStatus)
        RETURNVAR: communication-preferences_v4_unsubscribeAll_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: communication-preferences_v4_unsubscribeAll_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: communication-preferences.v4.unsubscribeAll.get
  communication-preferences.v4.unsubscribeAll.create:
    SUMMARY: Unsubscribe a contact from all subscriptions
    DESC: Unsubscribe a contact from all email subscriptions.
