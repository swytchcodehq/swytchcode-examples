VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.enablement.list:
    SUMMARY: Read All
    DESC: Returns all objects in the object library and their enablement status
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/object-library/enablement
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PortalObjectTypeEnablementPublicResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(PortalObjectTypeEnablementPublicResponse)
        RETURNVAR: crm_v3_enablement_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_enablement_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.enablement.list
  crm.v3.enablement.get:
    SUMMARY: Read
    DESC: Returns an object and its enablement status
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/object-library/enablement/{objectTypeId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ObjectTypeEnablementPublicResponse)
    INPUTS:
      - objectTypeId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ObjectTypeEnablementPublicResponse)
        RETURNVAR: crm_v3_enablement_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_enablement_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.enablement.get
STRUCTS:
  ObjectTypeEnablementPublicResponse:
    - name: enablement
      NAME: enablement
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
  PortalObjectTypeEnablementPublicResponse:
    - name: enablementByObjectTypeId
      NAME: enablementByObjectTypeId
      type: map[STRING]BOOL
      TYPE: map[STRING]BOOL
      REQUIRED: true
