VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.content.get:
    SUMMARY: Download a file
    DESC: Downloads the byte contents of the file at the specified path in the specified environment.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/source-code/{environment}/content/{path}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - environment:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_content_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.content.get
  cms.v3.content.update:
    SUMMARY: Create or update a file
    DESC: Upserts a file at the specified path in the specified environment. Accepts multipart/form-data content type.
    HTTP:
      METHOD: PUT
      ENDPOINT: /cms/v3/source-code/{environment}/content/{path}
      HEADERS:
        Content-Type: multipart/form-data
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: multipart/form-data
      ACCEPT: application/json
      BODYTYPE: form-data
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AssetFileMetadata)
    INPUTS:
      - environment:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
      - file:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(AssetFileMetadata)
        RETURNVAR: cms_v3_content_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_content_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.content.update
  cms.v3.content.create:
    SUMMARY: Create a file
    DESC: Creates a file at the specified path in the specified environment. Accepts multipart/form-data content type. Throws an error if a file already exists at the specified path.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/source-code/{environment}/content/{path}
      HEADERS:
        Content-Type: multipart/form-data
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: multipart/form-data
      ACCEPT: application/json
      BODYTYPE: form-data
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AssetFileMetadata)
    INPUTS:
      - environment:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
      - file:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(AssetFileMetadata)
        RETURNVAR: cms_v3_content_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_content_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.content.create
  cms.v3.content.delete:
    SUMMARY: Delete a file
    DESC: Deletes the file at the specified path in the specified environment.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /cms/v3/source-code/{environment}/content/{path}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - environment:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_content_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.content.delete
  cms.v3.metadata.get:
    SUMMARY: Get the metadata for a file
    DESC: Gets the metadata object for the file at the specified path in the specified environment.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/source-code/{environment}/metadata/{path}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AssetFileMetadata)
    INPUTS:
      - environment:
          TYPE: STRING
          LOCATION: path
      - path:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(AssetFileMetadata)
        RETURNVAR: cms_v3_metadata_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_metadata_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.metadata.get
  cms.v3.sourceCode.validate:
    SUMMARY: Validate the contents of a file
    DESC: Validates the file contents passed to the endpoint given a specified path and environment. Accepts multipart/form-data content type.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/source-code/{environment}/validate/{path}
      HEADERS:
        Content-Type: multipart/form-data
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: multipart/form-data
      ACCEPT: application/json
      BODYTYPE: form-data
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - path:
          TYPE: STRING
          LOCATION: path
      - environment:
          TYPE: STRING
          LOCATION: path
      - file:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_sourceCode_validate_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.sourceCode.validate
  cms.v3.async.create:
    SUMMARY: Extract a zip file
    DESC: Extract a zip file in the developer file system. Extraction status can be checked with the `/extract/async/tasks/taskId/status` endpoint below.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/source-code/extract/async
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(FileExtractRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TaskLocator)
    INPUTS:
      - body:
          TYPE: STRUCT(FileExtractRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TaskLocator)
        RETURNVAR: cms_v3_async_create_202
        STATUS: 202
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_async_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.async.create
  cms.v3.status.get:
    SUMMARY: Get extraction status
    DESC: Get the status of an extraction by the `taskId` returned from the initial `extract/async` request.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/source-code/extract/async/tasks/{taskId}/status
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ActionResponse)
    INPUTS:
      - taskId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ActionResponse)
        RETURNVAR: cms_v3_status_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_status_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.status.get
STRUCTS:
  AssetFileMetadata:
    - name: createdAt
      NAME: createdAt
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Timestamp of when the object was first created.
    - name: archivedAt
      NAME: archivedAt
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Timestamp of when the object was archived (deleted).
    - name: folder
      NAME: folder
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Determines whether or not this path points to a folder.
    - name: children
      NAME: children
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: If the object is a folder, contains the filenames of the files within the folder.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the file.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The path of the file in the CMS Developer File System.
    - name: hash
      NAME: hash
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: updatedAt
      NAME: updatedAt
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Timestamp of when the object was last updated.
  FileExtractRequest:
    - name: path
      NAME: path
      type: STRING
      TYPE: STRING
      REQUIRED: true
  ActionResponse:
    - name: completedAt
      NAME: completedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: requestedAt
      NAME: requestedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: startedAt
      NAME: startedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: links
      NAME: links
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: false
    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: true
  TaskLocator:
    - name: links
      NAME: links
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: false
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
