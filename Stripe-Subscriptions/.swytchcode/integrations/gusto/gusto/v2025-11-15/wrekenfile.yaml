          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
      - body:
          TYPE: STRUCT(v1.employee.i9Authorization.updateRequest)
          REQUIRED: true
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(v1.employee.i9Authorization.updateResponse200)
        RETURNVAR: v1_employee_i9Authorization_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error404)
        STATUS: 404
