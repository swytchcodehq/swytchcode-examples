  v1.employee.stateTaxes.get:
    SUMMARY: Get attributes relevant for an employee's state taxes
    DESC: "Get attributes relevant for an employee's state taxes. The data required to correctly calculate an employee's state taxes varies by both home and work location. This API returns information about each question that must be answered grouped by state. Mostly commonly, an employee lives and works in the same state and will only have questions for a single state. The response contains metadata about each question, the type of answer expected, and the current answer stored in Gusto for that question. Answers are represented by an array. Today, this array can only be empty or contain exactly one element, but is designed to allow for forward compatibility with effective-dated fields. Until effective dated answers are supported, the `valid_from` and `valid_up_to` must always be `\"2010-01-01\"` and `null` respectively. ## About filing new hire reports Payroll Admins are responsible for filing a new hire report for each Employee. The `file_new_hire_report` question will only be listed if: - the `employee.onboarding_status` is one of the following:   - `admin_onboarding_incomplete`   - `self_onboarding_awaiting_admin_review` - that employee's work state requires filing a new hire report scope: `employee_state_taxes:read`"
    HTTP:
      METHOD: GET
      ENDPOINT: /{baseUrl}/v1/employees/:employee_uuid/state_taxes
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(v1.employee.stateTaxes.getResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(v1.employee.stateTaxes.getResponse200)
        RETURNVAR: v1_employee_stateTaxes_get
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error404)
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: v1.employee.stateTaxes.get
  v1.employee.stateTaxes.update:
    SUMMARY: Update attributes relevant for an employee's state taxes
    DESC: "Update attributes relevant for an employee's state taxes. As described for the GET endpoint, the answers must be supplied in the effective-dated format, but currently only a single answer will be accepted - `valid_from` and `valid_up_to` must be `\"2010-01-01\"` and `null` respectively. scope: `employee_state_taxes:write`"
    HTTP:
      METHOD: PUT
      ENDPOINT: /{baseUrl}/v1/employees/:employee_uuid/state_taxes
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(v1.employee.stateTaxes.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
