  v1.contractor.onboardingStatus.get:
    SUMMARY: Retrieves a contractor's onboarding status
    DESC: "Retrieves a contractor's onboarding status. The data returned helps inform the required onboarding steps and respective completion status. scope: `contractors:read` ## onboarding_status ### Admin-facilitated onboarding | onboarding_status | Description | |:------------------|------------:| | `admin_onboarding_incomplete` | Admin needs to enter basic information about the contractor. | | `admin_onboarding_review` | All information has been completed and admin needs to confirm onboarding. | | `onboarding_completed` | Contractor has been fully onboarded and verified. | ### Contractor self-onboarding | onboarding_status | Description | | --- | ----------- | | `admin_onboarding_incomplete` | Admin needs to enter basic information about the contractor. | | `self_onboarding_not_invited` | Admin has the intention to invite the contractor to self-onboard (e.g., marking a checkbox), but the system has not yet sent the invitation. | | `self_onboarding_invited` | Contractor has been sent an invitation to self-onboard. | | `self_onboarding_started` | Contractor has started the self-onboarding process. | | `self_onboarding_review` | Admin needs to review contractors's entered information and confirm onboarding. | | `onboarding_completed` | Contractor has been fully onboarded and verified. | ## onboarding_steps | onboarding_steps | Requirement(s) to be completed | |:-----------------|-------------------------------:| | `basic_details` | Add individual contractor's first name, last name, social security number or Business name and EIN depending on the contractor type | | `add_address` | Add contractor address. | | `compensation_details` | Add contractor compensation. | | `payment_details` | (optional) Set up contractor's direct deposit or set to check. | | `sign_documents` | Contractor forms (e.g., W9) are generated & signed. | | `file_new_hire_report` | Contractor new hire report is generated. |"
    HTTP:
      METHOD: GET
      ENDPOINT: /{baseUrl}/v1/contractors/:contractor_uuid/onboarding_status
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(v1.contractor.onboardingStatus.getResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(v1.contractor.onboardingStatus.getResponse200)
        RETURNVAR: v1_contractor_onboardingStatus_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: v1.contractor.onboardingStatus.get
  v1.contractor.onboardingStatus.update:
    SUMMARY: Updates a contractor's onboarding status
    DESC: "Updates a contractor's onboarding status. scope: `contractors:write` Below is a list of valid onboarding status changes depending on the intended action to be performed on behalf of the contractor. | Action | current onboarding_status | new onboarding_status | |:------------------|:------------:|----------:| | Mark a contractor as self-onboarding | `admin_onboarding_incomplete` | `self_onboarding_not_invited` | | Invite a contractor to self-onboard | `admin_onboarding_incomplete` or `self_onboarding_not_invited` | `self_onboarding_invited` | | Cancel a contractor's self-onboarding | `self_onboarding_invited` or `self_onboarding_not_invited` | `admin_onboarding_incomplete` | | Review a contractor's self-onboarded info | `self_onboarding_started` | `self_onboarding_review` | | Finish a contractor's onboarding | `admin_onboarding_review` or `self_onboarding_review` | `onboarding_completed` |"
    HTTP:
      METHOD: PUT
      ENDPOINT: /{baseUrl}/v1/contractors/:contractor_uuid/onboarding_status
