          REQUIRED: true
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(v1.employee.onboardingStatus.updateResponse200)
        RETURNVAR: v1_employee_onboardingStatus_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error404)
