    DESC: "Creates a new, unprocessed, off-cycle payroll. ## `off_cycle_reason` By default: - External benefits and deductions will be included when the `off_cycle_reason` is set to `Correction`. - All benefits and deductions are blocked when the `off_cycle_reason` is set to `Bonus`. These elections can be overridden with the `skip_regular_deductions` boolean. scope: `payrolls:run`"
