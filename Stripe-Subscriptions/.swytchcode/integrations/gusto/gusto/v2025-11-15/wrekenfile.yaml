  v1.company.bankAccounts.create:
    SUMMARY: This endpoint creates a new company bank account
    DESC: "This endpoint creates a new company bank account. Upon being created, two verification deposits are automatically sent to the bank account, and the bank account's verification_status is 'awaiting_deposits'. When the deposits are successfully transferred, the verification_status changes to 'ready_for_verification', at which point the verify endpoint can be used to verify the bank account. After successful verification, the bank account's verification_status is 'verified'. >🚧 Warning > > If a default bank account exists, it will be disabled and the new bank account will replace it as the company's default funding method. scope: `company_bank_accounts:write`"
