      RETURNS: result
      RESULT:
        TYPE: STRUCT(v1.employee.onboardingStatus.updateResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
