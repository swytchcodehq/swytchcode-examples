  v1.employee.onboardingStatus.get:
    SUMMARY: "# Description Retrieves an employee's onboarding status"
    DESC: "# Description Retrieves an employee's onboarding status. The data returned helps inform the required onboarding steps and respective completion status. ## onboarding_status ### Admin-facilitated onboarding | onboarding_status | Description | |:------------------|------------:| | `admin_onboarding_incomplete` | Admin needs to complete the full employee-onboarding. | | `onboarding_completed` | Employee has been fully onboarded and verified. | ### Employee self-onboarding | onboarding_status | Description | |:------------------|------------:| | `admin_onboarding_incomplete` | Admin needs to enter basic information about the employee. | | `self_onboarding_pending_invite` | Admin has the intention to invite the employee to self-onboard (e.g., marking a checkbox), but the system has not yet sent the invitation. | | `self_onboarding_invited` | Employee has been sent an invitation to self-onboard. | | `self_onboarding_invited_started` | Employee has started the self-onboarding process. | | `self_onboarding_invited_overdue` | Employee's start date has passed, and employee has still not completed self-onboarding. | | `self_onboarding_completed_by_employee` | Employee has completed entering in their information. The status should be updated via API to \"self_onboarding_awaiting_admin_review\" from here, once the Admin has started reviewing. | | `self_onboarding_awaiting_admin_review` | Admin has started to verify the employee's information. | | `onboarding_completed` | Employee has been fully onboarded and verified. | ## onboarding_steps | onboarding_steps | Requirement(s) to be completed | |:-----------------|-------------------------------:| | `personal_details` | Add employee's first name, last name, email, date of birth, social security number | | `compensation_details` | Associate employee to a job & compensation. | | `add_work_address` | Add employee work address. | | `add_home_address` | Add employee home address. | | `federal_tax_setup` | Set up federal tax withholdings. | | `state_tax_setup` | Set up state tax withholdings. | | `direct_deposit_setup` | (optional) Set up employee's direct deposit. | | `employee_form_signing` | Employee forms (e.g., W4, direct deposit authorization) are generated & signed. | | `file_new_hire_report` | File a new hire report for this employee. | | `admin_review` | Admin reviews & confirms employee details (only required for Employee self-onboarding) | scope: `employees:read`"
    HTTP:
      METHOD: GET
      ENDPOINT: /{baseUrl}/v1/employees/:employee_id/onboarding_status
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(v1.employee.onboardingStatus.getResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(v1.employee.onboardingStatus.getResponse200)
        RETURNVAR: v1_employee_onboardingStatus_get
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error404)
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: v1.employee.onboardingStatus.get
  v1.employee.onboardingStatus.update:
    SUMMARY: Updates an employee's onboarding status
    DESC: "Updates an employee's onboarding status.         Below is a list of valid onboarding status changes depending on the intended action to be performed on behalf of the employee.         | Action | current onboarding_status | new onboarding_status |         |:------------------|:------------:|----------:|         | Mark an employee as self-onboarding | `admin_onboarding_incomplete` | `self_onboarding_pending_invite` |         | Invite an employee to self-onboard | `admin_onboarding_incomplete` or `self_onboarding_pending_invite` | `self_onboarding_invited` |         | Cancel an employee's self-onboarding | `self_onboarding_invited` or `self_onboarding_pending_invite` | `admin_onboarding_incomplete` |         | Review an employee's self-onboarded info | `self_onboarding_completed_by_employee` | `self_onboarding_awaiting_admin_review` |         | Finish an employee's onboarding | `admin_onboarding_incomplete` or `self_onboarding_awaiting_admin_review` | `onboarding_completed` | scope: `employees:manage`"
    HTTP:
      METHOD: PUT
