VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://api.gusto-demo.com
METHODS:
  v1.token_info.get:
    SUMMARY: Returns scope and resource information associated with the current access token
    DESC: "Returns scope and resource information associated with the current access token. Use this endpoint to verify the following for the current access token: * Resource (company, employee, contractor, or application) and resource owner * Access level"
    HTTP:
      METHOD: GET
      ENDPOINT: /{baseUrl}/v1/token_info
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(v1.token_info.listResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    RETURNS:
      - RETURNTYPE: STRUCT(v1.token_info.listResponse200)
        RETURNVAR: v1_token_info_get
        STATUS: 200
    CANONICAL_ID: v1.token_info.get
  oauth.token.create:
    SUMMARY: Creates a system access token or refreshes an oauth access token
    DESC: Creates a system access token or refreshes an oauth access token
    HTTP:
      METHOD: POST
      ENDPOINT: /{baseUrl}/oauth/token
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(oauth.token.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(oauth.token.createResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
      - body:
          TYPE: STRUCT(oauth.token.createRequest)
          REQUIRED: true
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(oauth.token.createResponse200)
        RETURNVAR: oauth_token_create
        STATUS: 200
    CANONICAL_ID: oauth.token.create
  v1.partner_managed_company.create:
    SUMMARY: Create a partner managed company
    DESC: "Create a partner managed company. When you successfully call the API, it does the following: * Creates a new company in Gusto * Creates a new user using the provided email if the user does not already exist. * Makes the user the primary payroll administrator of the new company. In response, you will receive oauth access tokens for the created company. IMPORTANT: the returned access and refresh tokens are reserved for this company only. They cannot be used to access other companies AND previously granted tokens cannot be used to access this company. > 📘 System Access Authentication > > this endpoint uses the [Bearer Auth scheme with the system-level access token in the HTTP Authorization header](https://docs.gusto.com/embedded-payroll/docs/system-access)"
    HTTP:
      METHOD: POST
      ENDPOINT: /{baseUrl}/v1/partner_managed_companies
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(v1.partner_managed_company.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(v1.partner_managed_company.createResponse200)
    INPUTS:
      - baseUrl:
          TYPE: STRING
          LOCATION: path
      - X-Gusto-API-Version:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
      - body:
          TYPE: STRUCT(v1.partner_managed_company.createRequest)
          REQUIRED: true
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(v1.partner_managed_company.createResponse200)
        RETURNVAR: v1_partner_managed_company_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: STRUCT(Error422)
        STATUS: 422
        WHEN: Client error (HTTP 422)
    CANONICAL_ID: v1.partner_managed_company.create
  v1.company.get:
    SUMMARY: Get a company
    DESC: "Get a company. The employees:read scope is required to return home_address and non-work locations. The company_admin:read scope is required to return primary_payroll_admin. The signatories:read scope is required to return primary_signatory. scope: `companies:read`"
