  exchange_rates.exchange_rate.list:
    SUMMARY: Get current exchange rate between two currencies.
    DESC: |
      Returns the current exchange rate from the "from" currency to the "to" currency.
      The exchange rate is updated roughly every 30s. Note that as of this writing,
      Bridge does not offer a "quote" by which a user can lock in a rate for a given
      amount of time. This is provided only as a courtesy to estimate what you are
      likely to get in a subsequent transfer request that involves currency exchange.

      As of March 2026, we support:
        - `USD <> BRL`
        - `USD <> COP`
        - `USD <> EUR`
        - `USD <> GBP`
        - `USD <> MXN`
        - `USD <> USDT`
        - `BTC > USD`
        - `ETH > USD`
        - `SOL > USD`
    HTTP:
      METHOD: GET
      ENDPOINT: /exchange_rates
      HEADERS:
        Api-Key: api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(exchange_rates.exchange_rate.listResponse200)
    INPUTS:
      - from:
          TYPE: STRING
          LOCATION: query
      - to:
          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(exchange_rates.exchange_rate.listResponse200)
        RETURNVAR: exchange_rates_exchange_rate_list
        STATUS: 200
    CANONICAL_ID: exchange_rates.exchange_rate.list
