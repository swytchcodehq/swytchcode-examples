      METHOD: GET
      ENDPOINT: /wallets
      HEADERS:
        Api-Key: api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BridgeWalletsList)
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - starting_after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - ending_before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(BridgeWalletsList)
        RETURNVAR: wallets_wallet_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 500
        WHEN: Server error (HTTP 500)
    CANONICAL_ID: wallets.wallet.list
