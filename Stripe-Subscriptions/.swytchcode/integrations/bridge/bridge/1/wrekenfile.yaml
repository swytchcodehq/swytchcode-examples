  customers.fiat_payout_configuration.get:
    SUMMARY: Get the fiat payout configuration for a customer
    DESC: |
      Retrieve the fiat payout configuration for the given customer ID. This configuration determines which payout method (bridge, developer, payment_provider, or customer) is used for each currency and payment rail combination.

      The configuration is a nested hash structure where:
      - Top-level keys are currency codes (e.g., "usd", "eur", "brl", "mxn")
      - Second-level keys are payment rail codes (e.g., "wire", "ach", "sepa", "pix", "spei")
      - Values are payout names: `bridge`, `developer`, `payment_provider`, or `customer`

      Currently, only the following values are supported for the payout method:
      - usd.wire: `developer`, `customer`
      - usd.ach: `bridge`
      - eur.sepa: `bridge`
      - brl.pix: `payment_provider`
      - mxn.spei: `payment_provider`
    HTTP:
      METHOD: GET
      ENDPOINT: /customers/{customerID}/fiat_payout_configuration
      HEADERS:
        Api-Key: api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatPayoutConfigurationResponse)
    INPUTS:
      - customerID:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(FiatPayoutConfigurationResponse)
        RETURNVAR: customers_fiat_payout_configuration_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 500
        WHEN: Server error (HTTP 500)
    CANONICAL_ID: customers.fiat_payout_configuration.get
  customers.fiat_payout_configuration.update:
    SUMMARY: Update the fiat payout configuration for a customer
    DESC: |
      Update the fiat payout configuration for the given customer ID. This configuration determines which payout method (bridge, developer, payment_provider, or customer) is used for each currency and payment rail combination.

      The configuration is a nested hash structure where:
      - Top-level keys are currency codes (e.g., "usd", "eur", "brl", "mxn")
      - Second-level keys are payment rail codes (e.g., "wire", "ach", "sepa", "pix", "spei")
      - Values are payout names: `bridge`, `developer`, `payment_provider`, or `customer`

      Currently, only the following values are supported for the payout method:
      - usd.wire: `developer`, `customer`
      - usd.ach: `bridge`
      - eur.sepa: `bridge`
      - brl.pix: `payment_provider`
      - mxn.spei: `payment_provider`

      Only the currency/payment rail combinations provided will be updated. Other existing configurations will remain unchanged.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /customers/{customerID}/fiat_payout_configuration
      HEADERS:
        Content-Type: application/json
        Api-Key: api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PatchFiatPayoutConfigurationInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatPayoutConfigurationResponse)
    INPUTS:
      - customerID:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(PatchFiatPayoutConfigurationInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FiatPayoutConfigurationResponse)
        RETURNVAR: customers_fiat_payout_configuration_update
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: STRUCT(Error)
        STATUS: 403
        WHEN: Request not allowed. Contact your account manager to be enabled for this feature. Additional fees apply. (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
      - TYPE: ANY
        STATUS: 500
