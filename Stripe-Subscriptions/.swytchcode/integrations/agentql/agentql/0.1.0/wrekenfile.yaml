VERSION: 2.0.2
DEFAULTS:
  x-api-key: <X-API-KEY>
  w_base_url: https://api.default.com
METHODS:
  query-data.query-data.create:
    SUMMARY: Query Data Service
    DESC: |-
      Get the AgentQL response for the data query.

      If the AQL query is not provided, generate it using the prompt from request.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/query-data
      HEADERS:
        Content-Type: application/json
        X-API-Key: x-api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RestWebPageQueryRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RestQueryResponse)
    INPUTS:
      - X-TF-Request-Origin:
          TYPE: STRING
          REQUIRED: false
          LOCATION: header
          DEFAULT: rest-api-data
      - content-type:
          TYPE: STRING
          LOCATION: header
      - body:
          TYPE: STRUCT(RestWebPageQueryRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RestQueryResponse)
        RETURNVAR: query-data_query-data_create
        STATUS: 200
    CANONICAL_ID: query-data.query-data.create
  usage.usage.list:
    SUMMARY: Get Usage
    DESC: Get API key usage and subscription information for your account.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/usage
      HEADERS:
        X-API-Key: x-api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UsageResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(UsageResponse)
        RETURNVAR: usage_usage_list
        STATUS: 200
    CANONICAL_ID: usage.usage.list
  tetra.session.create:
    SUMMARY: Create Session
    DESC: Create a new Tetra browser session.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/tetra/sessions
      HEADERS:
        Content-Type: application/json
        X-API-Key: x-api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(tetra.session.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BrowserSession)
    INPUTS:
      - body:
          TYPE: STRUCT(tetra.session.createRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BrowserSession)
        RETURNVAR: tetra_session_create_201
        STATUS: 201
    ERRORS:
      - TYPE: STRUCT(HTTPValidationError)
        STATUS: 422
        WHEN: Validation Error (HTTP 422)
    CANONICAL_ID: tetra.session.create
  tetra.usage.list:
    SUMMARY: List Session Usage
    DESC: List Tetra browser session usage for the authenticated user.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/tetra/usage
      HEADERS:
        X-API-Key: x-api-key
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TelemetryListResponse)
    INPUTS:
      - sub_user_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - session_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - start_after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - end_before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
      - page:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 1
    RETURNS:
      - RETURNTYPE: STRUCT(TelemetryListResponse)
        RETURNVAR: tetra_usage_list
        STATUS: 200
        PAGINATION:
          TYPE: page
          PAGE_SIZE_FIELD: limit
    CANONICAL_ID: tetra.usage.list
  query-data.query-data.create_8046:
