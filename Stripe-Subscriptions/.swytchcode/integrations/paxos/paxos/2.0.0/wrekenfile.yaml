  events.event.list:
    SUMMARY: List Events
    DESC: |-
      This endpoint enables you to fetch a list of events that have been created by the system.
      You can use query parameters to filter the results by the `created_at` time using `created_at.lt`, `created_at.gt`, etc. and you can
      `limit` the number of events returned.

      Use `page_cursor` from the previous response to paginate through results. Use `order` to control sort direction (ASC or DESC by created_at).
      Events returned will be ordered by `created_at` in ascending order by default.
    HTTP:
      METHOD: GET
      ENDPOINT: /events
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListEventsResponse)
    INPUTS:
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - is_test:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListEventsResponse)
        RETURNVAR: events_event_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Insufficient scopes (HTTP 403)
    CANONICAL_ID: events.event.list
  events.event.get:
