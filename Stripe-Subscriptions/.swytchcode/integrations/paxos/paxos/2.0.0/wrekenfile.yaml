VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  w_base_url: https://api.paxos.com/v2
METHODS:
  profiles.profile.list:
    SUMMARY: List Profiles
    DESC: |-
      Return the associated Profiles for the current Account.
      The paginated results default to the maximum limit of 1,000 Profiles, unless otherwise specified with the `limit` parameter.
      Every paginated response contains a `next_page` field until the last page is reached.
      Pass the `next_page` value into the `page_cursor` field of the next request to retrieve the next page of results.
    HTTP:
      METHOD: GET
      ENDPOINT: /profiles
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListProfilesResponse)
    INPUTS:
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order_by:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - nickname:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListProfilesResponse)
        RETURNVAR: profiles_profile_list
        STATUS: 200
    CANONICAL_ID: profiles.profile.list
  profiles.profile.create:
    SUMMARY: Create Profile
    DESC: Create a new profile for this account. Profiles created using this endpoint always have a type of `NORMAL`.
    HTTP:
      METHOD: POST
      ENDPOINT: /profiles
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateProfileRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Profile)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateProfileRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Profile)
        RETURNVAR: profiles_profile_create
        STATUS: 200
    CANONICAL_ID: profiles.profile.create
  profiles.profile.get:
    SUMMARY: Get Profile
    DESC: Read a single profile by its UUID, or read the default profile using the alias "default".
    HTTP:
      METHOD: GET
      ENDPOINT: /profiles/{profile_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Profile)
    INPUTS:
      - profile_id:
          TYPE: STRING
          LOCATION: path
      - include_deactivated:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(Profile)
        RETURNVAR: profiles_profile_get
        STATUS: 200
    CANONICAL_ID: profiles.profile.get
  profiles.profile.update:
    SUMMARY: Update Profile
    DESC: Change the `nickname` label for the given `profile_id` (Profile).
    HTTP:
      METHOD: PUT
      ENDPOINT: /profiles/{profile_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProfilePublicUpdateProfileBody)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Profile)
    INPUTS:
      - profile_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ProfilePublicUpdateProfileBody)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Profile)
        RETURNVAR: profiles_profile_update
        STATUS: 200
    CANONICAL_ID: profiles.profile.update
  profiles.balance.get:
    SUMMARY: List Profile Balances
    DESC: |-
      Retrieve the Profile’s available and trading balances.
      Use query parameters to retrieve a defined set of assets.
      Omit query parameters to retrieve all asset balances.
    HTTP:
      METHOD: GET
      ENDPOINT: /profiles/{profile_id}/balances
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListProfileBalancesResponse)
    INPUTS:
      - profile_id:
          TYPE: STRING
          LOCATION: path
      - assets:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListProfileBalancesResponse)
        RETURNVAR: profiles_balance_get
        STATUS: 200
    CANONICAL_ID: profiles.balance.get
  profiles.balance.get_e11:
    SUMMARY: Get Profile Balance
    DESC: Get the balance of `asset` in a profile.
    HTTP:
      METHOD: GET
      ENDPOINT: /profiles/{profile_id}/balances/{asset}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProfileBalance)
    INPUTS:
      - profile_id:
          TYPE: STRING
          LOCATION: path
      - asset:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProfileBalance)
        RETURNVAR: profiles_balance_get_e11
        STATUS: 200
    CANONICAL_ID: profiles.balance.get_e11
  profiles.deactivate.update:
    SUMMARY: Deactivate Profile
    DESC: |-
      Deactivate the given `profile_id`. The default profile cannot be deactivated.
      Deactivated profiles won't be visible for deposits.
      Profiles with more than zero balances cannot be deactivated.
      If a deactivated profile has a non-zero balance it will be reactivated.
    HTTP:
      METHOD: PUT
      ENDPOINT: /profiles/{profile_id}/deactivate
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DeactivateProfileResponse)
    INPUTS:
      - profile_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(DeactivateProfileResponse)
        RETURNVAR: profiles_deactivate_update
        STATUS: 200
    CANONICAL_ID: profiles.deactivate.update
  sandbox.profile.deposit.create:
    SUMMARY: Create Sandbox Deposit
    DESC: |-
      Create a test deposit to fund a profile in the sandbox environment.

      Always specify `crypto_network` when making a crypto sandbox deposit. Omit the parameter when depositing fiat.

      *This functionality is only available in the sandbox environment.*
    HTTP:
      METHOD: POST
      ENDPOINT: /sandbox/profiles/{profile_id}/deposit
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(FundingSandboxCreateSandboxDepositBody)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreateSandboxDepositResponse)
    INPUTS:
      - profile_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(FundingSandboxCreateSandboxDepositBody)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreateSandboxDepositResponse)
        RETURNVAR: sandbox_profile_deposit_create
        STATUS: 200
    CANONICAL_ID: sandbox.profile.deposit.create
  identity.identity.list:
    SUMMARY: List Identities
    DESC: |-
      This endpoint enables you to fetch a list of Identities.
      You can use query parameters to filter the results returned by `created_at`, `updated_at`, `summary_status` and `identity_type`

      Note that this endpoint supports pagination and returns a cursor token for fetching next pages.
    HTTP:
      METHOD: GET
      ENDPOINT: /identity/identities
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListIdentitiesResponse)
    INPUTS:
      - summary_status:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order_by:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - identity_type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListIdentitiesResponse)
        RETURNVAR: identity_identity_list
        STATUS: 200
    CANONICAL_ID: identity.identity.list
  identity.identity.create:
    SUMMARY: Create Identity
    DESC: |-
      Creates a new Person or Institution Identity on the Paxos Platform.

      A successful response indicates that the identity has been created and is `PENDING` approval. The identity is only
      available to use on the Platform once it is `APPROVED`. For a full description of statuses read the [status guide here](https://docs.paxos.com/identity/statuses).

      For detailed guidance on which [fields are required](https://docs.paxos.com/identity/required-details) for your integration
      or the [lifecycle of an Identity](https://docs.paxos.com/identity/statuses) on the platform, please read the [Identity Developer Guide](https://docs.paxos.com/identity).
    HTTP:
      METHOD: POST
      ENDPOINT: /identity/identities
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateIdentityRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Identity)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateIdentityRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Identity)
        RETURNVAR: identity_identity_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 409
        WHEN: Duplicate identity record (HTTP 409)
    CANONICAL_ID: identity.identity.create
  identity.identity.documents.get:
    SUMMARY: List Identity Documents
    DESC: This endpoint enables you to get a list of all documents associated with an identity.
    HTTP:
      METHOD: GET
      ENDPOINT: /identity/identities/{identity_id}/documents
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListIdentityDocumentsResponse)
    INPUTS:
      - identity_id:
          TYPE: STRING
          LOCATION: path
      - include_pending_docs:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListIdentityDocumentsResponse)
        RETURNVAR: identity_identity_documents_get
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Permissions Denied (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: identity.identity.documents.get
  identity.identity.documents.update:
    SUMMARY: Document Upload
    DESC: |-
      This endpoint enables you to receive a URL to upload a document to Paxos for identity verification or enhanced due diligence purposes.
      When uploading a document you must specify the document type. You will receive a
      URL where you can upload the document using a POST request.

      Requirements:
      - Uploaded documents must be less than 100 MB in size
      - Supported formats include PDF, JPG, and PNG

      For more information on document requirements for enhanced due diligence, see [here](https://docs.paxos.com/identity/edd).
    HTTP:
      METHOD: PUT
      ENDPOINT: /identity/identities/{identity_id}/documents
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IdentityPublicDocumentUploadBody)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DocumentUploadResponse)
    INPUTS:
      - identity_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(IdentityPublicDocumentUploadBody)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(DocumentUploadResponse)
        RETURNVAR: identity_identity_documents_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Permissions Denied (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Not Found (HTTP 404)
      - TYPE: STRUCT(Problem)
        STATUS: 409
        WHEN: Already Exists (HTTP 409)
    CANONICAL_ID: identity.identity.documents.update
  identity.identity.get:
    SUMMARY: Get Identity
    DESC: |-
      Get an Identity by its (identity) id. You can only see identities created by you.

      You can use the query parameter `include_details` to include identity details (`person_details` or `institution_details`) in
      the response and the query parameter `include_institution_members` to include institution members in the response.
    HTTP:
      METHOD: GET
      ENDPOINT: /identity/identities/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Identity)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - include_details:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - include_institution_members:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(Identity)
        RETURNVAR: identity_identity_get
        STATUS: 200
    CANONICAL_ID: identity.identity.get
  identity.identity.update:
    SUMMARY: Update Identity
    DESC: |-
      Updates an Identity, this action performs a delta of what is submitted in the update and the existing identity.
      - Updating details (`person_details` or `institution_details`) might lead to the identity being re-verified (e.g. re-screening name changes), which
      could impact the identity's ability to transact on the Platform.
      - Setting `set_user_disabled` to `true` will make the Identity `DISABLED` (read [more here](https://docs.paxos.com/identity/statuses) on what this means)
      - Setting `tax_details` will update all the tax details for the identity
      - Setting `last_kyc_refresh_date` indicates this is not an adhoc-update, and instead an update for a [periodic kyc refresh](https://docs.paxos.com/identity/kyc-refresh)

      Changing an Institution Identity to a Person and vice-versa is not supported.
    HTTP:
      METHOD: PUT
      ENDPOINT: /identity/identities/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(IdentityPublicUpdateIdentityBody)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Identity)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(IdentityPublicUpdateIdentityBody)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Identity)
        RETURNVAR: identity_identity_update
        STATUS: 200
    CANONICAL_ID: identity.identity.update
  identity.institution-member.create:
    SUMMARY: Add Institution Members
    DESC: |-
      Add one or more institution members to a given institution.

      Adding new members doesn't affect existing members. For example, if an institution has three
      members, and adds two members using this API, then the institution would end up with five total members.

      For details on the properties that can be specified when creating institution members,
      see [Specifying Institution Members and Their Roles](#specifying-institution-members-and-their-roles).
    HTTP:
      METHOD: POST
      ENDPOINT: /identity/institution-members
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AddInstitutionMembersRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AddInstitutionMembersResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(AddInstitutionMembersRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(AddInstitutionMembersResponse)
        RETURNVAR: identity_institution-member_create
        STATUS: 200
    CANONICAL_ID: identity.institution-member.create
  identity.institution-member.delete:
    SUMMARY: Remove Institution Member
    DESC: Removes an institution member from an institution.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /identity/institution-members/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DeleteInstitutionMemberResponse)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(DeleteInstitutionMemberResponse)
        RETURNVAR: identity_institution-member_delete
        STATUS: 200
    CANONICAL_ID: identity.institution-member.delete
  identity.account.list:
    SUMMARY: List Accounts
    DESC: |-
      List accounts with pagination. Every response will contain a `next_page` field,
      as long as the end of the list has not been reached. Pass this value into the `page_cursor` field of the next request
      to retrieve the next page of results.
    HTTP:
      METHOD: GET
      ENDPOINT: /identity/accounts
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListAccountsResponse)
    INPUTS:
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order_by:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - identity_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - updated_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListAccountsResponse)
        RETURNVAR: identity_account_list
        STATUS: 200
    CANONICAL_ID: identity.account.list
  identity.account.create:
    SUMMARY: Create Account
    DESC: |-
      Create an account for a given identity, via the `identity_id` field.
      This identity is the primary owner of the account for all tax-related purposes.

      To track user balances using Paxos [Profiles](#tag/Profiles), use `create_profile=true` when creating the account.
      Once an account has been created, it is not possible to associate it with a [Profile](#tag/Profiles).

      ### Account Members

      In addition to the primary owner, other identities may be associated with the account, by using `members`.
      The identity on the account is treated as a BENEFICIAL_OWNER.

      To add a financial advisor to an account, add a member with the FINANCIAL_ADVISOR role.

      #### Example
      This example request creates a joint account for John and Jane Doe. John has identity_id=82c338f4-3cb7-4d9b-be2a-4b077c82ee3a,
      and Jane has identity_id=0f5d8475-33f3-4ebd-88a0-66dedc2581c1. John is the primary owner of the account for tax-purposes, but Jane
      is a full beneficial owner.

      Additionally, this account has an associated financial advisor with identity_id=0d26f878-298e-4d47-81be-cdf4e982a3d3.

      ```json
      {
      "account": {
      "identity_id": "82c338f4-3cb7-4d9b-be2a-4b077c82ee3a",
      "members": [{
      "identity_id": "0f5d8475-33f3-4ebd-88a0-66dedc2581c1",
      "roles": ["BENEFICIAL_OWNER"]
      }, {
      "identity_id": "0d26f878-298e-4d47-81be-cdf4e982a3d3",
      "roles": ["FINANCIAL_ADVISOR"]
      }]
      }
      }
      ```

      ### Fields

      Any fields not listed are forbidden in this request.

      Field | Notes
      ---|---
      identity_id | Required
      description | Optional
      metadata | Optional
      ref_id | Optional
      members | Optional
    HTTP:
      METHOD: POST
      ENDPOINT: /identity/accounts
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateAccountRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Account)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateAccountRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Account)
        RETURNVAR: identity_account_create
        STATUS: 200
    CANONICAL_ID: identity.account.create
  identity.account.update:
    SUMMARY: Update Account
    DESC: |-
      This enables you to update an existing account with new information. Please refer to the following
      table for fields that can be updated via this endpoint.

      Field | Notes
      ---|---
      account.id | Required
      account.description | Optional
      account.ref_id | Optional
      account.metadata | Optional. This will overwrite any existing metadata added to the account.
      account.members | Optional. The only roles that can be added/removed are `FINANCIAL_ADVISOR` or `AUTHORIZED_USER.` You must always specify the full members object as we do not currently support differential member updates.
      set_user_disabled | Optional. Setting this to `true` will disable the account, limiting its ability to be used within the Paxos platform.

      #### Example Requests
      #### Disabling an account

      ```json
      {
      "set_user_disabled": true,
      "account": {
      "id": "82c338f4-3cb7-4d9b-be2a-4b077c82ee3a",
      "description": "Account Description",
      "ref_id": "82c338f4-3cb7"
      }
      }
      ```

      ### Adding an account member
      To retain the existing account members and add a new account member, the `members` field must contain the existing
      account members and the new member. The below example adds an `AUTHORIZED_USER` to the account.

      In order to add account members while leaving existing account members unaffected, clients
      should use the [Add Account Members](#operation/AddAccountMembers) API.

      ```json
      {
      "account": {
      "id": "82c338f4-3cb7-4d9b-be2a-4b077c82ee3a",
      "members": [{
      "identity_id": "0f5d8475-33f3-4ebd-88a0-66dedc2581c1",
      "roles": ["BENEFICIAL_OWNER"]
      }, {
      "identity_id": "0d26f878-298e-4d47-81be-cdf4e982a3d3",
      "roles": ["FINANCIAL_ADVISOR"]
      }, {
      "identity_id": "012k23eb-298e-4d47-81be-cdf4e982a3d3",
      "roles": ["AUTHORIZED_USER"]
      }]
      }
      }
      ```

      ### Removing an account member
      To remove an existing account member and retain other needed members, the `members` field must contain
      the existing account members without the account member you'd like to remove. The below example removes an `AUTHORIZED_USER` from the account.

      Note, this API requires the `members` array to have at least one element. In order to delete all members
      from an account, clients should use the [Delete Account Member](#operation/DeleteAccountMember) API.

      ```json
      {
      "account": {
      "id": "82c338f4-3cb7-4d9b-be2a-4b077c82ee3a",
      "members": [{
      "identity_id": "0f5d8475-33f3-4ebd-88a0-66dedc2581c1",
      "roles": ["BENEFICIAL_OWNER"]
      }]
      }
      }
      ```

      ### Updating an account members' roles
      To update an account members' roles, the `members` field must contain all the existing members with their roles along
      with the additional role that you'd like to add or remove. The below example adds the `FINANCIAL_ADVISOR` role to an member that is already a `BENEFICIAL_OWNER`.

      ```json
      {
      "account": {
      "id": "82c338f4-3cb7-4d9b-be2a-4b077c82ee3a",
      "members": [{
      "identity_id": "0f5d8475-33f3-4ebd-88a0-66dedc2581c1",
      "roles": ["BENEFICIAL_OWNER", "FINANCIAL_ADVISOR"]
      }]
      }
      }
      ```
