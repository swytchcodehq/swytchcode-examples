  settlement.transaction.list:
    SUMMARY: List Transactions
    DESC: |-
      This endpoint enables you to fetch a list of Settlement Transactions that you have created (own the `source_profile_id`) or have been alleged against you (own the `target_profile_id`).
      You can use query parameters to filter the results returned by `statuses`, `source_profile_id` and `target_profile_id`.

      Note that this endpoint supports pagination and returns a cursor token for fetching next pages.
    HTTP:
      METHOD: GET
      ENDPOINT: /settlement/transactions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListTransactionsResponse)
    INPUTS:
      - statuses:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - source_profile_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - target_profile_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListTransactionsResponse)
        RETURNVAR: settlement_transaction_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Insufficient scopes (HTTP 403)
    CANONICAL_ID: settlement.transaction.list
  settlement.transaction.create:
    SUMMARY: Create Transaction
    DESC: |-
      Creates a new bilateral Settlement Transaction with one or more legs. The customer must own the
      `source_profile_id` specified in the transaction.

      A successful response indicates the transaction has been accepted and will be in an initial `status` of `"PENDING"`
      for settlement, the transaction is only eligible for settlement once the `status` is `"AFFIRMED"` by the
      `target_profile_id` and the current time is between the provided `settlement_window_start` and `settlement_window_end`.

      Settlement will only be enacted once both `source_profile_id` and `target_profile_id` have sufficient balances to
      fulfill all legs specified as settlement is **atomic**.
    HTTP:
      METHOD: POST
      ENDPOINT: /settlement/transactions
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateTransactionRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transaction)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateTransactionRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Transaction)
        RETURNVAR: settlement_transaction_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Insufficient scopes (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 409
        WHEN: Already Exists (HTTP 409)
    CANONICAL_ID: settlement.transaction.create
  settlement.transaction.get:
    SUMMARY: Get Transaction
    DESC: |-
      Get a Settlement Transaction by its (transaction) id, you must have created the transaction (own the `source_profile_id`) or
      have had the transaction alleged against you (own the `target_profile_id`).
    HTTP:
      METHOD: GET
      ENDPOINT: /settlement/transactions/{transaction_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transaction)
    INPUTS:
      - transaction_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Transaction)
        RETURNVAR: settlement_transaction_get
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Insufficient scopes (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: settlement.transaction.get
  settlement.transaction.delete:
    SUMMARY: Cancel Transaction
    DESC: |-
      Cancels the Settlement Transaction, this action can only be done by the customer owning the source profile (`source_profile_id`).
      The transaction must be in a `"PENDING"` status for this to take effect, you cannot cancel a transaction which
      is `"AFFIRMED"`.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /settlement/transactions/{transaction_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transaction)
    INPUTS:
      - transaction_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Transaction)
        RETURNVAR: settlement_transaction_delete
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Insufficient scopes (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 409
        WHEN: Already Exists (HTTP 409)
    CANONICAL_ID: settlement.transaction.delete
  settlement.transaction.affirm.update:
    SUMMARY: Affirm Transaction
    DESC: |-
      Affirms the Settlement Transaction for settlement, the transaction is now eligible for settlement once the current time is
      between the provided `settlement_window_start` and `settlement_window_end`. This action can only be done by the
      customer owning the target profile (`target_profile_id`).
      The transaction must be in a `"PENDING"` status for this to take effect.
    HTTP:
      METHOD: PUT
      ENDPOINT: /settlement/transactions/{transaction_id}/affirm
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transaction)
    INPUTS:
      - transaction_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Transaction)
        RETURNVAR: settlement_transaction_affirm_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Insufficient scopes (HTTP 403)
    CANONICAL_ID: settlement.transaction.affirm.update
