    CANONICAL_ID: transfer.fee.cryptoWithdrawal.create
  transfer.fiat-account.list:
    SUMMARY: List Fiat Accounts
    DESC: |-
      List all Fiat Accounts, optionally filtering and paging the results.
      The response includes an abbreviated `FiatAccount` object:

      - Beneficiary name and address details are excluded.
      - Only the last four (**4**) digits of the account number are included.

      Use [Get Fiat Account](#operation/GetFiatAccount) to retrieve the complete `FiatAccount` object.

      The paginated results default to the maximum limit of 1,000 Fiat Accounts, unless otherwise specified with the `limit` parameter.
      Every paginated response contains a `next_page` field until the last page is reached.
      Pass the `next_page` value into the `page_cursor` field of the next request to retrieve the next page of results.
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/fiat-accounts
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListFiatAccountsResponse)
    INPUTS:
      - ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - ref_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order_by:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - include_deleted:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListFiatAccountsResponse)
        RETURNVAR: transfer_fiat-account_list
        STATUS: 200
    CANONICAL_ID: transfer.fiat-account.list
  transfer.fiat-account.create:
    SUMMARY: Create Fiat Account
    DESC: |-
      Create an account to initiate a fiat withdrawal.

      For U.S. wires, set `fiat_network_instructions` > `wire` > `routing_details` > `routing_number_type` to `ABA`. For international (SWIFT) wires, set `fiat_network_instructions` > `wire` > `routing_details` > `routing_number_type` to `SWIFT`.
      For CUBIX, set `fiat_network_instructions` > `cubix` > `account_id`, and do not specify `routing_number_type`. For CUBIX, the `account_id` is the CUBIX account ID.
    HTTP:
      METHOD: POST
      ENDPOINT: /transfer/fiat-accounts
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateFiatAccountRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatAccount)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateFiatAccountRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FiatAccount)
        RETURNVAR: transfer_fiat-account_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: transfer.fiat-account.create
  transfer.fiat-account.get:
    SUMMARY: Get Fiat Account
    DESC: |-
      Get a single Fiat Account by ID.

      In the polling workflow, this endpoint can be called to monitor a FiatAccount's status.
      The Fiat Account response includes the full account number, beneficiary name and address details.
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/fiat-accounts/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatAccount)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - include_deleted:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(FiatAccount)
        RETURNVAR: transfer_fiat-account_get
        STATUS: 200
    CANONICAL_ID: transfer.fiat-account.get
  transfer.fiat-account.delete:
    SUMMARY: Delete Fiat Account
    DESC: |-
      Delete a Fiat Account.
      Once a Fiat Account is deleted, transfers cannot be initiated to it.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /transfer/fiat-accounts/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: transfer_fiat-account_delete
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: transfer.fiat-account.delete
  transfer.fiat-account.update:
    SUMMARY: Update Fiat Account
    DESC: |-
      Change an existing value or add a new value on one or more fields for the given Fiat Account and return the modified Fiat Account in `PENDING` status.
      Update fields in **either** `fiat_account_owner.person_details` or `fiat_account_owner.institution_details`.
      Attempts to convert the `fiat_account_owner` type results in an error.
      Empty strings or null values are ignored.

      Upon successful response, Paxos initiates an automated review of the requested changes and then either sets the status to `APPROVED` or `REJECTED`.
      Occasionally, a manual review may be required.
      Use [Get Fiat Account](#operation/GetFiatAccount) to check for status changes.
    HTTP:
      METHOD: PUT
      ENDPOINT: /transfer/fiat-accounts/{id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TransferPublicUpdateFiatAccountBody)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatAccount)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(TransferPublicUpdateFiatAccountBody)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FiatAccount)
        RETURNVAR: transfer_fiat-account_update
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Not Found (HTTP 404)
    CANONICAL_ID: transfer.fiat-account.update
  transfer.fiat-deposit-instruction.list:
    SUMMARY: List Fiat Deposit Instructions
    DESC: |-
      Return the associated Fiat Deposit Instructions matching the search criteria for the current Account.
      The paginated results default to the maximum limit of 1,000 Fiat Deposit instructions, unless otherwise specified with the `limit` parameter.
      Every paginated response contains a `next_page` field until the last page is reached.
      Pass the `next_page` value into the `page_cursor` field of the next request to retrieve the next page of results.
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/fiat-deposit-instructions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListFiatDepositInstructionsResponse)
    INPUTS:
      - ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - ref_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListFiatDepositInstructionsResponse)
        RETURNVAR: transfer_fiat-deposit-instruction_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Could not find Identity (HTTP 404)
    CANONICAL_ID: transfer.fiat-deposit-instruction.list
  transfer.fiat-deposit-instruction.create:
    SUMMARY: Create Fiat Deposit Instructions
    DESC: Create instructions for depositing fiat.
    HTTP:
      METHOD: POST
      ENDPOINT: /transfer/fiat-deposit-instructions
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateFiatDepositInstructionsRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatDepositInstructions)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateFiatDepositInstructionsRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FiatDepositInstructions)
        RETURNVAR: transfer_fiat-deposit-instruction_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Could not find Identity (HTTP 404)
    CANONICAL_ID: transfer.fiat-deposit-instruction.create
  transfer.fiat-deposit-instruction.get:
    SUMMARY: Get Fiat Deposit Instructions
    DESC: |-
      Get instructions for depositing fiat using a Paxos Fiat Deposit Instructions ID.
      The Fiat Deposit Instructions ID (`id`) is provided in the response of the [Create Fiat Deposit Instructions](#operation/CreateFiatDepositInstructions).
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/fiat-deposit-instructions/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FiatDepositInstructions)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(FiatDepositInstructions)
        RETURNVAR: transfer_fiat-deposit-instruction_get
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Could not find Identity (HTTP 404)
    CANONICAL_ID: transfer.fiat-deposit-instruction.get
  transfer.fiat-withdrawal.create:
    SUMMARY: Create Fiat Withdrawal
    DESC: Withdraw fiat to the given destination.
    HTTP:
      METHOD: POST
      ENDPOINT: /transfer/fiat-withdrawals
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateFiatWithdrawalRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transfer)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateFiatWithdrawalRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Transfer)
        RETURNVAR: transfer_fiat-withdrawal_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: ANY
        STATUS: 403
        WHEN: Insufficient funds (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 404
        WHEN: Could not find Profile (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Transfer already exists (HTTP 409)
    CANONICAL_ID: transfer.fiat-withdrawal.create
  transfer.internal.create:
    SUMMARY: Create Internal Transfer
    DESC: Transfer assets between two profiles belonging to the same customer.
    HTTP:
      METHOD: POST
      ENDPOINT: /transfer/internal
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateInternalTransferRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transfer)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateInternalTransferRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Transfer)
        RETURNVAR: transfer_internal_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Insufficient funds (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Could not find profile (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Transfer already exists (HTTP 409)
    CANONICAL_ID: transfer.internal.create
  transfer.limit.utilizations.list:
    SUMMARY: List Transfer Limits
    DESC: List all limits that apply to the given transaction type.
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/limits/utilizations
      HEADERS:
