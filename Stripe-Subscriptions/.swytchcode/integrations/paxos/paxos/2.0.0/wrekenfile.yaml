          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListTransferLimitsResponse)
        RETURNVAR: transfer_limit_utilizations_list
        STATUS: 200
    CANONICAL_ID: transfer.limit.utilizations.list
  transfer.paxo.create:
    SUMMARY: Create Paxos Transfer
    DESC: Transfer assets between two Profiles belonging to different [Entities](https://docs.paxos.com/dashboard/organization#entity).
    HTTP:
      METHOD: POST
      ENDPOINT: /transfer/paxos
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreatePaxosTransferRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transfer)
    INPUTS:
      - body:
          TYPE: STRUCT(CreatePaxosTransferRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Transfer)
        RETURNVAR: transfer_paxo_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 403
        WHEN: Insufficient funds (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Could not find profile (HTTP 404)
      - TYPE: ANY
        STATUS: 409
        WHEN: Transfer already exists (HTTP 409)
    CANONICAL_ID: transfer.paxo.create
  transfer.transfer.list:
    SUMMARY: List Transfers
    DESC: |-
      List all transfers, optionally filtering and paging the results.

      By default, transfers are returned in reverse chronological (descending)
      order by creation time.

      The recommended polling workflow is to query the results in ascending
      order (by setting `order_by` to `CREATED_AT`), keeping track of the
      `created_at` timestamp of the most recent transfer in the paged results.
      Once transfers are discovered, the caller should store the returned `ID`
      and query GetTransfer to retrieve status updates.
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/transfers
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListTransfersResponse)
    INPUTS:
      - profile_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - identity_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - ref_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - order_by:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - account_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - group_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - crypto_tx_hashes:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - secondary_statuses:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - statuses:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListTransfersResponse)
        RETURNVAR: transfer_transfer_list
        STATUS: 200
    CANONICAL_ID: transfer.transfer.list
  transfer.transfer.get:
    SUMMARY: Get Transfer
    DESC: |-
      Get a single transfer by ID.

      In the polling workflow, this endpoint can be called to monitor transfer
      status changes.
    HTTP:
      METHOD: GET
      ENDPOINT: /transfer/transfers/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Transfer)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Transfer)
        RETURNVAR: transfer_transfer_get
        STATUS: 200
    CANONICAL_ID: transfer.transfer.get
  tax.tax-form-revision.list:
    SUMMARY: List Tax Form Revisions
    DESC: |-
      Used for more granular file retrieval for specific accounts that require updated tax forms.
      Lists all versions of a tax form for single account and tax year. Revisions will increment up as new tax forms are issued for the same account, tax year, and form type pairing. The highest value revision is the most recent.
      Tax Form URL links will expire after 60 seconds.
      Supported form types: 1099-B, 1099-MISC, and 1099-DA. If form_types is not provided, defaults to 1099-B for tax years prior to 2025, and 1099-DA from 2025 onwards.
    HTTP:
      METHOD: GET
      ENDPOINT: /tax/tax-form-revisions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListTaxFormRevisionsResponse)
    INPUTS:
      - account_id:
          TYPE: STRING
          LOCATION: query
      - tax_year:
          TYPE: STRING
          LOCATION: query
      - form_types:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - revision:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListTaxFormRevisionsResponse)
        RETURNVAR: tax_tax-form-revision_list
        STATUS: 200
    CANONICAL_ID: tax.tax-form-revision.list
  tax.tax-form.list:
    SUMMARY: List Tax Forms
    DESC: |-
      Used for bulk file transfer use cases.
      List tax forms for given account ids and tax year. The most recent revision number will be returned (revisions increment up; highest value revision for a specific account, tax year, and form type pairing is the most recent).
      Tax Form URL links will expire after 60 seconds.
      Please call ListTaxFormRevisions endpoint for all versions of a single accounts tax forms.
      Supported form types: 1099-B, 1099-MISC, and 1099-DA. If form_types is not provided, defaults to 1099-B for tax years prior to 2025, and 1099-DA from 2025 onwards.
    HTTP:
      METHOD: GET
      ENDPOINT: /tax/tax-forms
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListTaxFormsResponse)
    INPUTS:
      - account_ids:
          TYPE: "[]STRING"
          LOCATION: query
      - tax_year:
          TYPE: STRING
          LOCATION: query
      - form_types:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListTaxFormsResponse)
        RETURNVAR: tax_tax-form_list
        STATUS: 200
    CANONICAL_ID: tax.tax-form.list
  conversion.stablecoin.list:
    SUMMARY: List Stablecoin Conversions
    DESC: |-
      List all conversions, optionally filtering and paging the results.

      By default, conversions are returned in reverse chronological (descending)
      order by creation time. If no query parameters are supplied,
      the response will include up to the last 100 conversions which
      were created.

      The paginated results default to display up to 100 conversions, unless
      otherwise specified with the `limit` parameter. The maximum `limit` value is 1000.
      Every paginated response contains a `next_page_cursor` field until the last page is reached.

      Pass the `next_page_cursor` value into the `page_cursor` field of a new
      request to retrieve the next page of results.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversion/stablecoins
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListStablecoinConversionsResponse)
    INPUTS:
      - profile_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - ref_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - created_at.begin:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.end:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.begin:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updated_at.end:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListStablecoinConversionsResponse)
        RETURNVAR: conversion_stablecoin_list
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
    CANONICAL_ID: conversion.stablecoin.list
  conversion.stablecoin.create:
    SUMMARY: Create Stablecoin Conversion
    DESC: |-
      Create a Conversion request to exchange assets 1:1.

      A request to create a conversion can fail with one of the following
      types of errors:
       - [Insufficient Funds](https://developer.paxos.com/docs/v2/problems/insufficient-funds)
         if the Profile (`profile_id`) has insufficient available balance to
         fund the execution.
       - [Already Exists](https://developer.paxos.com/docs/v2/problems/already-exists)
         if a conversion with the same external ID (`ref_id`) has already been created.
    HTTP:
      METHOD: POST
      ENDPOINT: /conversion/stablecoins
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateStablecoinConversionRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(StablecoinConversion)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateStablecoinConversionRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(StablecoinConversion)
        RETURNVAR: conversion_stablecoin_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Problem)
        STATUS: 400
        WHEN: Bad Request (HTTP 400)
      - TYPE: STRUCT(Problem)
        STATUS: 403
        WHEN: Forbidden (HTTP 403)
      - TYPE: STRUCT(Problem)
        STATUS: 409
        WHEN: Already Exists (HTTP 409)
    CANONICAL_ID: conversion.stablecoin.create
  conversion.stablecoin.get:
    SUMMARY: Get Stablecoin Conversion
    DESC: Retrieve a single conversion using the transaction `id` from the [Create Stablecoin Conversion](#operation/CreateStablecoinConversion) response.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversion/stablecoins/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(StablecoinConversion)
    INPUTS:
