  orchestration.orchestration.list:
    SUMMARY: List Orchestrations
    DESC: |-
      List all orchestrations, optionally filtering and paging the results.

      By default, orchestrations are returned in reverse chronological (descending)
      order by creation time. If no query parameters are supplied,
      the response will include up to the last 100 orchestrations which
      were created.

      The paginated results default to display up to 100 orchestrations, unless
      otherwise specified with the `limit` parameter. The maximum `limit` value is 1000.
      Every paginated response contains a `next_page_cursor` field until the last page is reached.

      Pass the `next_page_cursor` value into the `page_cursor` field of a new
      request to retrieve the next page of results.

      When filtering by profile IDs using the `profile_ids` parameter, there is a limit of 100 profiles
      that can be specified in a single request.

      Orchestrations are provided for various operations including:
      - Deposits to a paxos-platform crypto address or bank account
      - Withdrawals to a customer-owned crypto address or bank account
      - Conversions from one asset to another
      - Orchestrated workflows involving some or all of the above
      - Invocation of an Orchestration Rule
    HTTP:
      METHOD: GET
      ENDPOINT: /orchestration/orchestrations
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListOrchestrationsResponse)
    INPUTS:
      - orchestration_rule_id:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - source_asset:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - destination_asset:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - created_at.lt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.lte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.eq:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gte:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - created_at.gt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - orchestration_id:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - profile_id:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListOrchestrationsResponse)
        RETURNVAR: orchestration_orchestration_list
        STATUS: 200
    CANONICAL_ID: orchestration.orchestration.list
  orchestration.orchestration.create:
    SUMMARY: Create Orchestration
    DESC: |-
      Creates a one-time orchestration that moves assets from a source profile to a destination.
      Use this endpoint when funds already reside on the Paxos platform and need to be transferred or converted as part of a single workflow.

      A request to create an orchestration can fail with one of the following
      types of errors:
       - [Insufficient Funds](https://developer.paxos.com/docs/v2/problems/insufficient-funds)
         if the Profile (`profile_id`) has insufficient available balance to
         fund the execution.
       - [Already Exists](https://developer.paxos.com/docs/v2/problems/already-exists)
         if an orchestration with the same external ID (`ref_id`) has already been created.
    HTTP:
      METHOD: POST
      ENDPOINT: /orchestration/orchestrations
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateOrchestrationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Orchestration)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateOrchestrationRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Orchestration)
        RETURNVAR: orchestration_orchestration_create
        STATUS: 200
    CANONICAL_ID: orchestration.orchestration.create
  orchestration.orchestration.get:
    SUMMARY: Get Orchestration
    DESC: Retreives a specific orchestration using its orchestration ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /orchestration/orchestrations/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Orchestration)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Orchestration)
        RETURNVAR: orchestration_orchestration_get
        STATUS: 200
    CANONICAL_ID: orchestration.orchestration.get
  orchestration.rule.list:
    SUMMARY: List Orchestration Rules
    DESC: |-
      List all orchestration rules, optionally filtering and paging the results.

      By default, orchestration rules are returned in reverse chronological (descending)
      order by creation time. If no query parameters are supplied,
      the response will include up to the last 100 rules which were created.

      The paginated results default to display up to 100 rules, unless
      otherwise specified with the `limit` parameter. The maximum `limit` value is 1000.
      Every paginated response contains a `next_page_cursor` field until the last page is reached.

      Pass the `next_page_cursor` value into the `page_cursor` field of a new
      request to retrieve the next page of results.

      Rules can be filtered by:
      - Profile ID (`profile_id`)
      - Status (`status`)
      - Source asset (`source_asset`)
      - Destination asset (`destination_asset`)
    HTTP:
      METHOD: GET
      ENDPOINT: /orchestration/rules
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListOrchestrationRulesResponse)
    INPUTS:
      - profile_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - source_asset:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - destination_asset:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - page_cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListOrchestrationRulesResponse)
        RETURNVAR: orchestration_rule_list
        STATUS: 200
    CANONICAL_ID: orchestration.rule.list
  orchestration.rule.create:
    SUMMARY: Create Orchestration Rule
    DESC: |-
      Creates a persistent orchestration rule that automatically triggers orchestrations
      when matching deposits are received.

      The rule will:
      1. Generate deposit instructions associated with the rule.
      2. Continuously monitor incoming deposits to those instructions.
      3. Automatically execute orchestrations to the specified destination.

      Supported Sources:

      - Crypto deposit
      - Fiat deposit

      Supported Destinations:

      - Crypto address on a supported network
      - Bank account
      - Profile ID

      Error conditions:
      - [Already Exists](https://developer.paxos.com/docs/v2/problems/already-exists): Returned if a rule with the same ref_id already exists.
    HTTP:
      METHOD: POST
      ENDPOINT: /orchestration/rules
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CreateOrchestrationRuleRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreateOrchestrationRuleResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(CreateOrchestrationRuleRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreateOrchestrationRuleResponse)
        RETURNVAR: orchestration_rule_create
        STATUS: 200
    CANONICAL_ID: orchestration.rule.create
  orchestration.rule.delete:
    SUMMARY: Delete Orchestration Rule
    DESC: |-
      Deactivates an orchestration rule by updating its status to DELETED.
      Once deleted, the rule will no longer trigger new orchestrations.
      Any orchestrations previously created by the rule will continue to be processed.

      The request accepts a single rule ID and returns the updated rule resource
      with its status set to DELETED upon success.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /orchestration/rules/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DeleteOrchestrationRuleResponse)
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(DeleteOrchestrationRuleResponse)
        RETURNVAR: orchestration_rule_delete
        STATUS: 200
    CANONICAL_ID: orchestration.rule.delete
