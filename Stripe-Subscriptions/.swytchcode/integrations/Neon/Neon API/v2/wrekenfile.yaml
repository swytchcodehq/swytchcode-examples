        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RoleResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - role_name:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(RoleResponse)
        RETURNVAR: get_project_branch_role_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteprojectbranchrole:
    SUMMARY: Delete role
    DESC: |
      Deletes the specified Postgres role from the branch.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      You can obtain the `role_name` by listing the roles for a branch.
      For related information, see [Manage roles](https://neon.tech/docs/manage/roles/).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/roles/{role_name}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RoleOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - role_name:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(RoleOperations)
        RETURNVAR: delete_project_branch_role_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getprojectbranchrolepassword:
    SUMMARY: Retrieve role password
    DESC: |
      Retrieves the password for the specified Postgres role, if possible.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      You can obtain the `role_name` by listing the roles for a branch.
      For related information, see [Manage roles](https://neon.tech/docs/manage/roles/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/roles/{role_name}/reveal_password
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RolePasswordResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - role_name:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(RolePasswordResponse)
        RETURNVAR: get_project_branch_role_password_result
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(GeneralError)
        STATUS: 404
        WHEN: Role not found (HTTP 404)
      - TYPE: STRUCT(GeneralError)
        STATUS: 412
        WHEN: Storing passwords is disabled (HTTP 412)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  resetprojectbranchrolepassword:
    SUMMARY: Reset role password
    DESC: |
      Resets the password for the specified Postgres role.
      Returns a new password and operations. The new password is ready to use when the last operation finishes.
      The old password remains valid until last operation finishes.
      Connections to the compute endpoint are dropped. If idle,
      the compute endpoint becomes active for a short period of time.

      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      You can obtain the `role_name` by listing the roles for a branch.
      For related information, see [Manage roles](https://neon.tech/docs/manage/roles/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/roles/{role_name}/reset_password
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RoleOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - role_name:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(RoleOperations)
        RETURNVAR: reset_project_branch_role_password_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectvpcendpoints:
    SUMMARY: List VPC endpoint restrictions
    DESC: |
      Lists VPC endpoint restrictions for the specified Neon project.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/vpc_endpoints
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VPCEndpointsResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VPCEndpointsResponse)
        RETURNVAR: list_project_v_p_c_endpoints_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  assignprojectvpcendpoint:
    SUMMARY: Set VPC endpoint restriction
    DESC: |
      Sets or updates a VPC endpoint restriction for a Neon project.
      When a VPC endpoint restriction is set, the project only accepts connections
      from the specified VPC.
      A VPC endpoint can be set as a restriction only after it is assigned to the
      parent organization of the Neon project.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/vpc_endpoints/{vpc_endpoint_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(VPCEndpointAssignment)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - vpc_endpoint_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(VPCEndpointAssignment)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteprojectvpcendpoint:
    SUMMARY: Delete VPC endpoint restriction
    DESC: |
      Removes the specified VPC endpoint restriction from a Neon project.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/vpc_endpoints/{vpc_endpoint_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - vpc_endpoint_id:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createprojectendpoint:
    SUMMARY: Create compute endpoint
    DESC: |
      Creates a compute endpoint for the specified branch.
      An endpoint is a Neon compute instance.
      There is a maximum of one read-write compute endpoint per branch.
      If the specified branch already has a read-write compute endpoint, the operation fails.
      A branch can have multiple read-only compute endpoints.

      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain `branch_id` by listing the project's branches.
      A `branch_id` has a `br-` prefix.
      For supported regions and `region_id` values, see [Regions](https://neon.tech/docs/introduction/regions/).
      For more information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/endpoints
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(EndpointCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(EndpointCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointOperations)
        RETURNVAR: create_project_endpoint_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectendpoints:
    SUMMARY: List compute endpoints
    DESC: |
      Retrieves a list of compute endpoints for the specified project.
      A compute endpoint is a Neon compute instance.
      You can obtain a `project_id` by listing the projects for your Neon account.
      For information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/endpoints
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointsResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointsResponse)
        RETURNVAR: list_project_endpoints_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getprojectendpoint:
    SUMMARY: Retrieve compute endpoint details
    DESC: |
      Retrieves information about the specified compute endpoint.
      A compute endpoint is a Neon compute instance.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain an `endpoint_id` by listing your project's compute endpoints.
      An `endpoint_id` has an `ep-` prefix.
      For information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/endpoints/{endpoint_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - endpoint_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointResponse)
        RETURNVAR: get_project_endpoint_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteprojectendpoint:
    SUMMARY: Delete compute endpoint
    DESC: |
      Delete the specified compute endpoint.
      A compute endpoint is a Neon compute instance.
      Deleting a compute endpoint drops existing network connections to the compute endpoint.
      The deletion is completed when last operation in the chain finishes successfully.

      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain an `endpoint_id` by listing your project's compute endpoints.
      An `endpoint_id` has an `ep-` prefix.
      For information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/endpoints/{endpoint_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - endpoint_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointOperations)
        RETURNVAR: delete_project_endpoint_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updateprojectendpoint:
    SUMMARY: Update compute endpoint
    DESC: |
      Updates the specified compute endpoint.

      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain an `endpoint_id` and `branch_id` by listing your project's compute endpoints.
      An `endpoint_id` has an `ep-` prefix. A `branch_id` has a `br-` prefix.
       For more information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).

      If the returned list of operations is not empty, the compute endpoint is not ready to use.
      The client must wait for the last operation to finish before using the compute endpoint.
      If the compute endpoint was idle before the update, it becomes active for a short period of time,
      and the control plane suspends it again after the update.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /projects/{project_id}/endpoints/{endpoint_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(EndpointUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - endpoint_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(EndpointUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointOperations)
        RETURNVAR: update_project_endpoint_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  startprojectendpoint:
    SUMMARY: Start compute endpoint
    DESC: |
      Starts a compute endpoint. The compute endpoint is ready to use
      after the last operation in chain finishes successfully.

      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain an `endpoint_id` by listing your project's compute endpoints.
      An `endpoint_id` has an `ep-` prefix.
      For information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/endpoints/{endpoint_id}/start
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - endpoint_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointOperations)
        RETURNVAR: start_project_endpoint_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  suspendprojectendpoint:
    SUMMARY: Suspend compute endpoint
    DESC: |
      Suspend the specified compute endpoint
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain an `endpoint_id` by listing your project's compute endpoints.
      An `endpoint_id` has an `ep-` prefix.
      For information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/endpoints/{endpoint_id}/suspend
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - endpoint_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointOperations)
        RETURNVAR: suspend_project_endpoint_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  restartprojectendpoint:
    SUMMARY: Restart compute endpoint
    DESC: |
      Restart the specified compute endpoint: suspend immediately followed by start operations.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain an `endpoint_id` by listing your project's compute endpoints.
      An `endpoint_id` has an `ep-` prefix.
      For information about compute endpoints, see [Manage computes](https://neon.tech/docs/manage/endpoints/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/endpoints/{endpoint_id}/restart
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - endpoint_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointOperations)
        RETURNVAR: restart_project_endpoint_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getconsumptionhistoryperaccount:
    SUMMARY: Retrieve account consumption metrics (legacy plans)
    DESC: |
      Retrieves consumption metrics for Scale and Enterprise plan accounts, and for legacy Scale, Business, and Enterprise plan accounts.
      Consumption history begins at the time the account was upgraded to a supported plan.
    HTTP:
      METHOD: GET
      ENDPOINT: /consumption_history/account
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ConsumptionHistoryPerAccountResponse)
    INPUTS:
      - from:
          TYPE: TIMESTAMP
          LOCATION: query
      - to:
          TYPE: TIMESTAMP
          LOCATION: query
      - granularity:
          TYPE: STRING
          LOCATION: query
      - org_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - include_v1_metrics:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - metrics:
          TYPE: ANY
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ConsumptionHistoryPerAccountResponse)
        RETURNVAR: get_consumption_history_per_account_result
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(GeneralError)
        STATUS: 403
        WHEN: This endpoint is not available. It is only supported for Scale, Business, and Enterprise plan accounts. (HTTP 403)
      - TYPE: STRUCT(GeneralError)
        STATUS: 404
        WHEN: Account is not a member of the organization specified by `org_id`. (HTTP 404)
      - TYPE: STRUCT(GeneralError)
        STATUS: 406
        WHEN: |-
          The specified `date-time` range is outside the boundaries of the specified `granularity`.
          Adjust your `from` and `to` values or select a different `granularity`.
           (HTTP 406)
      - TYPE: STRUCT(GeneralError)
        STATUS: 429
        WHEN: Too many requests (HTTP 429)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getconsumptionhistoryperproject:
    SUMMARY: Retrieve project consumption metrics (legacy plans)
    DESC: |
      Retrieves consumption metrics for Scale, Business, and Enterprise plan projects. History begins at the time of upgrade.
      Results are ordered by time in ascending order (oldest to newest).
      Issuing a call to this API does not wake a project's compute endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /consumption_history/projects
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - project_ids:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - from:
          TYPE: TIMESTAMP
          LOCATION: query
      - to:
          TYPE: TIMESTAMP
          LOCATION: query
      - granularity:
          TYPE: STRING
          LOCATION: query
      - org_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - include_v1_metrics:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - metrics:
          TYPE: ANY
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: get_consumption_history_per_project_result
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(GeneralError)
        STATUS: 403
        WHEN: This endpoint is not available. It is only supported with Scale, Business, and Enterprise plan accounts. (HTTP 403)
      - TYPE: STRUCT(GeneralError)
        STATUS: 404
        WHEN: Account is not a member of the organization specified by `org_id`. (HTTP 404)
      - TYPE: STRUCT(GeneralError)
        STATUS: 406
        WHEN: |-
          The specified `date-time` range is outside the boundaries of the specified `granularity`.
          Adjust your `from` and `to` values or select a different `granularity`.
           (HTTP 406)
      - TYPE: STRUCT(GeneralError)
        STATUS: 429
        WHEN: Too many requests (HTTP 429)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getconsumptionhistoryperprojectv2:
    SUMMARY: Retrieve project consumption metrics
    DESC: |
      Retrieves consumption metrics for Launch, Scale, Agent, and Enterprise plan projects. History begins at the time of upgrade.
