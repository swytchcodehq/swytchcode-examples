    RETURNS:
      - RETURNTYPE: STRUCT(CurrentUserInfoResponse)
        RETURNVAR: get_current_user_info_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getcurrentuserorganizations:
    SUMMARY: Retrieve current user organizations list
    DESC: |
      Retrieves information about the current Neon user's organizations
    HTTP:
      METHOD: GET
      ENDPOINT: /users/me/organizations
