VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <TOKEN>
  cookie_zenith: <ZENITH>
  cookie_keycloak_token: <KEYCLOAK_TOKEN>
  w_base_url: https://console.neon.tech/api/v2
METHODS:
  listapikeys:
    SUMMARY: List API keys
    DESC: |
      Retrieves the API keys for your Neon account.
      The response does not include API key tokens. A token is only provided when creating an API key.
      API keys can also be managed in the Neon Console.
      For more information, see [Manage API keys](https://neon.tech/docs/manage/api-keys/).
    HTTP:
      METHOD: GET
      ENDPOINT: /api_keys
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(ApiKeysListResponseItem)"
    RETURNS:
      - RETURNTYPE: "[]STRUCT(ApiKeysListResponseItem)"
        RETURNVAR: list_api_keys_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createapikey:
    SUMMARY: Create API key
    DESC: |
      Creates an API key.
      The `key_name` is a user-specified name for the key.
      This method returns an `id` and `key`. The `key` is a randomly generated, 64-bit token required to access the Neon API.
      API keys can also be managed in the Neon Console.
      See [Manage API keys](https://neon.tech/docs/manage/api-keys/).
    HTTP:
      METHOD: POST
      ENDPOINT: /api_keys
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ApiKeyCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApiKeyCreateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ApiKeyCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ApiKeyCreateResponse)
        RETURNVAR: create_api_key_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  revokeapikey:
    SUMMARY: Revoke API key
    DESC: |
      Revokes the specified API key.
      An API key that is no longer needed can be revoked.
      This action cannot be reversed.
      You can obtain `key_id` values by listing the API keys for your Neon account.
      API keys can also be managed in the Neon Console.
      See [Manage API keys](https://neon.tech/docs/manage/api-keys/).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /api_keys/{key_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ApiKeyRevokeResponse)
    INPUTS:
      - key_id:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ApiKeyRevokeResponse)
        RETURNVAR: revoke_api_key_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getprojectoperation:
    SUMMARY: Retrieve operation details
    DESC: |
      Retrieves details for the specified operation.
      An operation is an action performed on a Neon project resource.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain a `operation_id` by listing operations for the project.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/operations/{operation_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OperationResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - operation_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(OperationResponse)
        RETURNVAR: get_project_operation_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojects:
    SUMMARY: List projects
    DESC: |
      Retrieves a list of projects for an organization.
      You may need to specify an org_id parameter depending on your API key type.
      For more information, see [Manage projects](https://neon.tech/docs/manage/projects/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - search:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - org_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - timeout:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - recoverable:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: list_projects_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createproject:
    SUMMARY: Create project
    DESC: |
      Creates a Neon project within an organization.
      You may need to specify an org_id parameter depending on your API key type.
      Plan limits define how many projects you can create.
      For more information, see [Manage projects](https://neon.tech/docs/manage/projects/).

      You can specify a region and Postgres version in the request body.
      Neon currently supports PostgreSQL 14, 15, 16, and 17.
      For supported regions and `region_id` values, see [Regions](https://neon.tech/docs/introduction/regions/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProjectCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(ProjectCreateRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listsharedprojects:
    SUMMARY: List shared projects
    DESC: |
      Retrieves a list of projects shared with your Neon account.
      For more information, see [Manage projects](https://neon.tech/docs/manage/projects/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/shared
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - search:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - timeout:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: list_shared_projects_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getproject:
    SUMMARY: Retrieve project details
    DESC: |
      Retrieves information about the specified project.
      You can obtain a `project_id` by listing the projects for an organization.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectResponse)
        RETURNVAR: get_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updateproject:
    SUMMARY: Update project
    DESC: |
      Updates the specified project.
      You can obtain a `project_id` by listing the projects for your Neon account.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /projects/{project_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ProjectUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ProjectUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: update_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteproject:
    SUMMARY: Delete project
    DESC: |
      Deletes the specified project.
      You can obtain a `project_id` by listing the projects for your Neon account.
      Deleting a project is a permanent action.
      Deleting a project also deletes endpoints, branches, databases, and users that belong to the project.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectResponse)
        RETURNVAR: delete_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  restoreproject:
    SUMMARY: Restore a deleted project
    DESC: |
      DEPRECATED, use `/projects/{project_id}/recover` instead. Restores a deleted project during the deletion grace period.
      You can obtain a `project_id` by listing the projects for your Neon account.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/restore
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectRecoverResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectRecoverResponse)
        RETURNVAR: restore_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  recoverproject:
    SUMMARY: Recover a deleted project
    DESC: |
      Recovers a deleted project during the deletion grace period.
      You can obtain a `project_id` by listing the projects for your Neon account.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/recover
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectRecoverResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectRecoverResponse)
        RETURNVAR: recover_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectoperations:
    SUMMARY: List operations
    DESC: |
      Retrieves a list of operations for the specified Neon project.
      You can obtain a `project_id` by listing the projects for your Neon account.
      The number of operations returned can be large.
      To paginate the response, issue an initial request with a `limit` value.
      Then, add the `cursor` value that was returned in the response to the next request.
      Operations older than 6 months may be deleted from our systems.
      If you need more history than that, you should store your own history.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/operations
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - project_id:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectpermissions:
    SUMMARY: List project access
    DESC: Retrieves details about users who have access to the project, including the permission `id`, the granted-to email address, and the date project access was granted.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/permissions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectPermissions)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectPermissions)
        RETURNVAR: list_project_permissions_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  grantpermissiontoproject:
    SUMMARY: Grant project access
    DESC: Grants project access to the account associated with the specified email address
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/permissions
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(GrantPermissionToProjectRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectPermission)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(GrantPermissionToProjectRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectPermission)
        RETURNVAR: grant_permission_to_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  revokepermissionfromproject:
    SUMMARY: Revoke project access
    DESC: Revokes project access from the user associated with the specified permission `id`. You can retrieve a user's permission `id` by listing project access.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/permissions/{permission_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectPermission)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - permission_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectPermission)
        RETURNVAR: revoke_permission_from_project_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getavailablepreloadlibraries:
    SUMMARY: Return available shared preload libraries
    DESC: Return available shared preload libraries
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/available_preload_libraries
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AvailablePreloadLibraries)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AvailablePreloadLibraries)
        RETURNVAR: get_available_preload_libraries_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createprojecttransferrequest:
    SUMMARY: Create a project transfer request
    DESC: |
      Creates a transfer request for the specified project. A transfer request allows
      the project to be transferred to another account or organization. The request
      has an expiration time after which it can no longer be used. To accept/claim
      the transfer request, the recipient user/organization must call the
      `/projects/{project_id}/transfer_requests/{request_id}` API endpoint, or visit
      `https://console.neon.tech/app/claim?p={project_id}&tr={request_id}&ru={redirect_url}`
      in the Neon Console. The `ru` parameter is optional and can be used to redirect
      the user after accepting the transfer request.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/transfer_requests
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(createProjectTransferRequestRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectTransferRequestResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(createProjectTransferRequestRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectTransferRequestResponse)
        RETURNVAR: create_project_transfer_request_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  acceptprojecttransferrequest:
    SUMMARY: Accept a project transfer request
    DESC: |
      Accepts a transfer request for the specified project, transferring it to the specified organization
      or user. If org_id is not passed, the project will be transferred to the current user or organization account.
    HTTP:
      METHOD: PUT
      ENDPOINT: /projects/{project_id}/transfer_requests/{request_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(acceptProjectTransferRequestRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - request_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(acceptProjectTransferRequestRequest)
          REQUIRED: false
          LOCATION: body
    ERRORS:
      - TYPE: STRUCT(AcceptProjectTransferRequestSatisfiesPlanError)
        STATUS: 406
        WHEN: Account doesn't satisfy the plan requirements to own the project (HTTP 406)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getprojectjwks:
    SUMMARY: List JWKS URLs
    DESC: |
      Returns the JWKS URLs available for verifying JWTs used as the authentication mechanism for the specified project.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/jwks
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ProjectJWKSResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ProjectJWKSResponse)
        RETURNVAR: get_project_j_w_k_s_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  addprojectjwks:
    SUMMARY: Add JWKS URL
    DESC: |
      Add a new JWKS URL to a project, such that it can be used for verifying JWTs used as the authentication mechanism for the specified project.

      The URL must be a valid HTTPS URL that returns a JSON Web Key Set.

      The `provider_name` field allows you to specify which authentication provider you're using (e.g., Clerk, Auth0, AWS Cognito, etc.).

      The `branch_id` can be used to specify on which branches the JWKS URL will be accepted. If not specified, then it will work on any branch.

      The `role_names` can be used to specify for which roles the JWKS URL will be accepted. If not specified, then default roles will be used (authenticator, authenticated and anonymous).

      The `jwt_audience` can be used to specify which "aud" values should be accepted by Neon in the JWTs that are used for authentication.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/jwks
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AddProjectJWKSRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(JWKSCreationOperation)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(AddProjectJWKSRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(JWKSCreationOperation)
        RETURNVAR: add_project_j_w_k_s_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteprojectjwks:
    SUMMARY: Delete JWKS URL
    DESC: Deletes a JWKS URL from the specified project
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/jwks/{jwks_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(JWKS)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - jwks_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(JWKS)
        RETURNVAR: delete_project_j_w_k_s_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createprojectbranchdataapi:
    SUMMARY: Create Neon Data API
    DESC: |
      Creates a new instance of Neon Data API in the specified branch.
      You can obtain the `project_id` and `branch_id` by listing the projects and branches for your Neon account.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/data-api/{database_name}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DataAPICreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DataAPICreateResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - database_name:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(DataAPICreateRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(DataAPICreateResponse)
        RETURNVAR: create_project_branch_data_a_p_i_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updateprojectbranchdataapi:
    SUMMARY: Update Neon Data API
    DESC: |
      Updates the Neon Data API configuration for the specified branch.
      You can optionally provide settings to update the Data API configuration.
      The schema cache is always refreshed as part of this operation.
      You can obtain the `project_id` and `branch_id` by listing the projects and branches for your Neon account.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/data-api/{database_name}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DataAPIUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EmptyResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
