    RETURNS:
      - RETURNTYPE: STRUCT(OrganizationsResponse)
        RETURNVAR: get_current_user_organizations_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  transferprojectsfromusertoorg:
    SUMMARY: Transfer projects from personal account to organization
    DESC: |
      Transfers selected projects, identified by their IDs, from your personal account to a specified organization.
    HTTP:
      METHOD: POST
      ENDPOINT: /users/me/projects/transfer
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TransferProjectsToOrganizationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EmptyResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(TransferProjectsToOrganizationRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(EmptyResponse)
        RETURNVAR: transfer_projects_from_user_to_org_result
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(LimitsUnsatisfiedResponse)
        STATUS: 406
        WHEN: Transfer failed - the target organization has too many projects or its plan is incompatible with the source account. Reduce the number of projects or upgrade the target organization to increase its capacity. (HTTP 406)
      - TYPE: STRUCT(ProjectsWithIntegrationResponse)
        STATUS: 422
        WHEN: One or more of the provided project IDs have GitHub or Vercel integrations installed. Transferring integration projects is currently not supported (HTTP 422)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getauthdetails:
    SUMMARY: Get request authentication details
    DESC: |
      Returns auth information about the passed credentials. It can refer to an API key, Bearer token or OAuth session.
    HTTP:
