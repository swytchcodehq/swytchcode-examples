      RETURNS: result
      RESULT:
        TYPE: STRUCT(RolesResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(RolesResponse)
        RETURNVAR: list_project_branch_roles_result
        STATUS: 200
