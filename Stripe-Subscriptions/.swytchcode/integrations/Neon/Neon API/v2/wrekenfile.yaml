  updateorganizationmember:
    SUMMARY: Update role for organization member
    DESC: |
      Only an admin can perform this action.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /organizations/{org_id}/members/{member_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(OrganizationMemberUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Member)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - member_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(OrganizationMemberUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Member)
        RETURNVAR: update_organization_member_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  removeorganizationmember:
    SUMMARY: Remove member from the organization
    DESC: |
      Remove member from the organization.
      Only an admin of the organization can perform this action.
      If another admin is being removed, it will not be allows in case it is the only admin left in the organization.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /organizations/{org_id}/members/{member_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EmptyResponse)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - member_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EmptyResponse)
        RETURNVAR: remove_organization_member_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getorganizationinvitations:
    SUMMARY: Retrieve organization invitation details
    DESC: |
      Retrieves information about extended invitations for the specified organization
    HTTP:
      METHOD: GET
      ENDPOINT: /organizations/{org_id}/invitations
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OrganizationInvitationsResponse)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(OrganizationInvitationsResponse)
        RETURNVAR: get_organization_invitations_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createorganizationinvitations:
    SUMMARY: Create organization invitations
    DESC: |
      Creates invitations for a specific organization.
      If the invited user has an existing account, they automatically join as a member.
      If they don't yet have an account, they are invited to create one, after which they become a member.
      Each invited user receives an email notification.
    HTTP:
      METHOD: POST
      ENDPOINT: /organizations/{org_id}/invitations
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(OrganizationInvitesCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OrganizationInvitationsResponse)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(OrganizationInvitesCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(OrganizationInvitationsResponse)
        RETURNVAR: create_organization_invitations_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  transferprojectsfromorgtoorg:
    SUMMARY: Transfer projects between organizations
    DESC: |
      Transfers selected projects, identified by their IDs, from your organization to another specified organization.
    HTTP:
      METHOD: POST
      ENDPOINT: /organizations/{source_org_id}/projects/transfer
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(TransferProjectsToOrganizationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EmptyResponse)
    INPUTS:
      - source_org_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(TransferProjectsToOrganizationRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(EmptyResponse)
        RETURNVAR: transfer_projects_from_org_to_org_result
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(LimitsUnsatisfiedResponse)
        STATUS: 406
        WHEN: Transfer failed - the target organization has too many projects or its plan is incompatible with the source organization. Reduce projects or upgrade the organization. (HTTP 406)
      - TYPE: STRUCT(ProjectsWithIntegrationResponse)
        STATUS: 422
        WHEN: One or more of the provided project IDs have GitHub or Vercel integrations installed. Transferring integration projects is currently not supported (HTTP 422)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listorganizationvpcendpointsallregions:
    SUMMARY: List VPC endpoints across all regions
    DESC: |
      Retrieves the list of VPC endpoints for the specified Neon organization across all regions.
    HTTP:
      METHOD: GET
      ENDPOINT: /organizations/{org_id}/vpc/vpc_endpoints
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VPCEndpointsWithRegionResponse)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VPCEndpointsWithRegionResponse)
        RETURNVAR: list_organization_v_p_c_endpoints_all_regions_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listorganizationvpcendpoints:
    SUMMARY: List VPC endpoints
    DESC: |
      Retrieves the list of VPC endpoints for the specified Neon organization.
    HTTP:
      METHOD: GET
      ENDPOINT: /organizations/{org_id}/vpc/region/{region_id}/vpc_endpoints
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VPCEndpointsResponse)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - region_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VPCEndpointsResponse)
        RETURNVAR: list_organization_v_p_c_endpoints_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getorganizationvpcendpointdetails:
    SUMMARY: Retrieve VPC endpoint details
    DESC: |
      Retrieves the current state and configuration details of a specified VPC endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /organizations/{org_id}/vpc/region/{region_id}/vpc_endpoints/{vpc_endpoint_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VPCEndpointDetails)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - region_id:
          TYPE: STRING
          LOCATION: path
      - vpc_endpoint_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VPCEndpointDetails)
        RETURNVAR: get_organization_v_p_c_endpoint_details_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  assignorganizationvpcendpoint:
    SUMMARY: Assign or update VPC endpoint
    DESC: |
      Assigns a VPC endpoint to a Neon organization or updates its existing assignment.
    HTTP:
      METHOD: POST
      ENDPOINT: /organizations/{org_id}/vpc/region/{region_id}/vpc_endpoints/{vpc_endpoint_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(VPCEndpointAssignment)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - region_id:
          TYPE: STRING
          LOCATION: path
      - vpc_endpoint_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(VPCEndpointAssignment)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteorganizationvpcendpoint:
    SUMMARY: Delete VPC endpoint
    DESC: |
      Deletes the VPC endpoint from the specified Neon organization.
      If you delete a VPC endpoint from a Neon organization, that VPC endpoint cannot
      be added back to the Neon organization.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /organizations/{org_id}/vpc/region/{region_id}/vpc_endpoints/{vpc_endpoint_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - region_id:
          TYPE: STRING
          LOCATION: path
      - vpc_endpoint_id:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getactiveregions:
    SUMMARY: List supported regions
    DESC: |
      Lists supported Neon regions
    HTTP:
      METHOD: GET
      ENDPOINT: /regions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
