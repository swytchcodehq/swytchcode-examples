        WHEN: HTTP default
  createprojectbranch:
    SUMMARY: Create branch
    DESC: |
      Creates a branch in the specified project.
      You can obtain a `project_id` by listing the projects for your Neon account.
      This method does not require a request body, but you can specify one to create a compute endpoint for the branch or to select a non-default parent branch.
      By default, the branch is created from the project's default branch with no compute endpoint, and the branch name is auto-generated.
      To access the branch, you must add an endpoint object. A `read_write` endpoint allows you to perform read and write operations on the branch.
      Each branch supports one read-write endpoint and multiple read-only endpoints.
      For related information, see [Manage branches](https://neon.tech/docs/manage/branches/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(createProjectBranchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(createProjectBranchRequest)
          REQUIRED: false
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectbranches:
    SUMMARY: List branches
    DESC: |
      Retrieves a list of branches for the specified project.
      You can obtain a `project_id` by listing the projects for your Neon account.

      Each Neon project has a root branch named `main`.
      A `branch_id` value has a `br-` prefix.
      A project may contain child branches that were branched from `main` or from another branch.
      A parent branch is identified by the `parent_id` value, which is the `id` of the parent branch.
      For related information, see [Manage branches](https://neon.tech/docs/manage/branches/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - search:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - sort_by:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: updated_at
      - cursor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - sort_order:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: desc
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: list_project_branches_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createprojectbranchanonymized:
    SUMMARY: Create anonymized branch
    DESC: |
      Creates a new branch with anonymized data using PostgreSQL Anonymizer for static masking.
      This allows developers to work with masked production data.
      Optionally, provide `masking_rules` to set initial masking rules for the branch
      and `start_anonymization` to automatically start anonymization after creation. This
      combines functionality of updating masking rules and starting anonymization into the
      branch creation request.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branch_anonymized
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BranchAnonymizedCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BranchAnonymizedCreateRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  countprojectbranches:
    SUMMARY: Retrieve number of branches
    DESC: |
      Retrieves the total number of branches in the specified project.
      You can obtain a `project_id` by listing the projects for your Neon account.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/count
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
