  getmaskingrules:
    SUMMARY: Get masking rules
    DESC: |
      Retrieves the masking rules for the specified anonymized branch.
      Masking rules define how sensitive data should be anonymized using PostgreSQL Anonymizer.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/masking_rules
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(MaskingRulesResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(MaskingRulesResponse)
        RETURNVAR: get_masking_rules_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updatemaskingrules:
    SUMMARY: Update masking rules
    DESC: |
      Updates the masking rules for the specified anonymized branch.
      Masking rules define how sensitive data should be anonymized using PostgreSQL Anonymizer.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/masking_rules
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(MaskingRulesUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(MaskingRulesResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(MaskingRulesUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(MaskingRulesResponse)
        RETURNVAR: update_masking_rules_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getanonymizedbranchstatus:
    SUMMARY: Get anonymized branch status
    DESC: |
      Retrieves the current status of an anonymized branch, including its state and progress information.
      This endpoint allows you to monitor the anonymization process from initialization through completion.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      Only anonymized branches will have status information available.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/anonymized_status
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AnonymizedBranchStatusResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AnonymizedBranchStatusResponse)
        RETURNVAR: get_anonymized_branch_status_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  startanonymization:
    SUMMARY: Start anonymization
    DESC: |
      Starts the anonymization process for an anonymized branch that is in the initialized, error, or anonymized state.
      This will apply all defined masking rules to anonymize sensitive data in the branch databases.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      The branch must be an anonymized branch to start anonymization.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/anonymize
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AnonymizedBranchStatusResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AnonymizedBranchStatusResponse)
        RETURNVAR: start_anonymization_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  setdefaultprojectbranch:
    SUMMARY: Set branch as default
    DESC: |
      Sets the specified branch as the project's default branch.
      The default designation is automatically removed from the previous default branch.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      For more information, see [Manage branches](https://neon.tech/docs/manage/branches/).
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/set_as_default
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BranchOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(BranchOperations)
        RETURNVAR: set_default_project_branch_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  finalizerestorebranch:
    SUMMARY: Finalize restore
    DESC: |
      Finalize the restore operation for a branch created from a snapshot.
      This operation updates the branch so it functions as the original branch it replaced.
      This includes:
        - Reassigning any computes from the original branch to the restored branch (this will restart the computes)
        - Renaming the restored branch to the original branch's name
        - Renaming the original branch so it no longer uses the original name

      This operation only applies to branches created using the `restoreSnapshot` endpoint with `finalize_restore: false`.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/finalize_restore
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(finalizeRestoreBranchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OperationsResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(finalizeRestoreBranchRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(OperationsResponse)
        RETURNVAR: finalize_restore_branch_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectbranchendpoints:
    SUMMARY: List branch endpoints
    DESC: |
      Retrieves a list of compute endpoints for the specified branch.
      Neon permits only one read-write compute endpoint per branch.
      A branch can have multiple read-only compute endpoints.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/endpoints
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EndpointsResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(EndpointsResponse)
        RETURNVAR: list_project_branch_endpoints_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listprojectbranchdatabases:
    SUMMARY: List databases
    DESC: |
      Retrieves a list of databases for the specified branch.
      A branch can have multiple databases.
      You can obtain a `project_id` by listing the projects for your Neon account.
