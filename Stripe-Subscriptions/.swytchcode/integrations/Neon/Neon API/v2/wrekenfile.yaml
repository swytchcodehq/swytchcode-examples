  createprojectbranchrole:
    SUMMARY: Create role
    DESC: |
      Creates a Postgres role in the specified branch.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      For related information, see [Manage roles](https://neon.tech/docs/manage/roles/).

      Connections established to the active compute endpoint will be dropped.
      If the compute endpoint is idle, the endpoint becomes active for a short period of time and is suspended afterward.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/roles
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RoleCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RoleOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(RoleCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RoleOperations)
        RETURNVAR: create_project_branch_role_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getprojectbranchrole:
    SUMMARY: Retrieve role details
    DESC: |
      Retrieves details about the specified role.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      You can obtain the `role_name` by listing the roles for a branch.
      In Neon, the terms "role" and "user" are synonymous.
      For related information, see [Manage roles](https://neon.tech/docs/manage/roles/).
