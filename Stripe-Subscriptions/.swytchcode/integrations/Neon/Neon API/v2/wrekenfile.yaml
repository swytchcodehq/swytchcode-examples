          LOCATION: path
      - database_name:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(DatabaseResponse)
        RETURNVAR: get_project_branch_database_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updateprojectbranchdatabase:
    SUMMARY: Update database
    DESC: |
      Updates the specified database in the branch.
      You can obtain a `project_id` by listing the projects for your Neon account.
