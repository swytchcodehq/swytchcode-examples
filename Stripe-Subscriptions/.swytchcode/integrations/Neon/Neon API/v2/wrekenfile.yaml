        STATUS: 500
        WHEN: HTTP default
  getprojectbranch:
    SUMMARY: Retrieve branch details
    DESC: |
      Retrieves information about the specified branch.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain a `branch_id` by listing the project's branches.
      A `branch_id` value has a `br-` prefix.

      Each Neon project is initially created with a root and default branch named `main`.
      A project can contain one or more branches.
      A parent branch is identified by a `parent_id` value, which is the `id` of the parent branch.
      For related information, see [Manage branches](https://neon.tech/docs/manage/branches/).
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/{branch_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: get_project_branch_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deleteprojectbranch:
    SUMMARY: Delete branch
    DESC: |
      Deletes the specified branch from a project, and places
      all compute endpoints into an idle state, breaking existing client connections.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain a `branch_id` by listing the project's branches.
      For related information, see [Manage branches](https://neon.tech/docs/manage/branches/).

      When a successful response status is received, the compute endpoints are still active,
      and the branch is not yet deleted from storage.
      The deletion occurs after all operations finish.
      You cannot delete a project's root or default branch, and you cannot delete a branch that has a child branch.
      A project must have at least one branch.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/branches/{branch_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BranchOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(BranchOperations)
        RETURNVAR: delete_project_branch_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updateprojectbranch:
    SUMMARY: Update branch
    DESC: |
      Updates the specified branch.
      You can obtain a `project_id` by listing the projects for your Neon account.
      You can obtain the `branch_id` by listing the project's branches.
      For more information, see [Manage branches](https://neon.tech/docs/manage/branches/).
    HTTP:
      METHOD: PATCH
      ENDPOINT: /projects/{project_id}/branches/{branch_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BranchUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BranchOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BranchUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BranchOperations)
        RETURNVAR: update_project_branch_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  restoreprojectbranch:
    SUMMARY: Restore branch
    DESC: Restores a branch to an earlier state in its own or another branch's history
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/restore
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BranchRestoreRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BranchOperations)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BranchRestoreRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BranchOperations)
        RETURNVAR: restore_project_branch_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
