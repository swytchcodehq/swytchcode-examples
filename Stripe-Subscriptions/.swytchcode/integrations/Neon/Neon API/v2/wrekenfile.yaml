        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createsnapshot:
    SUMMARY: Create snapshot
    DESC: |
      Create a snapshot from the specified branch using the provided parameters.
      This endpoint may initiate an asynchronous operation.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/snapshot
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(createSnapshotResponse200)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - lsn:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - timestamp:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - name:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - expires_at:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(createSnapshotResponse200)
        RETURNVAR: create_snapshot_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listsnapshots:
    SUMMARY: List project snapshots
    DESC: |
      List the snapshots for the specified project.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/snapshots
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(listSnapshotsResponse200)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(listSnapshotsResponse200)
        RETURNVAR: list_snapshots_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  deletesnapshot:
    SUMMARY: Delete snapshot
    DESC: |
      Delete the specified snapshot.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /projects/{project_id}/snapshots/{snapshot_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OperationsResponse)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - snapshot_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(OperationsResponse)
        RETURNVAR: delete_snapshot_202
        STATUS: 202
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  updatesnapshot:
    SUMMARY: Update snapshot
    DESC: |
      Update the specified snapshot.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /projects/{project_id}/snapshots/{snapshot_id}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SnapshotUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(updateSnapshotResponse200)
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - snapshot_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(SnapshotUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(updateSnapshotResponse200)
        RETURNVAR: update_snapshot_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  restoresnapshot:
    SUMMARY: Restore snapshot
    DESC: |
      Restore the specified snapshot to a new branch and optionally finalize the restore operation.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: POST
      ENDPOINT: /projects/{project_id}/snapshots/{snapshot_id}/restore
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(restoreSnapshotRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - project_id:
          TYPE: STRING
          LOCATION: path
      - snapshot_id:
          TYPE: STRING
          LOCATION: path
      - name:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(restoreSnapshotRequest)
          REQUIRED: false
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getsnapshotschedule:
    SUMMARY: View backup schedule
    DESC: |
      View the backup schedule for the specified branch.

      **Note**: This endpoint is currently in Beta.
    HTTP:
      METHOD: GET
      ENDPOINT: /projects/{project_id}/branches/{branch_id}/backup_schedule
      HEADERS:
