          LOCATION: path
      - branch_id:
          TYPE: STRING
          LOCATION: path
      - database_name:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(DatabaseUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(DatabaseOperations)
        RETURNVAR: update_project_branch_database_result
