          LOCATION: path
      - body:
          TYPE: STRUCT(BackupSchedule)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
STRUCTS:
  TelemetryConnection:
    - name: protocol
      type: STRING
      REQUIRED: true
      comment: |
        Required. Communication protocol used to send telemetry data. Options: grpc, http.
    - name: endpoint
      type: STRING
      REQUIRED: true
      comment: |
        Required. URI of the OpenTelemetry Collector (e.g., https://collector.customer.com:4317).
    - name: authentication
      type: STRUCT(TelemetryAuthentication)
      REQUIRED: true
      comment: |
        Required. Authentication configuration to securely send telemetry.
        Options include bearer token, basic auth, or API key.
  TelemetryAuthentication:
    - name: bearer_token
      type: OBJECT
      REQUIRED: false
    - name: basic
      type: OBJECT
      REQUIRED: false
    - name: api_key
      type: OBJECT
      REQUIRED: false
  TelemetryAuthentication_bearer_token:
    - name: token
      type: STRING
      REQUIRED: true
  TelemetryAuthentication_basic:
    - name: username
      type: STRING
      REQUIRED: true
    - name: password
      type: STRING
      REQUIRED: true
  TelemetryAuthentication_api_key:
    - name: key
      type: STRING
      REQUIRED: true
    - name: header_name
      type: STRING
      REQUIRED: false
      comment: |
        Optional. Custom header name for the API key. If not specified, defaults to "X-API-Key".
        This allows using custom header names like "Authorization", "X-Custom-Key", etc.
  TelemetryConfig:
    - name: types
      type: "[]STRING"
      REQUIRED: true
      comment: |
        Required. The telemetry data types to enable. One or both of: metrics, logs.
    - name: metrics_endpoint_override
      type: STRING
      REQUIRED: false
      comment: |
        Optional. Overrides the default endpoint for metrics (e.g., https://metrics.customer.com:4317).
    - name: logs_endpoint_override
      type: STRING
      REQUIRED: false
      comment: |
        Optional. Overrides the default endpoint for logs (e.g., https://logs.customer.com:4318).
  TelemetryResource:
    - name: attributes
      type: map[STRING]STRING
      REQUIRED: false
      comment: |
        Optional. Key-value attributes that describe the source of telemetry (e.g., service.name: neon-test).
        See: @https://opentelemetry.io/docs/specs/semconv/resource/#services
  PaginationResponse:
    - name: pagination
      type: STRUCT(Pagination)
      REQUIRED: false
  Pagination:
    - name: cursor
      type: STRING
      REQUIRED: true
  PlanDetails:
    - name: name
      type: STRING
      REQUIRED: true
    - name: version
      type: STRUCT(PlanVersion)
      REQUIRED: false
  PlanVersion:
    - name: major
      type: INT
      REQUIRED: true
    - name: minor
      type: INT
      REQUIRED: true
  AddProjectJWKSRequest:
    - name: jwks_url
      type: STRING
      REQUIRED: true
      comment: The URL that lists the JWKS
    - name: provider_name
      type: STRING
      REQUIRED: true
      comment: The name of the authentication provider (e.g., Clerk, Stytch, Auth0)
    - name: branch_id
      type: STRING
      REQUIRED: false
      comment: Branch ID
    - name: jwt_audience
      type: STRING
      REQUIRED: false
      comment: The name of the required JWT Audience to be used
    - name: role_names
      type: "[]STRING"
      REQUIRED: false
      comment: DEPRECATED. This field should only be used when using Neon RLS. The roles the JWKS should be mapped to. By default, the JWKS is mapped to the `authenticator`, `authenticated` and `anonymous` roles.
    - name: skip_role_creation
      type: BOOL
      REQUIRED: false
      comment: DEPRECATED. This field should only be used when using Neon RLS. If true, the role creation will be skipped.
  JWKS:
    - name: id
      type: STRING
      REQUIRED: true
      comment: JWKS ID
    - name: project_id
      type: STRING
      REQUIRED: true
      comment: Project ID
    - name: branch_id
      type: STRING
      REQUIRED: false
      comment: Branch ID
    - name: jwks_url
      type: STRING
      REQUIRED: true
