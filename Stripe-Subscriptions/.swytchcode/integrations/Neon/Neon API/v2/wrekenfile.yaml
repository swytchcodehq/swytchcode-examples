        RETURNVAR: get_consumption_history_per_project_v2_result
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(GeneralError)
        STATUS: 403
        WHEN: This endpoint is not available. It is only supported with Scale, Business, and Enterprise plan accounts. (HTTP 403)
      - TYPE: STRUCT(GeneralError)
        STATUS: 404
        WHEN: Account is not a member of the organization specified by `org_id`. (HTTP 404)
      - TYPE: STRUCT(GeneralError)
        STATUS: 406
        WHEN: |-
          The specified `date-time` range is outside the boundaries of the specified `granularity`.
          Adjust your `from` and `to` values or select a different `granularity`.
           (HTTP 406)
      - TYPE: STRUCT(GeneralError)
        STATUS: 429
        WHEN: Too many requests (HTTP 429)
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  getorganization:
    SUMMARY: Retrieve organization details
    DESC: |
      Retrieves information about the specified organization.
    HTTP:
      METHOD: GET
      ENDPOINT: /organizations/{org_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Organization)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Organization)
        RETURNVAR: get_organization_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  listorgapikeys:
    SUMMARY: List organization API keys
    DESC: |
      Retrieves the API keys for the specified organization.
      The response does not include API key tokens. A token is only provided when creating an API key.
      API keys can also be managed in the Neon Console.
      For more information, see [Manage API keys](https://neon.tech/docs/manage/api-keys/).
    HTTP:
      METHOD: GET
      ENDPOINT: /organizations/{org_id}/api_keys
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(OrgApiKeysListResponseItem)"
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: "[]STRUCT(OrgApiKeysListResponseItem)"
        RETURNVAR: list_org_api_keys_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  createorgapikey:
    SUMMARY: Create organization API key
    DESC: |
      Creates an API key for the specified organization.
      The `key_name` is a user-specified name for the key.
      This method returns an `id` and `key`. The `key` is a randomly generated, 64-bit token required to access the Neon API.
      API keys can also be managed in the Neon Console.
      See [Manage API keys](https://neon.tech/docs/manage/api-keys/).
    HTTP:
      METHOD: POST
      ENDPOINT: /organizations/{org_id}/api_keys
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(OrgApiKeyCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(OrgApiKeyCreateResponse)
    INPUTS:
      - org_id:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(OrgApiKeyCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(OrgApiKeyCreateResponse)
        RETURNVAR: create_org_api_key_result
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
  revokeorgapikey:
    SUMMARY: Revoke organization API key
    DESC: |
      Revokes the specified organization API key.
      An API key that is no longer needed can be revoked.
      This action cannot be reversed.
      You can obtain `key_id` values by listing the API keys for an organization.
      API keys can also be managed in the Neon Console.
      See [Manage API keys](https://neon.tech/docs/manage/api-keys/).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /organizations/{org_id}/api_keys/{key_id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
