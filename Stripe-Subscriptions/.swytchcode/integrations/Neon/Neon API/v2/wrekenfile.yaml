    - name: in_progress_maintenances
      type: INT
      REQUIRED: true
    - name: scheduled_maintenances
      type: INT
      REQUIRED: true
  createProjectTransferRequestRequest:
    - name: ttl_seconds
      type: INT
      REQUIRED: false
      comment: |
        Specifies the validity duration of the transfer request in seconds. If not provided,
        the request will expire after 24 hours (86,400 seconds).
  acceptProjectTransferRequestRequest:
    - name: org_id
      type: STRING
      REQUIRED: false
      comment: |
        The Neon organization ID to transfer the project to. If not provided, the project will be
        transferred to the current user or organization account.
  disableNeonAuthRequest:
    - name: delete_data
      type: BOOL
      REQUIRED: false
      comment: If true, deletes the `neon_auth` schema from the database
  deleteNeonAuthIntegrationRequest:
    - name: delete_data
      type: BOOL
      REQUIRED: false
      comment: If true, deletes the `neon_auth` schema from the database
  createProjectBranchRequest:
    - name: endpoints
      type: "[]STRUCT(BranchCreateRequestEndpointOptions)"
      REQUIRED: false
    - name: branch
      type: OBJECT
      REQUIRED: false
    - name: annotation_value
      type: STRUCT(AnnotationValueData)
      REQUIRED: false
  finalizeRestoreBranchRequest:
    - name: name
      type: STRING
      REQUIRED: false
      comment: used to rename the existing branch when it is replaced. if omitted, a default name is generated and used
  createSnapshotResponse200:
    - name: snapshot
      type: STRUCT(Snapshot)
      REQUIRED: true
    - name: operations
      type: "[]STRUCT(Operation)"
      REQUIRED: true
  listSnapshotsResponse200:
    - name: snapshots
      type: "[]STRUCT(Snapshot)"
      REQUIRED: true
  updateSnapshotResponse200:
    - name: snapshot
      type: STRUCT(Snapshot)
      REQUIRED: true
  restoreSnapshotRequest:
    - name: name
      type: STRING
      REQUIRED: false
      comment: |
        A name for the newly restored branch.
        If omitted, a default name will be generated.
    - name: target_branch_id
      type: STRING
      REQUIRED: false
      comment: |
        The ID of the branch to restore the snapshot into.
        If not specified, the branch from which the snapshot was originally
        created (`snapshot.source_branch_id`) will be used.
    - name: finalize_restore
      type: BOOL
      REQUIRED: false
      comment: |
        Set to `true` to finalize the restore operation immediately.
        This will complete the restore and move any associated computes to the new branch,
        similar to the `finalizeRestoreBranch` operation.
        Defaults to `false` to allow previewing the restored snapshot data first.
