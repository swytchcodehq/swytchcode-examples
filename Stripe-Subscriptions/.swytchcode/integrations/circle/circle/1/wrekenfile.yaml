      ENDPOINT: /v1/businessAccount/transfers
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - walletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - sourceWalletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - destinationWalletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - from:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - to:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - pageBefore:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - pageAfter:
