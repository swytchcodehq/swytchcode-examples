      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreateContractExecutionTransactionForDeveloper)
    INPUTS:
      - X-Request-Id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: header
    RETURNS:
