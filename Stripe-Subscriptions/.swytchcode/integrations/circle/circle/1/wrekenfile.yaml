  prepare-withdrawal.prepare-withdrawal.create:
    SUMMARY: Prepare a withdrawal request
    DESC: |
      Turns the user's burn transaction data on the remote chain into fully encoded burn intents to send to the `/withdraw` endpoint. This endpoint performs the following:
      - Resolves contract and token addresses across networks.
      - Determines the optimal forwarding strategy, such as redepositing to another xReserve remote domain or forwarding to a CCTP domain.
      - Calculates transfer amounts and fees.
      - Encodes forwarding call data with the calculated transfer amounts.
      - Generates `maxBlockHeight` and `maxFee` values with safety buffers.
      - Returns data in the structure expected by the withdraw endpoint.

      Note: The `/withdraw` endpoint requires signatures and the remote chain `burnTxId` in addition to the burn intent prepared by this endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/prepare-withdrawal
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PrepareWithdrawalRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(PrepareWithdrawalRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 500
        WHEN: Server error (HTTP 500)
    CANONICAL_ID: prepare-withdrawal.prepare-withdrawal.create
  withdraw.withdraw.create:
    SUMMARY: Submit signed burn intents for withdrawal
    DESC: Submits up to five signed burn intent batches per request call. Each batch may contain one burn intent or a set of up to 10.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/withdraw
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(WithdrawRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - body:
          TYPE: STRUCT(WithdrawRequest)
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: STRUCT(Error409)
        STATUS: 409
        WHEN: Conflict occurred. The burn transaction ID is already associated with an active withdrawal. (HTTP 409)
      - TYPE: ANY
        STATUS: 500
        WHEN: Server error (HTTP 500)
    CANONICAL_ID: withdraw.withdraw.create
  withdrawal.withdrawal.get:
    SUMMARY: Get withdrawal status
    DESC: Returns the status and transfer details of a specified withdrawal group.
    HTTP:
