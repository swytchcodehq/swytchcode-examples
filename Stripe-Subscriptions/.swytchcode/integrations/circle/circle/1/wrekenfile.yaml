  businessaccount.wallet.deposit.create:
    SUMMARY: Create a deposit address
    DESC: |
      Generates a new blockchain address for a wallet for a given currency/chain pair. Circle may reuse addresses on blockchains that support reuse. For example, if you're requesting two addresses for depositing USD and ETH, both on Ethereum, you may see the same Ethereum address returned. Depositing cryptocurrency to a generated address will credit the associated wallet with the value of the deposit. Note: Circle Mint Singapore customers must verify all transfer recipients using the UI in the Circle Console, as transfers from unverified addresses will be held in `pending` status.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/businessAccount/wallets/addresses/deposit
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BusinessGenerateAddressRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - walletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BusinessGenerateAddressRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: businessaccount_wallet_deposit_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: businessaccount.wallet.deposit.create
  businessaccount.wallet.deposit.list:
    SUMMARY: List all deposit addresses
    DESC: Returns a list of deposit addresses for a given wallet.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/businessAccount/wallets/addresses/deposit
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - walletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: businessaccount_wallet_deposit_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: businessaccount.wallet.deposit.list
  businessaccount.wallet.recipient.create:
    SUMMARY: Create a recipient address
    DESC: |
      Stores an external blockchain address. Once added, the recipient address must be verified to ensure that you know and trust each new address.

      **For France customers:**

      Circle Mint France customers must verify all transfer recipients using the UI in the Circle Console, as transfers from unverified addresses will be held in pending status. Please see Help Center articles below for details:
      - [Circle Mint France Travel Rule](https://help.circle.com/s/article/Circle-Mint-France-Travel-Rule)
      - [Circle Mint France wallet verification](https://help.circle.com/s/article/Circle-Mint-France-wallet-verification)
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/businessAccount/wallets/addresses/recipient
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BusinessRecipientAddressCreationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BusinessRecipientAddressCreationRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: businessaccount_wallet_recipient_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: businessaccount.wallet.recipient.create
  businessaccount.wallet.recipient.list:
    SUMMARY: List all recipient addresses
    DESC: |
      Returns a list of recipient addresses that have each been verified and are eligible for transfers. Any recipient addresses pending administrator verification are not included in the response.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/businessAccount/wallets/addresses/recipient
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - from:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - to:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - pageBefore:
          TYPE: STRING
          REQUIRED: false
