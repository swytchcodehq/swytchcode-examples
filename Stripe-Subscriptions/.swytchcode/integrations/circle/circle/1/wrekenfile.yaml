  businessaccount.transfer.create:
    SUMMARY: Create a transfer
    DESC: A transfer can be made from an existing business account to a blockchain location.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/businessAccount/transfers
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
