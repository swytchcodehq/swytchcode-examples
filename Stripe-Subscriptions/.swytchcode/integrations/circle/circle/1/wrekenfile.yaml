        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(MockWirePaymentRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: mocks_payment_wire_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: mocks.payment.wire.create
