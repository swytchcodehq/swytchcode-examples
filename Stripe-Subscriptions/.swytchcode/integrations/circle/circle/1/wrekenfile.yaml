    CANONICAL_ID: businessaccount.bank.instructions.get
  mocks.payment.wire.create:
    SUMMARY: Create a mock Wire payment
    DESC: In the sandbox environment, initiate a mock wire payment that mimics the behavior of funds sent through the bank (wire) account linked to master wallet.
