  businessaccount.bank.instructions.get:
    SUMMARY: Get wire instructions
    DESC: Get the wire transfer instructions into the Circle bank account given your bank account ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/businessAccount/banks/wires/{id}/instructions
