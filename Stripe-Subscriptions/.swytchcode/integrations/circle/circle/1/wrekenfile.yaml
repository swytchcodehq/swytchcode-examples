VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <TOKEN>
  w_base_url: https://api-sandbox.circle.com
METHODS:
  ping.ping.list:
    SUMMARY: Ping
    DESC: Checks that the service is running.
    HTTP:
      METHOD: GET
      ENDPOINT: /ping
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Ping)
    RETURNS:
      - RETURNTYPE: STRUCT(Ping)
        RETURNVAR: ping_ping_list
        STATUS: 200
    CANONICAL_ID: ping.ping.list
  configuration.configuration.list:
    SUMMARY: Get configuration info
    DESC: Retrieves general configuration information.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/configuration
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: configuration_configuration_list
        STATUS: 200
    CANONICAL_ID: configuration.configuration.list
  stablefx.notification.subscriptions.create:
    SUMMARY: Create a webhook subscription
    DESC: |
      Create a webhook subscription by configuring an endpoint to receive notifications.
    HTTP:
      METHOD: POST
      ENDPOINT: /v2/stablefx/notifications/subscriptions
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(stablefx.notification.subscriptions.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CreateSubscription)
    INPUTS:
      - X-Request-Id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: header
      - body:
          TYPE: STRUCT(stablefx.notification.subscriptions.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CreateSubscription)
        RETURNVAR: stablefx_notification_subscriptions_create
        STATUS: 200
    ERRORS:
      - TYPE: STRUCT(Error400)
        STATUS: 400
        WHEN: Bad request - validation error (HTTP 400)
      - TYPE: STRUCT(Error401)
        STATUS: 401
        WHEN: Not authenticated (HTTP 401)
    CANONICAL_ID: stablefx.notification.subscriptions.create
  notifications.subscription.list:
    SUMMARY: List all notification subscriptions
    DESC: Retrieve a list of existing notification subscriptions with details.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/notifications/subscriptions
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: notifications_subscription_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: notifications.subscription.list
  stablefx.notification.subscriptions.delete:
    SUMMARY: Delete a notification subscription
    DESC: Delete an existing subscription.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /v2/stablefx/notifications/subscriptions/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
      - X-Request-Id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: header
    ERRORS:
      - TYPE: STRUCT(Error401)
        STATUS: 401
        WHEN: Not authenticated (HTTP 401)
      - TYPE: STRUCT(Error404)
        STATUS: 404
        WHEN: Resource not found (HTTP 404)
    CANONICAL_ID: stablefx.notification.subscriptions.delete
  stablecoins.stablecoin.list:
    SUMMARY: List all stablecoins
    DESC: Retrieves total circulating supply for supported stablecoins across all chains. This endpoint is rate limited to one call per minute (based on IP).
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/stablecoins
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: stablecoins_stablecoin_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 429
        WHEN: Client error (HTTP 429)
    CANONICAL_ID: stablecoins.stablecoin.list
  businessaccount.balance.list:
    SUMMARY: List all balances
    DESC: Retrieves the balance of funds that are available for use.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/businessAccount/balances
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - walletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: businessaccount_balance_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: businessaccount.balance.list
  businessaccount.payout.create:
    SUMMARY: Create a payout
    DESC: |
      Create a redemption (offramp) payout. This payout converts a digital asset to fiat currency.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/businessAccount/payouts
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BusinessPayoutCreationRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BusinessPayoutCreationRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: businessaccount_payout_create_201
        STATUS: 201
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: businessaccount.payout.create
  businessaccount.payout.list:
    SUMMARY: List all payouts
    DESC: |
      Lists all payouts for your account.

      Note that this endpoint does not return the tracking reference number for the payouts in the response. If you need that information you must get each payout individually by ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/businessAccount/payouts
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListBusinessPayout)
    INPUTS:
      - destination:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - status:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - sourceWalletId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - from:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - to:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - pageBefore:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - pageAfter:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - pageSize:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListBusinessPayout)
        RETURNVAR: businessaccount_payout_list
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
    CANONICAL_ID: businessaccount.payout.list
  businessaccount.payout.get:
    SUMMARY: Get a payout
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/businessAccount/payouts/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: businessaccount_payout_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: businessaccount.payout.get
  businessaccount.bank.wires.create:
    SUMMARY: Create a wire bank account
