VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://dashboard.alchemy.com/api
METHODS:
  graphql.variable.get:
    SUMMARY: Get Variable Elements
    DESC: |
      This endpoint allows you to read the values within a Custom Webhook variable.
      It supports pagination with `limit` and `after` (and optionally `pageKey`) query parameters.
    HTTP:
      METHOD: GET
      ENDPOINT: /graphql/variables/{variable}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: "[]STRUCT(webhook_addresses_response)"
    INPUTS:
      - X-Alchemy-Token:
          TYPE: STRING
          LOCATION: header
      - variable:
          TYPE: STRING
          LOCATION: path
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 100
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - pageKey:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: "0"
    RETURNS:
      - RETURNTYPE: "[]STRUCT(webhook_addresses_response)"
        RETURNVAR: graphql_variable_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request- The server cannot understand the request. (HTTP 400)
      - TYPE: ANY
        STATUS: 404
        WHEN: Not found- The requested resource could not be found (HTTP 404)
      - TYPE: ANY
        STATUS: 500
        WHEN: Internal Server Error- Try again (HTTP 500)
    CANONICAL_ID: graphql.variable.get
  graphql.variable.create:
    SUMMARY: Create a Variable
    DESC: |
      This endpoint allows you to create a variable that can be inserted into a Custom Webhook GraphQL statement.

      If the variable does not exist, it is created with the provided items. If it already exists, the call is additive: existing items are unchanged, new items are appended, and duplicates are ignored (no error is thrown).
    HTTP:
      METHOD: POST
      ENDPOINT: /graphql/variables/{variable}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(create_custom_webhook)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - X-Alchemy-Token:
          TYPE: STRING
          LOCATION: header
      - variable:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(create_custom_webhook)
          REQUIRED: false
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request- The server cannot understand the request. (HTTP 400)
      - TYPE: ANY
        STATUS: 500
        WHEN: Internal Server Error- Try again (HTTP 500)
    CANONICAL_ID: graphql.variable.create
  graphql.variable.delete:
    SUMMARY: Delete a Variable
    DESC: This endpoint allows you to delete a Custom Webhook variable
    HTTP:
      METHOD: DELETE
      ENDPOINT: /graphql/variables/{variable}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - X-Alchemy-Token:
          TYPE: STRING
          LOCATION: header
      - variable:
          TYPE: STRING
          LOCATION: path
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request- The server cannot understand the request. (HTTP 400)
      - TYPE: ANY
        STATUS: 404
        WHEN: Not found- The requested resource could not be found (HTTP 404)
      - TYPE: ANY
        STATUS: 500
        WHEN: Internal Server Error- Try again (HTTP 500)
    CANONICAL_ID: graphql.variable.delete
  graphql.variable.update:
    SUMMARY: Update a Variable
    DESC: |
      Add and remove elements within a Custom Webhook variable

      <Info>The use of both `add` and `delete` arrays within a single request is currently not supported. Attempting to send both will result in a 400 error. To add and remove elements, make separate API calls for each action.</Info>
    HTTP:
      METHOD: PATCH
      ENDPOINT: /graphql/variables/{variable}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(update_custom_webhook_variable)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - X-Alchemy-Token:
          TYPE: STRING
          LOCATION: header
      - variable:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(update_custom_webhook_variable)
          REQUIRED: false
          LOCATION: body
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Bad Request- The server cannot understand the request. (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Unauthorized- missing or invalid authentication credentials (HTTP 401)
      - TYPE: ANY
        STATUS: 500
        WHEN: Internal Server Error- Try again (HTTP 500)
    CANONICAL_ID: graphql.variable.update
