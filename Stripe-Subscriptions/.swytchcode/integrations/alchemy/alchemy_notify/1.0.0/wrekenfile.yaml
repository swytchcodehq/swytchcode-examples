STRUCTS:
  nft_filter_object:
    - name: contract_address
      NAME: contract_address
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Contract address for an NFT. If this field and the `token_id` aren't set, all NFT activity updates will be sent.
    - name: token_id
      NAME: token_id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Token ID for an NFT (decimal or "0x" prefixed hex string). Cannot be set if `contract_address` is not provided.
  create_webhook:
    - name: network
      NAME: network
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: webhook_type
      NAME: webhook_type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: webhook_url
      NAME: webhook_url
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL where requests are sent
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Name of the webhook
    - name: graphql_query
      NAME: graphql_query
      type: ANY
      TYPE: ANY
      REQUIRED: false
    - name: addresses
      NAME: addresses
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: List of addresses to track. Required for ADDRESS_ACTIVITY webhook type.
    - name: nft_filters
      NAME: nft_filters
      type: "[]STRUCT(nft_filter_object)"
      TYPE: "[]STRUCT(nft_filter_object)"
      REQUIRED: false
      comment: List of NFT filter objects to track. Required for NFT_ACTIVITY webhook type.
  create_custom_webhook:
    - name: items
      NAME: items
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: A variable defined as a set of addresses or byte32 elements. Must be non-empty.
  update_webhook_addresses:
    - name: webhook_id
      NAME: webhook_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the address activity webhook
    - name: addresses_to_add
      NAME: addresses_to_add
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: List of addresses to add **(empty array if none)**.
    - name: addresses_to_remove
      NAME: addresses_to_remove
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: List of addresses to remove **(empty array if none)**.
  update_webhook_nft_filters:
    - name: webhook_id
      NAME: webhook_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the address activity webhook
    - name: nft_filters_to_add
      NAME: nft_filters_to_add
      type: "[]STRUCT(nft_filter_object)"
      TYPE: "[]STRUCT(nft_filter_object)"
      REQUIRED: false
      comment: List of NFT filters to add (empty array if none).
    - name: nft_filters_to_remove
      NAME: nft_filters_to_remove
      type: "[]STRUCT(nft_filter_object)"
      TYPE: "[]STRUCT(nft_filter_object)"
      REQUIRED: false
      comment: List of NFT filters to remove (empty array if none).
  update_custom_webhook_variable:
    - name: add
      NAME: add
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Set of elements to be added to a Custom Webhook variable
    - name: delete
      NAME: delete
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Set of elements to be deleted from a Custom Webhook variable
  replace_webhook_addresses:
    - name: webhook_id
      NAME: webhook_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the address activity webhook.
    - name: addresses
      NAME: addresses
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: New list of addresses to track (replaces any existing addresses).
  update_webhook:
    - name: webhook_id
      NAME: webhook_id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the webhook
    - name: is_active
      NAME: is_active
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: |
        Set webhook status (true for active, false for inactive)
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Update the webhook name
  webhook_object_response:
    - name: data
      NAME: data
      type: "[]STRUCT(webhook_creation_data)"
      TYPE: "[]STRUCT(webhook_creation_data)"
      REQUIRED: false
      comment: List of webhooks for your team.
  webhook_creation_data:
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Unique ID for the webhook.
    - name: network
      NAME: network
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: webhook_type
      NAME: webhook_type
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: webhook_url
      NAME: webhook_url
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: URL endpoint where the webhook is sent
    - name: is_active
      NAME: is_active
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the webhook is active, false otherwise.
    - name: time_created
      NAME: time_created
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Timestamp when the webhook was created.
    - name: version
      NAME: version
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Webhook version (v1 or v2)
    - name: signing_key
      NAME: signing_key
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Signing key for the webhook.
  create_webhook_response:
    - name: data
      NAME: data
      type: STRUCT(webhook_creation_data)
      TYPE: STRUCT(webhook_creation_data)
      REQUIRED: false
  update_webhook_response:
    - name: data
      NAME: data
      type: ANY
      TYPE: ANY
      REQUIRED: false
  webhook_nft_filters_response:
    - name: data
      NAME: data
      type: "[]STRUCT(nft_filter_object)"
      TYPE: "[]STRUCT(nft_filter_object)"
      REQUIRED: false
      comment: List of NFT filter objects.
    - name: pagination
      NAME: pagination
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: Pagination information.
  webhook_addresses_response:
    - name: data
      NAME: data
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: List of addresses associated with the webhook.
    - name: pagination
      NAME: pagination
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: Pagination information.
  update-webhook-addresses.update-webhook-address.updateResponse200:
    - NAME: value
      TYPE: ANY
      REQUIRED: false
  update-webhook-nft-filters.update-webhook-nft-filter.updateResponse200:
    - NAME: value
      TYPE: ANY
      REQUIRED: false
  delete-webhook.delete-webhook.deleteResponse200:
    - NAME: value
      TYPE: ANY
      REQUIRED: false
