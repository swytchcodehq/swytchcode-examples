      NAME: sequence_number
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A string containing a 64-bit unsigned integer.
    - name: authentication_key
      NAME: authentication_key
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: All bytes (Vec) data is represented as hex-encoded string prefixed with 0x and fulfilled with two hex digits per byte.
  accounts.resource.getResponse200:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
