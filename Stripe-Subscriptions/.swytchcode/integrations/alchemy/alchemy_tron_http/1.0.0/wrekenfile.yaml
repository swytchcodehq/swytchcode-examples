VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://tron-mainnet.g.alchemy.com/v2/{apiKey}
METHODS:
  wallet.validateaddress.create:
    SUMMARY: Validate an address
    DESC: |
      Validates whether the given address is a valid TRON address.   It can optionally check whether the address is in base58check format (`visible: true`) or hex format (`visible: false`).
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/validateaddress
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.validateaddress.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.validateaddress.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.validateaddress.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.validateaddress.createResponse200)
        RETURNVAR: wallet_validateaddress_create
        STATUS: 200
    CANONICAL_ID: wallet.validateaddress.create
  wallet.broadcasttransaction.create:
    SUMMARY: Broadcast a transaction
    DESC: |
      Broadcasts a signed transaction to the TRON network.   The transaction must be correctly formed and signed before being sent.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/broadcasttransaction
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.broadcasttransaction.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.broadcasttransaction.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.broadcasttransaction.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.broadcasttransaction.createResponse200)
        RETURNVAR: wallet_broadcasttransaction_create
        STATUS: 200
    CANONICAL_ID: wallet.broadcasttransaction.create
  wallet.broadcasthex.create:
    SUMMARY: Broadcast a hex-encoded transaction
    DESC: |
      Broadcasts a signed transaction to the TRON network using a hex-encoded string.   This is useful when a transaction has already been constructed and signed externally.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/broadcasthex
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.broadcasthex.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.broadcasthex.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.broadcasthex.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.broadcasthex.createResponse200)
        RETURNVAR: wallet_broadcasthex_create
        STATUS: 200
    CANONICAL_ID: wallet.broadcasthex.create
  wallet.createtransaction.create:
    SUMMARY: Create a transaction
    DESC: |
      Creates an unsigned TRON transfer transaction between two accounts. The transaction must be signed and broadcast separately after creation.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/createtransaction
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.createtransaction.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.createtransaction.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.createtransaction.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.createtransaction.createResponse200)
        RETURNVAR: wallet_createtransaction_create
        STATUS: 200
    CANONICAL_ID: wallet.createtransaction.create
  wallet.createaccount.create:
    SUMMARY: Create an account
    DESC: |
      Creates a new account under the specified owner address. This is a permissioned action that must be signed and broadcasted to the TRON network.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/createaccount
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.createaccount.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.createaccount.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.createaccount.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.createaccount.createResponse200)
        RETURNVAR: wallet_createaccount_create
        STATUS: 200
    CANONICAL_ID: wallet.createaccount.create
  wallet.getaccount.create:
    SUMMARY: Get account details
    DESC: |
      Retrieves details about a specific TRON account, including balances, permissions, and resource usage.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getaccount
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getaccount.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getaccount.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getaccount.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getaccount.createResponse200)
        RETURNVAR: wallet_getaccount_create
        STATUS: 200
    CANONICAL_ID: wallet.getaccount.create
  wallet.updateaccount.create:
    SUMMARY: Update account name
    DESC: |
      Updates the account name associated with the given owner address.   The name must be a hex-encoded string and is limited in length.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/updateaccount
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.updateaccount.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.updateaccount.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.updateaccount.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.updateaccount.createResponse200)
        RETURNVAR: wallet_updateaccount_create
        STATUS: 200
    CANONICAL_ID: wallet.updateaccount.create
  wallet.accountpermissionupdate.create:
    SUMMARY: Update account permissions
    DESC: |
      Updates the owner and active permission structures of a TRON account.   This allows fine-grained control over account access and required thresholds.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/accountpermissionupdate
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.accountpermissionupdate.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.accountpermissionupdate.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.accountpermissionupdate.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.accountpermissionupdate.createResponse200)
        RETURNVAR: wallet_accountpermissionupdate_create
        STATUS: 200
    CANONICAL_ID: wallet.accountpermissionupdate.create
  wallet.getaccountbalance.create:
    SUMMARY: Get account balance at a specific block
    DESC: |
      Retrieves the account balance for a specific TRON address at a given block.   This method is useful for historical balance lookups.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getaccountbalance
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getaccountbalance.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getaccountbalance.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getaccountbalance.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getaccountbalance.createResponse200)
        RETURNVAR: wallet_getaccountbalance_create
        STATUS: 200
    CANONICAL_ID: wallet.getaccountbalance.create
  wallet.getaccountresource.create:
    SUMMARY: Get account resource limits
    DESC: |
      Returns resource limit and usage information for a given TRON address, including Net and Energy values.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getaccountresource
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getaccountresource.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getaccountresource.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getaccountresource.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getaccountresource.createResponse200)
        RETURNVAR: wallet_getaccountresource_create
        STATUS: 200
    CANONICAL_ID: wallet.getaccountresource.create
  wallet.getaccountnet.create:
    SUMMARY: Get account Net resource info
    DESC: |
      Returns Net resource limits and usage for a given TRON address. This is a simplified version of the resource query focused only on Net metrics.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getaccountnet
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getaccountnet.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getaccountnet.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getaccountnet.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getaccountnet.createResponse200)
        RETURNVAR: wallet_getaccountnet_create
        STATUS: 200
    CANONICAL_ID: wallet.getaccountnet.create
  wallet.freezebalance.create:
    SUMMARY: Freeze balance for resource allocation
    DESC: |
      Freezes TRX tokens in an account to gain bandwidth or energy resources.   Frozen tokens will be locked for a specified duration.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/freezebalance
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.freezebalance.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.freezebalance.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.freezebalance.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.freezebalance.createResponse200)
        RETURNVAR: wallet_freezebalance_create
        STATUS: 200
    CANONICAL_ID: wallet.freezebalance.create
  wallet.unfreezebalance.create:
    SUMMARY: Unfreeze account balance
    DESC: |
      Unfreezes a previously frozen TRON account balance to restore access to tokens. The unfreeze operation must specify the resource type originally frozen.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/unfreezebalance
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.unfreezebalance.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.unfreezebalance.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.unfreezebalance.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.unfreezebalance.createResponse200)
        RETURNVAR: wallet_unfreezebalance_create
        STATUS: 200
    CANONICAL_ID: wallet.unfreezebalance.create
  wallet.getdelegatedresource.create:
    SUMMARY: Get delegated resource information
    DESC: |
      Returns the amount of resource delegated from one address to another. This includes bandwidth and energy delegated.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getdelegatedresource
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getdelegatedresource.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getdelegatedresource.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getdelegatedresource.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getdelegatedresource.createResponse200)
        RETURNVAR: wallet_getdelegatedresource_create
        STATUS: 200
    CANONICAL_ID: wallet.getdelegatedresource.create
  wallet.getdelegatedresourceaccountindex.create:
    SUMMARY: Get delegated resource account index
    DESC: |
      Returns the account address for which delegated resource index information is being queried.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getdelegatedresourceaccountindex
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getdelegatedresourceaccountindex.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getdelegatedresourceaccountindex.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getdelegatedresourceaccountindex.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getdelegatedresourceaccountindex.createResponse200)
        RETURNVAR: wallet_getdelegatedresourceaccountindex_create
        STATUS: 200
    CANONICAL_ID: wallet.getdelegatedresourceaccountindex.create
  wallet.freezebalancev2.create:
    SUMMARY: Freeze balance using FreezeBalanceV2
    DESC: |
      Freezes TRX tokens in an account to gain ENERGY resources using the newer FreezeBalanceV2 mechanism.   This version omits the `frozen_duration` parameter and is considered an improved alternative to `/freezebalance`.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/freezebalancev2
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.freezebalancev2.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.freezebalancev2.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.freezebalancev2.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.freezebalancev2.createResponse200)
        RETURNVAR: wallet_freezebalancev2_create
        STATUS: 200
    CANONICAL_ID: wallet.freezebalancev2.create
  wallet.delegateresource.create:
    SUMMARY: Delegate resource to another account
    DESC: |
      Delegates bandwidth or energy resources from one account to another. The delegator must have previously frozen TRX to obtain the resources.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/delegateresource
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.delegateresource.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.delegateresource.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.delegateresource.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.delegateresource.createResponse200)
        RETURNVAR: wallet_delegateresource_create
        STATUS: 200
    CANONICAL_ID: wallet.delegateresource.create
  wallet.undelegateresource.create:
    SUMMARY: Undelegate resource from another account
    DESC: |
      Removes previously delegated bandwidth or energy resources from a target account.   The operation reclaims the resource back to the owner's account.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/undelegateresource
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.undelegateresource.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.undelegateresource.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.undelegateresource.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.undelegateresource.createResponse200)
        RETURNVAR: wallet_undelegateresource_create
        STATUS: 200
    CANONICAL_ID: wallet.undelegateresource.create
  wallet.withdrawexpireunfreeze.create:
    SUMMARY: Withdraw expired unfreeze balance
    DESC: |
      Withdraws TRX from expired unfreeze operations.   This retrieves tokens that were frozen and then unfrozen, but not yet withdrawn.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/withdrawexpireunfreeze
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.withdrawexpireunfreeze.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.withdrawexpireunfreeze.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.withdrawexpireunfreeze.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.withdrawexpireunfreeze.createResponse200)
        RETURNVAR: wallet_withdrawexpireunfreeze_create
        STATUS: 200
    CANONICAL_ID: wallet.withdrawexpireunfreeze.create
  wallet.getavailableunfreezecount.create:
    SUMMARY: Get available unfreeze count
    DESC: |
      Returns the number of available unfreeze operations for the specified account.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getavailableunfreezecount
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getavailableunfreezecount.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getavailableunfreezecount.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getavailableunfreezecount.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getavailableunfreezecount.createResponse200)
        RETURNVAR: wallet_getavailableunfreezecount_create
        STATUS: 200
    CANONICAL_ID: wallet.getavailableunfreezecount.create
  wallet.getcanwithdrawunfreezeamount.create:
    SUMMARY: Get withdrawable unfreeze amount
    DESC: |
      Returns the amount of TRX that can be withdrawn from expired unfreeze operations for the specified account at a given timestamp.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getcanwithdrawunfreezeamount
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getcanwithdrawunfreezeamount.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getcanwithdrawunfreezeamount.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getcanwithdrawunfreezeamount.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getcanwithdrawunfreezeamount.createResponse200)
        RETURNVAR: wallet_getcanwithdrawunfreezeamount_create
        STATUS: 200
    CANONICAL_ID: wallet.getcanwithdrawunfreezeamount.create
  wallet.getcandelegatedmaxsize.create:
    SUMMARY: Get maximum delegatable resource size
    DESC: |
      Returns the maximum amount of resources (in SUN) that can be delegated by a given account.   The type can be 0 for BANDWIDTH or 1 for ENERGY.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getcandelegatedmaxsize
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getcandelegatedmaxsize.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getcandelegatedmaxsize.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getcandelegatedmaxsize.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getcandelegatedmaxsize.createResponse200)
        RETURNVAR: wallet_getcandelegatedmaxsize_create
        STATUS: 200
    CANONICAL_ID: wallet.getcandelegatedmaxsize.create
  wallet.getdelegatedresourcev2.create:
    SUMMARY: Get delegated resource details (V2)
    DESC: |
      In Stake 2.0, queries detailed information of resource shares delegated from one account to another. Returns amounts staked for BANDWIDTH and ENERGY, and their expiration times if present.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getdelegatedresourcev2
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getdelegatedresourcev2.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getdelegatedresourcev2.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getdelegatedresourcev2.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getdelegatedresourcev2.createResponse200)
        RETURNVAR: wallet_getdelegatedresourcev2_create
        STATUS: 200
    CANONICAL_ID: wallet.getdelegatedresourcev2.create
  wallet.getdelegatedresourceaccountindexv2.create:
    SUMMARY: Get delegated resource account index (V2)
    DESC: |
      Returns the delegated resource account index under Stake 2.0 for the given address.   This is used to locate accounts participating in delegation relationships.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getdelegatedresourceaccountindexv2
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getdelegatedresourceaccountindexv2.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(wallet.getdelegatedresourceaccountindexv2.createResponse200)
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getdelegatedresourceaccountindexv2.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(wallet.getdelegatedresourceaccountindexv2.createResponse200)
        RETURNVAR: wallet_getdelegatedresourceaccountindexv2_create
        STATUS: 200
    CANONICAL_ID: wallet.getdelegatedresourceaccountindexv2.create
  wallet.getblock.create:
    SUMMARY: Get block by number or ID
    DESC: |
      Retrieves a block from the TRON blockchain by its number or block ID.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getblock
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(wallet.getblock.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: map[STRING]ANY
    INPUTS:
      - body:
          TYPE: STRUCT(wallet.getblock.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: map[STRING]ANY
        RETURNVAR: wallet_getblock_create
        STATUS: 200
    CANONICAL_ID: wallet.getblock.create
  wallet.getblockbynum.create:
    SUMMARY: Get block by number
    DESC: Retrieves a block by its block number.
    HTTP:
      METHOD: POST
      ENDPOINT: /wallet/getblockbynum
