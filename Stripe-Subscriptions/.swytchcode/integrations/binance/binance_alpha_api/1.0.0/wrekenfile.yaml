VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://api.default.com
  prod_url: https://www.binance.com
METHODS:
  bapi.defi.aggTrades.list:
    SUMMARY: Fetch agg-trades
    HTTP:
      METHOD: GET
      ENDPOINT: /bapi/defi/v1/public/alpha-trade/agg-trades
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: path
      - symbol:
          TYPE: STRING
          LOCATION: query
      - X-MBX-APIKEY:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    CANONICAL_ID: bapi.defi.aggTrades.list
  bapi.defi.getExchangeInfo.list:
