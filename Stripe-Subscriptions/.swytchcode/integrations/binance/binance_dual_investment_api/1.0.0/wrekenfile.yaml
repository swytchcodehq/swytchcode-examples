      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: path
      - id:
          TYPE: STRING
          LOCATION: query
      - orderId:
          TYPE: STRING
          LOCATION: query
      - depositAmount:
          TYPE: STRING
