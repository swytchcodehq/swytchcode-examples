VERSION: 2.0.2
DEFAULTS:
  w_base_url: https://api.default.com
  prod_url: https://api.binance.com
METHODS:
  sapi.v1.accounts.list:
    SUMMARY: Fetch accounts
    HTTP:
      METHOD: GET
      ENDPOINT: /sapi/v1/dci/product/accounts
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: path
      - timestamp:
          TYPE: STRING
          LOCATION: query
      - signature:
          TYPE: STRING
          LOCATION: query
      - X-MBX-APIKEY:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    CANONICAL_ID: sapi.v1.accounts.list
  sapi.v1.editStatus.create:
