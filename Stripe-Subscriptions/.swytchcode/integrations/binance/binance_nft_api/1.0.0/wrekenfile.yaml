    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: path
      - orderType:
          TYPE: STRING
          LOCATION: query
      - timestamp:
          TYPE: STRING
          LOCATION: query
      - signature:
          TYPE: STRING
          LOCATION: query
      - X-MBX-APIKEY:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    CANONICAL_ID: sapi.v1.transactions.list
  sapi.v1.withdraw.list:
    SUMMARY: Fetch withdraw
    HTTP:
      METHOD: GET
      ENDPOINT: /sapi/v1/nft/history/withdraw
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: path
      - timestamp:
          TYPE: STRING
          LOCATION: query
      - signature:
          TYPE: STRING
          LOCATION: query
      - X-MBX-APIKEY:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    CANONICAL_ID: sapi.v1.withdraw.list
  sapi.v1.getAsset.list:
    SUMMARY: Fetch getAsset
    HTTP:
      METHOD: GET
      ENDPOINT: /sapi/v1/nft/user/getAsset
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: VOID
    INPUTS:
      - url:
          TYPE: STRING
          LOCATION: path
      - timestamp:
          TYPE: STRING
          LOCATION: query
      - signature:
          TYPE: STRING
          LOCATION: query
      - X-MBX-APIKEY:
          TYPE: STRING
          LOCATION: header
      - Accept:
          TYPE: STRING
          LOCATION: header
    CANONICAL_ID: sapi.v1.getAsset.list
