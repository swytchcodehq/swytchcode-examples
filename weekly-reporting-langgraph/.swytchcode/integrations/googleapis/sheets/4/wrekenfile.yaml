      TYPE: STRING
      REQUIRED: false
      comment: The name of the font to use by default for all chart text (e.g. title, axis labels, legend). If a font is specified for a specific part of the chart it will override this font name.
    - name: hiddenDimensionStrategy
      NAME: hiddenDimensionStrategy
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Determines how the charts will use hidden rows or columns.
    - name: histogramChart
      NAME: histogramChart
      type: STRUCT(HistogramChartSpec)
      TYPE: STRUCT(HistogramChartSpec)
      REQUIRED: false
      comment: A histogram chart specification.
    - name: maximized
      NAME: maximized
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to make a chart fill the entire space in which it's rendered with minimum padding. False to use the default padding. (Not applicable to Geo and Org charts.)
    - name: orgChart
      NAME: orgChart
      type: STRUCT(OrgChartSpec)
      TYPE: STRUCT(OrgChartSpec)
      REQUIRED: false
      comment: An org chart specification.
    - name: pieChart
      NAME: pieChart
      type: STRUCT(PieChartSpec)
      TYPE: STRUCT(PieChartSpec)
      REQUIRED: false
      comment: A pie chart specification.
    - name: scorecardChart
      NAME: scorecardChart
      type: STRUCT(ScorecardChartSpec)
      TYPE: STRUCT(ScorecardChartSpec)
      REQUIRED: false
      comment: A scorecard chart specification.
    - name: sortSpecs
      NAME: sortSpecs
      type: "[]STRUCT(SortSpec)"
      TYPE: "[]STRUCT(SortSpec)"
      REQUIRED: false
      comment: The order to sort the chart data by. Only a single sort spec is supported. Only supported for data source charts.
    - name: subtitle
      NAME: subtitle
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The subtitle of the chart.
    - name: subtitleTextFormat
      NAME: subtitleTextFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The subtitle text format. Strikethrough, underline, and link are not supported.
    - name: subtitleTextPosition
      NAME: subtitleTextPosition
      type: STRUCT(TextPosition)
      TYPE: STRUCT(TextPosition)
      REQUIRED: false
      comment: The subtitle text position. This field is optional.
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The title of the chart.
    - name: titleTextFormat
      NAME: titleTextFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The title text format. Strikethrough, underline, and link are not supported.
    - name: titleTextPosition
      NAME: titleTextPosition
      type: STRUCT(TextPosition)
      TYPE: STRUCT(TextPosition)
      REQUIRED: false
      comment: The title text position. This field is optional.
    - name: treemapChart
      NAME: treemapChart
      type: STRUCT(TreemapChartSpec)
      TYPE: STRUCT(TreemapChartSpec)
      REQUIRED: false
      comment: A treemap chart specification.
    - name: waterfallChart
      NAME: waterfallChart
      type: STRUCT(WaterfallChartSpec)
      TYPE: STRUCT(WaterfallChartSpec)
      REQUIRED: false
      comment: A waterfall chart specification.
  BasicChartSpec:
    - name: axis
      NAME: axis
      type: "[]STRUCT(BasicChartAxis)"
      TYPE: "[]STRUCT(BasicChartAxis)"
      REQUIRED: false
      comment: The axis on the chart.
    - name: chartType
      NAME: chartType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of the chart.
    - name: compareMode
      NAME: compareMode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The behavior of tooltips and data highlighting when hovering on data and chart area.
    - name: domains
      NAME: domains
      type: "[]STRUCT(BasicChartDomain)"
      TYPE: "[]STRUCT(BasicChartDomain)"
      REQUIRED: false
      comment: The domain of data this is charting. Only a single domain is supported.
    - name: headerCount
      NAME: headerCount
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The number of rows or columns in the data that are "headers". If not set, Google Sheets will guess how many rows are headers based on the data. (Note that BasicChartAxis.title may override the axis title inferred from the header values.)
    - name: interpolateNulls
      NAME: interpolateNulls
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: If some values in a series are missing, gaps may appear in the chart (e.g, segments of lines in a line chart will be missing). To eliminate these gaps set this to true. Applies to Line, Area, and Combo charts.
    - name: legendPosition
      NAME: legendPosition
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The position of the chart legend.
    - name: lineSmoothing
      NAME: lineSmoothing
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Gets whether all lines should be rendered smooth or straight by default. Applies to Line charts.
    - name: series
      NAME: series
      type: "[]STRUCT(BasicChartSeries)"
      TYPE: "[]STRUCT(BasicChartSeries)"
      REQUIRED: false
      comment: The data this chart is visualizing.
    - name: stackedType
      NAME: stackedType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The stacked type for charts that support vertical stacking. Applies to Area, Bar, Column, Combo, and Stepped Area charts.
    - name: threeDimensional
      NAME: threeDimensional
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to make the chart 3D. Applies to Bar and Column charts.
    - name: totalDataLabel
      NAME: totalDataLabel
      type: STRUCT(DataLabel)
      TYPE: STRUCT(DataLabel)
      REQUIRED: false
      comment: Controls whether to display additional data labels on stacked charts which sum the total value of all stacked values at each value along the domain axis. These data labels can only be set when chart_type is one of AREA, BAR, COLUMN, COMBO or STEPPED_AREA and stacked_type is either STACKED or PERCENT_STACKED. In addition, for COMBO, this will only be supported if there is only one type of stackable series type or one type has more series than the others and each of the other types have no more than one series. For example, if a chart has two stacked bar series and one area series, the total data labels will be supported. If it has three bar series and two area series, total data labels are not allowed. Neither CUSTOM nor placement can be set on the total_data_label.
  BasicChartAxis:
    - name: format
      NAME: format
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The format of the title. Only valid if the axis is not associated with the domain. The link field is not supported.
    - name: position
      NAME: position
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The position of this axis.
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The title of this axis. If set, this overrides any title inferred from headers of the data.
    - name: titleTextPosition
      NAME: titleTextPosition
      type: STRUCT(TextPosition)
      TYPE: STRUCT(TextPosition)
      REQUIRED: false
      comment: The axis title text position.
    - name: viewWindowOptions
      NAME: viewWindowOptions
      type: STRUCT(ChartAxisViewWindowOptions)
      TYPE: STRUCT(ChartAxisViewWindowOptions)
      REQUIRED: false
      comment: The view window options for this axis.
  TextFormat:
    - name: bold
      NAME: bold
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the text is bold.
    - name: fontFamily
      NAME: fontFamily
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The font family.
    - name: fontSize
      NAME: fontSize
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The size of the font.
    - name: foregroundColor
      NAME: foregroundColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The foreground color of the text. Deprecated: Use foreground_color_style."
    - name: foregroundColorStyle
      NAME: foregroundColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The foreground color of the text. If foreground_color is also set, this field takes precedence.
    - name: italic
      NAME: italic
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the text is italicized.
    - name: link
      NAME: link
      type: STRUCT(Link)
      TYPE: STRUCT(Link)
      REQUIRED: false
      comment: The link destination of the text, if any. Setting the link field in a TextFormatRun will clear the cell's existing links or a cell-level link set in the same request. When a link is set, the text foreground color will be set to the default link color and the text will be underlined. If these fields are modified in the same request, those values will be used instead of the link defaults.
    - name: strikethrough
      NAME: strikethrough
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the text has a strikethrough.
    - name: underline
      NAME: underline
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the text is underlined.
  Link:
    - name: uri
      NAME: uri
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The link identifier.
  TextPosition:
    - name: horizontalAlignment
      NAME: horizontalAlignment
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Horizontal alignment setting for the piece of text.
  ChartAxisViewWindowOptions:
    - name: viewWindowMax
      NAME: viewWindowMax
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The maximum numeric value to be shown in this view window. If unset, will automatically determine a maximum value that looks good for the data.
    - name: viewWindowMin
      NAME: viewWindowMin
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The minimum numeric value to be shown in this view window. If unset, will automatically determine a minimum value that looks good for the data.
    - name: viewWindowMode
      NAME: viewWindowMode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The view window's mode.
  BasicChartDomain:
    - name: domain
      NAME: domain
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data of the domain. For example, if charting stock prices over time, this is the data representing the dates.
    - name: reversed
      NAME: reversed
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to reverse the order of the domain values (horizontal axis).
  ChartData:
    - name: aggregateType
      NAME: aggregateType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The aggregation type for the series of a data source chart. Only supported for data source charts.
    - name: columnReference
      NAME: columnReference
      type: STRUCT(DataSourceColumnReference)
      TYPE: STRUCT(DataSourceColumnReference)
      REQUIRED: false
      comment: The reference to the data source column that the data reads from.
    - name: groupRule
      NAME: groupRule
      type: STRUCT(ChartGroupRule)
      TYPE: STRUCT(ChartGroupRule)
      REQUIRED: false
      comment: The rule to group the data by if the ChartData backs the domain of a data source chart. Only supported for data source charts.
    - name: sourceRange
      NAME: sourceRange
      type: STRUCT(ChartSourceRange)
      TYPE: STRUCT(ChartSourceRange)
      REQUIRED: false
      comment: The source ranges of the data.
  DataSourceColumnReference:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The display name of the column. It should be unique within a data source.
  ChartGroupRule:
    - name: dateTimeRule
      NAME: dateTimeRule
      type: STRUCT(ChartDateTimeRule)
      TYPE: STRUCT(ChartDateTimeRule)
      REQUIRED: false
      comment: A ChartDateTimeRule.
    - name: histogramRule
      NAME: histogramRule
      type: STRUCT(ChartHistogramRule)
      TYPE: STRUCT(ChartHistogramRule)
      REQUIRED: false
      comment: A ChartHistogramRule
  ChartDateTimeRule:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of date-time grouping to apply.
  ChartHistogramRule:
    - name: intervalSize
      NAME: intervalSize
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The size of the buckets that are created. Must be positive.
    - name: maxValue
      NAME: maxValue
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The maximum value at which items are placed into buckets. Values greater than the maximum are grouped into a single bucket. If omitted, it is determined by the maximum item value.
    - name: minValue
      NAME: minValue
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The minimum value at which items are placed into buckets. Values that are less than the minimum are grouped into a single bucket. If omitted, it is determined by the minimum item value.
  ChartSourceRange:
    - name: sources
      NAME: sources
      type: "[]STRUCT(GridRange)"
      TYPE: "[]STRUCT(GridRange)"
      REQUIRED: false
      comment: "The ranges of data for a series or domain. Exactly one dimension must have a length of 1, and all sources in the list must have the same dimension with length 1. The domain (if it exists) & all series must have the same number of source ranges. If using more than one source range, then the source range at a given offset must be in order and contiguous across the domain and series. For example, these are valid configurations: domain sources: A1:A5 series1 sources: B1:B5 series2 sources: D6:D10 domain sources: A1:A5, C10:C12 series1 sources: B1:B5, D10:D12 series2 sources: C1:C5, E10:E12"
  BasicChartSeries:
    - name: color
      NAME: color
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The color for elements (such as bars, lines, and points) associated with this series. If empty, a default color is used. Deprecated: Use color_style."
    - name: colorStyle
      NAME: colorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The color for elements (such as bars, lines, and points) associated with this series. If empty, a default color is used. If color is also set, this field takes precedence.
    - name: dataLabel
      NAME: dataLabel
      type: STRUCT(DataLabel)
      TYPE: STRUCT(DataLabel)
      REQUIRED: false
      comment: Information about the data labels for this series.
    - name: lineStyle
      NAME: lineStyle
      type: STRUCT(LineStyle)
      TYPE: STRUCT(LineStyle)
      REQUIRED: false
      comment: The line style of this series. Valid only if the chartType is AREA, LINE, or SCATTER. COMBO charts are also supported if the series chart type is AREA or LINE.
    - name: pointStyle
      NAME: pointStyle
      type: STRUCT(PointStyle)
      TYPE: STRUCT(PointStyle)
      REQUIRED: false
      comment: The style for points associated with this series. Valid only if the chartType is AREA, LINE, or SCATTER. COMBO charts are also supported if the series chart type is AREA, LINE, or SCATTER. If empty, a default point style is used.
    - name: series
      NAME: series
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data being visualized in this chart series.
    - name: styleOverrides
      NAME: styleOverrides
      type: "[]STRUCT(BasicSeriesDataPointStyleOverride)"
      TYPE: "[]STRUCT(BasicSeriesDataPointStyleOverride)"
      REQUIRED: false
      comment: Style override settings for series data points.
    - name: targetAxis
      NAME: targetAxis
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The minor axis that will specify the range of values for this series. For example, if charting stocks over time, the "Volume" series may want to be pinned to the right with the prices pinned to the left, because the scale of trading volume is different than the scale of prices. It is an error to specify an axis that isn't a valid minor axis for the chart's type.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of this series. Valid only if the chartType is COMBO. Different types will change the way the series is visualized. Only LINE, AREA, and COLUMN are supported.
  DataLabel:
    - name: customLabelData
      NAME: customLabelData
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: Data to use for custom labels. Only used if type is set to CUSTOM. This data must be the same length as the series or other element this data label is applied to. In addition, if the series is split into multiple source ranges, this source data must come from the next column in the source data. For example, if the series is B2:B4,E6:E8 then this data must come from C2:C4,F6:F8.
    - name: placement
      NAME: placement
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The placement of the data label relative to the labeled data.
    - name: textFormat
      NAME: textFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The text format used for the data label. The link field is not supported.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of the data label.
  LineStyle:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The dash type of the line.
    - name: width
      NAME: width
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The thickness of the line, in px.
  PointStyle:
    - name: shape
      NAME: shape
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The point shape. If empty or unspecified, a default shape is used.
    - name: size
      NAME: size
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The point size. If empty, a default size is used.
  BasicSeriesDataPointStyleOverride:
    - name: color
      NAME: color
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "Color of the series data point. If empty, the series default is used. Deprecated: Use color_style."
    - name: colorStyle
      NAME: colorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: Color of the series data point. If empty, the series default is used. If color is also set, this field takes precedence.
    - name: index
      NAME: index
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The zero-based index of the series data point.
    - name: pointStyle
      NAME: pointStyle
      type: STRUCT(PointStyle)
      TYPE: STRUCT(PointStyle)
      REQUIRED: false
      comment: Point style of the series data point. Valid only if the chartType is AREA, LINE, or SCATTER. COMBO charts are also supported if the series chart type is AREA, LINE, or SCATTER. If empty, the series default is used.
  BubbleChartSpec:
    - name: bubbleBorderColor
      NAME: bubbleBorderColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The bubble border color. Deprecated: Use bubble_border_color_style."
    - name: bubbleBorderColorStyle
      NAME: bubbleBorderColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The bubble border color. If bubble_border_color is also set, this field takes precedence.
    - name: bubbleLabels
      NAME: bubbleLabels
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the bubble labels. These do not need to be unique.
    - name: bubbleMaxRadiusSize
      NAME: bubbleMaxRadiusSize
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The max radius size of the bubbles, in pixels. If specified, the field must be a positive value.
    - name: bubbleMinRadiusSize
      NAME: bubbleMinRadiusSize
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The minimum radius size of the bubbles, in pixels. If specific, the field must be a positive value.
    - name: bubbleOpacity
      NAME: bubbleOpacity
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The opacity of the bubbles between 0 and 1.0. 0 is fully transparent and 1 is fully opaque.
    - name: bubbleSizes
      NAME: bubbleSizes
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the bubble sizes. Bubble sizes are used to draw the bubbles at different sizes relative to each other. If specified, group_ids must also be specified. This field is optional.
    - name: bubbleTextStyle
      NAME: bubbleTextStyle
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The format of the text inside the bubbles. Strikethrough, underline, and link are not supported.
    - name: domain
      NAME: domain
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the bubble x-values. These values locate the bubbles in the chart horizontally.
    - name: groupIds
      NAME: groupIds
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the bubble group IDs. All bubbles with the same group ID are drawn in the same color. If bubble_sizes is specified then this field must also be specified but may contain blank values. This field is optional.
    - name: legendPosition
      NAME: legendPosition
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Where the legend of the chart should be drawn.
    - name: series
      NAME: series
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the bubble y-values. These values locate the bubbles in the chart vertically.
  CandlestickChartSpec:
    - name: data
      NAME: data
      type: "[]STRUCT(CandlestickData)"
      TYPE: "[]STRUCT(CandlestickData)"
      REQUIRED: false
      comment: The Candlestick chart data. Only one CandlestickData is supported.
    - name: domain
      NAME: domain
      type: STRUCT(CandlestickDomain)
      TYPE: STRUCT(CandlestickDomain)
      REQUIRED: false
      comment: The domain data (horizontal axis) for the candlestick chart. String data will be treated as discrete labels, other data will be treated as continuous values.
  CandlestickData:
    - name: closeSeries
      NAME: closeSeries
      type: STRUCT(CandlestickSeries)
      TYPE: STRUCT(CandlestickSeries)
      REQUIRED: false
      comment: The range data (vertical axis) for the close/final value for each candle. This is the top of the candle body. If greater than the open value the candle will be filled. Otherwise the candle will be hollow.
    - name: highSeries
      NAME: highSeries
      type: STRUCT(CandlestickSeries)
      TYPE: STRUCT(CandlestickSeries)
      REQUIRED: false
      comment: The range data (vertical axis) for the high/maximum value for each candle. This is the top of the candle's center line.
    - name: lowSeries
      NAME: lowSeries
      type: STRUCT(CandlestickSeries)
      TYPE: STRUCT(CandlestickSeries)
      REQUIRED: false
      comment: The range data (vertical axis) for the low/minimum value for each candle. This is the bottom of the candle's center line.
    - name: openSeries
      NAME: openSeries
      type: STRUCT(CandlestickSeries)
      TYPE: STRUCT(CandlestickSeries)
      REQUIRED: false
      comment: The range data (vertical axis) for the open/initial value for each candle. This is the bottom of the candle body. If less than the close value the candle will be filled. Otherwise the candle will be hollow.
  CandlestickSeries:
    - name: data
      NAME: data
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data of the CandlestickSeries.
  CandlestickDomain:
    - name: data
      NAME: data
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data of the CandlestickDomain.
    - name: reversed
      NAME: reversed
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to reverse the order of the domain values (horizontal axis).
  DataSourceChartProperties:
    - name: dataExecutionStatus
      NAME: dataExecutionStatus
      type: STRUCT(DataExecutionStatus)
      TYPE: STRUCT(DataExecutionStatus)
      REQUIRED: false
      comment: Output only. The data execution status.
    - name: dataSourceId
      NAME: dataSourceId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: ID of the data source that the chart is associated with.
  DataExecutionStatus:
    - name: errorCode
      NAME: errorCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The error code.
    - name: errorMessage
      NAME: errorMessage
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The error message, which may be empty.
    - name: lastRefreshTime
      NAME: lastRefreshTime
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Gets the time the data last successfully refreshed.
    - name: state
      NAME: state
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The state of the data execution.
  FilterSpec:
    - name: columnIndex
      NAME: columnIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The zero-based column index.
    - name: dataSourceColumnReference
      NAME: dataSourceColumnReference
      type: STRUCT(DataSourceColumnReference)
      TYPE: STRUCT(DataSourceColumnReference)
      REQUIRED: false
      comment: Reference to a data source column.
    - name: filterCriteria
      NAME: filterCriteria
      type: STRUCT(FilterCriteria)
      TYPE: STRUCT(FilterCriteria)
      REQUIRED: false
      comment: The criteria for the column.
  FilterCriteria:
    - name: condition
      NAME: condition
      type: STRUCT(BooleanCondition)
      TYPE: STRUCT(BooleanCondition)
      REQUIRED: false
      comment: A condition that must be true for values to be shown. (This does not override hidden_values -- if a value is listed there, it will still be hidden.)
    - name: hiddenValues
      NAME: hiddenValues
      type: "[]STRING"
