      type: STRUCT(EmbeddedObjectBorder)
      TYPE: STRUCT(EmbeddedObjectBorder)
      REQUIRED: false
      comment: The border of the chart.
    - name: chartId
      NAME: chartId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The ID of the chart.
    - name: position
      NAME: position
      type: STRUCT(EmbeddedObjectPosition)
      TYPE: STRUCT(EmbeddedObjectPosition)
      REQUIRED: false
      comment: The position of the chart.
    - name: spec
      NAME: spec
      type: STRUCT(ChartSpec)
      TYPE: STRUCT(ChartSpec)
      REQUIRED: false
