      type: "[]STRUCT(WaterfallChartCustomSubtotal)"
      TYPE: "[]STRUCT(WaterfallChartCustomSubtotal)"
      REQUIRED: false
      comment: Custom subtotal columns appearing in this series. The order in which subtotals are defined is not significant. Only one subtotal may be defined for each data point.
    - name: data
      NAME: data
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data being visualized in this series.
    - name: dataLabel
      NAME: dataLabel
      type: STRUCT(DataLabel)
      TYPE: STRUCT(DataLabel)
      REQUIRED: false
      comment: Information about the data labels for this series.
    - name: hideTrailingSubtotal
      NAME: hideTrailingSubtotal
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to hide the subtotal column from the end of the series. By default, a subtotal column will appear at the end of each series. Setting this field to true will hide that subtotal column for this series.
    - name: negativeColumnsStyle
      NAME: negativeColumnsStyle
      type: STRUCT(WaterfallChartColumnStyle)
      TYPE: STRUCT(WaterfallChartColumnStyle)
      REQUIRED: false
      comment: Styles for all columns in this series with negative values.
    - name: positiveColumnsStyle
      NAME: positiveColumnsStyle
      type: STRUCT(WaterfallChartColumnStyle)
      TYPE: STRUCT(WaterfallChartColumnStyle)
      REQUIRED: false
      comment: Styles for all columns in this series with positive values.
    - name: subtotalColumnsStyle
      NAME: subtotalColumnsStyle
      type: STRUCT(WaterfallChartColumnStyle)
      TYPE: STRUCT(WaterfallChartColumnStyle)
      REQUIRED: false
      comment: Styles for all subtotal columns in this series.
  WaterfallChartCustomSubtotal:
    - name: dataIsSubtotal
      NAME: dataIsSubtotal
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the data point at subtotal_index is the subtotal. If false, the subtotal will be computed and appear after the data point.
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A label for the subtotal column.
    - name: subtotalIndex
      NAME: subtotalIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The zero-based index of a data point within the series. If data_is_subtotal is true, the data point at this index is the subtotal. Otherwise, the subtotal appears after the data point with this index. A series can have multiple subtotals at arbitrary indices, but subtotals do not affect the indices of the data points. For example, if a series has three data points, their indices will always be 0, 1, and 2, regardless of how many subtotals exist on the series or what data points they are associated with.
