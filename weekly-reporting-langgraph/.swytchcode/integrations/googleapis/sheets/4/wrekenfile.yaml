      TYPE: BOOL
      REQUIRED: false
      comment: True if the filter should apply to pivot tables. If not set, default to `True`.
    - name: backgroundColor
      NAME: backgroundColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background color of the slicer. Deprecated: Use background_color_style."
    - name: backgroundColorStyle
      NAME: backgroundColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The background color of the slicer. If background_color is also set, this field takes precedence.
    - name: columnIndex
      NAME: columnIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The zero-based column index in the data table on which the filter is applied to.
    - name: dataRange
      NAME: dataRange
      type: STRUCT(GridRange)
      TYPE: STRUCT(GridRange)
      REQUIRED: false
      comment: The data range of the slicer.
    - name: filterCriteria
      NAME: filterCriteria
      type: STRUCT(FilterCriteria)
      TYPE: STRUCT(FilterCriteria)
      REQUIRED: false
      comment: The filtering criteria of the slicer.
    - name: horizontalAlignment
      NAME: horizontalAlignment
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The horizontal alignment of title in the slicer. If unspecified, defaults to `LEFT`
    - name: textFormat
      NAME: textFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The text format of title in the slicer. The link field is not supported.
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The title of the slicer.
  AppendCellsRequest:
    - name: fields
      NAME: fields
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The fields of CellData that should be updated. At least one field must be specified. The root is the CellData; 'row.values.' should not be specified. A single `"*"` can be used as short-hand for listing every field.
    - name: rows
      NAME: rows
      type: "[]STRUCT(RowData)"
      TYPE: "[]STRUCT(RowData)"
      REQUIRED: false
      comment: The data to append.
    - name: sheetId
      NAME: sheetId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The sheet ID to append the data to.
  RowData:
    - name: values
      NAME: values
      type: "[]STRUCT(CellData)"
      TYPE: "[]STRUCT(CellData)"
      REQUIRED: false
      comment: The values in the row, one per column.
  CellData:
    - name: dataSourceFormula
      NAME: dataSourceFormula
      type: STRUCT(DataSourceFormula)
      TYPE: STRUCT(DataSourceFormula)
      REQUIRED: false
      comment: Output only. Information about a data source formula on the cell. The field is set if user_entered_value is a formula referencing some DATA_SOURCE sheet, e.g. `=SUM(DataSheet!Column)`.
    - name: dataSourceTable
      NAME: dataSourceTable
      type: STRUCT(DataSourceTable)
      TYPE: STRUCT(DataSourceTable)
      REQUIRED: false
      comment: A data source table anchored at this cell. The size of data source table itself is computed dynamically based on its configuration. Only the first cell of the data source table contains the data source table definition. The other cells will contain the display values of the data source table result in their effective_value fields.
    - name: dataValidation
      NAME: dataValidation
      type: STRUCT(DataValidationRule)
      TYPE: STRUCT(DataValidationRule)
      REQUIRED: false
      comment: A data validation rule on the cell, if any. When writing, the new data validation rule will overwrite any prior rule.
    - name: effectiveFormat
      NAME: effectiveFormat
      type: STRUCT(CellFormat)
      TYPE: STRUCT(CellFormat)
      REQUIRED: false
      comment: The effective format being used by the cell. This includes the results of applying any conditional formatting and, if the cell contains a formula, the computed number format. If the effective format is the default format, effective format will not be written. This field is read-only.
    - name: effectiveValue
      NAME: effectiveValue
      type: STRUCT(ExtendedValue)
      TYPE: STRUCT(ExtendedValue)
      REQUIRED: false
      comment: The effective value of the cell. For cells with formulas, this is the calculated value. For cells with literals, this is the same as the user_entered_value. This field is read-only.
    - name: formattedValue
      NAME: formattedValue
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The formatted value of the cell. This is the value as it's shown to the user. This field is read-only.
    - name: hyperlink
      NAME: hyperlink
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A hyperlink this cell points to, if any. If the cell contains multiple hyperlinks, this field will be empty. This field is read-only. To set it, use a `=HYPERLINK` formula in the userEnteredValue.formulaValue field. A cell-level link can also be set from the userEnteredFormat.textFormat field. Alternatively, set a hyperlink in the textFormatRun.format.link field that spans the entire cell.
    - name: note
      NAME: note
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Any note on the cell.
    - name: pivotTable
      NAME: pivotTable
      type: STRUCT(PivotTable)
      TYPE: STRUCT(PivotTable)
      REQUIRED: false
      comment: A pivot table anchored at this cell. The size of pivot table itself is computed dynamically based on its data, grouping, filters, values, etc. Only the top-left cell of the pivot table contains the pivot table definition. The other cells will contain the calculated values of the results of the pivot in their effective_value fields.
    - name: textFormatRuns
      NAME: textFormatRuns
      type: "[]STRUCT(TextFormatRun)"
      TYPE: "[]STRUCT(TextFormatRun)"
      REQUIRED: false
      comment: Runs of rich text applied to subsections of the cell. Runs are only valid on user entered strings, not formulas, bools, or numbers. Properties of a run start at a specific index in the text and continue until the next run. Runs will inherit the properties of the cell unless explicitly changed. When writing, the new runs will overwrite any prior runs. When writing a new user_entered_value, previous runs are erased.
    - name: userEnteredFormat
      NAME: userEnteredFormat
      type: STRUCT(CellFormat)
      TYPE: STRUCT(CellFormat)
      REQUIRED: false
      comment: The format the user entered for the cell. When writing, the new format will be merged with the existing format.
    - name: userEnteredValue
      NAME: userEnteredValue
      type: STRUCT(ExtendedValue)
      TYPE: STRUCT(ExtendedValue)
      REQUIRED: false
      comment: "The value the user entered in the cell. e.g., `1234`, `'Hello'`, or `=NOW()` Note: Dates, Times and DateTimes are represented as doubles in serial number format."
  DataSourceFormula:
    - name: dataExecutionStatus
      NAME: dataExecutionStatus
      type: STRUCT(DataExecutionStatus)
      TYPE: STRUCT(DataExecutionStatus)
      REQUIRED: false
      comment: Output only. The data execution status.
    - name: dataSourceId
      NAME: dataSourceId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the data source the formula is associated with.
  DataSourceTable:
    - name: columnSelectionType
      NAME: columnSelectionType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type to select columns for the data source table. Defaults to SELECTED.
    - name: columns
      NAME: columns
      type: "[]STRUCT(DataSourceColumnReference)"
      TYPE: "[]STRUCT(DataSourceColumnReference)"
      REQUIRED: false
      comment: Columns selected for the data source table. The column_selection_type must be SELECTED.
    - name: dataExecutionStatus
      NAME: dataExecutionStatus
      type: STRUCT(DataExecutionStatus)
      TYPE: STRUCT(DataExecutionStatus)
      REQUIRED: false
      comment: Output only. The data execution status.
    - name: dataSourceId
      NAME: dataSourceId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the data source the data source table is associated with.
    - name: filterSpecs
      NAME: filterSpecs
      type: "[]STRUCT(FilterSpec)"
      TYPE: "[]STRUCT(FilterSpec)"
      REQUIRED: false
      comment: Filter specifications in the data source table.
    - name: rowLimit
      NAME: rowLimit
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The limit of rows to return. If not set, a default limit is applied. Please refer to the Sheets editor for the default and max limit.
    - name: sortSpecs
      NAME: sortSpecs
      type: "[]STRUCT(SortSpec)"
      TYPE: "[]STRUCT(SortSpec)"
      REQUIRED: false
      comment: Sort specifications in the data source table. The result of the data source table is sorted based on the sort specifications in order.
  DataValidationRule:
    - name: condition
      NAME: condition
      type: STRUCT(BooleanCondition)
      TYPE: STRUCT(BooleanCondition)
      REQUIRED: false
      comment: The condition that data in the cell must match.
    - name: inputMessage
      NAME: inputMessage
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A message to show the user when adding data to the cell.
    - name: showCustomUi
      NAME: showCustomUi
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the UI should be customized based on the kind of condition. If true, "List" conditions will show a dropdown.
    - name: strict
      NAME: strict
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if invalid data should be rejected.
  ExtendedValue:
    - name: boolValue
      NAME: boolValue
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Represents a boolean value.
    - name: errorValue
      NAME: errorValue
      type: STRUCT(ErrorValue)
      TYPE: STRUCT(ErrorValue)
      REQUIRED: false
      comment: Represents an error. This field is read-only.
    - name: formulaValue
      NAME: formulaValue
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Represents a formula.
    - name: numberValue
      NAME: numberValue
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: "Represents a double value. Note: Dates, Times and DateTimes are represented as doubles in SERIAL_NUMBER format."
    - name: stringValue
      NAME: stringValue
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Represents a string value. Leading single quotes are not included. For example, if the user typed `'123` into the UI, this would be represented as a `stringValue` of `"123"`.
  ErrorValue:
    - name: message
      NAME: message
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A message with more information about the error (in the spreadsheet's locale).
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of error.
  PivotTable:
    - name: columns
      NAME: columns
      type: "[]STRUCT(PivotGroup)"
      TYPE: "[]STRUCT(PivotGroup)"
      REQUIRED: false
      comment: Each column grouping in the pivot table.
    - name: criteria
      NAME: criteria
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: false
      comment: An optional mapping of filters per source column offset. The filters are applied before aggregating data into the pivot table. The map's key is the column offset of the source range that you want to filter, and the value is the criteria for that column. For example, if the source was `C10:E15`, a key of `0` will have the filter for column `C`, whereas the key `1` is for column `D`. This field is deprecated in favor of filter_specs.
    - name: dataExecutionStatus
      NAME: dataExecutionStatus
      type: STRUCT(DataExecutionStatus)
      TYPE: STRUCT(DataExecutionStatus)
      REQUIRED: false
      comment: Output only. The data execution status for data source pivot tables.
    - name: dataSourceId
      NAME: dataSourceId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the data source the pivot table is reading data from.
    - name: filterSpecs
      NAME: filterSpecs
      type: "[]STRUCT(PivotFilterSpec)"
      TYPE: "[]STRUCT(PivotFilterSpec)"
      REQUIRED: false
      comment: The filters applied to the source columns before aggregating data for the pivot table. Both criteria and filter_specs are populated in responses. If both fields are specified in an update request, this field takes precedence.
    - name: rows
      NAME: rows
      type: "[]STRUCT(PivotGroup)"
      TYPE: "[]STRUCT(PivotGroup)"
      REQUIRED: false
      comment: Each row grouping in the pivot table.
    - name: source
      NAME: source
      type: STRUCT(GridRange)
      TYPE: STRUCT(GridRange)
      REQUIRED: false
      comment: The range the pivot table is reading data from.
    - name: valueLayout
      NAME: valueLayout
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Whether values should be listed horizontally (as columns) or vertically (as rows).
    - name: values
      NAME: values
      type: "[]STRUCT(PivotValue)"
      TYPE: "[]STRUCT(PivotValue)"
      REQUIRED: false
      comment: A list of values to include in the pivot table.
  PivotGroup:
    - name: dataSourceColumnReference
      NAME: dataSourceColumnReference
      type: STRUCT(DataSourceColumnReference)
      TYPE: STRUCT(DataSourceColumnReference)
      REQUIRED: false
      comment: The reference to the data source column this grouping is based on.
    - name: groupLimit
      NAME: groupLimit
      type: STRUCT(PivotGroupLimit)
      TYPE: STRUCT(PivotGroupLimit)
      REQUIRED: false
      comment: The count limit on rows or columns to apply to this pivot group.
    - name: groupRule
      NAME: groupRule
      type: STRUCT(PivotGroupRule)
      TYPE: STRUCT(PivotGroupRule)
      REQUIRED: false
      comment: The group rule to apply to this row/column group.
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The labels to use for the row/column groups which can be customized. For example, in the following pivot table, the row label is `Region` (which could be renamed to `State`) and the column label is `Product` (which could be renamed `Item`). Pivot tables created before December 2017 do not have header labels. If you'd like to add header labels to an existing pivot table, please delete the existing pivot table and then create a new pivot table with same parameters. +--------------+---------+-------+ | SUM of Units | Product | | | Region | Pen | Paper | +--------------+---------+-------+ | New York | 345 | 98 | | Oregon | 234 | 123 | | Tennessee | 531 | 415 | +--------------+---------+-------+ | Grand Total | 1110 | 636 | +--------------+---------+-------+
    - name: repeatHeadings
      NAME: repeatHeadings
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the headings in this pivot group should be repeated. This is only valid for row groupings and is ignored by columns. By default, we minimize repetition of headings by not showing higher level headings where they are the same. For example, even though the third row below corresponds to "Q1 Mar", "Q1" is not shown because it is redundant with previous rows. Setting repeat_headings to true would cause "Q1" to be repeated for "Feb" and "Mar". +--------------+ | Q1 | Jan | | | Feb | | | Mar | +--------+-----+ | Q1 Total | +--------------+
    - name: showTotals
      NAME: showTotals
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the pivot table should include the totals for this grouping.
    - name: sortOrder
      NAME: sortOrder
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The order the values in this group should be sorted.
    - name: sourceColumnOffset
      NAME: sourceColumnOffset
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The column offset of the source range that this grouping is based on. For example, if the source was `C10:E15`, a `sourceColumnOffset` of `0` means this group refers to column `C`, whereas the offset `1` would refer to column `D`.
    - name: valueBucket
      NAME: valueBucket
      type: STRUCT(PivotGroupSortValueBucket)
      TYPE: STRUCT(PivotGroupSortValueBucket)
      REQUIRED: false
      comment: The bucket of the opposite pivot group to sort by. If not specified, sorting is alphabetical by this group's values.
    - name: valueMetadata
      NAME: valueMetadata
      type: "[]STRUCT(PivotGroupValueMetadata)"
      TYPE: "[]STRUCT(PivotGroupValueMetadata)"
      REQUIRED: false
      comment: Metadata about values in the grouping.
  PivotGroupLimit:
    - name: applyOrder
      NAME: applyOrder
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The order in which the group limit is applied to the pivot table. Pivot group limits are applied from lower to higher order number. Order numbers are normalized to consecutive integers from 0. For write request, to fully customize the applying orders, all pivot group limits should have this field set with an unique number. Otherwise, the order is determined by the index in the PivotTable.rows list and then the PivotTable.columns list.
    - name: countLimit
      NAME: countLimit
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The count limit.
  PivotGroupRule:
    - name: dateTimeRule
      NAME: dateTimeRule
      type: STRUCT(DateTimeRule)
      TYPE: STRUCT(DateTimeRule)
      REQUIRED: false
      comment: A DateTimeRule.
    - name: histogramRule
      NAME: histogramRule
      type: STRUCT(HistogramRule)
      TYPE: STRUCT(HistogramRule)
      REQUIRED: false
      comment: A HistogramRule.
    - name: manualRule
      NAME: manualRule
      type: STRUCT(ManualRule)
      TYPE: STRUCT(ManualRule)
      REQUIRED: false
      comment: A ManualRule.
  DateTimeRule:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of date-time grouping to apply.
  HistogramRule:
    - name: end
      NAME: end
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The maximum value at which items are placed into buckets of constant size. Values above end are lumped into a single bucket. This field is optional.
    - name: interval
      NAME: interval
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The size of the buckets that are created. Must be positive.
    - name: start
      NAME: start
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The minimum value at which items are placed into buckets of constant size. Values below start are lumped into a single bucket. This field is optional.
  ManualRule:
    - name: groups
      NAME: groups
      type: "[]STRUCT(ManualRuleGroup)"
      TYPE: "[]STRUCT(ManualRuleGroup)"
      REQUIRED: false
      comment: The list of group names and the corresponding items from the source data that map to each group name.
  ManualRuleGroup:
    - name: groupName
      NAME: groupName
      type: STRUCT(ExtendedValue)
      TYPE: STRUCT(ExtendedValue)
      REQUIRED: false
      comment: The group name, which must be a string. Each group in a given ManualRule must have a unique group name.
    - name: items
      NAME: items
      type: "[]STRUCT(ExtendedValue)"
      TYPE: "[]STRUCT(ExtendedValue)"
      REQUIRED: false
      comment: The items in the source data that should be placed into this group. Each item may be a string, number, or boolean. Items may appear in at most one group within a given ManualRule. Items that do not appear in any group will appear on their own.
  PivotGroupSortValueBucket:
    - name: buckets
      NAME: buckets
      type: "[]STRUCT(ExtendedValue)"
      TYPE: "[]STRUCT(ExtendedValue)"
      REQUIRED: false
      comment: Determines the bucket from which values are chosen to sort. For example, in a pivot table with one row group & two column groups, the row group can list up to two values. The first value corresponds to a value within the first column group, and the second value corresponds to a value in the second column group. If no values are listed, this would indicate that the row should be sorted according to the "Grand Total" over the column groups. If a single value is listed, this would correspond to using the "Total" of that bucket.
    - name: valuesIndex
      NAME: valuesIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The offset in the PivotTable.values list which the values in this grouping should be sorted by.
  PivotGroupValueMetadata:
    - name: collapsed
      NAME: collapsed
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the data corresponding to the value is collapsed.
    - name: value
      NAME: value
      type: STRUCT(ExtendedValue)
      TYPE: STRUCT(ExtendedValue)
      REQUIRED: false
      comment: The calculated value the metadata corresponds to. (Note that formulaValue is not valid, because the values will be calculated.)
  PivotFilterSpec:
    - name: columnOffsetIndex
      NAME: columnOffsetIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The zero-based column offset of the source range.
    - name: dataSourceColumnReference
      NAME: dataSourceColumnReference
      type: STRUCT(DataSourceColumnReference)
      TYPE: STRUCT(DataSourceColumnReference)
      REQUIRED: false
      comment: The reference to the data source column.
    - name: filterCriteria
      NAME: filterCriteria
      type: STRUCT(PivotFilterCriteria)
      TYPE: STRUCT(PivotFilterCriteria)
      REQUIRED: false
      comment: The criteria for the column.
  PivotFilterCriteria:
    - name: condition
      NAME: condition
      type: STRUCT(BooleanCondition)
      TYPE: STRUCT(BooleanCondition)
      REQUIRED: false
      comment: A condition that must be true for values to be shown. (`visibleValues` does not override this -- even if a value is listed there, it is still hidden if it does not meet the condition.) Condition values that refer to ranges in A1-notation are evaluated relative to the pivot table sheet. References are treated absolutely, so are not filled down the pivot table. For example, a condition value of `=A1` on "Pivot Table 1" is treated as `'Pivot Table 1'!$A$1`. The source data of the pivot table can be referenced by column header name. For example, if the source data has columns named "Revenue" and "Cost" and a condition is applied to the "Revenue" column with type `NUMBER_GREATER` and value `=Cost`, then only columns where "Revenue" > "Cost" are included.
    - name: visibleByDefault
      NAME: visibleByDefault
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether values are visible by default. If true, the visible_values are ignored, all values that meet condition (if specified) are shown. If false, values that are both in visible_values and meet condition are shown.
    - name: visibleValues
      NAME: visibleValues
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Values that should be included. Values not listed here are excluded.
  PivotValue:
    - name: calculatedDisplayType
      NAME: calculatedDisplayType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: If specified, indicates that pivot values should be displayed as the result of a calculation with another pivot value. For example, if calculated_display_type is specified as PERCENT_OF_GRAND_TOTAL, all the pivot values are displayed as the percentage of the grand total. In the Sheets editor, this is referred to as "Show As" in the value section of a pivot table.
    - name: dataSourceColumnReference
      NAME: dataSourceColumnReference
      type: STRUCT(DataSourceColumnReference)
      TYPE: STRUCT(DataSourceColumnReference)
      REQUIRED: false
      comment: The reference to the data source column that this value reads from.
    - name: formula
      NAME: formula
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A custom formula to calculate the value. The formula must start with an `=` character.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A name to use for the value.
    - name: sourceColumnOffset
      NAME: sourceColumnOffset
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The column offset of the source range that this value reads from. For example, if the source was `C10:E15`, a `sourceColumnOffset` of `0` means this value refers to column `C`, whereas the offset `1` would refer to column `D`.
    - name: summarizeFunction
      NAME: summarizeFunction
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A function to summarize the value. If formula is set, the only supported values are SUM and CUSTOM. If sourceColumnOffset is set, then `CUSTOM` is not supported.
  TextFormatRun:
    - name: format
      NAME: format
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The format of this run. Absent values inherit the cell's format.
    - name: startIndex
      NAME: startIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The zero-based character index where this run starts, in UTF-16 code units.
  AppendDimensionRequest:
    - name: dimension
      NAME: dimension
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Whether rows or columns should be appended.
    - name: length
      NAME: length
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The number of rows or columns to append.
    - name: sheetId
      NAME: sheetId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The sheet to append rows or columns to.
  ValueRange:
    - name: majorDimension
      NAME: majorDimension
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: "The major dimension of the values. For output, if the spreadsheet data is: `A1=1,B1=2,A2=3,B2=4`, then requesting `range=A1:B2,majorDimension=ROWS` will return `[[1,2],[3,4]]`, whereas requesting `range=A1:B2,majorDimension=COLUMNS` will return `[[1,3],[2,4]]`. For input, with `range=A1:B2,majorDimension=ROWS` then `[[1,2],[3,4]]` will set `A1=1,B1=2,A2=3,B2=4`. With `range=A1:B2,majorDimension=COLUMNS` then `[[1,2],[3,4]]` will set `A1=1,B1=3,A2=2,B2=4`. When writing, if this field is not set, it defaults to ROWS."
    - name: range
      NAME: range
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The range the values cover, in [A1 notation](https://developers.google.com/workspace/sheets/api/guides/concepts#cell). For output, this range indicates the entire requested range, even though the values will exclude trailing rows and columns. When appending values, this field represents the range to search for a table, after which values will be appended.
    - name: values
      NAME: values
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: false
      comment: "The data that was read or to be written. This is an array of arrays, the outer array representing all the data and each inner array representing a major dimension. Each item in the inner array corresponds with one cell. For output, empty trailing rows and columns will not be included. For input, supported value types are: bool, string, and double. Null values will be skipped. To set a cell to an empty value, set the string value to an empty string."
  AutoFillRequest:
    - name: range
      NAME: range
      type: STRUCT(GridRange)
      TYPE: STRUCT(GridRange)
      REQUIRED: false
