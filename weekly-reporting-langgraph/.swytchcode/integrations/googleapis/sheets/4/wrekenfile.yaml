          REQUIRED: false
          LOCATION: query
      - $.xgafv:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - spreadsheetId:
          TYPE: STRING
          LOCATION: path
      - includeGridData:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - ranges:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: spreadsheets_spreadsheet_get
        STATUS: 200
    CANONICAL_ID: spreadsheets.spreadsheet.get
