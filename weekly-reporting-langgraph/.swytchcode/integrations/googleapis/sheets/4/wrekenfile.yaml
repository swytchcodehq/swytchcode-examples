    - name: booleanRule
      NAME: booleanRule
      type: STRUCT(BooleanRule)
      TYPE: STRUCT(BooleanRule)
      REQUIRED: false
      comment: The formatting is either "on" or "off" according to the rule.
    - name: gradientRule
      NAME: gradientRule
