      - quotaUser:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - upload_protocol:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - uploadType:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - $.xgafv:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(Spreadsheet)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: spreadsheets_spreadsheet_create
        STATUS: 200
    CANONICAL_ID: spreadsheets.spreadsheet.create
  spreadsheets.spreadsheet.get:
    SUMMARY: Returns the spreadsheet at the given ID
    DESC: "Returns the spreadsheet at the given ID. The caller must specify the spreadsheet ID. By default, data within grids is not returned. You can include grid data in one of 2 ways: * Specify a [field mask](https://developers.google.com/workspace/sheets/api/guides/field-masks) listing your desired fields using the `fields` URL parameter in HTTP * Set the includeGridData URL parameter to true. If a field mask is set, the `includeGridData` parameter is ignored For large spreadsheets, as a best practice, retrieve only the specific spreadsheet fields that you want. To retrieve only subsets of spreadsheet data, use the ranges URL parameter. Ranges are specified using [A1 notation](https://developers.google.com/workspace/sheets/api/guides/concepts#cell). You can define a single cell (for example, `A1`) or multiple cells (for example, `A1:D5`). You can also get cells from other sheets within the same spreadsheet (for example, `Sheet2!A1:C4`) or retrieve multiple ranges at once (for example, `?ranges=A1:D5&ranges=Sheet2!A1:C4`). Limiting the range returns only the portions of the spreadsheet that intersect the requested ranges."
    HTTP:
      METHOD: GET
      ENDPOINT: /v4/spreadsheets/{spreadsheetId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: "*/*"
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - access_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - alt:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: json
      - callback:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - fields:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - key:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - oauth_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - prettyPrint:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: true
      - quotaUser:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - upload_protocol:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - uploadType:
