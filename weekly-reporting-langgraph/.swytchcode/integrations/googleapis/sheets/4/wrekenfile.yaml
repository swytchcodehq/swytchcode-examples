STRUCTS:
  AddBandingRequest:
    - name: bandedRange
      NAME: bandedRange
      type: STRUCT(BandedRange)
      TYPE: STRUCT(BandedRange)
      REQUIRED: false
      comment: The banded range to add. The bandedRangeId field is optional; if one is not set, an id will be randomly generated. (It is an error to specify the ID of a range that already exists.)
  BandedRange:
    - name: bandedRangeId
      NAME: bandedRangeId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The ID of the banded range.
    - name: columnProperties
      NAME: columnProperties
      type: STRUCT(BandingProperties)
      TYPE: STRUCT(BandingProperties)
      REQUIRED: false
      comment: Properties for column bands. These properties are applied on a column- by-column basis throughout all the columns in the range. At least one of row_properties or column_properties must be specified.
    - name: range
      NAME: range
      type: STRUCT(GridRange)
      TYPE: STRUCT(GridRange)
      REQUIRED: false
      comment: The range over which these properties are applied.
    - name: rowProperties
      NAME: rowProperties
      type: STRUCT(BandingProperties)
      TYPE: STRUCT(BandingProperties)
      REQUIRED: false
      comment: Properties for row bands. These properties are applied on a row-by-row basis throughout all the rows in the range. At least one of row_properties or column_properties must be specified.
  BandingProperties:
    - name: firstBandColor
      NAME: firstBandColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The first color that is alternating. (Required) Deprecated: Use first_band_color_style."
    - name: firstBandColorStyle
      NAME: firstBandColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The first color that is alternating. (Required) If first_band_color is also set, this field takes precedence.
    - name: footerColor
      NAME: footerColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The color of the last row or column. If this field is not set, the last row or column is filled with either first_band_color or second_band_color, depending on the color of the previous row or column. Deprecated: Use footer_color_style."
    - name: footerColorStyle
      NAME: footerColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The color of the last row or column. If this field is not set, the last row or column is filled with either first_band_color or second_band_color, depending on the color of the previous row or column. If footer_color is also set, this field takes precedence.
    - name: headerColor
      NAME: headerColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The color of the first row or column. If this field is set, the first row or column is filled with this color and the colors alternate between first_band_color and second_band_color starting from the second row or column. Otherwise, the first row or column is filled with first_band_color and the colors proceed to alternate as they normally would. Deprecated: Use header_color_style."
    - name: headerColorStyle
      NAME: headerColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The color of the first row or column. If this field is set, the first row or column is filled with this color and the colors alternate between first_band_color and second_band_color starting from the second row or column. Otherwise, the first row or column is filled with first_band_color and the colors proceed to alternate as they normally would. If header_color is also set, this field takes precedence.
    - name: secondBandColor
      NAME: secondBandColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The second color that is alternating. (Required) Deprecated: Use second_band_color_style."
    - name: secondBandColorStyle
      NAME: secondBandColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The second color that is alternating. (Required) If second_band_color is also set, this field takes precedence.
  Color:
    - name: alpha
      NAME: alpha
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: "The fraction of this color that should be applied to the pixel. That is, the final pixel color is defined by the equation: `pixel color = alpha * (this color) + (1.0 - alpha) * (background color)` This means that a value of 1.0 corresponds to a solid color, whereas a value of 0.0 corresponds to a completely transparent color. This uses a wrapper message rather than a simple float scalar so that it is possible to distinguish between a default value and the value being unset. If omitted, this color object is rendered as a solid color (as if the alpha value had been explicitly given a value of 1.0)."
    - name: blue
      NAME: blue
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The amount of blue in the color as a value in the interval [0, 1].
    - name: green
      NAME: green
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The amount of green in the color as a value in the interval [0, 1].
    - name: red
      NAME: red
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The amount of red in the color as a value in the interval [0, 1].
  ColorStyle:
    - name: rgbColor
      NAME: rgbColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: RGB color. The [`alpha`](/sheets/api/reference/rest/v4/spreadsheets/other#Color.FIELDS.alpha) value in the [`Color`](/sheets/api/reference/rest/v4/spreadsheets/other#color) object isn't generally supported.
    - name: themeColor
      NAME: themeColor
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Theme color.
  GridRange:
    - name: endColumnIndex
      NAME: endColumnIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The end column (exclusive) of the range, or not set if unbounded.
    - name: endRowIndex
      NAME: endRowIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The end row (exclusive) of the range, or not set if unbounded.
    - name: sheetId
      NAME: sheetId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The sheet this range is on.
    - name: startColumnIndex
      NAME: startColumnIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The start column (inclusive) of the range, or not set if unbounded.
    - name: startRowIndex
      NAME: startRowIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The start row (inclusive) of the range, or not set if unbounded.
  AddChartRequest:
    - name: chart
      NAME: chart
      type: STRUCT(EmbeddedChart)
      TYPE: STRUCT(EmbeddedChart)
      REQUIRED: false
      comment: The chart that should be added to the spreadsheet, including the position where it should be placed. The chartId field is optional; if one is not set, an id will be randomly generated. (It is an error to specify the ID of an embedded object that already exists.)
