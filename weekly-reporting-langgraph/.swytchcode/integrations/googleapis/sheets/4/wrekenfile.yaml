  spreadsheets.getbydatafilter.create:
    SUMMARY: Returns the spreadsheet at the given ID
    DESC: "Returns the spreadsheet at the given ID. The caller must specify the spreadsheet ID. This method differs from GetSpreadsheet in that it allows selecting which subsets of spreadsheet data to return by specifying a dataFilters parameter. Multiple DataFilters can be specified. Specifying one or more data filters returns the portions of the spreadsheet that intersect ranges matched by any of the filters. By default, data within grids is not returned. You can include grid data one of 2 ways: * Specify a [field mask](https://developers.google.com/workspace/sheets/api/guides/field-masks) listing your desired fields using the `fields` URL parameter in HTTP * Set the includeGridData parameter to true. If a field mask is set, the `includeGridData` parameter is ignored For large spreadsheets, as a best practice, retrieve only the specific spreadsheet fields that you want."
    HTTP:
      METHOD: POST
      ENDPOINT: /v4/spreadsheets/{spreadsheetId}:getByDataFilter
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: "*/*"
      BODY:
        TYPE: STRUCT(GetSpreadsheetByDataFilterRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - access_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - alt:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: json
      - callback:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - fields:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - key:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - oauth_token:
