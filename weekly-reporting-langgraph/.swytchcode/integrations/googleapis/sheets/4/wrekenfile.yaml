VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  w_base_url: https://sheets.googleapis.com
METHODS:
  spreadsheets.spreadsheet.create:
    SUMMARY: Creates a spreadsheet, returning the newly created spreadsheet.
    DESC: Creates a spreadsheet, returning the newly created spreadsheet.
    HTTP:
      METHOD: POST
      ENDPOINT: /v4/spreadsheets
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: "*/*"
      BODY:
        TYPE: STRUCT(Spreadsheet)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - access_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - alt:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
          DEFAULT: json
      - callback:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - fields:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - key:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
