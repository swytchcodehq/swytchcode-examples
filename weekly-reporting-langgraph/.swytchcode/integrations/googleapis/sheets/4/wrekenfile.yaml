      REQUIRED: false
      comment: Values that should be hidden.
    - name: visibleBackgroundColor
      NAME: visibleBackgroundColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background fill color to filter by; only cells with this fill color are shown. Mutually exclusive with visible_foreground_color. Deprecated: Use visible_background_color_style."
    - name: visibleBackgroundColorStyle
      NAME: visibleBackgroundColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The background fill color to filter by; only cells with this fill color are shown. This field is mutually exclusive with visible_foreground_color, and must be set to an RGB-type color. If visible_background_color is also set, this field takes precedence.
    - name: visibleForegroundColor
      NAME: visibleForegroundColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The foreground color to filter by; only cells with this foreground color are shown. Mutually exclusive with visible_background_color. Deprecated: Use visible_foreground_color_style."
    - name: visibleForegroundColorStyle
      NAME: visibleForegroundColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The foreground color to filter by; only cells with this foreground color are shown. This field is mutually exclusive with visible_background_color, and must be set to an RGB-type color. If visible_foreground_color is also set, this field takes precedence.
  BooleanCondition:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of condition.
    - name: values
      NAME: values
      type: "[]STRUCT(ConditionValue)"
      TYPE: "[]STRUCT(ConditionValue)"
      REQUIRED: false
      comment: The values of the condition. The number of supported values depends on the condition type. Some support zero values, others one or two values, and ConditionType.ONE_OF_LIST supports an arbitrary number of values.
  ConditionValue:
    - name: relativeDate
      NAME: relativeDate
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A relative date (based on the current date). Valid only if the type is DATE_BEFORE, DATE_AFTER, DATE_ON_OR_BEFORE or DATE_ON_OR_AFTER. Relative dates are not supported in data validation. They are supported only in conditional formatting and conditional filters.
    - name: userEnteredValue
      NAME: userEnteredValue
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A value the condition is based on. The value is parsed as if the user typed into a cell. Formulas are supported (and must begin with an `=` or a '+').
  HistogramChartSpec:
    - name: bucketSize
      NAME: bucketSize
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: By default the bucket size (the range of values stacked in a single column) is chosen automatically, but it may be overridden here. E.g., A bucket size of 1.5 results in buckets from 0 - 1.5, 1.5 - 3.0, etc. Cannot be negative. This field is optional.
    - name: legendPosition
      NAME: legendPosition
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The position of the chart legend.
    - name: outlierPercentile
      NAME: outlierPercentile
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The outlier percentile is used to ensure that outliers do not adversely affect the calculation of bucket sizes. For example, setting an outlier percentile of 0.05 indicates that the top and bottom 5% of values when calculating buckets. The values are still included in the chart, they will be added to the first or last buckets instead of their own buckets. Must be between 0.0 and 0.5.
    - name: series
      NAME: series
      type: "[]STRUCT(HistogramSeries)"
      TYPE: "[]STRUCT(HistogramSeries)"
      REQUIRED: false
      comment: The series for a histogram may be either a single series of values to be bucketed or multiple series, each of the same length, containing the name of the series followed by the values to be bucketed for that series.
    - name: showItemDividers
      NAME: showItemDividers
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether horizontal divider lines should be displayed between items in each column.
  HistogramSeries:
    - name: barColor
      NAME: barColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The color of the column representing this series in each bucket. This field is optional. Deprecated: Use bar_color_style."
    - name: barColorStyle
      NAME: barColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The color of the column representing this series in each bucket. This field is optional. If bar_color is also set, this field takes precedence.
    - name: data
      NAME: data
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data for this histogram series.
  OrgChartSpec:
    - name: labels
      NAME: labels
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the labels for all the nodes in the chart. Labels must be unique.
    - name: nodeColor
      NAME: nodeColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The color of the org chart nodes. Deprecated: Use node_color_style."
    - name: nodeColorStyle
      NAME: nodeColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The color of the org chart nodes. If node_color is also set, this field takes precedence.
    - name: nodeSize
      NAME: nodeSize
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The size of the org chart nodes.
    - name: parentLabels
      NAME: parentLabels
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the label of the parent for the corresponding node. A blank value indicates that the node has no parent and is a top-level node. This field is optional.
    - name: selectedNodeColor
      NAME: selectedNodeColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The color of the selected org chart nodes. Deprecated: Use selected_node_color_style."
    - name: selectedNodeColorStyle
      NAME: selectedNodeColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The color of the selected org chart nodes. If selected_node_color is also set, this field takes precedence.
    - name: tooltips
      NAME: tooltips
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data containing the tooltip for the corresponding node. A blank value results in no tooltip being displayed for the node. This field is optional.
  PieChartSpec:
    - name: domain
      NAME: domain
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data that covers the domain of the pie chart.
    - name: legendPosition
      NAME: legendPosition
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Where the legend of the pie chart should be drawn.
    - name: pieHole
      NAME: pieHole
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The size of the hole in the pie chart.
    - name: series
      NAME: series
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data that covers the one and only series of the pie chart.
    - name: threeDimensional
      NAME: threeDimensional
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the pie is three dimensional.
  ScorecardChartSpec:
    - name: aggregateType
      NAME: aggregateType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The aggregation type for key and baseline chart data in scorecard chart. This field is not supported for data source charts. Use the ChartData.aggregateType field of the key_value_data or baseline_value_data instead for data source charts. This field is optional.
    - name: baselineValueData
      NAME: baselineValueData
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data for scorecard baseline value. This field is optional.
    - name: baselineValueFormat
      NAME: baselineValueFormat
      type: STRUCT(BaselineValueFormat)
      TYPE: STRUCT(BaselineValueFormat)
      REQUIRED: false
      comment: Formatting options for baseline value. This field is needed only if baseline_value_data is specified.
    - name: customFormatOptions
      NAME: customFormatOptions
      type: STRUCT(ChartCustomNumberFormatOptions)
      TYPE: STRUCT(ChartCustomNumberFormatOptions)
      REQUIRED: false
      comment: Custom formatting options for numeric key/baseline values in scorecard chart. This field is used only when number_format_source is set to CUSTOM. This field is optional.
    - name: keyValueData
      NAME: keyValueData
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data for scorecard key value.
    - name: keyValueFormat
      NAME: keyValueFormat
      type: STRUCT(KeyValueFormat)
      TYPE: STRUCT(KeyValueFormat)
      REQUIRED: false
      comment: Formatting options for key value.
    - name: numberFormatSource
      NAME: numberFormatSource
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The number format source used in the scorecard chart. This field is optional.
    - name: scaleFactor
      NAME: scaleFactor
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: Value to scale scorecard key and baseline value. For example, a factor of 10 can be used to divide all values in the chart by 10. This field is optional.
  BaselineValueFormat:
    - name: comparisonType
      NAME: comparisonType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The comparison type of key value with baseline value.
    - name: description
      NAME: description
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Description which is appended after the baseline value. This field is optional.
    - name: negativeColor
      NAME: negativeColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "Color to be used, in case baseline value represents a negative change for key value. This field is optional. Deprecated: Use negative_color_style."
    - name: negativeColorStyle
      NAME: negativeColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: Color to be used, in case baseline value represents a negative change for key value. This field is optional. If negative_color is also set, this field takes precedence.
    - name: position
      NAME: position
      type: STRUCT(TextPosition)
      TYPE: STRUCT(TextPosition)
      REQUIRED: false
      comment: Specifies the horizontal text positioning of baseline value. This field is optional. If not specified, default positioning is used.
    - name: positiveColor
      NAME: positiveColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "Color to be used, in case baseline value represents a positive change for key value. This field is optional. Deprecated: Use positive_color_style."
    - name: positiveColorStyle
      NAME: positiveColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: Color to be used, in case baseline value represents a positive change for key value. This field is optional. If positive_color is also set, this field takes precedence.
    - name: textFormat
      NAME: textFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: Text formatting options for baseline value. The link field is not supported.
  ChartCustomNumberFormatOptions:
    - name: prefix
      NAME: prefix
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Custom prefix to be prepended to the chart attribute. This field is optional.
    - name: suffix
      NAME: suffix
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Custom suffix to be appended to the chart attribute. This field is optional.
  KeyValueFormat:
    - name: position
      NAME: position
      type: STRUCT(TextPosition)
      TYPE: STRUCT(TextPosition)
      REQUIRED: false
      comment: Specifies the horizontal text positioning of key value. This field is optional. If not specified, default positioning is used.
    - name: textFormat
      NAME: textFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: Text formatting options for key value. The link field is not supported.
  SortSpec:
    - name: backgroundColor
      NAME: backgroundColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background fill color to sort by; cells with this fill color are sorted to the top. Mutually exclusive with foreground_color. Deprecated: Use background_color_style."
    - name: backgroundColorStyle
      NAME: backgroundColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The background fill color to sort by; cells with this fill color are sorted to the top. Mutually exclusive with foreground_color, and must be an RGB-type color. If background_color is also set, this field takes precedence.
    - name: dataSourceColumnReference
      NAME: dataSourceColumnReference
      type: STRUCT(DataSourceColumnReference)
      TYPE: STRUCT(DataSourceColumnReference)
      REQUIRED: false
      comment: Reference to a data source column.
    - name: dimensionIndex
      NAME: dimensionIndex
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The dimension the sort should be applied to.
    - name: foregroundColor
      NAME: foregroundColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The foreground color to sort by; cells with this foreground color are sorted to the top. Mutually exclusive with background_color. Deprecated: Use foreground_color_style."
    - name: foregroundColorStyle
      NAME: foregroundColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The foreground color to sort by; cells with this foreground color are sorted to the top. Mutually exclusive with background_color, and must be an RGB-type color. If foreground_color is also set, this field takes precedence.
    - name: sortOrder
      NAME: sortOrder
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The order data should be sorted.
  TreemapChartSpec:
    - name: colorData
      NAME: colorData
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data that determines the background color of each treemap data cell. This field is optional. If not specified, size_data is used to determine background colors. If specified, the data is expected to be numeric. color_scale will determine how the values in this data map to data cell background colors.
    - name: colorScale
      NAME: colorScale
      type: STRUCT(TreemapChartColorScale)
      TYPE: STRUCT(TreemapChartColorScale)
      REQUIRED: false
      comment: The color scale for data cells in the treemap chart. Data cells are assigned colors based on their color values. These color values come from color_data, or from size_data if color_data is not specified. Cells with color values less than or equal to min_value will have minValueColor as their background color. Cells with color values greater than or equal to max_value will have maxValueColor as their background color. Cells with color values between min_value and max_value will have background colors on a gradient between minValueColor and maxValueColor, the midpoint of the gradient being midValueColor. Cells with missing or non-numeric color values will have noDataColor as their background color.
    - name: headerColor
      NAME: headerColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background color for header cells. Deprecated: Use header_color_style."
    - name: headerColorStyle
      NAME: headerColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The background color for header cells. If header_color is also set, this field takes precedence.
    - name: hideTooltips
      NAME: hideTooltips
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to hide tooltips.
    - name: hintedLevels
      NAME: hintedLevels
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The number of additional data levels beyond the labeled levels to be shown on the treemap chart. These levels are not interactive and are shown without their labels. Defaults to 0 if not specified.
    - name: labels
      NAME: labels
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data that contains the treemap cell labels.
    - name: levels
      NAME: levels
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The number of data levels to show on the treemap chart. These levels are interactive and are shown with their labels. Defaults to 2 if not specified.
    - name: maxValue
      NAME: maxValue
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The maximum possible data value. Cells with values greater than this will have the same color as cells with this value. If not specified, defaults to the actual maximum value from color_data, or the maximum value from size_data if color_data is not specified.
    - name: minValue
      NAME: minValue
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: The minimum possible data value. Cells with values less than this will have the same color as cells with this value. If not specified, defaults to the actual minimum value from color_data, or the minimum value from size_data if color_data is not specified.
    - name: parentLabels
      NAME: parentLabels
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data the contains the treemap cells' parent labels.
    - name: sizeData
      NAME: sizeData
      type: STRUCT(ChartData)
      TYPE: STRUCT(ChartData)
      REQUIRED: false
      comment: The data that determines the size of each treemap data cell. This data is expected to be numeric. The cells corresponding to non-numeric or missing data will not be rendered. If color_data is not specified, this data is used to determine data cell background colors as well.
    - name: textFormat
      NAME: textFormat
      type: STRUCT(TextFormat)
      TYPE: STRUCT(TextFormat)
      REQUIRED: false
      comment: The text format for all labels on the chart. The link field is not supported.
  TreemapChartColorScale:
    - name: maxValueColor
      NAME: maxValueColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background color for cells with a color value greater than or equal to maxValue. Defaults to #109618 if not specified. Deprecated: Use max_value_color_style."
    - name: maxValueColorStyle
      NAME: maxValueColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: "The background color for cells with a color value greater than or equal to maxValue. Defaults to #109618 if not specified. If max_value_color is also set, this field takes precedence."
    - name: midValueColor
      NAME: midValueColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background color for cells with a color value at the midpoint between minValue and maxValue. Defaults to #efe6dc if not specified. Deprecated: Use mid_value_color_style."
    - name: midValueColorStyle
      NAME: midValueColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: "The background color for cells with a color value at the midpoint between minValue and maxValue. Defaults to #efe6dc if not specified. If mid_value_color is also set, this field takes precedence."
    - name: minValueColor
      NAME: minValueColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background color for cells with a color value less than or equal to minValue. Defaults to #dc3912 if not specified. Deprecated: Use min_value_color_style."
    - name: minValueColorStyle
      NAME: minValueColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: "The background color for cells with a color value less than or equal to minValue. Defaults to #dc3912 if not specified. If min_value_color is also set, this field takes precedence."
    - name: noDataColor
      NAME: noDataColor
      type: STRUCT(Color)
      TYPE: STRUCT(Color)
      REQUIRED: false
      comment: "The background color for cells that have no color data associated with them. Defaults to #000000 if not specified. Deprecated: Use no_data_color_style."
    - name: noDataColorStyle
      NAME: noDataColorStyle
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: "The background color for cells that have no color data associated with them. Defaults to #000000 if not specified. If no_data_color is also set, this field takes precedence."
  WaterfallChartSpec:
    - name: connectorLineStyle
      NAME: connectorLineStyle
      type: STRUCT(LineStyle)
      TYPE: STRUCT(LineStyle)
      REQUIRED: false
      comment: The line style for the connector lines.
    - name: domain
      NAME: domain
      type: STRUCT(WaterfallChartDomain)
      TYPE: STRUCT(WaterfallChartDomain)
