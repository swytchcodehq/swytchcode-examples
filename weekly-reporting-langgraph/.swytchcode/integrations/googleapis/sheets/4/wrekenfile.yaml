      REQUIRED: false
      comment: True to interpret the first value as a total.
    - name: hideConnectorLines
      NAME: hideConnectorLines
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True to hide connector lines between columns.
    - name: series
