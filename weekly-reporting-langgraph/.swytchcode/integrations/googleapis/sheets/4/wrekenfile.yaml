      type: STRUCT(FilterView)
      TYPE: STRUCT(FilterView)
      REQUIRED: false
      comment: The new properties of the filter view.
  UpdateNamedRangeRequest:
    - name: fields
      NAME: fields
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The fields that should be updated. At least one field must be specified. The root `namedRange` is implied and should not be specified. A single `"*"` can be used as short-hand for listing every field.
    - name: namedRange
      NAME: namedRange
      type: STRUCT(NamedRange)
      TYPE: STRUCT(NamedRange)
      REQUIRED: false
      comment: The named range to update with the new properties.
  UpdateProtectedRangeRequest:
    - name: fields
      NAME: fields
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The fields that should be updated. At least one field must be specified. The root `protectedRange` is implied and should not be specified. A single `"*"` can be used as short-hand for listing every field.
    - name: protectedRange
      NAME: protectedRange
      type: STRUCT(ProtectedRange)
      TYPE: STRUCT(ProtectedRange)
      REQUIRED: false
      comment: The protected range to update with the new properties.
  UpdateSheetPropertiesRequest:
    - name: fields
      NAME: fields
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The fields that should be updated. At least one field must be specified. The root `properties` is implied and should not be specified. A single `"*"` can be used as short-hand for listing every field.
    - name: properties
      NAME: properties
      type: STRUCT(SheetProperties)
      TYPE: STRUCT(SheetProperties)
      REQUIRED: false
      comment: The properties to update.
  UpdateSlicerSpecRequest:
    - name: fields
      NAME: fields
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The fields that should be updated. At least one field must be specified. The root `SlicerSpec` is implied and should not be specified. A single "*"` can be used as short-hand for listing every field.
    - name: slicerId
      NAME: slicerId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The id of the slicer to update.
    - name: spec
      NAME: spec
      type: STRUCT(SlicerSpec)
      TYPE: STRUCT(SlicerSpec)
      REQUIRED: false
      comment: The specification to apply to the slicer.
  UpdateSpreadsheetPropertiesRequest:
    - name: fields
      NAME: fields
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The fields that should be updated. At least one field must be specified. The root 'properties' is implied and should not be specified. A single `"*"` can be used as short-hand for listing every field.
    - name: properties
      NAME: properties
      type: STRUCT(SpreadsheetProperties)
      TYPE: STRUCT(SpreadsheetProperties)
      REQUIRED: false
      comment: The properties to update.
  SpreadsheetProperties:
    - name: autoRecalc
      NAME: autoRecalc
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The amount of time to wait before volatile functions are recalculated.
    - name: defaultFormat
      NAME: defaultFormat
      type: STRUCT(CellFormat)
      TYPE: STRUCT(CellFormat)
      REQUIRED: false
      comment: The default format of all cells in the spreadsheet. CellData.effectiveFormat will not be set if the cell's format is equal to this default format. This field is read-only.
    - name: importFunctionsExternalUrlAccessAllowed
      NAME: importFunctionsExternalUrlAccessAllowed
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether to allow external URL access for image and import functions. Read only when true. When false, you can set to true. This value will be bypassed and always return true if the admin has enabled the [allowlisting feature](https://support.google.com/a?p=url_allowlist).
    - name: iterativeCalculationSettings
      NAME: iterativeCalculationSettings
      type: STRUCT(IterativeCalculationSettings)
      TYPE: STRUCT(IterativeCalculationSettings)
      REQUIRED: false
      comment: Determines whether and how circular references are resolved with iterative calculation. Absence of this field means that circular references result in calculation errors.
    - name: locale
      NAME: locale
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: "The locale of the spreadsheet in one of the following formats: * an ISO 639-1 language code such as `en` * an ISO 639-2 language code such as `fil`, if no 639-1 code exists * a combination of the ISO language code and country code, such as `en_US` Note: when updating this field, not all locales/languages are supported."
    - name: spreadsheetTheme
      NAME: spreadsheetTheme
      type: STRUCT(SpreadsheetTheme)
      TYPE: STRUCT(SpreadsheetTheme)
      REQUIRED: false
      comment: Theme applied to the spreadsheet.
    - name: timeZone
      NAME: timeZone
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The time zone of the spreadsheet, in CLDR format such as `America/New_York`. If the time zone isn't recognized, this may be a custom time zone such as `GMT-07:00`.
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The title of the spreadsheet.
  IterativeCalculationSettings:
    - name: convergenceThreshold
      NAME: convergenceThreshold
      type: FLOAT
      TYPE: FLOAT
      REQUIRED: false
      comment: When iterative calculation is enabled and successive results differ by less than this threshold value, the calculation rounds stop.
    - name: maxIterations
      NAME: maxIterations
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: When iterative calculation is enabled, the maximum number of calculation rounds to perform.
  SpreadsheetTheme:
    - name: primaryFontFamily
      NAME: primaryFontFamily
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Name of the primary font family.
    - name: themeColors
      NAME: themeColors
      type: "[]STRUCT(ThemeColorPair)"
      TYPE: "[]STRUCT(ThemeColorPair)"
      REQUIRED: false
      comment: The spreadsheet theme color pairs. To update you must provide all theme color pairs.
  ThemeColorPair:
    - name: color
      NAME: color
      type: STRUCT(ColorStyle)
      TYPE: STRUCT(ColorStyle)
      REQUIRED: false
      comment: The concrete color corresponding to the theme color type.
    - name: colorType
      NAME: colorType
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The type of the spreadsheet theme color.
  Spreadsheet:
    - name: dataSourceSchedules
      NAME: dataSourceSchedules
      type: "[]STRUCT(DataSourceRefreshSchedule)"
      TYPE: "[]STRUCT(DataSourceRefreshSchedule)"
      REQUIRED: false
      comment: Output only. A list of data source refresh schedules.
    - name: dataSources
      NAME: dataSources
      type: "[]STRUCT(DataSource)"
      TYPE: "[]STRUCT(DataSource)"
      REQUIRED: false
      comment: A list of external data sources connected with the spreadsheet.
    - name: developerMetadata
      NAME: developerMetadata
      type: "[]STRUCT(DeveloperMetadata)"
      TYPE: "[]STRUCT(DeveloperMetadata)"
      REQUIRED: false
      comment: The developer metadata associated with a spreadsheet.
    - name: namedRanges
      NAME: namedRanges
      type: "[]STRUCT(NamedRange)"
      TYPE: "[]STRUCT(NamedRange)"
      REQUIRED: false
      comment: The named ranges defined in a spreadsheet.
    - name: properties
      NAME: properties
      type: STRUCT(SpreadsheetProperties)
      TYPE: STRUCT(SpreadsheetProperties)
      REQUIRED: false
      comment: Overall properties of a spreadsheet.
    - name: sheets
      NAME: sheets
      type: "[]STRUCT(Sheet)"
      TYPE: "[]STRUCT(Sheet)"
      REQUIRED: false
      comment: The sheets that are part of a spreadsheet.
    - name: spreadsheetId
      NAME: spreadsheetId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the spreadsheet. This field is read-only.
    - name: spreadsheetUrl
      NAME: spreadsheetUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The url of the spreadsheet. This field is read-only.
  DataSourceRefreshSchedule:
    - name: dailySchedule
      NAME: dailySchedule
      type: STRUCT(DataSourceRefreshDailySchedule)
      TYPE: STRUCT(DataSourceRefreshDailySchedule)
      REQUIRED: false
      comment: Daily refresh schedule.
    - name: enabled
      NAME: enabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if the refresh schedule is enabled, or false otherwise.
    - name: monthlySchedule
      NAME: monthlySchedule
      type: STRUCT(DataSourceRefreshMonthlySchedule)
      TYPE: STRUCT(DataSourceRefreshMonthlySchedule)
      REQUIRED: false
      comment: Monthly refresh schedule.
    - name: nextRun
      NAME: nextRun
      type: STRUCT(Interval)
      TYPE: STRUCT(Interval)
      REQUIRED: false
      comment: Output only. The time interval of the next run.
    - name: refreshScope
      NAME: refreshScope
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The scope of the refresh. Must be ALL_DATA_SOURCES.
    - name: weeklySchedule
      NAME: weeklySchedule
      type: STRUCT(DataSourceRefreshWeeklySchedule)
      TYPE: STRUCT(DataSourceRefreshWeeklySchedule)
      REQUIRED: false
      comment: Weekly refresh schedule.
  DataSourceRefreshDailySchedule:
    - name: startTime
      NAME: startTime
      type: STRUCT(TimeOfDay)
      TYPE: STRUCT(TimeOfDay)
      REQUIRED: false
      comment: The start time of a time interval in which a data source refresh is scheduled. Only `hours` part is used. The time interval size defaults to that in the Sheets editor.
  TimeOfDay:
    - name: hours
      NAME: hours
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Hours of a day in 24 hour format. Must be greater than or equal to 0 and typically must be less than or equal to 23. An API may choose to allow the value "24:00:00" for scenarios like business closing time.
    - name: minutes
      NAME: minutes
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Minutes of an hour. Must be greater than or equal to 0 and less than or equal to 59.
    - name: nanos
      NAME: nanos
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Fractions of seconds, in nanoseconds. Must be greater than or equal to 0 and less than or equal to 999,999,999.
    - name: seconds
      NAME: seconds
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Seconds of a minute. Must be greater than or equal to 0 and typically must be less than or equal to 59. An API may allow the value 60 if it allows leap-seconds.
  DataSourceRefreshMonthlySchedule:
    - name: daysOfMonth
      NAME: daysOfMonth
      type: "[]INT"
      TYPE: "[]INT"
      REQUIRED: false
      comment: Days of the month to refresh. Only 1-28 are supported, mapping to the 1st to the 28th day. At least one day must be specified.
    - name: startTime
      NAME: startTime
      type: STRUCT(TimeOfDay)
      TYPE: STRUCT(TimeOfDay)
      REQUIRED: false
      comment: The start time of a time interval in which a data source refresh is scheduled. Only `hours` part is used. The time interval size defaults to that in the Sheets editor.
  Interval:
    - name: endTime
      NAME: endTime
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Optional. Exclusive end of the interval. If specified, a Timestamp matching this interval will have to be before the end.
    - name: startTime
      NAME: startTime
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Optional. Inclusive start of the interval. If specified, a Timestamp matching this interval will have to be the same or after the start.
  DataSourceRefreshWeeklySchedule:
    - name: daysOfWeek
      NAME: daysOfWeek
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Days of the week to refresh. At least one day must be specified.
    - name: startTime
      NAME: startTime
      type: STRUCT(TimeOfDay)
      TYPE: STRUCT(TimeOfDay)
      REQUIRED: false
      comment: The start time of a time interval in which a data source refresh is scheduled. Only `hours` part is used. The time interval size defaults to that in the Sheets editor.
  Sheet:
    - name: bandedRanges
      NAME: bandedRanges
      type: "[]STRUCT(BandedRange)"
      TYPE: "[]STRUCT(BandedRange)"
      REQUIRED: false
      comment: The banded (alternating colors) ranges on this sheet.
    - name: basicFilter
      NAME: basicFilter
      type: STRUCT(BasicFilter)
      TYPE: STRUCT(BasicFilter)
      REQUIRED: false
      comment: The filter on this sheet, if any.
    - name: charts
      NAME: charts
      type: "[]STRUCT(EmbeddedChart)"
      TYPE: "[]STRUCT(EmbeddedChart)"
      REQUIRED: false
      comment: The specifications of every chart on this sheet.
    - name: columnGroups
      NAME: columnGroups
      type: "[]STRUCT(DimensionGroup)"
      TYPE: "[]STRUCT(DimensionGroup)"
      REQUIRED: false
      comment: All column groups on this sheet, ordered by increasing range start index, then by group depth.
    - name: conditionalFormats
      NAME: conditionalFormats
      type: "[]STRUCT(ConditionalFormatRule)"
      TYPE: "[]STRUCT(ConditionalFormatRule)"
      REQUIRED: false
      comment: The conditional format rules in this sheet.
    - name: data
      NAME: data
      type: "[]STRUCT(GridData)"
      TYPE: "[]STRUCT(GridData)"
      REQUIRED: false
      comment: Data in the grid, if this is a grid sheet. The number of GridData objects returned is dependent on the number of ranges requested on this sheet. For example, if this is representing `Sheet1`, and the spreadsheet was requested with ranges `Sheet1!A1:C10` and `Sheet1!D15:E20`, then the first GridData will have a startRow/startColumn of `0`, while the second one will have `startRow 14` (zero-based row 15), and `startColumn 3` (zero-based column D). For a DATA_SOURCE sheet, you can not request a specific range, the GridData contains all the values.
    - name: developerMetadata
      NAME: developerMetadata
      type: "[]STRUCT(DeveloperMetadata)"
      TYPE: "[]STRUCT(DeveloperMetadata)"
      REQUIRED: false
      comment: The developer metadata associated with a sheet.
    - name: filterViews
      NAME: filterViews
      type: "[]STRUCT(FilterView)"
      TYPE: "[]STRUCT(FilterView)"
      REQUIRED: false
      comment: The filter views in this sheet.
    - name: merges
      NAME: merges
      type: "[]STRUCT(GridRange)"
      TYPE: "[]STRUCT(GridRange)"
      REQUIRED: false
      comment: The ranges that are merged together.
    - name: properties
      NAME: properties
      type: STRUCT(SheetProperties)
      TYPE: STRUCT(SheetProperties)
      REQUIRED: false
      comment: The properties of the sheet.
    - name: protectedRanges
      NAME: protectedRanges
      type: "[]STRUCT(ProtectedRange)"
      TYPE: "[]STRUCT(ProtectedRange)"
      REQUIRED: false
      comment: The protected ranges in this sheet.
    - name: rowGroups
      NAME: rowGroups
      type: "[]STRUCT(DimensionGroup)"
      TYPE: "[]STRUCT(DimensionGroup)"
      REQUIRED: false
      comment: All row groups on this sheet, ordered by increasing range start index, then by group depth.
    - name: slicers
      NAME: slicers
      type: "[]STRUCT(Slicer)"
      TYPE: "[]STRUCT(Slicer)"
      REQUIRED: false
      comment: The slicers on this sheet.
  GridData:
    - name: columnMetadata
      NAME: columnMetadata
      type: "[]STRUCT(DimensionProperties)"
      TYPE: "[]STRUCT(DimensionProperties)"
      REQUIRED: false
      comment: Metadata about the requested columns in the grid, starting with the column in start_column.
    - name: rowData
      NAME: rowData
      type: "[]STRUCT(RowData)"
      TYPE: "[]STRUCT(RowData)"
      REQUIRED: false
      comment: The data in the grid, one entry per row, starting with the row in startRow. The values in RowData will correspond to columns starting at start_column.
    - name: rowMetadata
      NAME: rowMetadata
      type: "[]STRUCT(DimensionProperties)"
      TYPE: "[]STRUCT(DimensionProperties)"
      REQUIRED: false
      comment: Metadata about the requested rows in the grid, starting with the row in start_row.
    - name: startColumn
      NAME: startColumn
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The first column this GridData refers to, zero-based.
    - name: startRow
      NAME: startRow
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The first row this GridData refers to, zero-based.
  BatchUpdateValuesByDataFilterRequest:
    - name: data
      NAME: data
      type: "[]STRUCT(DataFilterValueRange)"
      TYPE: "[]STRUCT(DataFilterValueRange)"
      REQUIRED: false
      comment: The new values to apply to the spreadsheet. If more than one range is matched by the specified DataFilter the specified values are applied to all of those ranges.
    - name: includeValuesInResponse
      NAME: includeValuesInResponse
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Determines if the update response should include the values of the cells that were updated. By default, responses do not include the updated values. The `updatedData` field within each of the BatchUpdateValuesResponse.responses contains the updated values. If the range to write was larger than the range actually written, the response includes all values in the requested range (excluding trailing empty rows and columns).
    - name: responseDateTimeRenderOption
      NAME: responseDateTimeRenderOption
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Determines how dates, times, and durations in the response should be rendered. This is ignored if response_value_render_option is FORMATTED_VALUE. The default dateTime render option is SERIAL_NUMBER.
    - name: responseValueRenderOption
      NAME: responseValueRenderOption
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Determines how values in the response should be rendered. The default render option is FORMATTED_VALUE.
    - name: valueInputOption
      NAME: valueInputOption
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: How the input data should be interpreted.
  DataFilterValueRange:
    - name: dataFilter
      NAME: dataFilter
      type: STRUCT(DataFilter)
      TYPE: STRUCT(DataFilter)
      REQUIRED: false
      comment: The data filter describing the location of the values in the spreadsheet.
    - name: majorDimension
      NAME: majorDimension
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The major dimension of the values.
    - name: values
      NAME: values
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: false
      comment: The data to be written. If the provided values exceed any of the ranges matched by the data filter then the request fails. If the provided values are less than the matched ranges only the specified values are written, existing values in the matched ranges remain unaffected.
  BatchUpdateValuesRequest:
    - name: data
      NAME: data
      type: "[]STRUCT(ValueRange)"
      TYPE: "[]STRUCT(ValueRange)"
      REQUIRED: false
      comment: The new values to apply to the spreadsheet.
    - name: includeValuesInResponse
      NAME: includeValuesInResponse
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Determines if the update response should include the values of the cells that were updated. By default, responses do not include the updated values. The `updatedData` field within each of the BatchUpdateValuesResponse.responses contains the updated values. If the range to write was larger than the range actually written, the response includes all values in the requested range (excluding trailing empty rows and columns).
    - name: responseDateTimeRenderOption
      NAME: responseDateTimeRenderOption
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Determines how dates, times, and durations in the response should be rendered. This is ignored if response_value_render_option is FORMATTED_VALUE. The default dateTime render option is SERIAL_NUMBER.
    - name: responseValueRenderOption
      NAME: responseValueRenderOption
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Determines how values in the response should be rendered. The default render option is FORMATTED_VALUE.
    - name: valueInputOption
      NAME: valueInputOption
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: How the input data should be interpreted.
  CopySheetToAnotherSpreadsheetRequest:
    - name: destinationSpreadsheetId
      NAME: destinationSpreadsheetId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the spreadsheet to copy the sheet to.
  GetSpreadsheetByDataFilterRequest:
    - name: dataFilters
      NAME: dataFilters
      type: "[]STRUCT(DataFilter)"
      TYPE: "[]STRUCT(DataFilter)"
      REQUIRED: false
      comment: The DataFilters used to select which ranges to retrieve from the spreadsheet.
    - name: includeGridData
      NAME: includeGridData
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if grid data should be returned. This parameter is ignored if a field mask was set in the request.
