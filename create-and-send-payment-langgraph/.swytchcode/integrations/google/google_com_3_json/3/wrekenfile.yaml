STRUCTS:
  AccountLink:
    - name: accountLinkTarget
      NAME: accountLinkTarget
      type: STRUCT(AccountLinkTarget)
      TYPE: STRUCT(AccountLinkTarget)
      REQUIRED: false
      comment: Required for CREATE requests. The properties in the Hotel Center account that can be managed using the linked Google Ads account.
    - name: googleAdsCustomerName
      NAME: googleAdsCustomerName
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: "Required for CREATE requests. The value representing the Google Ads customer ID in the format `customers/{google_ads_customer_id}`. For example: `customers/0123456789`. Note that the `googleAdsCustomerName` field is not returned in responses to GET requests."
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The resource name for the account link in the format `accounts/{account_id}/accountLinks/{account_link_id}`.
    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The current status of the account link.
  AccountLinkTarget:
    - name: allHotels
      NAME: allHotels
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: True if all properties under the Hotel Center account are made available to the account link. The default is `false`.
    - name: hotelList
      NAME: hotelList
      type: STRUCT(HotelList)
      TYPE: STRUCT(HotelList)
      REQUIRED: false
      comment: List of properties that is made available to the account link.
  HotelList:
    - name: partnerHotelIds
      NAME: partnerHotelIds
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Hotel IDs.
  Brand:
    - name: activeDisplayNames
      NAME: activeDisplayNames
      type: "[]STRUCT(LocalizedText)"
      TYPE: "[]STRUCT(LocalizedText)"
      REQUIRED: false
      comment: Output only. The brand's active display names in all provided languages, only present if the display name is approved for all provided languages.
    - name: activeIcon
      NAME: activeIcon
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. The brand's active [accounts.icon](/hotels/hotel-prices/api-reference/rest/v3/accounts.icons#resource:-iconresource). The value refers to the icons's resource name in the format `accounts/{account_id}/icons/{icon_id}`. An active icon is one that has been approved.
    - name: activeIconUri
      NAME: activeIconUri
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. URL of the active icon, only present when the icon has been approved.
    - name: displayNameDisapprovalReason
      NAME: displayNameDisapprovalReason
      type: "[]STRUCT(DisplayNameDisapprovalReason)"
      TYPE: "[]STRUCT(DisplayNameDisapprovalReason)"
      REQUIRED: false
      comment: Output only. Display name's disapproval reason. Only applies to display names with the review state 'REJECTED'.
    - name: displayNameState
      NAME: displayNameState
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. The brand's display names review state, which applies to all display name language entries. If there are both submitted and active display names, this refers to the submitted display names.
    - name: displayNames
      NAME: displayNames
      type: "[]STRUCT(LocalizedText)"
      TYPE: "[]STRUCT(LocalizedText)"
      REQUIRED: false
      comment: Input only. The name Google displays for the brand's properties. Setting the display names is only necessary if you want to override the landing page display name or account-level display name for the brand. Google reviews the display names for appropriate content. When there are multiple languages, Google will only show the display names once Google approves all the languages.
    - name: icon
      NAME: icon
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Input only. The brand's [accounts.icon](/hotels/hotel-prices/api-reference/rest/v3/accounts.icons#resource:-iconresource) identifying the brand's icon. The value refers to the icons's resource name in the format `accounts/{account_id}/icons/{icon_id}`.
    - name: iconDisapprovalReasons
      NAME: iconDisapprovalReasons
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Output only. The icon's disapproval reason(s). Only applies to submitted icons with `REJECTED` state.
    - name: iconState
      NAME: iconState
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. The brand's icon's review state. If there are both submitted and active icons, this refers to the submitted icon.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. The resource name for the brand in the format `accounts/{account_id}/brands/{brand_id}`. The `brand_id` corresponds to the partner's brand identifier used for landing page matching and the property-level brand identifier. A default brand is applied to properties that do not have a brand. The `brand_id` of the default brand is `NO_BRAND_ID`. It can be fetched and updated like any configured brand.
    - name: propertyCount
      NAME: propertyCount
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. The number of properties with the corresponding brand ID.
    - name: submittedDisplayNames
      NAME: submittedDisplayNames
      type: "[]STRUCT(LocalizedText)"
      TYPE: "[]STRUCT(LocalizedText)"
      REQUIRED: false
      comment: Output only. The brand's submitted display names in all provided languages, only present if the display name is new or rejected for any language.
    - name: submittedIcon
      NAME: submittedIcon
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Output only. The brand's submitted [accounts.icon](/hotels/hotel-prices/api-reference/rest/v3/accounts.icons#resource:-iconresource). The value refers to the icons's resource name in the format `accounts/{account_id}/icons/{icon_id}`. A submitted icon is one that is new or rejected.
  LocalizedText:
    - name: languageCode
      NAME: languageCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The text's BCP-47 language code, such as "en-US" or "sr-Latn". For more information, see http://www.unicode.org/reports/tr35/#Unicode_locale_identifier.
    - name: text
      NAME: text
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Localized string in the language corresponding to language_code below.
