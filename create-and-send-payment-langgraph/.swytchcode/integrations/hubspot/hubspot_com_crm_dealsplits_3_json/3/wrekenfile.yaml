VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.upsert.create:
    SUMMARY: Create or replace deal splits for deals with the provided IDs. Deal split percentages for each deal must sum up to 1.0 (100%) and may have up to 8 decimal places
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/deals/splits/batch/upsert
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicDealSplitsBatchCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseDealToDealSplits)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicDealSplitsBatchCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseDealToDealSplits)
        RETURNVAR: crm_v3_upsert_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseDealToDealSplitsWithErrors)
        RETURNVAR: crm_v3_upsert_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_upsert_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.upsert.create
  crm.v3.read.create:
    SUMMARY: Read a batch of deal split objects by their associated deal object internal ID
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/deals/splits/batch/read
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseDealToDealSplits)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputPublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseDealToDealSplits)
        RETURNVAR: crm_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseDealToDealSplitsWithErrors)
        RETURNVAR: crm_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.read.create
