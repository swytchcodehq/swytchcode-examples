VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  w_base_url: https://api.hubapi.com
METHODS:
  crm-object-schemas.v3.schemas.list:
    SUMMARY: Get all schemas
    DESC: Returns all object schemas that have been defined for your account.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm-object-schemas/v3/schemas
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseObjectSchemaNoPaging)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseObjectSchemaNoPaging)
        RETURNVAR: crm-object-schemas_v3_schemas_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_schemas_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.schemas.list
  crm-object-schemas.v3.schemas.create:
    SUMMARY: Create a new schema
    DESC: Define a new object schema, along with custom properties and associations. The entire object schema, including its object type ID, properties, and associations will be returned in the response.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm-object-schemas/v3/schemas
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ObjectSchemaEgg)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ObjectSchema)
    INPUTS:
      - body:
          TYPE: STRUCT(ObjectSchemaEgg)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ObjectSchema)
        RETURNVAR: crm-object-schemas_v3_schemas_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_schemas_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.schemas.create
  crm-object-schemas.v3.schemas.get:
    SUMMARY: Get an existing schema
    DESC: Returns an existing object schema.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm-object-schemas/v3/schemas/{objectType}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ObjectSchema)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ObjectSchema)
        RETURNVAR: crm-object-schemas_v3_schemas_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_schemas_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.schemas.get
  crm-object-schemas.v3.schemas.delete:
    SUMMARY: Delete a schema
    DESC: Deletes a schema. Any existing records of this schema must be deleted **first**. Otherwise this call will fail.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm-object-schemas/v3/schemas/{objectType}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_schemas_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.schemas.delete
  crm-object-schemas.v3.schemas.update:
    SUMMARY: Update a schema
    DESC: Update the details for an existing object schema.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm-object-schemas/v3/schemas/{objectType}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ObjectTypeDefinitionPatch)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ObjectTypeDefinition)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ObjectTypeDefinitionPatch)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ObjectTypeDefinition)
        RETURNVAR: crm-object-schemas_v3_schemas_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_schemas_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.schemas.update
  crm-object-schemas.v3.associations.create:
    SUMMARY: Create an association
    DESC: Defines a new association between the primary schema's object type and other object types.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm-object-schemas/v3/schemas/{objectType}/associations
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AssociationDefinitionEgg)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AssociationDefinition)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(AssociationDefinitionEgg)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(AssociationDefinition)
        RETURNVAR: crm-object-schemas_v3_associations_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_associations_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.associations.create
  crm-object-schemas.v3.associations.delete:
    SUMMARY: Remove an association
    DESC: Removes an existing association from a schema.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm-object-schemas/v3/schemas/{objectType}/associations/{associationIdentifier}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - associationIdentifier:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm-object-schemas_v3_associations_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm-object-schemas.v3.associations.delete
