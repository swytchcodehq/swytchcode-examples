VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  business-units.v3.user.get:
    SUMMARY: Get Business Units for a user
    DESC: Get Business Units identified by `userId`. The `userId` refers to the user’s ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /business-units/v3/business-units/user/{userId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicBusinessUnitNoPaging)
    INPUTS:
      - userId:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - name:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicBusinessUnitNoPaging)
        RETURNVAR: business-units_v3_user_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: business-units_v3_user_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: business-units.v3.user.get
STRUCTS:
  PublicBusinessUnitLogoMetadata:
    - name: logoAltText
      NAME: logoAltText
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The logo's alt text
    - name: resizedUrl
      NAME: resizedUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The logo's resized url
    - name: logoUrl
      NAME: logoUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The logo's url
  CollectionResponsePublicBusinessUnitNoPaging:
    - name: results
      NAME: results
      type: "[]STRUCT(PublicBusinessUnit)"
      TYPE: "[]STRUCT(PublicBusinessUnit)"
      REQUIRED: true
      comment: The collection of Business Units
  PublicBusinessUnit:
    - name: logoMetadata
      NAME: logoMetadata
      type: STRUCT(PublicBusinessUnitLogoMetadata)
      TYPE: STRUCT(PublicBusinessUnitLogoMetadata)
      REQUIRED: false
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The Business Unit's name
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The Business Unit's unique ID
