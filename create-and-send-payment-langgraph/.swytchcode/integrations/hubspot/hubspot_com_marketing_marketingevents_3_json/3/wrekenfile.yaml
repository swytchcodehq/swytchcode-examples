VERSION: 2.0.2
DEFAULTS:
  query_hapikey: <HAPIKEY>
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  marketing.v3.attendance.create:
    SUMMARY: Record Participants by ContactId with Marketing Event External Ids
    DESC: |-
      Records the participation of multiple HubSpot contacts in a Marketing Event using their HubSpot contact IDs.

      Additional Functionality:
      - Adds a timeline event to the contacts.

      Allowed Properties:
      For the state "attend":
      - joinedAt
      - leftAt
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/marketing-events/attendance/{externalEventId}/{subscriberState}/create
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputMarketingEventSubscriber)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSubscriberVidResponse)
    INPUTS:
      - externalEventId:
          TYPE: STRING
          LOCATION: path
      - subscriberState:
          TYPE: STRING
          LOCATION: path
      - externalAccountId:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputMarketingEventSubscriber)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSubscriberVidResponse)
        RETURNVAR: marketing_v3_attendance_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_attendance_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.attendance.create
  marketing.v3.breakdown.get:
    SUMMARY: Read participations breakdown by Marketing Event internal identifier
    DESC: Read Marketing event's participations breakdown with optional filters by internal identifier marketingEventId.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/marketing-events/participations/{marketingEventId}/breakdown
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalParticipationBreakdownForwardPaging)
    INPUTS:
      - marketingEventId:
          TYPE: INT
          LOCATION: path
      - contactIdentifier:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - state:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalParticipationBreakdownForwardPaging)
        RETURNVAR: marketing_v3_breakdown_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_breakdown_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.breakdown.get
  marketing.v3.upsert.create:
    SUMMARY: Record a subscriber state by contact ID
    DESC: Record a subscriber state between multiple HubSpot contacts and a marketing event, using HubSpot contact IDs. Note that the contact must already exist in HubSpot; a contact will not be created.
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/marketing-events/events/{externalEventId}/{subscriberState}/upsert
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputMarketingEventSubscriber)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - externalEventId:
          TYPE: STRING
          LOCATION: path
      - subscriberState:
          TYPE: STRING
          LOCATION: path
      - externalAccountId:
          TYPE: STRING
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputMarketingEventSubscriber)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_upsert_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.upsert.create
  marketing.v3.events.get:
    SUMMARY: Get Marketing Event by External IDs
    DESC: |-
      Returns the details of a Marketing Event with the specified externalAccountId, externalEventId, if it exists.

      Only Marketing Events created by the same app making the request can be retrieved.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/marketing-events/events/{externalEventId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(MarketingEventPublicReadResponse)
    INPUTS:
      - externalEventId:
          TYPE: STRING
          LOCATION: path
      - externalAccountId:
          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(MarketingEventPublicReadResponse)
        RETURNVAR: marketing_v3_events_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_events_get_NaN
