          LOCATION: path
      - body:
          TYPE: STRUCT(MarketingEventCreateRequestParams)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(MarketingEventPublicDefaultResponse)
        RETURNVAR: marketing_v3_events_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_events_update_NaN
