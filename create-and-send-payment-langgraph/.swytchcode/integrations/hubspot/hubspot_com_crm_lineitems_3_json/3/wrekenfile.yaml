VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.read.create:
    SUMMARY: Read a batch of line items by internal ID, or unique property values
    DESC: "Retrieve records by record ID or include the `idProperty` parameter to retrieve records by a custom unique value property. "
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items/batch/read
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.read.create
  crm.v3.lineItems.get:
    SUMMARY: Read
    DESC: Read an Object identified by `{lineItemId}`. `{lineItemId}` refers to the internal object ID by default, or optionally any unique property value as specified by the `idProperty` query param.  Control what is returned via the `properties` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/line_items/{lineItemId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObjectWithAssociations)
    INPUTS:
      - lineItemId:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObjectWithAssociations)
        RETURNVAR: crm_v3_lineItems_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_lineItems_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.lineItems.get
  crm.v3.lineItems.delete:
    SUMMARY: Archive
    DESC: Move an Object identified by `{lineItemId}` to the recycling bin.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/objects/line_items/{lineItemId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - lineItemId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_lineItems_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.lineItems.delete
  crm.v3.lineItems.update:
    SUMMARY: Update
    DESC: Perform a partial update of an Object identified by `{lineItemId}`or optionally a unique property value as specified by the `idProperty` query param. `{lineItemId}` refers to the internal object ID by default, and the `idProperty` query param refers to a property whose values are unique for the object. Provided property values will be overwritten. Read-only and non-existent properties will result in an error. Properties values can be cleared by passing an empty string.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/objects/line_items/{lineItemId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimplePublicObjectInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - lineItemId:
          TYPE: STRING
          LOCATION: path
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(SimplePublicObjectInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_lineItems_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_lineItems_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.lineItems.update
  crm.v3.archive.create:
    SUMMARY: Archive a batch of line items by ID
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items/batch/archive
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_archive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.archive.create
  crm.v3.batch.create:
    SUMMARY: Create a batch of line items
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items/batch/create
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputForCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputForCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.batch.create
  crm.v3.batch.update:
    SUMMARY: Update a batch of line items by internal ID, or unique property values
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items/batch/update
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_batch_update
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_batch_update_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_batch_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.batch.update
  crm.v3.lineItems.list:
    SUMMARY: List
    DESC: Read a page of line items. Control what is returned via the `properties` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/line_items
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
        RETURNVAR: crm_v3_lineItems_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_lineItems_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.lineItems.list
  crm.v3.lineItems.create:
    SUMMARY: Create
    DESC: Create a line item with the given properties and return a copy of the object, including the ID. Documentation and examples for creating standard line items is provided.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimplePublicObjectInputForCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(SimplePublicObjectInputForCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_lineItems_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_lineItems_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.lineItems.create
  crm.v3.upsert.create:
    SUMMARY: Create or update a batch of line items by unique property values
    DESC: Create or update records identified by a unique property value as specified by the `idProperty` query param. `idProperty` query param refers to a property whose values are unique for the object.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items/batch/upsert
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputUpsert)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicUpsertObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputUpsert)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicUpsertObject)
        RETURNVAR: crm_v3_upsert_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicUpsertObjectWithErrors)
        RETURNVAR: crm_v3_upsert_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_upsert_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.upsert.create
  crm.v3.search.create:
    SUMMARY: Search for line items
    DESC: Search for line items by filtering on properties, searching through associations, and sorting results. Learn more about [CRM search](https://developers.hubspot.com/docs/guides/api/crm/search#make-a-search-request).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/line_items/search
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicObjectSearchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalSimplePublicObjectForwardPaging)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicObjectSearchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalSimplePublicObjectForwardPaging)
        RETURNVAR: crm_v3_search_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_search_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.search.create
