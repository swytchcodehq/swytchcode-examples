VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.updateLanguages.create:
    SUMMARY: Update languages of multi-language group
    DESC: Explicitly set new languages for each blog in a multi-language group.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blog-settings/settings/multi-language/update-languages
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UpdateLanguagesRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(UpdateLanguagesRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_updateLanguages_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_updateLanguages_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.updateLanguages.create
  cms.v3.revisions.get:
    SUMMARY: Retrieves all the previous versions of a Blog
    DESC: Retrieves all the previous versions of a Blog
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blog-settings/settings/{blogId}/revisions
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalVersionBlog)
    INPUTS:
      - blogId:
          TYPE: STRING
          LOCATION: path
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalVersionBlog)
        RETURNVAR: cms_v3_revisions_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_revisions_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.revisions.get
  cms.v3.revisions.get_8a95:
    SUMMARY: Retrieves a previous version of a Blog
    DESC: Retrieves a previous version of a Blog
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blog-settings/settings/{blogId}/revisions/{revisionId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(VersionBlog)
    INPUTS:
      - blogId:
          TYPE: STRING
          LOCATION: path
      - revisionId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(VersionBlog)
        RETURNVAR: cms_v3_revisions_get_8a95
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_revisions_get_8a95_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.revisions.get_8a95
  cms.v3.settings.get:
    SUMMARY: Retrieve a Blog
    DESC: Retrieve the Blog object identified by the id in the path.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blog-settings/settings/{blogId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Blog)
    INPUTS:
      - blogId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Blog)
        RETURNVAR: cms_v3_settings_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_settings_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.settings.get
  cms.v3.createLanguageVariation.create:
    SUMMARY: Create a new language variation
    DESC: Create a new language variation from an existing blog
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blog-settings/settings/multi-language/create-language-variation
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BlogLanguageCloneRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Blog)
    INPUTS:
      - body:
          TYPE: STRUCT(BlogLanguageCloneRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Blog)
        RETURNVAR: cms_v3_createLanguageVariation_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_createLanguageVariation_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.createLanguageVariation.create
  cms.v3.settings.list:
    SUMMARY: Get all Blogs
    DESC: |
      Get the list of Blogs. Supports paging and filtering. This method would be useful for an integration that examined these models and used an external service to suggest edits.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/blog-settings/settings
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalBlogForwardPaging)
    INPUTS:
      - createdAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalBlogForwardPaging)
        RETURNVAR: cms_v3_settings_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_settings_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.settings.list
  cms.v3.setNewLangPrimary.update:
    SUMMARY: Set a new primary language
    DESC: Set a blog as the primary language of a multi-language group.
    HTTP:
      METHOD: PUT
      ENDPOINT: /cms/v3/blog-settings/settings/multi-language/set-new-lang-primary
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SetNewLanguagePrimaryRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(SetNewLanguagePrimaryRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_setNewLangPrimary_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.setNewLangPrimary.update
  cms.v3.detachFromLangGroup.create:
    SUMMARY: Detach a blog from a multi-language group
    DESC: Detach a blog from a multi-language group.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blog-settings/settings/multi-language/detach-from-lang-group
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DetachFromLangGroupRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(DetachFromLangGroupRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_detachFromLangGroup_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_detachFromLangGroup_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.detachFromLangGroup.create
  cms.v3.attachToLangGroup.create:
    SUMMARY: Attach a blog to a multi-language group
    DESC: Attach a blog to a multi-language group.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/blog-settings/settings/multi-language/attach-to-lang-group
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AttachToLangPrimaryRequestVNext)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(AttachToLangPrimaryRequestVNext)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_attachToLangGroup_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_attachToLangGroup_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.attachToLangGroup.create
STRUCTS:
  UpdateLanguagesRequestVNext:
    - name: languages
      NAME: languages
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
      comment: Map of object IDs to associated languages of object in the multi-language group.
    - name: primaryId
      NAME: primaryId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the primary object in the multi-language group.
  SetNewLanguagePrimaryRequestVNext:
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of object to set as primary in multi-language group.
  DetachFromLangGroupRequestVNext:
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the object to remove from a multi-language group.
  Paging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
    - name: prev
      NAME: prev
      type: STRUCT(PreviousPage)
      TYPE: STRUCT(PreviousPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  PreviousPage:
    - name: before
      NAME: before
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
  AttachToLangPrimaryRequestVNext:
    - name: language
      NAME: language
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Designated language of the object to add to a multi-language group.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the object to add to a multi-language group.
    - name: primaryId
      NAME: primaryId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of primary language object in multi-language group.
    - name: primaryLanguage
      NAME: primaryLanguage
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Primary language of the multi-language group.
  VersionBlog:
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The id of the version.
    - name: user
      NAME: user
      type: STRUCT(VersionUser)
      TYPE: STRUCT(VersionUser)
      REQUIRED: true
    - name: object
      NAME: object
      type: STRUCT(Blog)
      TYPE: STRUCT(Blog)
      REQUIRED: true
    - name: updatedAt
      NAME: updatedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
  VersionUser:
    - name: fullName
      NAME: fullName
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The first and last name of the User.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of the User.
    - name: email
      NAME: email
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The email address of the user.
  Blog:
    - name: created
      NAME: created
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: absoluteUrl
      NAME: absoluteUrl
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: description
      NAME: description
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The Description of this Blog.
    - name: language
      NAME: language
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The explicitly defined language of the Blog. If null, the Blog will default to the language of the Domain.
    - name: translatedFromId
      NAME: translatedFromId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of the primary Blog this object was translated from.
    - name: publicAccessRules
      NAME: publicAccessRules
      type: "[]STRUCT(PublicAccessRule)"
      TYPE: "[]STRUCT(PublicAccessRule)"
      REQUIRED: true
      comment: Rules for require member registration to access private content.
    - name: publicTitle
      NAME: publicTitle
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The public title of this Blog.
    - name: allowComments
      NAME: allowComments
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Boolean determining whether or not this blog allows public comments.
    - name: deletedAt
      NAME: deletedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The timestamp (ISO8601 format) when this Blog was deleted.
    - name: htmlTitle
      NAME: htmlTitle
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The html title of this Blog.
    - name: publicAccessRulesEnabled
      NAME: publicAccessRulesEnabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Boolean to determine whether or not to respect publicAccessRules.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The internal name of the blog.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of the Blog.
    - name: updated
      NAME: updated
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: slug
      NAME: slug
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The path of the this blog. This field is appended to the domain to construct the url of this blog.
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  BlogLanguageCloneRequestVNext:
    - name: language
      NAME: language
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Target language of new variant.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: ID of blog to clone.
    - name: primaryLanguage
      NAME: primaryLanguage
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Language of primary blog to clone.
    - name: slug
      NAME: slug
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Path to this blog.
  CollectionResponseWithTotalBlogForwardPaging:
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Total number of blogs.
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(Blog)"
      TYPE: "[]STRUCT(Blog)"
      REQUIRED: true
      comment: Collection of blogs.
  CollectionResponseWithTotalVersionBlog:
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Total number of blog versions.
    - name: paging
      NAME: paging
      type: STRUCT(Paging)
      TYPE: STRUCT(Paging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(VersionBlog)"
      TYPE: "[]STRUCT(VersionBlog)"
      REQUIRED: true
      comment: Collection of blog versions.
  PublicAccessRule:
    - NAME: value
      TYPE: ANY
      REQUIRED: false
