      METHOD: GET
      ENDPOINT: /crm/v3/pipelines/{objectType}/{pipelineId}/stages/{stageId}/audit
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicAuditInfoNoPaging)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - stageId:
          TYPE: STRING
          LOCATION: path
      - pipelineId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicAuditInfoNoPaging)
        RETURNVAR: crm_v3_audit_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_audit_get_NaN
