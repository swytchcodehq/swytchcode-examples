        For `tickets` pipelines, the `ticketState` field is optional (`{ "ticketState": "OPEN" }`), and represents whether the ticket remains open or has been closed by a member of your Support team. Possible values are `OPEN` or `CLOSED`.
    - name: displayOrder
      NAME: displayOrder
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The order for displaying this pipeline stage. If two pipeline stages have a matching `displayOrder`, they will be sorted alphabetically by label.
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A label used to organize pipeline stages in HubSpot's UI. Each pipeline stage's label must be unique within that pipeline.
