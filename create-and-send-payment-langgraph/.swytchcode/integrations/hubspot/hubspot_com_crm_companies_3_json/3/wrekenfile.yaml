VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.read.create:
    SUMMARY: Retrieve a batch of companies
    DESC: Retrieve a batch of companies by ID (`companyId`) or by a unique property (`idProperty`). You can specify what is returned using the `properties` query parameter.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/batch/read
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.read.create
  crm.v3.companies.get:
    SUMMARY: Retrieve a company
    DESC: Retrieve a company by its ID (`companyId`) or by a unique property (`idProperty`). You can specify what is returned using the `properties` query parameter.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/companies/{companyId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObjectWithAssociations)
    INPUTS:
      - companyId:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObjectWithAssociations)
        RETURNVAR: crm_v3_companies_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_companies_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.companies.get
  crm.v3.companies.delete:
    SUMMARY: Archive a company
    DESC: Delete a company by ID. Deleted companies can be restored within 90 days of deletion. Learn more about [restoring records](https://knowledge.hubspot.com/records/restore-deleted-records).
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/objects/companies/{companyId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - companyId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_companies_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.companies.delete
  crm.v3.companies.update:
    SUMMARY: Update a company
    DESC: Update a company by ID (`companyId`) or unique property value (`idProperty`). Provided property values will be overwritten. Read-only and non-existent properties will result in an error. Properties values can be cleared by passing an empty string.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/objects/companies/{companyId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimplePublicObjectInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - companyId:
          TYPE: STRING
          LOCATION: path
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(SimplePublicObjectInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_companies_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_companies_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.companies.update
  crm.v3.merge.create:
    SUMMARY: Merge two companies
    DESC: Merge two company records. Learn more about [merging records](https://knowledge.hubspot.com/records/merge-records).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/merge
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicMergeInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicMergeInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_merge_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_merge_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.merge.create
  crm.v3.archive.create:
    SUMMARY: Archive a batch of companies
    DESC: Delete a batch of companies by ID. Deleted companies can be restored within 90 days of deletion. Learn more about [restoring records](https://knowledge.hubspot.com/records/restore-deleted-records).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/batch/archive
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_archive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.archive.create
  crm.v3.batch.create:
    SUMMARY: Create a batch of companies
    DESC: Create a batch of companies. The `inputs` array can contain a `properties` object to define property values for each company, along with an `associations` array to define [associations](https://developers.hubspot.com/docs/guides/api/crm/associations/associations-v4) with other CRM records.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/batch/create
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputForCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputForCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.batch.create
  crm.v3.batch.update:
    SUMMARY: Update a batch of companies
    DESC: Update a batch of companies by ID.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/batch/update
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_batch_update
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_batch_update_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_batch_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.batch.update
  crm.v3.companies.list:
    SUMMARY: Retrieve companies
    DESC: Retrieve all companies, using query parameters to control the information that gets returned.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/companies
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
        RETURNVAR: crm_v3_companies_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_companies_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.companies.list
  crm.v3.companies.create:
    SUMMARY: Create a company
    DESC: Create a single company. Include a `properties` object to define [property values](https://developers.hubspot.com/docs/guides/api/crm/properties) for the company, along with an `associations` array to define [associations](https://developers.hubspot.com/docs/guides/api/crm/associations/associations-v4) with other CRM records.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimplePublicObjectInputForCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(SimplePublicObjectInputForCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_companies_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_companies_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.companies.create
  crm.v3.upsert.create:
    SUMMARY: Create or update a batch of companies by unique property values
    DESC: Create or update companies identified by a unique property value as specified by the `idProperty` query parameter. `idProperty` query param refers to a property whose values are unique for the object.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/batch/upsert
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputUpsert)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicUpsertObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInputUpsert)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicUpsertObject)
        RETURNVAR: crm_v3_upsert_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicUpsertObjectWithErrors)
        RETURNVAR: crm_v3_upsert_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_upsert_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.upsert.create
  crm.v3.search.create:
    SUMMARY: Search for companies
    DESC: Search for companies by filtering on properties, searching through associations, and sorting results. Learn more about [CRM search](https://developers.hubspot.com/docs/guides/api/crm/search#make-a-search-request).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/companies/search
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicObjectSearchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalSimplePublicObjectForwardPaging)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicObjectSearchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalSimplePublicObjectForwardPaging)
        RETURNVAR: crm_v3_search_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_search_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.search.create
