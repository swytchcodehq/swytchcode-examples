VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  marketing.v4.singleSend.create:
    SUMMARY: Perform operation post-/marketing/v4/email/single-send
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v4/email/single-send
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicSingleSendRequestEgg)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(EmailSendStatusView)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicSingleSendRequestEgg)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(EmailSendStatusView)
        RETURNVAR: marketing_v4_singleSend_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v4_singleSend_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v4.singleSend.create
STRUCTS:
  EmailSendStatusView:
    - name: eventId
      NAME: eventId
      type: STRUCT(EventIdView)
      TYPE: STRUCT(EventIdView)
      REQUIRED: false
    - name: completedAt
      NAME: completedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: Time when the send was completed.
    - name: statusId
      NAME: statusId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Identifier used to query the status of the send.
    - name: sendResult
      NAME: sendResult
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Result of the send.
    - name: requestedAt
      NAME: requestedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: Time when the send was requested.
    - name: startedAt
      NAME: startedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: Time when the send began processing.
    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Status of the send request.
  EventIdView:
    - name: created
      NAME: created
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: Time of event creation.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Identifier of event.
  PublicSingleSendRequestEgg:
    - name: customProperties
      NAME: customProperties
      type: map[STRING]ANY
      TYPE: map[STRING]ANY
      REQUIRED: false
      comment: |-
        The customProperties field is a map of property values. Each property value contains a name and value property. Each property will be visible in the template under {{ custom.NAME }}.
        Note: Custom properties do not currently support arrays. To provide a listing in an email, one workaround is to build an HTML list (either with tables or ul) and specify it as a custom property.
    - name: emailId
      NAME: emailId
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The content ID for the email, which can be found in email tool UI.
    - name: message
      NAME: message
      type: STRUCT(PublicSingleSendEmail)
      TYPE: STRUCT(PublicSingleSendEmail)
      REQUIRED: true
    - name: contactProperties
      NAME: contactProperties
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: false
      comment: The contactProperties field is a map of contact property values. Each contact property value contains a name and value property. Each property will get set on the contact record and will be visible in the template under {{ contact.NAME }}. Use these properties when you want to set a contact property while you’re sending the email. For example, when sending a receipt you may want to set a last_paid_date property, as the sending of the receipt will have information about the last payment.
  PublicSingleSendEmail:
    - name: cc
      NAME: cc
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: List of email addresses to send as Cc.
    - name: sendId
      NAME: sendId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: ID for a particular send. No more than one email will be sent per sendId.
    - name: bcc
      NAME: bcc
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: List of email addresses to send as Bcc.
    - name: replyTo
      NAME: replyTo
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: List of Reply-To header values for the email.
    - name: from
      NAME: from
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The From header for the email.
    - name: to
      NAME: to
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The recipient of the email.
