      - propertyName:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - properties:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(Property)
        RETURNVAR: crm_v3_properties_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_properties_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.properties.get
  crm.v3.properties.delete:
