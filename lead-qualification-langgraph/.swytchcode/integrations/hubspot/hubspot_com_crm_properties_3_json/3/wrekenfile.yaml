        RETURNVAR: crm_v3_properties_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_properties_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.properties.update
  crm.v3.read.create:
    SUMMARY: Read a batch of properties
    DESC: Read a provided list of properties.
    HTTP:
