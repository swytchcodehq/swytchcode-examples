        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.read.create
  crm.v3.batch.create:
    SUMMARY: Create a batch of properties
    DESC: Create a batch of properties using the same rules as when creating an individual property.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/properties/{objectType}/batch/create
      HEADERS:
