VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.archive.create:
    SUMMARY: Archive a batch of properties
    DESC: Archive a provided list of properties. This method will return a 204 No Content response on success regardless of the initial state of the property (e.g. active, already archived, non-existent).
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/properties/{objectType}/batch/archive
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPropertyName)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchInputPropertyName)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_archive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.archive.create
  crm.v3.groups.get:
    SUMMARY: Read a property group
    DESC: Read a property group identified by {groupName}.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/properties/{objectType}/groups/{groupName}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PropertyGroup)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - groupName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PropertyGroup)
        RETURNVAR: crm_v3_groups_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_groups_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.groups.get
  crm.v3.groups.delete:
    SUMMARY: Archive a property group
    DESC: Move a property group identified by {groupName} to the recycling bin.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/properties/{objectType}/groups/{groupName}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - groupName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_groups_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.groups.delete
  crm.v3.groups.update:
    SUMMARY: Update a property group
    DESC: Perform a partial update of a property group identified by {groupName}. Provided fields will be overwritten.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/properties/{objectType}/groups/{groupName}
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PropertyGroupUpdate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PropertyGroup)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - groupName:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(PropertyGroupUpdate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PropertyGroup)
        RETURNVAR: crm_v3_groups_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_groups_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.groups.update
  crm.v3.properties.get:
