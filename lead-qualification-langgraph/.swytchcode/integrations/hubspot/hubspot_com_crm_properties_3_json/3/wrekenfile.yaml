        TYPE: ANY
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - propertyName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_properties_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.properties.delete
  crm.v3.properties.update:
    SUMMARY: Update a property
    DESC: Perform a partial update of a property identified by {propertyName}. Provided fields will be overwritten.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/properties/{objectType}/{propertyName}
