VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  settings.v3.teams.list:
    SUMMARY: See details about this account's teams
    DESC: View teams for this account
    HTTP:
      METHOD: GET
      ENDPOINT: /settings/v3/users/teams
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicTeamNoPaging)
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicTeamNoPaging)
        RETURNVAR: settings_v3_teams_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_teams_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.teams.list
  settings.v3.roles.list:
    SUMMARY: Retrieves the roles on an account
    DESC: Retrieves the roles on an account
    HTTP:
      METHOD: GET
      ENDPOINT: /settings/v3/users/roles
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicPermissionSetNoPaging)
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicPermissionSetNoPaging)
        RETURNVAR: settings_v3_roles_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_roles_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.roles.list
  settings.v3.users.list:
    SUMMARY: Retrieves a list of users from an account
    DESC: Retrieves a list of users from an account
    HTTP:
      METHOD: GET
      ENDPOINT: /settings/v3/users/
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicUserForwardPaging)
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicUserForwardPaging)
        RETURNVAR: settings_v3_users_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_users_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.users.list
  settings.v3.users.create:
    SUMMARY: Adds a user
    DESC: New users will only have minimal permissions, which is contacts-base. A welcome email will prompt them to set a password and log in to HubSpot.
    HTTP:
      METHOD: POST
      ENDPOINT: /settings/v3/users/
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UserProvisionRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicUser)
    INPUTS:
      - body:
          TYPE: STRUCT(UserProvisionRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicUser)
        RETURNVAR: settings_v3_users_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_users_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.users.create
  settings.v3.users.get:
    SUMMARY: Retrieves a user
    DESC: Retrieves a user identified by `userId`. `userId` refers to the user's ID by default, or optionally email as specified by the `IdProperty` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /settings/v3/users/{userId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicUser)
    INPUTS:
      - userId:
          TYPE: STRING
          LOCATION: path
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicUser)
        RETURNVAR: settings_v3_users_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_users_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.users.get
  settings.v3.users.update:
    SUMMARY: Modifies a user
    DESC: Modifies a user identified by `userId`. `userId` refers to the user's ID by default, or optionally email as specified by the `IdProperty` query param.
    HTTP:
      METHOD: PUT
      ENDPOINT: /settings/v3/users/{userId}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicUserUpdate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicUser)
    INPUTS:
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - userId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicUserUpdate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicUser)
        RETURNVAR: settings_v3_users_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_users_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.users.update
  settings.v3.users.delete:
    SUMMARY: Removes a user
    DESC: Removes a user identified by `userId`. `userId` refers to the user's ID by default, or optionally email as specified by the `IdProperty` query param.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /settings/v3/users/{userId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - userId:
          TYPE: STRING
          LOCATION: path
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: settings_v3_users_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: settings.v3.users.delete
