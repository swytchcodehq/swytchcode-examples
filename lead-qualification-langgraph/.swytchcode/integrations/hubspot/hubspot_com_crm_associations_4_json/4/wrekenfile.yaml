VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v4.archive.create:
    SUMMARY: Delete
    DESC: Batch delete associations for objects
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v4/associations/{fromObjectType}/{toObjectType}/batch/archive
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicAssociationMultiArchive)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchInputPublicAssociationMultiArchive)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_archive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.archive.create
  crm.v4.batch.create:
    SUMMARY: Create
    DESC: Batch create associations for objects
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v4/associations/{fromObjectType}/{toObjectType}/batch/create
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicAssociationMultiPost)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseLabelsBetweenObjectPair)
    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchInputPublicAssociationMultiPost)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseLabelsBetweenObjectPair)
        RETURNVAR: crm_v4_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseLabelsBetweenObjectPairWithErrors)
        RETURNVAR: crm_v4_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.batch.create
  crm.v4.highUsageReport.create:
    SUMMARY: Report
    DESC: Requests a report of all objects in the portal which have a high usage of associations
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v4/associations/usage/high-usage-report/{userId}
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ReportCreationResponse)
    INPUTS:
      - userId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ReportCreationResponse)
        RETURNVAR: crm_v4_highUsageReport_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_highUsageReport_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.highUsageReport.create
  crm.v4.archive.create_970f:
    SUMMARY: Delete Specific Labels
    DESC: Batch delete specific association labels for objects. Deleting an unlabeled association will also delete all labeled associations between those two objects
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v4/associations/{fromObjectType}/{toObjectType}/batch/labels/archive
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicAssociationMultiPost)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchInputPublicAssociationMultiPost)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_archive_create_970f_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.archive.create_970f
  crm.v4.read.create:
    SUMMARY: Read
    DESC: "Batch read associations for objects to specific object type. The 'after' field in a returned paging object  can be added alongside the 'id' to retrieve the next page of associations from that objectId. The 'link' field is deprecated and should be ignored. Note: The 'paging' field will only be present if there are more pages and absent otherwise."
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v4/associations/{fromObjectType}/{toObjectType}/batch/read
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicFetchAssociationsBatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponsePublicAssociationMultiWithLabel)
    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchInputPublicFetchAssociationsBatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponsePublicAssociationMultiWithLabel)
        RETURNVAR: crm_v4_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponsePublicAssociationMultiWithLabelWithErrors)
        RETURNVAR: crm_v4_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.read.create
  crm.v4.default.create:
    SUMMARY: " Create Default Associations"
    DESC: Create the default (most generic) association type between two object types
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v4/associations/{fromObjectType}/{toObjectType}/batch/associate/default
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputPublicDefaultAssociationMultiPost)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponsePublicDefaultAssociation)
    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchInputPublicDefaultAssociationMultiPost)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponsePublicDefaultAssociation)
        RETURNVAR: crm_v4_default_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_default_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.default.create
  crm.v4.associations.update:
    SUMMARY: Create
    DESC: Set association labels between two records.
    HTTP:
      METHOD: PUT
      ENDPOINT: /crm/v4/objects/{objectType}/{objectId}/associations/{toObjectType}/{toObjectId}
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(crm.v4.associations.updateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(LabelsBetweenObjectPair)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - objectId:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(crm.v4.associations.updateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(LabelsBetweenObjectPair)
        RETURNVAR: crm_v4_associations_update_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_associations_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.associations.update
  crm.v4.associations.delete:
    SUMMARY: Delete
    DESC: deletes all associations between two records.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v4/objects/{objectType}/{objectId}/associations/{toObjectType}/{toObjectId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - objectId:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_associations_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.associations.delete
  crm.v4.associations.get:
    SUMMARY: List
    DESC: List all associations of an object by object type. Limit 500 per call.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v4/objects/{objectType}/{objectId}/associations/{toObjectType}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseMultiAssociatedObjectWithLabelForwardPaging)
    INPUTS:
      - objectType:
          TYPE: STRING
          LOCATION: path
      - objectId:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 500
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseMultiAssociatedObjectWithLabelForwardPaging)
        RETURNVAR: crm_v4_associations_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_associations_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.associations.get
  crm.v4.default.update:
    SUMMARY: Create Default
    DESC: Create the default (most generic) association type between two object types
    HTTP:
      METHOD: PUT
      ENDPOINT: /crm/v4/objects/{fromObjectType}/{fromObjectId}/associations/default/{toObjectType}/{toObjectId}
      HEADERS:
