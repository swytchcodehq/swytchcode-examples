    INPUTS:
      - fromObjectType:
          TYPE: STRING
          LOCATION: path
      - fromObjectId:
          TYPE: STRING
          LOCATION: path
      - toObjectType:
          TYPE: STRING
          LOCATION: path
      - toObjectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponsePublicDefaultAssociation)
        RETURNVAR: crm_v4_default_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v4_default_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v4.default.update
