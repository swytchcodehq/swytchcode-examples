      RETURNS: result
      RESULT:
        TYPE: STRUCT(File)
    INPUTS:
      - fileId:
          TYPE: STRING
          LOCATION: path
      - file:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - charsetHunch:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - options:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(File)
        RETURNVAR: files_v3_files_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: files_v3_files_update_NaN
