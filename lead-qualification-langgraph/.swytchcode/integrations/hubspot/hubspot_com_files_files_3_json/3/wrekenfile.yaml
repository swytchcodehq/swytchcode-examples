    SUMMARY: GDPR-delete file
    DESC: Delete a file in accordance with GDPR regulations.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /files/v3/files/{fileId}/gdpr-delete
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - fileId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: files_v3_files_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: files.v3.files.delete
  files.v3.files.get:
    SUMMARY: Retrieve file by ID
    DESC: Retrieve a file by its ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /files/v3/files/{fileId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(File)
    INPUTS:
      - fileId:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(File)
        RETURNVAR: files_v3_files_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: files_v3_files_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: files.v3.files.get
  files.v3.files.update:
    SUMMARY: Replace file
    DESC: Replace existing file data with new file data. Can be used to change image content without having to upload a new file and update all references.
