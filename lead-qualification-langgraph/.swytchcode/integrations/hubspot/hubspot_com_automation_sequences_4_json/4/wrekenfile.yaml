VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  automation.v4.contact.get:
    SUMMARY: Perform operation get-/automation/v4/sequences/enrollments/contact/{contactId}
    HTTP:
      METHOD: GET
      ENDPOINT: /automation/v4/sequences/enrollments/contact/{contactId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicSequenceEnrollmentResponse)
    INPUTS:
      - contactId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicSequenceEnrollmentResponse)
        RETURNVAR: automation_v4_contact_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_contact_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.contact.get
  automation.v4.sequences.list:
    SUMMARY: Perform operation get-/automation/v4/sequences/
    HTTP:
      METHOD: GET
      ENDPOINT: /automation/v4/sequences/
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalPublicSequenceLiteResponseForwardPaging)
    INPUTS:
      - userId:
          TYPE: STRING
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - name:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalPublicSequenceLiteResponseForwardPaging)
        RETURNVAR: automation_v4_sequences_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_sequences_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.sequences.list
  automation.v4.enrollments.create:
    SUMMARY: Perform operation post-/automation/v4/sequences/enrollments
    HTTP:
      METHOD: POST
      ENDPOINT: /automation/v4/sequences/enrollments
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicSequenceEnrollmentRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicSequenceEnrollmentLiteResponse)
    INPUTS:
      - userId:
          TYPE: STRING
          LOCATION: query
      - body:
          TYPE: STRUCT(PublicSequenceEnrollmentRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicSequenceEnrollmentLiteResponse)
        RETURNVAR: automation_v4_enrollments_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_enrollments_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.enrollments.create
  automation.v4.sequences.get:
    SUMMARY: Perform operation get-/automation/v4/sequences/{sequenceId}
    HTTP:
      METHOD: GET
      ENDPOINT: /automation/v4/sequences/{sequenceId}
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicSequenceResponse)
    INPUTS:
      - sequenceId:
          TYPE: STRING
          LOCATION: path
      - userId:
          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicSequenceResponse)
        RETURNVAR: automation_v4_sequences_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_sequences_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.sequences.get
