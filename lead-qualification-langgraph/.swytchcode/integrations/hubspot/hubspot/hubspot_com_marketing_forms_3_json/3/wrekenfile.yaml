VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  marketing.v3.forms.get:
    SUMMARY: Get a form definition
    DESC: Returns a form based on the form ID provided.
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/forms/{formId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FormDefinitionBase)
    INPUTS:
      - formId:
          TYPE: STRING
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(FormDefinitionBase)
        RETURNVAR: marketing_v3_forms_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_forms_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.forms.get
  marketing.v3.forms.update:
    SUMMARY: Update a form definition
    DESC: Update all fields of a hubspot form definition.
    HTTP:
      METHOD: PUT
      ENDPOINT: /marketing/v3/forms/{formId}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(HubSpotFormDefinition)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FormDefinitionBase)
    INPUTS:
      - formId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(HubSpotFormDefinition)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FormDefinitionBase)
        RETURNVAR: marketing_v3_forms_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_forms_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.forms.update
  marketing.v3.forms.delete:
    SUMMARY: Archive a form definition
    DESC: Archive a form definition. New submissions will not be accepted and the form definition will be permanently deleted after 3 months.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /marketing/v3/forms/{formId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - formId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_forms_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.forms.delete
  marketing.v3.forms.update_1417:
    SUMMARY: Partially update a form definition
    DESC: Update some of the form definition components
    HTTP:
      METHOD: PATCH
      ENDPOINT: /marketing/v3/forms/{formId}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(HubSpotFormDefinitionPatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FormDefinitionBase)
    INPUTS:
      - formId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(HubSpotFormDefinitionPatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FormDefinitionBase)
        RETURNVAR: marketing_v3_forms_update_1417
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_forms_update_1417_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.forms.update_1417
  marketing.v3.forms.list:
    SUMMARY: Get a list of forms
    DESC: Returns a list of forms based on the search filters. By default, it returns the first 20 `hubspot` forms
    HTTP:
      METHOD: GET
      ENDPOINT: /marketing/v3/forms/
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseFormDefinitionBaseForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - formTypes:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseFormDefinitionBaseForwardPaging)
        RETURNVAR: marketing_v3_forms_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_forms_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.forms.list
  marketing.v3.forms.create:
    SUMMARY: Create a form
    DESC: Add a new `hubspot` form
    HTTP:
      METHOD: POST
      ENDPOINT: /marketing/v3/forms/
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(FormDefinitionCreateRequestBase)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(FormDefinitionBase)
    INPUTS:
      - body:
          TYPE: STRUCT(FormDefinitionCreateRequestBase)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(FormDefinitionBase)
        RETURNVAR: marketing_v3_forms_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: marketing_v3_forms_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: marketing.v3.forms.create
STRUCTS:
  FormDefinitionBase:
    - name: variant
      NAME: variant
      type: STRUCT(FormDefinitionBase_Union)
      TYPE: STRUCT(FormDefinitionBase_Union)
      REQUIRED: false
  HubSpotFormDefinition:
    - name: variant
      NAME: variant
      type: STRUCT(HubSpotFormDefinition_Union)
      TYPE: STRUCT(HubSpotFormDefinition_Union)
      REQUIRED: false
    - name: formType
      NAME: formType
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: updatedAt
      NAME: updatedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
    - name: archived
      NAME: archived
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
    - name: archivedAt
      NAME: archivedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: fieldGroups
      NAME: fieldGroups
      type: "[]STRUCT(FieldGroup)"
      TYPE: "[]STRUCT(FieldGroup)"
      REQUIRED: true
    - name: configuration
      NAME: configuration
      type: STRUCT(HubSpotFormConfiguration)
      TYPE: STRUCT(HubSpotFormConfiguration)
      REQUIRED: true
    - name: displayOptions
      NAME: displayOptions
      type: STRUCT(FormDisplayOptions)
      TYPE: STRUCT(FormDisplayOptions)
      REQUIRED: true
    - name: legalConsentOptions
      NAME: legalConsentOptions
      type: ANY
      TYPE: ANY
      REQUIRED: true
  FieldGroup:
    - name: groupType
      NAME: groupType
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: richTextType
      NAME: richTextType
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of rich text included. The default value is text.
    - name: richText
      NAME: richText
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A block of rich text or an image. Those can be used to add extra information for the customers filling in the form. If the field group includes fields, the rich text will be displayed before the fields.
    - name: fields
      NAME: fields
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: true
      comment: The form fields included in the group
  HubSpotFormConfiguration:
    - name: createNewContactForNewEmail
      NAME: createNewContactForNewEmail
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether to create a new contact when a form is submitted with an email address that doesn’t match any in your existing contacts records.
    - name: editable
      NAME: editable
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the form can be edited.
    - name: allowLinkToResetKnownValues
      NAME: allowLinkToResetKnownValues
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether to add a reset link to the form. This removes any pre-populated content on the form and creates a new contact on submission.
    - name: lifecycleStages
      NAME: lifecycleStages
      type: "[]STRUCT(LifecycleStage)"
      TYPE: "[]STRUCT(LifecycleStage)"
      REQUIRED: false
    - name: postSubmitAction
      NAME: postSubmitAction
      type: STRUCT(FormPostSubmitAction)
      TYPE: STRUCT(FormPostSubmitAction)
      REQUIRED: true
    - name: language
      NAME: language
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The language of the form.
    - name: prePopulateKnownValues
      NAME: prePopulateKnownValues
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether contact fields should pre-populate with known information when a contact returns to your site.
    - name: cloneable
      NAME: cloneable
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the form can be cloned.
    - name: notifyContactOwner
      NAME: notifyContactOwner
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether to send a notification email to the contact owner when a submission is received.
    - name: recaptchaEnabled
      NAME: recaptchaEnabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether CAPTCHA (spam prevention) is enabled.
    - name: archivable
      NAME: archivable
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the form can be archived.
    - name: notifyRecipients
      NAME: notifyRecipients
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: The list of user IDs to receive a notification email when a submission is received.
  LifecycleStage:
    - name: objectTypeId
      NAME: objectTypeId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The objectTypeId for both contact and company
    - name: value
      NAME: value
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The internal name of the contact's lifecycle stage set when submitting a form
  FormPostSubmitAction:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The action to take after submit. The default action is displaying a thank you message.
    - name: value
      NAME: value
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The thank you text or the page to redirect to.
  FormDisplayOptions:
    - name: renderRawHtml
      NAME: renderRawHtml
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the form will render as raw HTML as opposed to inside an iFrame.
    - name: cssClass
      NAME: cssClass
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: theme
      NAME: theme
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The theme used for styling the input fields. This will not apply if the form is added to a HubSpot CMS page.
    - name: submitButtonText
      NAME: submitButtonText
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The text displayed on the form submit button.
    - name: style
      NAME: style
      type: STRUCT(FormStyle)
      TYPE: STRUCT(FormStyle)
      REQUIRED: true
  FormStyle:
    - name: labelTextSize
      NAME: labelTextSize
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: legalConsentTextColor
      NAME: legalConsentTextColor
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: fontFamily
      NAME: fontFamily
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: legalConsentTextSize
      NAME: legalConsentTextSize
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: backgroundWidth
      NAME: backgroundWidth
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: helpTextSize
      NAME: helpTextSize
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: submitFontColor
      NAME: submitFontColor
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: labelTextColor
      NAME: labelTextColor
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: submitAlignment
      NAME: submitAlignment
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: submitSize
      NAME: submitSize
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: helpTextColor
      NAME: helpTextColor
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: submitColor
      NAME: submitColor
      type: STRING
      TYPE: STRING
      REQUIRED: true
  FormDefinitionBase_Union:
    - name: value
      NAME: value
      type: ANY
      TYPE: ANY
      REQUIRED: false
  CollectionResponseFormDefinitionBaseForwardPaging:
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: true
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  FormDefinitionCreateRequestBase:
    - name: variant
      NAME: variant
      type: STRUCT(FormDefinitionCreateRequestBase_Union)
      TYPE: STRUCT(FormDefinitionCreateRequestBase_Union)
      REQUIRED: false
  FormDefinitionCreateRequestBase_Union:
    - name: value
      NAME: value
      type: ANY
      TYPE: ANY
      REQUIRED: false
  HubSpotFormDefinitionPatchRequest:
    - name: fieldGroups
      NAME: fieldGroups
      type: "[]STRUCT(FieldGroup)"
      TYPE: "[]STRUCT(FieldGroup)"
      REQUIRED: false
      comment: The fields in the form, grouped in rows.
    - name: archived
      NAME: archived
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether this form is archived.
    - name: configuration
      NAME: configuration
      type: STRUCT(HubSpotFormConfiguration)
      TYPE: STRUCT(HubSpotFormConfiguration)
      REQUIRED: false
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the form. Expected to be unique for a hub.
    - name: legalConsentOptions
      NAME: legalConsentOptions
      type: ANY
      TYPE: ANY
      REQUIRED: false
    - name: displayOptions
      NAME: displayOptions
      type: STRUCT(FormDisplayOptions)
      TYPE: STRUCT(FormDisplayOptions)
      REQUIRED: false
  HubSpotFormDefinition_Union:
    - NAME: value
      TYPE: ANY
      REQUIRED: false
