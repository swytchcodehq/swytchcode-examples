VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.read.create:
    SUMMARY: Read a batch of contacts by internal ID, or unique property values
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/batch/read
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.read.create
  crm.v3.contacts.get:
    SUMMARY: Read
    DESC: Read an Object identified by `{contactId}`. `{contactId}` refers to the internal object ID by default, or optionally any unique property value as specified by the `idProperty` query param.  Control what is returned via the `properties` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/contacts/{contactId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObjectWithAssociations)
    INPUTS:
      - contactId:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObjectWithAssociations)
        RETURNVAR: crm_v3_contacts_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_contacts_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.contacts.get
  crm.v3.contacts.delete:
    SUMMARY: Archive
    DESC: Move an Object identified by `{contactId}` to the recycling bin.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/objects/contacts/{contactId}
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - contactId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_contacts_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.contacts.delete
  crm.v3.contacts.update:
    SUMMARY: Update
    DESC: Perform a partial update of an Object identified by `{contactId}`. `{contactId}` refers to the internal object ID by default, or optionally any unique property value as specified by the `idProperty` query param. Provided property values will be overwritten. Read-only and non-existent properties will be ignored. Properties values can be cleared by passing an empty string.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/objects/contacts/{contactId}
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimplePublicObjectInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - contactId:
          TYPE: STRING
          LOCATION: path
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(SimplePublicObjectInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_contacts_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_contacts_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.contacts.update
  crm.v3.merge.create:
    SUMMARY: Merge two contacts with same type
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/merge
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicMergeInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicMergeInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_merge_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_merge_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.merge.create
  crm.v3.archive.create:
    SUMMARY: Archive a batch of contacts by ID
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/batch/archive
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_archive_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.archive.create
  crm.v3.batch.create:
    SUMMARY: Create a batch of contacts
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/batch/create
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectInputForCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectInputForCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_batch_create_201
        STATUS: 201
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_batch_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_batch_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.batch.create
  crm.v3.batch.update:
    SUMMARY: Update a batch of contacts
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/batch/update
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputSimplePublicObjectBatchInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(BatchInputSimplePublicObjectBatchInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_batch_update
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_batch_update_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_batch_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.batch.update
  crm.v3.contacts.delete_3c4d:
    SUMMARY: GDPR DELETE
    DESC: Permanently delete a contact and all associated content to follow GDPR. Use optional property 'idProperty' set to 'email' to identify contact by email address. If email address is not found, the email address will be added to a blocklist and prevent it from being used in the future.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/gdpr-delete
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicGdprDeleteInput)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - body:
          TYPE: STRUCT(PublicGdprDeleteInput)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_contacts_delete_3c4d_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.contacts.delete_3c4d
  crm.v3.contacts.list:
    SUMMARY: List
    DESC: Read a page of contacts. Control what is returned via the `properties` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/contacts
      HEADERS:
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
        RETURNVAR: crm_v3_contacts_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_contacts_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.contacts.list
  hubspot.crm.contacts.create:
    SUMMARY: Create
    DESC: Create a contact with the given properties and return a copy of the object, including the ID. Documentation and examples for creating standard contacts is provided.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SimplePublicObjectInputForCreate)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObject)
    INPUTS:
      - body:
          TYPE: STRUCT(SimplePublicObjectInputForCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObject)
        RETURNVAR: crm_v3_contacts_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_contacts_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: hubspot.crm.contacts.create
  crm.v3.search.create:
    SUMMARY: Perform operation post-/crm/v3/objects/contacts/search
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/contacts/search
      HEADERS:
        Content-Type: application/json
