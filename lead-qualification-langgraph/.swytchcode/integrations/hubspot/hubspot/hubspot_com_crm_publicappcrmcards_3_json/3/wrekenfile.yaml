VERSION: 2.0.2
DEFAULTS:
  query_hapikey: <HAPIKEY>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.sampleResponse.list:
    SUMMARY: Get sample card detail response
    DESC: Returns an example card detail response. This is the payload with displayed details for a card that will be shown to a user. An app should send this in response to the data fetch request.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/extensions/cards-dev/sample-response
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(IntegratorCardPayloadResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(IntegratorCardPayloadResponse)
        RETURNVAR: crm_v3_sampleResponse_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_sampleResponse_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.sampleResponse.list
  crm.v3.cardsDev.get:
    SUMMARY: Get all cards
    DESC: Returns a list of cards for a given app.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/extensions/cards-dev/{appId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicCardListResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicCardListResponse)
        RETURNVAR: crm_v3_cardsDev_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_cardsDev_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.cardsDev.get
  crm.v3.cardsDev.create:
    SUMMARY: Create a new card
    DESC: Defines a new card that will become active on an account when this app is installed.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/extensions/cards-dev/{appId}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CardCreateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicCardResponse)
    INPUTS:
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(CardCreateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicCardResponse)
        RETURNVAR: crm_v3_cardsDev_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_cardsDev_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.cardsDev.create
  crm.v3.cardsDev.get_b0e4:
    SUMMARY: Get a card.
    DESC: Returns the definition for a card with the given ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/extensions/cards-dev/{appId}/{cardId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicCardResponse)
    INPUTS:
      - cardId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicCardResponse)
        RETURNVAR: crm_v3_cardsDev_get_b0e4
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_cardsDev_get_b0e4_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.cardsDev.get_b0e4
  crm.v3.cardsDev.delete:
    SUMMARY: Delete a card
    DESC: Permanently deletes a card definition with the given ID. Once deleted, data fetch requests for this card will no longer be sent to your service. This can't be undone.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /crm/v3/extensions/cards-dev/{appId}/{cardId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - cardId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_cardsDev_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.cardsDev.delete
  crm.v3.cardsDev.update:
    SUMMARY: Update a card
    DESC: Update a card definition with new details.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /crm/v3/extensions/cards-dev/{appId}/{cardId}
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CardPatchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicCardResponse)
    INPUTS:
      - cardId:
          TYPE: STRING
          LOCATION: path
      - appId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(CardPatchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicCardResponse)
        RETURNVAR: crm_v3_cardsDev_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_cardsDev_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.cardsDev.update
STRUCTS:
  CardCreateRequest:
    - name: fetch
      NAME: fetch
      type: STRUCT(CardFetchBody)
      TYPE: STRUCT(CardFetchBody)
      REQUIRED: true
    - name: display
      NAME: display
      type: STRUCT(CardDisplayBody)
      TYPE: STRUCT(CardDisplayBody)
      REQUIRED: true
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The top-level title for this card. Displayed to users in the CRM UI.
    - name: actions
      NAME: actions
      type: STRUCT(CardActions)
      TYPE: STRUCT(CardActions)
      REQUIRED: true
  CardFetchBody:
    - name: serverlessFunction
      NAME: serverlessFunction
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: cardType
      NAME: cardType
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: objectTypes
      NAME: objectTypes
      type: "[]STRUCT(CardObjectTypeBody)"
      TYPE: "[]STRUCT(CardObjectTypeBody)"
      REQUIRED: true
      comment: An array of CRM object types where this card should be displayed. HubSpot will call your data fetch URL whenever a user visits a record page of the types defined here.
    - name: targetUrl
      NAME: targetUrl
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: URL to a service endpoints that will respond with card details. HubSpot will call this endpoint each time a user visits a CRM record page where this card should be displayed.
  CardObjectTypeBody:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A CRM object type where this card should be displayed.
    - name: propertiesToSend
      NAME: propertiesToSend
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: An array of properties that should be sent to this card's target URL when the data fetch request is made. Must be valid properties for the corresponding CRM object type.
  CardDisplayBody:
    - name: properties
      NAME: properties
      type: "[]STRUCT(CardDisplayProperty)"
      TYPE: "[]STRUCT(CardDisplayProperty)"
      REQUIRED: true
      comment: "Card display properties. These will will be rendered as \"label : value\" pairs in the card UI. See the [example card](#) in the overview docs for more details."
  CardDisplayProperty:
    - name: dataType
      NAME: dataType
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Type of data represented by this property.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: An internal identifier for this property. This value must be unique TODO.
    - name: options
      NAME: options
      type: "[]STRUCT(DisplayOption)"
      TYPE: "[]STRUCT(DisplayOption)"
      REQUIRED: true
      comment: An array of available options that can be displayed. Only used in when `dataType` is `STATUS`.
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The label for this property as you'd like it displayed to users.
  DisplayOption:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: JSON-friendly unique name for option.
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The text that will be displayed to users for this option.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of status.
  CardActions:
    - name: baseUrls
      NAME: baseUrls
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: A list of URL prefixes that will be accepted for card action URLs. If your data fetch response includes an action URL that doesn't begin with one of these values, it will result in an error and the card will not be displayed.
  CardFetchBodyPatch:
    - name: serverlessFunction
      NAME: serverlessFunction
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: cardType
      NAME: cardType
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: objectTypes
      NAME: objectTypes
      type: "[]STRUCT(CardObjectTypeBody)"
      TYPE: "[]STRUCT(CardObjectTypeBody)"
      REQUIRED: true
      comment: An array of CRM object types where this card should be displayed. HubSpot will call your target URL whenever a user visits a record page of the types defined here.
    - name: targetUrl
      NAME: targetUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: URL to a service endpoint that will respond with details for this card. HubSpot will call this endpoint each time a user visits a CRM record page where this card should be displayed.
  IntegratorObjectResult:
    - name: linkUrl
      NAME: linkUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: tokens
      NAME: tokens
      type: "[]STRUCT(ObjectToken)"
      TYPE: "[]STRUCT(ObjectToken)"
      REQUIRED: true
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: actions
      NAME: actions
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: true
  ObjectToken:
    - name: dataType
      NAME: dataType
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: value
      NAME: value
      type: STRING
      TYPE: STRING
      REQUIRED: true
  IFrameActionBody:
    - name: propertyNamesIncluded
      NAME: propertyNamesIncluded
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
    - name: width
      NAME: width
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: label
      NAME: label
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: url
      NAME: url
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: height
      NAME: height
      type: INT
      TYPE: INT
      REQUIRED: true
  PublicCardFetchBody:
    - name: objectTypes
      NAME: objectTypes
      type: "[]STRUCT(CardObjectTypeBody)"
      TYPE: "[]STRUCT(CardObjectTypeBody)"
      REQUIRED: true
    - name: targetUrl
      NAME: targetUrl
      type: STRING
      TYPE: STRING
      REQUIRED: true
  TopLevelActions:
    - name: secondary
      NAME: secondary
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: true
    - name: settings
      NAME: settings
      type: STRUCT(IFrameActionBody)
      TYPE: STRUCT(IFrameActionBody)
      REQUIRED: false
    - name: primary
      NAME: primary
      type: ANY
      TYPE: ANY
      REQUIRED: false
  PublicCardResponse:
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: fetch
      NAME: fetch
      type: STRUCT(PublicCardFetchBody)
      TYPE: STRUCT(PublicCardFetchBody)
      REQUIRED: true
    - name: display
      NAME: display
      type: STRUCT(CardDisplayBody)
      TYPE: STRUCT(CardDisplayBody)
      REQUIRED: true
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: title
      NAME: title
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: actions
      NAME: actions
      type: STRUCT(CardActions)
      TYPE: STRUCT(CardActions)
      REQUIRED: true
    - name: auditHistory
      NAME: auditHistory
      type: "[]STRUCT(CardAuditResponse)"
      TYPE: "[]STRUCT(CardAuditResponse)"
      REQUIRED: true
    - name: updatedAt
      NAME: updatedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
  CardAuditResponse:
    - name: actionType
      NAME: actionType
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: objectTypeId
      NAME: objectTypeId
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: authSource
      NAME: authSource
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: changedAt
      NAME: changedAt
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: applicationId
      NAME: applicationId
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: initiatingUserId
      NAME: initiatingUserId
      type: INT
      TYPE: INT
      REQUIRED: true
  IntegratorCardPayloadResponse:
    - name: responseVersion
      NAME: responseVersion
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: cardLabel
      NAME: cardLabel
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The label to be used for the `allItemsLinkUrl` link (e.g. 'See more tickets'). If not provided, this falls back to the card's title.
    - name: allItemsLinkUrl
      NAME: allItemsLinkUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: URL to a page the integrator has built that displays all details for this card. This URL will be displayed to users under a `See more [x]` link if there are more than five items in your response, where `[x]` is the value of `itemLabel`.
    - name: totalCount
      NAME: totalCount
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The total number of card properties that will be sent in this response.
    - name: topLevelActions
      NAME: topLevelActions
      type: STRUCT(TopLevelActions)
      TYPE: STRUCT(TopLevelActions)
      REQUIRED: false
    - name: sections
      NAME: sections
      type: "[]STRUCT(IntegratorObjectResult)"
      TYPE: "[]STRUCT(IntegratorObjectResult)"
      REQUIRED: false
