VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.read.create:
    SUMMARY: Read a batch of payments by internal ID, or unique property values
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/payments/batch/read
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponseSimplePublicObject)
    INPUTS:
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - body:
          TYPE: STRUCT(BatchReadInputSimplePublicObjectId)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObject)
        RETURNVAR: crm_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponseSimplePublicObjectWithErrors)
        RETURNVAR: crm_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.read.create
  crm.v3.payments.get:
    SUMMARY: Read
    DESC: Read an Object identified by `{paymentsId}`. `{paymentsId}` refers to the internal object ID by default, or optionally any unique property value as specified by the `idProperty` query param.  Control what is returned via the `properties` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/payments/{paymentsId}
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SimplePublicObjectWithAssociations)
    INPUTS:
      - paymentsId:
          TYPE: STRING
          LOCATION: path
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
      - idProperty:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(SimplePublicObjectWithAssociations)
        RETURNVAR: crm_v3_payments_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_payments_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.payments.get
  crm.v3.payments.list:
    SUMMARY: List
    DESC: Read a page of payments. Control what is returned via the `properties` query param.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/objects/payments
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
    INPUTS:
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
          DEFAULT: 10
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - properties:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - propertiesWithHistory:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - associations:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
          DEFAULT: false
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseSimplePublicObjectWithAssociationsForwardPaging)
        RETURNVAR: crm_v3_payments_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_payments_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.payments.list
  crm.v3.search.create:
    SUMMARY: Perform operation post-/crm/v3/objects/payments/search
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/objects/payments/search
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicObjectSearchRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalSimplePublicObjectForwardPaging)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicObjectSearchRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalSimplePublicObjectForwardPaging)
        RETURNVAR: crm_v3_search_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_search_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.search.create
