VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.auditLogs.list:
    SUMMARY: Query audit logs
    DESC: Returns audit logs based on filters.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/audit-logs/
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicAuditLog)
    INPUTS:
      - userId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - eventType:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - objectType:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - objectId:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicAuditLog)
        RETURNVAR: cms_v3_auditLogs_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_auditLogs_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.auditLogs.list
STRUCTS:
  CollectionResponsePublicAuditLog:
    - name: paging
      NAME: paging
      type: STRUCT(Paging)
      TYPE: STRUCT(Paging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(PublicAuditLog)"
      TYPE: "[]STRUCT(PublicAuditLog)"
      REQUIRED: true
  Paging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
    - name: prev
      NAME: prev
      type: STRUCT(PreviousPage)
      TYPE: STRUCT(PreviousPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  PreviousPage:
    - name: before
      NAME: before
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
  PublicAuditLog:
    - name: meta
      NAME: meta
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: objectName
      NAME: objectName
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The internal name of the object in HubSpot.
    - name: fullName
      NAME: fullName
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The name of the user who caused the event.
    - name: event
      NAME: event
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of event that took place (CREATED, UPDATED, PUBLISHED, DELETED, UNPUBLISHED).
    - name: userId
      NAME: userId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the user who caused the event.
    - name: objectId
      NAME: objectId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the object.
    - name: objectType
      NAME: objectType
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of the object (BLOG, LANDING_PAGE, DOMAIN, HUBDB_TABLE etc.)
    - name: timestamp
      NAME: timestamp
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The timestamp at which the event occurred.
