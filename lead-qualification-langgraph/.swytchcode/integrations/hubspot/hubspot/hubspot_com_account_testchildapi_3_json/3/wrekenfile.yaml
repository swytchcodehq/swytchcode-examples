VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  account-info.v3.login.list:
    SUMMARY: Get login activity for a HubSpot account.
    DESC: Get login activity.
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/activity/login
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicLoginAuditForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - userId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicLoginAuditForwardPaging)
        RETURNVAR: account-info_v3_login_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_login_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.login.list
  account-info.v3.daily.list:
    SUMMARY: Get the daily API usage and limits for a HubSpot account.
    DESC: Get daily API usage
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/api-usage/daily
      HEADERS: {}
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseApiUsageNoPaging)
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseApiUsageNoPaging)
        RETURNVAR: account-info_v3_daily_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_daily_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.daily.list
  account-info.v3.details.list:
    SUMMARY: Get account details for a HubSpot account.
    DESC: Get account details
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/details
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PortalInformationResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(PortalInformationResponse)
        RETURNVAR: account-info_v3_details_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_details_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.details.list
  account-info.v3.security.list:
    SUMMARY: Get security activity for a HubSpot account
    DESC: Get security activity
    HTTP:
      METHOD: GET
      ENDPOINT: /account-info/v3/activity/security
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseHydratedCriticalActionForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - userId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - fromTimestamp:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseHydratedCriticalActionForwardPaging)
        RETURNVAR: account-info_v3_security_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: account-info_v3_security_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: account-info.v3.security.list
STRUCTS:
  CollectionResponsePublicLoginAuditForwardPaging:
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(PublicLoginAudit)"
      TYPE: "[]STRUCT(PublicLoginAudit)"
      REQUIRED: true
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  PublicLoginAudit:
    - name: regionCode
      NAME: regionCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The approximate region code of the login
    - name: countryCode
      NAME: countryCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The approximate country code of the login
    - name: ipAddress
      NAME: ipAddress
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: IP address where the activity originated.
    - name: location
      NAME: location
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: userAgent
      NAME: userAgent
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Information about the device used for logging in.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The login activity's unique ID.
    - name: loginAt
      NAME: loginAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The time the login took place.
    - name: userId
      NAME: userId
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: The user's unique ID.
    - name: email
      NAME: email
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Email address of the user associated with the login.
    - name: loginSucceeded
      NAME: loginSucceeded
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the login was successful or not.
  ApiUsage:
    - name: collectedAt
      NAME: collectedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: Indicates when the cache was last updated.
    - name: usageLimit
      NAME: usageLimit
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Limits by which a single integration can consume the HubSpot public APIs.
    - name: fetchStatus
      NAME: fetchStatus
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Status of fetching the information, including if the data came from the cache.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Name of the limit type.
    - name: currentUsage
      NAME: currentUsage
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: How many API calls an account has made for the current day.
    - name: resetsAt
      NAME: resetsAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
      comment: Time that the limit will reset.
  HydratedCriticalAction:
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: The time the activity took place.
    - name: actingUser
      NAME: actingUser
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Email address of the user associated with the activity.
    - name: regionCode
      NAME: regionCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The approximate region code
    - name: infoUrl
      NAME: infoUrl
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A link to the URL where the action was taken in the account.
    - name: countryCode
      NAME: countryCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The approximate country code
    - name: ipAddress
      NAME: ipAddress
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: IP address where the activity originated.
    - name: location
      NAME: location
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The activity's unique ID.
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of activity.
    - name: userId
      NAME: userId
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The user's unique ID.
    - name: objectId
      NAME: objectId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the affected object.
  PortalInformationResponse:
    - name: additionalCurrencies
      NAME: additionalCurrencies
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
    - name: utcOffset
      NAME: utcOffset
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: companyCurrency
      NAME: companyCurrency
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: portalId
      NAME: portalId
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: accountType
      NAME: accountType
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: uiDomain
      NAME: uiDomain
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: timeZone
      NAME: timeZone
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: dataHostingLocation
      NAME: dataHostingLocation
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: utcOffsetMilliseconds
      NAME: utcOffsetMilliseconds
      type: INT
      TYPE: INT
      REQUIRED: true
  CollectionResponseHydratedCriticalActionForwardPaging:
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(HydratedCriticalAction)"
      TYPE: "[]STRUCT(HydratedCriticalAction)"
      REQUIRED: true
  CollectionResponseApiUsageNoPaging:
    - name: results
      NAME: results
      type: "[]STRUCT(ApiUsage)"
      TYPE: "[]STRUCT(ApiUsage)"
      REQUIRED: true
