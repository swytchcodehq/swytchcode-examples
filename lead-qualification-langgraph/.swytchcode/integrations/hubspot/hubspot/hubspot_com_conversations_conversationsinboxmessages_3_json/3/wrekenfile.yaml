STRUCTS:
  PublicDeliveryIdentifier:
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of identifier. HS_EMAIL_ADDRESS for email addresses; HS_PHONE_NUMBER for a phone number; CHANNEL_SPECIFIC_OPAQUE_ID for channels that use their own proprietary identifiers, like Facebook Messenger or LiveChat.
    - name: value
      NAME: value
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A string representation of the PublicDeliveryIdentifier, either an an E.164 phone number, an email address, or a channel-specific identifier.
  PublicMessageEgg:
    - name: variant
      NAME: variant
      type: STRUCT(PublicMessageEgg_Union)
      TYPE: STRUCT(PublicMessageEgg_Union)
      REQUIRED: false
  PublicMessageEgg_Union:
    - name: value
      NAME: value
      type: ANY
      TYPE: ANY
      REQUIRED: false
  PublicChannelAccount:
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: archivedAt
      NAME: archivedAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: archived
      NAME: archived
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
    - name: authorized
      NAME: authorized
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the channel account.
    - name: active
      NAME: active
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether the channel account is turned on.
    - name: deliveryIdentifier
      NAME: deliveryIdentifier
      type: STRUCT(PublicDeliveryIdentifier)
      TYPE: STRUCT(PublicDeliveryIdentifier)
      REQUIRED: false
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the channel account.
    - name: inboxId
      NAME: inboxId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the conversations inbox that contains the channel account.
    - name: channelId
      NAME: channelId
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the channel that the channel account is an instance of.
  CollectionResponseWithTotalPublicChannelForwardPaging:
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(PublicChannel)"
      TYPE: "[]STRUCT(PublicChannel)"
      REQUIRED: true
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  PublicChannel:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The name of the channel.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The ID of the channel.
  CollectionResponsePublicThreadForwardPaging:
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(PublicThread)"
      TYPE: "[]STRUCT(PublicThread)"
      REQUIRED: true
  PublicThread:
    - name: associatedContactId
      NAME: associatedContactId
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the associated Contact in the CRM. If the Contact for the thread has not yet been added or created, the `associatedContactId` returned will be a visitorID and cannot be used to search for the Contact in the CRM
    - name: threadAssociations
      NAME: threadAssociations
      type: STRUCT(PublicThreadAssociations)
      TYPE: STRUCT(PublicThreadAssociations)
      REQUIRED: false
    - name: assignedTo
      NAME: assignedTo
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: createdAt
      NAME: createdAt
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: true
      comment: When the thread was created.
    - name: archived
      NAME: archived
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: Whether this thread is archived.
    - name: originalChannelId
      NAME: originalChannelId
      type: STRING
      TYPE: STRING
