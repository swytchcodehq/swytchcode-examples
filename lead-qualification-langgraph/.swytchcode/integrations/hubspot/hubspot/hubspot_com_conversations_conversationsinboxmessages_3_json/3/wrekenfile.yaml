          LOCATION: query
      - associatedContactId:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - threadStatus:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - latestMessageTimestampAfter:
