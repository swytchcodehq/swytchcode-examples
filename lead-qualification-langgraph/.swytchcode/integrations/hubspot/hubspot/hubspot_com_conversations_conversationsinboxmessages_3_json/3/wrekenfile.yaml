VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  conversations.v3.inboxes.list:
    SUMMARY: Get conversations inboxes.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/inboxes
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalPublicInboxForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - defaultPageLength:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalPublicInboxForwardPaging)
        RETURNVAR: conversations_v3_inboxes_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_inboxes_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.inboxes.list
  conversations.v3.threads.get:
    SUMMARY: Get a single thread.
    DESC: Returns a single thread.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicThread)
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - association:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicThread)
        RETURNVAR: conversations_v3_threads_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_threads_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.threads.get
  conversations.v3.threads.delete:
    SUMMARY: Archives a thread.
    DESC: Archives a single thread. The thread will be permanently deleted 30 days after placed in an archived state.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_threads_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.threads.delete
  conversations.v3.threads.update:
    SUMMARY: Update a thread.
    DESC: Updates a single thread. Either a thread's status can be updated, or the thread can be restored.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicThreadUpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicThread)
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(PublicThreadUpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicThread)
        RETURNVAR: conversations_v3_threads_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_threads_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.threads.update
  conversations.v3.originalContent.get:
    SUMMARY: Get the original content of a single message.
    DESC: Returns the complete original text and rich text bodies of a message. This will be different from the text and rich text in the message itself if the message's `truncationStatus` is anything other than `NOT_TRUNCATED`.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}/messages/{messageId}/original-content
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicMessageContent)
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
      - messageId:
          TYPE: STRING
          LOCATION: path
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicMessageContent)
        RETURNVAR: conversations_v3_originalContent_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_originalContent_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.originalContent.get
  conversations.v3.messages.get:
    SUMMARY: Get message history for a thread.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}/messages
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicMessageForwardPaging)
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicMessageForwardPaging)
        RETURNVAR: conversations_v3_messages_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_messages_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.messages.get
  conversations.v3.messages.create:
    SUMMARY: Send a message to a thread.
    DESC: Send a new message on a thread at the current timestamp.
    HTTP:
      METHOD: POST
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}/messages
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicMessageEgg)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicMessage)
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
      - body:
          TYPE: STRUCT(PublicMessageEgg)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicMessage)
        RETURNVAR: conversations_v3_messages_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_messages_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.messages.create
  conversations.v3.read.create:
    SUMMARY: Get actors
    DESC: Resolve `ActorId`s to the underlying actors/participants.
    HTTP:
      METHOD: POST
      ENDPOINT: /conversations/v3/conversations/actors/batch/read
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchInputString)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchResponsePublicActor)
    INPUTS:
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - body:
          TYPE: STRUCT(BatchInputString)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchResponsePublicActor)
        RETURNVAR: conversations_v3_read_create
        STATUS: 200
      - RETURNTYPE: STRUCT(BatchResponsePublicActorWithErrors)
        RETURNVAR: conversations_v3_read_create_207
        STATUS: 207
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_read_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.read.create
  conversations.v3.channelAccounts.list:
    SUMMARY: Get channel accounts.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/channel-accounts
      HEADERS:
        Authorization: bearer_token
