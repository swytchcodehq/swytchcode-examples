      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicMessage)
    INPUTS:
      - threadId:
          TYPE: INT
          LOCATION: path
      - messageId:
          TYPE: STRING
          LOCATION: path
      - property:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(PublicMessage)
        RETURNVAR: conversations_v3_messages_get_709
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_messages_get_709_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.messages.get_709
  conversations.v3.channels.list:
    SUMMARY: Get channels.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/channels
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalPublicChannelForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - defaultPageLength:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalPublicChannelForwardPaging)
        RETURNVAR: conversations_v3_channels_list
        STATUS: 200
