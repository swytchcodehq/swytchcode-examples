      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_channelAccounts_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channelAccounts.list
  conversations.v3.channels.get:
    SUMMARY: Get a single channel.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/channels/{channelId}
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicChannel)
    INPUTS:
      - channelId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicChannel)
        RETURNVAR: conversations_v3_channels_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: conversations_v3_channels_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: conversations.v3.channels.get
  conversations.v3.messages.get_709:
    SUMMARY: Get a single message.
    HTTP:
      METHOD: GET
      ENDPOINT: /conversations/v3/conversations/threads/{threadId}/messages/{messageId}
