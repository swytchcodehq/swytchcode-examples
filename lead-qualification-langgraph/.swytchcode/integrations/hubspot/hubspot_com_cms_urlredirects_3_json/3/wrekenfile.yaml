VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.urlRedirects.list:
    SUMMARY: Get current redirects
    DESC: Returns all existing URL redirects. Results can be limited and filtered by creation or updated date.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/url-redirects/
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalUrlMappingForwardPaging)
    INPUTS:
      - createdAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalUrlMappingForwardPaging)
        RETURNVAR: cms_v3_urlRedirects_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_urlRedirects_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.urlRedirects.list
  cms.v3.urlRedirects.create:
    SUMMARY: Create a redirect
    DESC: Creates and configures a new URL redirect.
    HTTP:
      METHOD: POST
      ENDPOINT: /cms/v3/url-redirects/
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UrlMappingCreateRequestBody)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UrlMapping)
    INPUTS:
      - body:
          TYPE: STRUCT(UrlMappingCreateRequestBody)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UrlMapping)
        RETURNVAR: cms_v3_urlRedirects_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_urlRedirects_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.urlRedirects.create
  cms.v3.urlRedirects.get:
    SUMMARY: Get details for a redirect
    DESC: Returns the details for a single existing URL redirect by ID.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/url-redirects/{urlRedirectId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UrlMapping)
    INPUTS:
      - urlRedirectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(UrlMapping)
        RETURNVAR: cms_v3_urlRedirects_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_urlRedirects_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.urlRedirects.get
  cms.v3.urlRedirects.delete:
    SUMMARY: Delete a redirect
    DESC: Delete one existing redirect, so it is no longer mapped.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /cms/v3/url-redirects/{urlRedirectId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - urlRedirectId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_urlRedirects_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.urlRedirects.delete
  cms.v3.urlRedirects.update:
    SUMMARY: Update a redirect
    DESC: Updates the settings for an existing URL redirect.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /cms/v3/url-redirects/{urlRedirectId}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UrlMapping)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UrlMapping)
    INPUTS:
      - urlRedirectId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(UrlMapping)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UrlMapping)
        RETURNVAR: cms_v3_urlRedirects_update
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_urlRedirects_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.urlRedirects.update
STRUCTS:
  UrlMapping:
    - name: isTrailingSlashOptional
      NAME: isTrailingSlashOptional
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether a trailing slash will be ignored.
    - name: redirectStyle
      NAME: redirectStyle
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: "The type of redirect to create. Options include: 301 (permanent), 302 (temporary), or 305 (proxy). Find more details [here](https://knowledge.hubspot.com/cos-general/how-to-redirect-a-hubspot-page)."
    - name: isMatchQueryString
      NAME: isMatchQueryString
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the `routePrefix` should match on the entire URL path, including the query string.
    - name: created
      NAME: created
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: isMatchFullUrl
      NAME: isMatchFullUrl
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the `routePrefix` should match on the entire URL, including the domain.
    - name: destination
      NAME: destination
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The destination URL, where the target URL should be redirected if it matches the `routePrefix`.
    - name: isOnlyAfterNotFound
      NAME: isOnlyAfterNotFound
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the URL redirect mapping should apply only if a live page on the URL isn't found. If False, the URL redirect mapping will take precedence over any existing page.
    - name: isPattern
      NAME: isPattern
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the `routePrefix` should match based on pattern.
    - name: precedence
      NAME: precedence
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Used to prioritize URL redirection. If a given URL matches more than one redirect, the one with the **lower** precedence will be used.
    - name: routePrefix
      NAME: routePrefix
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The target incoming URL, path, or pattern to match for redirection.
    - name: isProtocolAgnostic
      NAME: isProtocolAgnostic
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the `routePrefix` should match both HTTP and HTTPS protocols.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of this URL redirect.
    - name: updated
      NAME: updated
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  UrlMappingCreateRequestBody:
    - name: isTrailingSlashOptional
      NAME: isTrailingSlashOptional
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: isMatchQueryString
      NAME: isMatchQueryString
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: redirectStyle
      NAME: redirectStyle
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: routePrefix
      NAME: routePrefix
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: isMatchFullUrl
      NAME: isMatchFullUrl
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: isProtocolAgnostic
      NAME: isProtocolAgnostic
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: destination
      NAME: destination
      type: STRING
      TYPE: STRING
      REQUIRED: true
    - name: isOnlyAfterNotFound
      NAME: isOnlyAfterNotFound
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: isPattern
      NAME: isPattern
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: precedence
      NAME: precedence
      type: INT
      TYPE: INT
      REQUIRED: false
  CollectionResponseWithTotalUrlMappingForwardPaging:
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(UrlMapping)"
      TYPE: "[]STRUCT(UrlMapping)"
      REQUIRED: true
