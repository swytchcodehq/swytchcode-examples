    SUMMARY: Completes a callback
    DESC: Complete a specific blocked action execution by ID.
    HTTP:
      METHOD: POST
      ENDPOINT: /automation/v4/actions/callbacks/{callbackId}/complete
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CallbackCompletionRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - callbackId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(CallbackCompletionRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: automation_v4_complete_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: automation.v4.complete.create
  automation.v4.complete.create_438f:
    SUMMARY: Complete a batch of callbacks
    DESC: Complete a batch of blocked action executions.
