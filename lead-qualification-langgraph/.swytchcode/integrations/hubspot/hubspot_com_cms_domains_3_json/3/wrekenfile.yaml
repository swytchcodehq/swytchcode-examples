VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  cms.v3.domains.list:
    SUMMARY: Get current domains
    DESC: Returns all existing domains that have been created. Results can be limited and filtered by creation or updated date.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/domains/
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalDomainForwardPaging)
    INPUTS:
      - createdAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - createdBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAt:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedAfter:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - updatedBefore:
          TYPE: TIMESTAMP
          REQUIRED: false
          LOCATION: query
      - sort:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - archived:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalDomainForwardPaging)
        RETURNVAR: cms_v3_domains_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_domains_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.domains.list
  cms.v3.domains.get:
    SUMMARY: Get a single domain
    DESC: Returns a single domains with the id specified.
    HTTP:
      METHOD: GET
      ENDPOINT: /cms/v3/domains/{domainId}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
        private-app: private-app
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Domain)
    INPUTS:
      - domainId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(Domain)
        RETURNVAR: cms_v3_domains_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: cms_v3_domains_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: cms.v3.domains.get
STRUCTS:
  ForwardPaging:
    - name: next
      NAME: next
      type: STRUCT(NextPage)
      TYPE: STRUCT(NextPage)
      REQUIRED: false
  NextPage:
    - name: link
      NAME: link
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: after
      NAME: after
      type: STRING
      TYPE: STRING
      REQUIRED: true
  Domain:
    - name: isUsedForLandingPage
      NAME: isUsedForLandingPage
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the domain is used for CMS landing pages.
    - name: primaryBlogPost
      NAME: primaryBlogPost
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: primaryKnowledge
      NAME: primaryKnowledge
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: created
      NAME: created
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: secondaryToDomain
      NAME: secondaryToDomain
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: manuallyMarkedAsResolving
      NAME: manuallyMarkedAsResolving
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: isUsedForKnowledge
      NAME: isUsedForKnowledge
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the domain is used for CMS knowledge pages.
    - name: isUsedForBlogPost
      NAME: isUsedForBlogPost
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the domain is used for CMS blog posts.
    - name: isUsedForSitePage
      NAME: isUsedForSitePage
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the domain is used for CMS site pages.
    - name: isResolving
      NAME: isResolving
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the DNS for this domain is optimally configured for use with HubSpot.
    - name: isSslEnabled
      NAME: isSslEnabled
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: isUsedForEmail
      NAME: isUsedForEmail
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: Whether the domain is used for CMS email web pages.
    - name: domain
      NAME: domain
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The actual domain or sub-domain. e.g. www.hubspot.com
    - name: primarySitePage
      NAME: primarySitePage
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: primaryLandingPage
      NAME: primaryLandingPage
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The unique ID of this domain.
    - name: correctCname
      NAME: correctCname
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: isSslOnly
      NAME: isSslOnly
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
    - name: updated
      NAME: updated
      type: TIMESTAMP
      TYPE: TIMESTAMP
      REQUIRED: false
    - name: primaryEmail
      NAME: primaryEmail
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
  CollectionResponseWithTotalDomainForwardPaging:
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
    - name: paging
      NAME: paging
      type: STRUCT(ForwardPaging)
      TYPE: STRUCT(ForwardPaging)
      REQUIRED: false
    - name: results
      NAME: results
      type: "[]STRUCT(Domain)"
      TYPE: "[]STRUCT(Domain)"
      REQUIRED: true
