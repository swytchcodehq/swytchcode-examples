VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.cancel.create:
    SUMMARY: Cancel an active import
    DESC: This allows a developer to cancel an active import.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/imports/{importId}/cancel
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ActionResponse)
    INPUTS:
      - importId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ActionResponse)
        RETURNVAR: crm_v3_cancel_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_cancel_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.cancel.create
  crm.v3.imports.get:
    SUMMARY: Get the information on any import
    DESC: A complete summary of an import record, including any updates.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/imports/{importId}
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicImportResponse)
    INPUTS:
      - importId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PublicImportResponse)
        RETURNVAR: crm_v3_imports_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_imports_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.imports.get
  crm.v3.errors.get:
    SUMMARY: Perform operation get-/crm/v3/imports/{importId}/errors_getErrors
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/imports/{importId}/errors
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicImportErrorForwardPaging)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - importId:
          TYPE: INT
          LOCATION: path
      - includeErrorMessage:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - includeRowData:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicImportErrorForwardPaging)
        RETURNVAR: crm_v3_errors_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_errors_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.errors.get
  crm.v3.imports.list:
    SUMMARY: Get active imports
    DESC: Returns a paged list of active imports for this account.
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/imports/
      HEADERS:
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponsePublicImportResponse)
    INPUTS:
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponsePublicImportResponse)
        RETURNVAR: crm_v3_imports_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_imports_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.imports.list
  crm.v3.imports.create:
    SUMMARY: Start a new import
    DESC: Begins importing data from the specified file resources. This uploads the corresponding file and uses the import request object to convert rows in the files to objects.
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/imports/
      HEADERS:
        Content-Type: multipart/form-data
        Authorization: bearer_token
        private-app-legacy: private-app-legacy
      CONTENT_TYPE: multipart/form-data
      ACCEPT: application/json
      BODYTYPE: form-data
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(PublicImportResponse)
    INPUTS:
      - files:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - importRequest:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(PublicImportResponse)
        RETURNVAR: crm_v3_imports_create
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_imports_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.imports.create
