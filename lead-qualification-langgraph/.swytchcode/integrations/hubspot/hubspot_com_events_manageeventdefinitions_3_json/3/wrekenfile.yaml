VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app-legacy: <PRIVATE-APP-LEGACY>
  w_base_url: https://api.hubapi.com
METHODS:
  events.v3.eventDefinitions.list:
    SUMMARY: Retrieve event definitions
    DESC: Retrieve existing custom event definitions.
    HTTP:
      METHOD: GET
      ENDPOINT: /events/v3/event-definitions
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CollectionResponseWithTotalExternalBehavioralEventTypeDefinitionForwardPaging)
    INPUTS:
      - searchString:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - includeProperties:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: query
      - sortOrder:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(CollectionResponseWithTotalExternalBehavioralEventTypeDefinitionForwardPaging)
        RETURNVAR: events_v3_eventDefinitions_list
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_eventDefinitions_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.eventDefinitions.list
  events.v3.eventDefinitions.create:
    SUMMARY: Create custom event definition
    DESC: Create a custom event definition.
    HTTP:
      METHOD: POST
      ENDPOINT: /events/v3/event-definitions
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ExternalBehavioralEventTypeDefinitionEgg)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExternalBehavioralEventTypeDefinition)
    INPUTS:
      - body:
          TYPE: STRUCT(ExternalBehavioralEventTypeDefinitionEgg)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ExternalBehavioralEventTypeDefinition)
        RETURNVAR: events_v3_eventDefinitions_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_eventDefinitions_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.eventDefinitions.create
  events.v3.eventDefinitions.get:
    SUMMARY: Retrieve a custom event definition
    DESC: Fetch a single custom event definition by name.
    HTTP:
      METHOD: GET
      ENDPOINT: /events/v3/event-definitions/{eventName}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExternalBehavioralEventTypeDefinition)
    INPUTS:
      - eventName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ExternalBehavioralEventTypeDefinition)
        RETURNVAR: events_v3_eventDefinitions_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_eventDefinitions_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.eventDefinitions.get
  events.v3.eventDefinitions.delete:
    SUMMARY: Delete an event definition
    DESC: Delete a custom event definition by name.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /events/v3/event-definitions/{eventName}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - eventName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_eventDefinitions_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.eventDefinitions.delete
  events.v3.eventDefinitions.update:
    SUMMARY: Update a custom event definition
    DESC: Update a specific custom event definition by name.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /events/v3/event-definitions/{eventName}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ExternalBehavioralEventTypeDefinitionPatch)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ExternalBehavioralEventTypeDefinition)
    INPUTS:
      - eventName:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ExternalBehavioralEventTypeDefinitionPatch)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ExternalBehavioralEventTypeDefinition)
        RETURNVAR: events_v3_eventDefinitions_update_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_eventDefinitions_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.eventDefinitions.update
  events.v3.property.create:
    SUMMARY: Create a property for an event definition
    DESC: Create a new property for an existing event definition.
    HTTP:
      METHOD: POST
      ENDPOINT: /events/v3/event-definitions/{eventName}/property
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
