    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Property)
    INPUTS:
      - eventName:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ExternalBehavioralEventPropertyCreate)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Property)
        RETURNVAR: events_v3_property_create_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_property_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.property.create
  events.v3.property.delete:
    SUMMARY: Delete a property from a custom event definition
    DESC: Delete an existing property from a custom event definition.
    HTTP:
      METHOD: DELETE
      ENDPOINT: /events/v3/event-definitions/{eventName}/property/{propertyName}
      HEADERS:
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: ANY
    INPUTS:
      - eventName:
          TYPE: STRING
          LOCATION: path
      - propertyName:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_property_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.property.delete
  events.v3.property.update:
    SUMMARY: Update an existing custom event property
    DESC: Update an existing property in a custom event definition.
    HTTP:
      METHOD: PATCH
      ENDPOINT: /events/v3/event-definitions/{eventName}/property/{propertyName}
      HEADERS:
        Content-Type: application/json
        private-app-legacy: private-app-legacy
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ExternalBehavioralEventPropertyDefinitionPatch)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Property)
    INPUTS:
      - eventName:
          TYPE: STRING
          LOCATION: path
      - propertyName:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(ExternalBehavioralEventPropertyDefinitionPatch)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Property)
        RETURNVAR: events_v3_property_update_201
        STATUS: 201
      - RETURNTYPE: ANY
        RETURNVAR: events_v3_property_update_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: events.v3.property.update
