VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  private-app: <PRIVATE-APP>
  w_base_url: https://api.hubapi.com
METHODS:
  crm.v3.status.get:
    SUMMARY: Get the status of the export including the URL to download the file
    DESC: Returns the status of the export with taskId, including the URL of the resulting file if the export status is COMPLETE
    HTTP:
      METHOD: GET
      ENDPOINT: /crm/v3/exports/export/async/tasks/{taskId}/status
      HEADERS:
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ActionResponseWithSingleResultURI)
    INPUTS:
      - taskId:
          TYPE: INT
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(ActionResponseWithSingleResultURI)
        RETURNVAR: crm_v3_status_get
        STATUS: 200
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_status_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.status.get
  crm.v3.async.create:
    SUMMARY: Start an export
    DESC: Begins exporting CRM data for the portal as specified in the request body
    HTTP:
      METHOD: POST
      ENDPOINT: /crm/v3/exports/export/async
      HEADERS:
        Content-Type: application/json
        private-app: private-app
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(PublicExportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(TaskLocator)
    INPUTS:
      - body:
          TYPE: STRUCT(PublicExportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(TaskLocator)
        RETURNVAR: crm_v3_async_create_202
        STATUS: 202
      - RETURNTYPE: ANY
        RETURNVAR: crm_v3_async_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: ANY
        STATUS: 500
        WHEN: HTTP default
    CANONICAL_ID: crm.v3.async.create
